<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title>Avatar</title>
    <style>
        :root {
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            --shadow: 4px 4px 0px #000000;
        }

        body {
            image-rendering: pixelated;
            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 400px;
            position: relative;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 20px;
        }

        .avatar-canvas {
            border: 2px solid black;
            box-shadow: 4px 4px 0 #ccc;
            background: white;
            image-rendering: pixelated;
            display: block;
        }

        .btn-row {
            display: flex;
            margin-top: 20px;
        }

        .btn-row > * + * {
            margin-left: 10px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-family: inherit;
            font-size: 0.85rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        #save-status {
            margin-top: 15px;
            font-weight: bold;
            font-size: 0.85rem;
            min-height: 1.2em;
            text-align: center;
        }

        /* LOGIN OVERLAY */
        #login-overlay {
            position: absolute;
            inset: 35px 0 0 0;
            background: rgba(255,255,255,0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        /* PIXEL EDITOR MODAL */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 5000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 6px 6px 0 black;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        .modal-box h3 {
            margin: 0 0 10px 0;
        }

        .pixel-grid {
            display: grid;
            grid-template-columns: repeat(16, 1fr);
            width: 256px;
            height: 256px;
            border: 2px solid black;
            background: white;
            margin: 15px auto;
            touch-action: none;
        }

        .pixel {
            border: 1px solid #eee;
            background: white;
            cursor: pointer;
        }

        .pixel.active {
            background: black;
            border-color: black;
        }

        .editor-controls {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .editor-controls > * + * {
            margin-left: 10px;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="theme.js?v=17"></script>
</head>

<body>

    <!-- PIXEL EDITOR MODAL -->
    <div id="avatar-modal" class="modal-overlay">
        <div class="modal-box">
            <h3>Draw Profile Icon</h3>
            <div id="pixel-grid" class="pixel-grid"></div>
            <div class="editor-controls">
                <button class="sys-btn" onclick="clearGrid()">Clear</button>
                <button class="sys-btn" onclick="saveCustomAvatar()"
                    style="background:black; color:white;">Save</button>
            </div>
            <button class="sys-btn" onclick="closeAvatarModal()"
                style="margin-top:10px; width:100%;">Cancel</button>
        </div>
    </div>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text">My Avatar</span>
        </div>

        <div class="content">
            <canvas id="my-avatar" class="avatar-canvas" width="128" height="128"
                style="width:128px; height:128px;"></canvas>

            <div class="btn-row">
                <button class="sys-btn" onclick="openAvatarModal()">Draw</button>
                <button class="sys-btn" onclick="regenerateAvatar()">Regenerate</button>
                <button class="sys-btn" onclick="clearCustomAvatar()">Clear</button>
            </div>

            <div class="btn-row" style="margin-top:15px;">
                <button class="sys-btn" onclick="saveAvatar()"
                    style="background:black; color:white; padding: 10px 30px;">Save Avatar</button>
            </div>

            <div id="save-status"></div>
        </div>

        <div id="login-overlay" style="display:none;">
            <h2>Please Log In</h2>
            <p>You need to be logged in to edit your avatar.</p>
            <button class="sys-btn" onclick="window.location.href='index?login=true'">Log In</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDY7x7vVmlYUyVZNLuCCmIQYa6PWFVfZqQ",
            authDomain: "rekindle-dd1fa.firebaseapp.com",
            projectId: "rekindle-dd1fa",
            storageBucket: "rekindle-dd1fa.firebasestorage.app",
            messagingSenderId: "748026882518",
            appId: "1:748026882518:web:6877dd4329318070c11c77",
            databaseURL: "https://rekindle-dd1fa-default-rtdb.firebaseio.com"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();

        let currentUser = null;
        let avatarSeed = null;
        let customAvatar = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('login-overlay').style.display = 'none';
                loadAvatar();
            } else {
                document.getElementById('login-overlay').style.display = 'flex';
            }
        });

        function loadAvatar() {
            db.ref('user_cards/' + currentUser.uid).once('value').then(snap => {
                const card = snap.val();
                if (card) {
                    avatarSeed = card.avatarSeed || currentUser.uid;
                    customAvatar = card.customAvatar || null;
                } else {
                    avatarSeed = Math.floor(Math.random() * 10000);
                    customAvatar = null;
                }
                drawAvatar('my-avatar', customAvatar || avatarSeed);
            });
        }

        function saveAvatar() {
            if (!currentUser) return;
            const statusEl = document.getElementById('save-status');
            statusEl.innerText = 'Saving...';

            const username = (currentUser.email || currentUser.uid).split('@')[0];
            const updates = {
                username: username,
                avatarSeed: avatarSeed,
                customAvatar: customAvatar || null
            };

            db.ref('user_cards/' + currentUser.uid).update(updates)
                .then(() => db.ref('users_public/' + currentUser.uid).update({
                    avatarSeed: avatarSeed,
                    customAvatar: customAvatar || null
                }))
                .then(() => {
                    statusEl.innerText = 'Saved!';
                    setTimeout(() => { statusEl.innerText = ''; }, 2000);
                })
                .catch(err => {
                    console.error(err);
                    statusEl.innerText = 'Error saving.';
                });
        }

        function regenerateAvatar() {
            avatarSeed = Math.floor(Math.random() * 100000);
            customAvatar = null;
            drawAvatar('my-avatar', avatarSeed);
        }

        function clearCustomAvatar() {
            customAvatar = null;
            drawAvatar('my-avatar', avatarSeed);
        }

        // --- PIXEL EDITOR ---
        let tempPixelData = new Array(256).fill(0);
        let isDrawing = false;
        let drawMode = 1;

        function openAvatarModal() {
            if (customAvatar && customAvatar.length === 256) {
                tempPixelData = [...customAvatar];
            } else if (customAvatar && customAvatar.length === 64) {
                tempPixelData = new Array(256).fill(0);
                for (let i = 0; i < 64; i++) {
                    if (customAvatar[i] === 1) {
                        const x = i % 8, y = Math.floor(i / 8);
                        const sx = x * 2, sy = y * 2;
                        tempPixelData[sy * 16 + sx] = 1;
                        tempPixelData[sy * 16 + sx + 1] = 1;
                        tempPixelData[(sy + 1) * 16 + sx] = 1;
                        tempPixelData[(sy + 1) * 16 + sx + 1] = 1;
                    }
                }
            } else {
                tempPixelData = new Array(256).fill(0);
            }
            document.getElementById('avatar-modal').style.display = 'flex';
            initPixelGrid();
        }

        function closeAvatarModal() {
            document.getElementById('avatar-modal').style.display = 'none';
        }

        function initPixelGrid() {
            const grid = document.getElementById('pixel-grid');
            grid.innerHTML = '';
            for (let i = 0; i < 256; i++) {
                const div = document.createElement('div');
                div.className = 'pixel' + (tempPixelData[i] ? ' active' : '');
                div.dataset.index = i;
                div.addEventListener('mousedown', e => { isDrawing = true; drawMode = tempPixelData[i] === 1 ? 0 : 1; setPixel(i, drawMode); });
                div.addEventListener('mouseenter', () => { if (isDrawing) setPixel(i, drawMode); });
                div.addEventListener('touchstart', e => { e.preventDefault(); isDrawing = true; drawMode = tempPixelData[i] === 1 ? 0 : 1; setPixel(i, drawMode); }, { passive: false });
                grid.appendChild(div);
            }
            grid.addEventListener('touchmove', e => {
                if (!isDrawing) return;
                e.preventDefault();
                const el = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                if (el && el.classList.contains('pixel')) setPixel(parseInt(el.dataset.index), drawMode);
            }, { passive: false });
            window.addEventListener('mouseup', () => isDrawing = false, { once: false });
            window.addEventListener('touchend', () => isDrawing = false, { once: false });
        }

        function setPixel(index, value) {
            tempPixelData[index] = value;
            const pixels = document.querySelectorAll('#pixel-grid .pixel');
            if (pixels[index]) {
                if (value) pixels[index].classList.add('active');
                else pixels[index].classList.remove('active');
            }
        }

        function clearGrid() {
            tempPixelData.fill(0);
            document.querySelectorAll('#pixel-grid .pixel').forEach(p => p.classList.remove('active'));
        }

        function saveCustomAvatar() {
            customAvatar = [...tempPixelData];
            closeAvatarModal();
            drawAvatar('my-avatar', customAvatar);
        }

        // --- AVATAR RENDERER ---
        function drawAvatar(canvasId, seed) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';

            if (Array.isArray(seed)) {
                const gridSize = Math.sqrt(seed.length);
                const pixelSize = canvas.width / gridSize;
                for (let i = 0; i < seed.length; i++) {
                    if (seed[i] === 1) {
                        ctx.fillRect((i % gridSize) * pixelSize, Math.floor(i / gridSize) * pixelSize, pixelSize, pixelSize);
                    }
                }
                return;
            }

            let hash = 0;
            const str = String(seed);
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }

            const gridSize = 16;
            const pixelSize = canvas.width / gridSize;
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < gridSize; y++) {
                    const bitIndex = (x * gridSize + y) % 32;
                    const secondary = ((hash >> 3) ^ (hash << 7)) + (y * 17);
                    const val = ((hash >> bitIndex) ^ (secondary >> (bitIndex % 16))) & 1;
                    const distFromCenter = Math.abs(y - 8) + Math.abs(x - 4);
                    const fillChance = distFromCenter < 6 ? val : (val && ((hash >> (x + y)) & 3) === 0);
                    if (fillChance) {
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                        ctx.fillRect((gridSize - 1 - x) * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
        }
    </script>
</body>

</html>
