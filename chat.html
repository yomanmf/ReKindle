<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>AI Assistant</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Courier New", Courier, monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            /* Background managed by settings */

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            font-family: "Geneva", sans-serif;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        /* CLOSE BUTTON (HOME) */
        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* CONTROLS */
        .controls {
            position: absolute;
            right: 10px;
            z-index: 1;
            display: flex;
        }

        .controls>*+* {
            margin-left: 10px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 4px 10px;
            font-family: "Geneva", sans-serif;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.8rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* CHAT AREA */
        #chat-history {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            display: flex;
            flex-direction: column;
        }

        #chat-history>*+* {
            margin-top: 20px;
        }

        .message {
            line-height: 1.5;
            font-size: 1.1rem;
            max-width: 90%;
        }

        .message.user {
            align-self: flex-end;
            text-align: right;
            font-weight: bold;
        }

        .message.user::before {
            content: "> ";
        }

        .message.ai {
            align-self: flex-start;
            text-align: left;
        }

        /* INPUT AREA */
        .input-area {
            border-top: 2px solid black;
            padding: 10px;
            display: flex;
            background: #eee;
        }

        .input-area>*+* {
            margin-left: 10px;
        }

        textarea {
            flex-grow: 1;
            border: 2px solid black;
            padding: 10px;
            font-family: inherit;
            font-size: 1.1rem;
            resize: none;
            height: 50px;
        }

        #send-btn {
            height: 74px;
            /* Match textarea height + padding */
            width: 80px;
            font-size: 1.2rem;
        }

        /* Formatted Code Blocks */
        pre {
            white-space: pre-wrap;
            background: #eee;
            padding: 10px;
            border: 1px solid black;
            font-size: 0.9rem;
        }

        /* MODAL SYSTEM */
        #settings-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        .modal-input {
            width: 100%;
            margin: 10px 0;
            padding: 8px;
            border: 2px solid black;
            font-family: inherit;
            box-sizing: border-box;
        }

        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 15px 0;
            text-align: left;
        }

        /* Model Selector Under Titlebar */
        #model-selector-bar {
            display: flex;
            overflow-x: auto;
            border-bottom: 2px solid black;
            padding: 5px;
            background: #eee;
            font-size: 0.8rem;
            align-items: center;
            justify-content: center;
        }

        #model-selector-bar button {
            margin-right: 8px;
            /* Replaces gap: 8px */
            white-space: nowrap;
        }

        #model-selector-bar select {
            font-size: 0.8rem;
            padding: 2px 4px;
            border: 1px solid #ccc;
            border-radius: 4px;
            background: white;
        }
    </style>
    <link rel="stylesheet" href="css/custom-select.css">
    <script src="time.js"></script>
    <script src="theme.js?v=18"></script>
    <script src="js/rekindle-cloud.js?v=2"></script>
    <script src="js/i18n.js"></script>
    <script src="js/custom-select.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>

            <span class="title-text" data-i18n="app.title">AI Assistant</span>

            <div class="controls">
                <button class="sys-btn" onclick="openSettings()" style="margin-right:5px;"
                    data-i18n="btn.settings">Settings</button>
                <button class="sys-btn" onclick="clearChat()" data-i18n="btn.clear">Clear</button>
            </div>
        </div>

        <!-- MODEL SELECTOR BAR -->
        <div id="model-selector-bar">
            <span id="model-provider-label" style="font-weight:bold; color:#666;" data-i18n="label.gemini">Gemini</span>
            <select id="quick-model-select" onchange="quickUpdateModel()"></select>
        </div>

        <div id="chat-history">
            <!-- Chat starts empty -->
        </div>

        <div class="input-area">
            <textarea id="user-input" placeholder="Ask a question..."
                data-i18n-placeholder="input.placeholder"></textarea>
            <button id="send-btn" class="sys-btn" onclick="sendMessage()" disabled="" data-i18n="btn.send">Send</button>
        </div>
        <div id="message-counter"
            style="text-align:center; font-size:0.8rem; padding:5px; background:#eee; border-top:1px solid #ccc; color:#666;">
            Loading quota...
        </div>

        <!-- SETTINGS MODAL -->
        <div id="settings-modal">
            <div class="modal-box">
                <h3 style="margin-top:0; border-bottom:2px solid black; padding-bottom:10px;"
                    data-i18n="settings.title">Settings</h3>

                <div class="setting-row">
                    <label for="byo-toggle" style="font-weight:bold;" data-i18n="settings.custom_key">Use Custom AI
                        Key</label>
                    <input type="checkbox" id="byo-toggle" onchange="toggleByoKey()" style="width:20px; height:20px;">
                </div>

                <!-- ALERT MODAL -->
                <div id="alert-modal"
                    style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(255,255,255,0.95); z-index:2000; align-items:center; justify-content:center; flex-direction:column;">
                    <div class="modal-box">
                        <p id="alert-message" style="margin:20px 0;">Message</p>
                        <button class="sys-btn" onclick="closeAlert()">OK</button>
                    </div>
                </div>

                <div id="ai-provider-settings"
                    style="display:none; background:#eee; padding:5px; border:1px solid #ccc; margin-top:5px;">
                    <div class="setting-row" style="margin:5px 0;">
                        <strong style="font-size:0.8rem;">Provider</strong>
                        <select id="ai-preset-select" onchange="onPresetChange()"
                            style="font-size:0.8rem; padding:2px;">
                            <option value="openai">OpenAI</option>
                            <option value="gemini">Google Gemini</option>
                            <option value="groq">Groq</option>
                            <option value="xai">xAI (Grok)</option>
                            <option value="mistral">Mistral</option>
                            <option value="perplexity">Perplexity</option>
                            <option value="together">Together AI</option>
                            <option value="fireworks">Fireworks AI</option>
                            <option value="ollama">Ollama (Local)</option>
                            <option value="custom_openai">Custom (OpenAI-compat)</option>
                            <option value="custom_gemini">Custom (Gemini-compat)</option>
                        </select>
                    </div>

                    <div class="setting-row" style="margin:5px 0;">
                        <strong style="font-size:0.8rem;">Model</strong>
                        <div style="display: flex; align-items: center">
                            <select id="ai-model-select" onchange="saveSettings()"
                                style="font-size:0.8rem; padding:2px; max-width:150px;">
                            </select>
                            <button class="sys-btn" onclick="fetchModels(true)"
                                style="font-size:0.7rem; padding:2px 5px; margin-left: 5px"
                                title="Fetch latest models using API Key">↻</button>
                        </div>
                    </div>

                    <label id="api-key-label" style="font-size:0.8rem;">API Key:</label>
                    <input type="text" id="ai-api-key" class="modal-input" placeholder="sk-..."
                        style="margin:5px 0; width: 100%; font-size: 0.85rem; font-family: monospace;">

                    <div id="custom-endpoint-section" style="display:none;">
                        <label style="font-size:0.8rem;">Endpoint:</label>
                        <input type="text" id="custom-endpoint" class="modal-input"
                            placeholder="http://localhost:11434/v1"
                            style="margin:5px 0; font-size:0.75rem;">
                    </div>
                </div>
                <p style="font-size:0.7rem; color:#666; margin-top:5px;">
                    Key is stored locally. <span id="api-key-link-wrap"></span>
                </p>

                <div style="margin-top: 20px; display: flex; justify-content: center">
                    <button class="sys-btn" onclick="saveSettings()" data-i18n="settings.save">Save</button>
                    <button class="sys-btn" onclick="closeSettings()" data-i18n="settings.cancel"
                        style="margin-left: 10px">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function obfuscate(str) {
            if (!str) return str;
            var key = 'rek';
            var res = '';
            for (var i = 0; i < str.length; i++) {
                res += String.fromCharCode(str.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            }
            return btoa(res);
        }
        function deobfuscate(str) {
            if (!str) return str;
            try {
                var key = 'rek';
                var raw = atob(str);
                var res = '';
                for (var i = 0; i < raw.length; i++) {
                    res += String.fromCharCode(raw.charCodeAt(i) ^ key.charCodeAt(i % key.length));
                }
                return res;
            } catch (e) { return str; }
        }
        function setSecureItem(key, value) { localStorage.setItem(key, obfuscate(value)); }
        function getSecureItem(key) { return deobfuscate(localStorage.getItem(key)); }
        // --- CONFIGURATION ---
        const AI_API_PATH = "/ai/chat";
        const DAILY_MESSAGE_LIMIT = 10;

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        let dailyMessageCount = null; // Loading state (null = loading, -1 = error, >=0 = count)
        let currentUserId = null;

        // Get today's date string for tracking (YYYY-MM-DD)
        function getTodayString() {
            const now = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
            return now.toISOString().split('T')[0];
        }

        // --- SETTINGS LOGIC ---
        let useByoKey = false;
        let aiPreset = "openai";
        let aiProvider = "openai"; // API format: 'openai' or 'gemini'
        let aiModel = "";
        let apiKey = "";
        let customEndpoint = "";

        const PROVIDER_PRESETS = {
            openai:        { name: 'OpenAI',                 type: 'openai',  endpoint: 'https://api.openai.com',                     keyPlaceholder: 'sk-...',     keyHint: 'Get OpenAI Key',      keyUrl: 'https://platform.openai.com/api-keys' },
            gemini:        { name: 'Google Gemini',          type: 'gemini',  endpoint: 'https://generativelanguage.googleapis.com',  keyPlaceholder: 'AIzaSy...',  keyHint: 'Get Gemini Key',      keyUrl: 'https://aistudio.google.com/app/apikey' },
            groq:          { name: 'Groq',                   type: 'openai',  endpoint: 'https://api.groq.com/openai/v1',            keyPlaceholder: 'gsk_...',    keyHint: 'Get Groq Key',        keyUrl: 'https://console.groq.com/keys' },
            xai:           { name: 'xAI (Grok)',             type: 'openai',  endpoint: 'https://api.x.ai/v1',                       keyPlaceholder: 'xai-...',    keyHint: 'Get xAI Key',         keyUrl: 'https://console.x.ai/' },
            mistral:       { name: 'Mistral',                type: 'openai',  endpoint: 'https://api.mistral.ai/v1',                 keyPlaceholder: '',           keyHint: 'Get Mistral Key',     keyUrl: 'https://console.mistral.ai/api-keys/' },
            perplexity:    { name: 'Perplexity',             type: 'openai',  endpoint: 'https://api.perplexity.ai',                 keyPlaceholder: 'pplx-...',   keyHint: 'Get Perplexity Key',  keyUrl: 'https://www.perplexity.ai/settings/api' },
            together:      { name: 'Together AI',            type: 'openai',  endpoint: 'https://api.together.xyz/v1',               keyPlaceholder: '',           keyHint: 'Get Together Key',    keyUrl: 'https://api.together.ai/settings/api-keys' },
            fireworks:     { name: 'Fireworks AI',           type: 'openai',  endpoint: 'https://api.fireworks.ai/inference/v1',     keyPlaceholder: 'fw_...',     keyHint: 'Get Fireworks Key',   keyUrl: 'https://fireworks.ai/account/api-keys' },
            ollama:        { name: 'Ollama (Local)',          type: 'openai',  endpoint: 'http://localhost:11434/v1',                 keyPlaceholder: 'ollama',     keyHint: '',                    keyUrl: '', showEndpoint: true },
            custom_openai: { name: 'Custom (OpenAI-compat)', type: 'openai',  endpoint: '',                                          keyPlaceholder: '',           keyHint: '',                    keyUrl: '', showEndpoint: true },
            custom_gemini: { name: 'Custom (Gemini-compat)', type: 'gemini',  endpoint: '',                                          keyPlaceholder: '',           keyHint: '',                    keyUrl: '', showEndpoint: true },
        };

        // Per-preset model cache keyed by preset id
        let customModels = {};

        function getActiveEndpoint() {
            const preset = PROVIDER_PRESETS[aiPreset];
            if (!preset) return '';
            return (preset.showEndpoint && customEndpoint) ? customEndpoint : preset.endpoint;
        }

        function onPresetChange() {
            const presetId = document.getElementById('ai-preset-select').value;
            const preset = PROVIDER_PRESETS[presetId];
            if (!preset) return;

            // Update key field UI
            document.getElementById('ai-api-key').placeholder = preset.keyPlaceholder;
            document.getElementById('api-key-label').innerText = preset.name + ' Key:';

            // Show/hide endpoint field
            const epSection = document.getElementById('custom-endpoint-section');
            epSection.style.display = preset.showEndpoint ? 'block' : 'none';
            if (preset.showEndpoint) {
                document.getElementById('custom-endpoint').placeholder = preset.endpoint || 'http://localhost:11434/v1';
            }

            // Update "Get Key" link
            const wrap = document.getElementById('api-key-link-wrap');
            wrap.innerHTML = preset.keyUrl
                ? `<a href="${preset.keyUrl}" target="_blank">${preset.keyHint}</a>`
                : '';

            // Refresh model list for new preset
            updateModelDropdown(presetId, '');
        }

        function updateModelDropdown(presetId, selectedModel) {
            const modelSelect = document.getElementById('ai-model-select');
            if (!modelSelect) return;
            modelSelect.innerHTML = '';
            const models = customModels[presetId] || [];
            models.forEach(m => {
                const opt = document.createElement('option');
                opt.value = m.id;
                opt.innerText = m.name;
                modelSelect.appendChild(opt);
            });
            if (selectedModel && models.find(m => m.id === selectedModel)) {
                modelSelect.value = selectedModel;
            } else if (models.length > 0) {
                modelSelect.value = models[0].id;
            }
        }

        function openSettings() {
            useByoKey = localStorage.getItem('chat_use_byo_key') === 'true';
            aiPreset = localStorage.getItem('chat_ai_preset') || 'openai';
            aiModel = localStorage.getItem('chat_ai_model') || '';
            apiKey = getSecureItem('chat_api_key') || '';
            customEndpoint = localStorage.getItem('chat_custom_endpoint') || '';

            try {
                customModels = JSON.parse(localStorage.getItem('chat_custom_models') || '{}');
            } catch (e) { customModels = {}; }

            document.getElementById('byo-toggle').checked = useByoKey;
            document.getElementById('ai-preset-select').value = aiPreset;
            document.getElementById('ai-api-key').value = apiKey;
            document.getElementById('custom-endpoint').value = customEndpoint;

            onPresetChange();
            updateModelDropdown(aiPreset, aiModel);
            toggleByoKey();
            updateQuickModelBar();
            document.getElementById('settings-modal').style.display = 'flex';
        }

        function toggleByoKey() {
            const isChecked = document.getElementById('byo-toggle').checked;
            document.getElementById('ai-provider-settings').style.display = isChecked ? 'block' : 'none';
            useByoKey = isChecked;
            updateMessageCounter();
        }

        function updateQuickModelBar() {
            const bar = document.getElementById('model-selector-bar');
            if (useByoKey && apiKey) {
                bar.style.display = 'flex';
                const preset = PROVIDER_PRESETS[aiPreset];
                document.getElementById('model-provider-label').innerText = preset ? preset.name : aiPreset;

                const select = document.getElementById('quick-model-select');
                select.innerHTML = '';
                const models = customModels[aiPreset] || [];
                models.forEach(m => {
                    const opt = document.createElement('option');
                    opt.value = m.id;
                    opt.innerText = m.name;
                    select.appendChild(opt);
                });
                if (aiModel && models.find(m => m.id === aiModel)) {
                    select.value = aiModel;
                } else if (models.length > 0) {
                    select.value = models[0].id;
                }
            } else {
                bar.style.display = 'none';
            }
        }

        function quickUpdateModel() {
            const val = document.getElementById('quick-model-select').value;
            aiModel = val;
            localStorage.setItem('chat_ai_model', aiModel);
            if (currentUserId) {
                const db = firebase.firestore();
                db.collection('users').doc(currentUserId).collection('privateSettings').doc('ai').set({
                    model: aiModel
                }, { merge: true });
            }
        }

        async function fetchModels(alertUser = false, specificPreset = null, specificKey = null) {
            const presetId = specificPreset || document.getElementById('ai-preset-select').value || aiPreset;
            const preset = PROVIDER_PRESETS[presetId];
            if (!preset) return;

            const key = specificKey || document.getElementById('ai-api-key').value.trim() || apiKey;
            if (!key) {
                if (alertUser) showAlert("Please enter an API Key first.");
                return;
            }

            const endpoint = (preset.showEndpoint)
                ? (document.getElementById('custom-endpoint').value.trim() || preset.endpoint)
                : preset.endpoint;

            if (alertUser) {
                const btn = document.querySelector('button[title="Fetch latest models using API Key"]');
                if (btn) btn.innerText = "...";
            }

            try {
                const data = await RekindleCloud.request(AI_API_PATH, {
                    method: 'POST',
                    body: {
                        action: 'list_models',
                        provider: preset.type,
                        endpoint: endpoint,
                        apiKey: key
                    }
                });

                if (data.models && data.models.length > 0) {
                    customModels[presetId] = data.models;
                    localStorage.setItem('chat_custom_models', JSON.stringify(customModels));
                    const modelSelect = document.getElementById('ai-model-select');
                    if (modelSelect && modelSelect.offsetParent !== null) {
                        updateModelDropdown(presetId, modelSelect.value);
                    }
                    updateQuickModelBar();
                    if (alertUser) showAlert("Models updated successfully!");
                } else if (data.error) {
                    throw new Error(data.error.message || "Unknown error");
                } else {
                    throw new Error("No models returned.");
                }
            } catch (e) {
                console.error(e);
                if (alertUser) showAlert("Error fetching models: " + e.message);
            } finally {
                if (alertUser) {
                    const btn = document.querySelector('button[title="Fetch latest models using API Key"]');
                    if (btn) btn.innerText = "↻";
                }
            }
        }

        function saveSettings() {
            const isChecked = document.getElementById('byo-toggle').checked;
            const presetId = document.getElementById('ai-preset-select').value;
            const model = document.getElementById('ai-model-select').value;
            const key = document.getElementById('ai-api-key').value.trim();
            const endpoint = document.getElementById('custom-endpoint').value.trim();

            useByoKey = isChecked;
            aiPreset = presetId;
            aiProvider = (PROVIDER_PRESETS[presetId] || {}).type || 'openai';
            aiModel = model;
            apiKey = key;
            customEndpoint = endpoint;

            localStorage.setItem('chat_use_byo_key', useByoKey);
            localStorage.setItem('chat_ai_preset', aiPreset);
            localStorage.setItem('chat_ai_provider', aiProvider);
            localStorage.setItem('chat_ai_model', aiModel);
            setSecureItem('chat_api_key', apiKey);
            localStorage.setItem('chat_custom_endpoint', customEndpoint);

            updateQuickModelBar();
            updateMessageCounter();

            if (currentUserId) {
                const db = firebase.firestore();
                db.collection('users').doc(currentUserId).collection('privateSettings').doc('ai').set({
                    aiPreset: presetId,
                    provider: aiProvider,
                    model: model,
                    apiKey: key,
                    customEndpoint: endpoint,
                    useByoKey: isChecked,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                }, { merge: true }).then(() => {
                    closeSettings();
                }).catch(error => {
                    console.error("Save failed:", error);
                    closeSettings();
                });
            } else {
                closeSettings();
            }
        }

        function closeSettings() {
            document.getElementById('settings-modal').style.display = 'none';
            loadSettingsFromFirebase();
        }

        function showAlert(msg) {
            document.getElementById('alert-message').innerText = msg;
            document.getElementById('alert-modal').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('alert-modal').style.display = 'none';
        }

        async function loadSettingsFromFirebase() {
            if (!currentUserId) return;
            try {
                const db = firebase.firestore();
                const doc = await db.collection('users').doc(currentUserId).collection('privateSettings').doc('ai').get();

                if (doc.exists) {
                    const data = doc.data();
                    useByoKey = data.useByoKey || false;
                    aiPreset = data.aiPreset || data.provider || 'openai';
                    aiProvider = (PROVIDER_PRESETS[aiPreset] || {}).type || data.provider || 'openai';
                    aiModel = data.model || '';
                    apiKey = data.apiKey || '';
                    customEndpoint = data.customEndpoint || '';

                    updateQuickModelBar();
                    updateMessageCounter();

                    if (useByoKey && apiKey) {
                        fetchModels(false, aiPreset, apiKey);
                    }
                } else {
                    useByoKey = false;
                    apiKey = '';
                    updateQuickModelBar();
                    updateMessageCounter();
                }
            } catch (e) {
                console.error("Error loading settings", e);
                useByoKey = false;
                apiKey = '';
                updateQuickModelBar();
                updateMessageCounter();
            }
        }

        // Load daily message count from Firestore
        async function loadDailyMessageCount() {
            if (!currentUserId) return;
            const db = firebase.firestore();
            const today = getTodayString();

            try {
                const doc = await db.collection('users').doc(currentUserId)
                    .collection('chatLimits').doc(today).get();

                if (doc.exists) {
                    dailyMessageCount = doc.data().count || 0;
                } else {
                    dailyMessageCount = 0;
                }
                updateMessageCounter();
            } catch (e) {
                if (e.code === 'permission-denied') {
                    console.warn("Permission denied loading message count; treating as 0");
                    dailyMessageCount = 0;
                } else {
                    console.error("Error loading message count:", e);
                    dailyMessageCount = -1; // Error marker
                }
                updateMessageCounter();
            }
        }

        // Increment and save message count
        async function incrementMessageCount() {
            if (!currentUserId) return false;
            const db = firebase.firestore();
            const today = getTodayString();

            try {
                await db.collection('users').doc(currentUserId)
                    .collection('chatLimits').doc(today).set({
                        count: firebase.firestore.FieldValue.increment(1),
                        lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
                    }, { merge: true });

                dailyMessageCount++;
                updateMessageCounter();
                return true;
            } catch (e) {
                console.error("Error saving message count:", e);
                return false;
            }
        }

        // Update the counter display
        function updateMessageCounter() {
            const counterEl = document.getElementById('message-counter');
            const sendBtn = document.getElementById('send-btn');
            if (counterEl) {
                if (useByoKey) {
                    counterEl.style.display = 'none';
                    if (sendBtn) sendBtn.disabled = false;
                } else {
                    counterEl.style.display = 'block';
                    if (dailyMessageCount === null) {
                        counterEl.innerText = "Loading quota...";
                        counterEl.style.color = '#666';
                        if (sendBtn) sendBtn.disabled = true;
                    } else if (dailyMessageCount === -1) {
                        counterEl.innerText = "Error loading quota. Refresh to try again.";
                        counterEl.style.color = '#cc0000';
                        if (sendBtn) sendBtn.disabled = true;
                    } else {
                        const remaining = DAILY_MESSAGE_LIMIT - dailyMessageCount;
                        counterEl.innerText = `${remaining}/${DAILY_MESSAGE_LIMIT} messages left today`;
                        counterEl.style.color = remaining <= 3 ? '#cc0000' : '#666';
                        if (sendBtn) sendBtn.disabled = remaining <= 0;
                    }
                }
            }
        }

        function checkAccess() {
            const sendBtn = document.getElementById('send-btn');
            if (typeof firebase !== 'undefined') {
                if (!firebase.apps.length) {
                    firebase.initializeApp(firebaseConfig);
                }
                const auth = firebase.auth();
                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUserId = user.uid;
                        loadSettingsFromFirebase();
                        loadDailyMessageCount();
                    } else {
                        currentUserId = null;
                        dailyMessageCount = -1;
                        document.getElementById('message-counter').innerText = "Please sign in to use AI Assistant.";
                        if (sendBtn) sendBtn.disabled = true;
                    }
                });
            } else {
                showAlert("Error: Firebase not loaded.");
            }
        }


        // --- INIT ---
        function waitForFirebase(callback, attempts = 0) {
            if (typeof firebase !== 'undefined') {
                callback();
            } else if (attempts < 50) {
                // Retry every 100ms for up to 5 seconds
                setTimeout(() => waitForFirebase(callback, attempts + 1), 100);
            } else {
                showAlert("Error: Firebase failed to load.");
            }
        }

        // Initialize settings on load
        function initSettings() {
            useByoKey = localStorage.getItem('chat_use_byo_key') === 'true';
            aiPreset = localStorage.getItem('chat_ai_preset') || 'openai';
            aiProvider = (PROVIDER_PRESETS[aiPreset] || {}).type || localStorage.getItem('chat_ai_provider') || 'openai';
            aiModel = localStorage.getItem('chat_ai_model') || '';
            apiKey = getSecureItem('chat_api_key') || '';
            customEndpoint = localStorage.getItem('chat_custom_endpoint') || '';

            try {
                customModels = JSON.parse(localStorage.getItem('chat_custom_models') || '{}');
            } catch (e) { customModels = {}; }

            const byoToggle = document.getElementById('byo-toggle');
            if (byoToggle) byoToggle.checked = useByoKey;

            toggleByoKey();
            updateQuickModelBar();
        }

        window.onload = () => {
            initSettings();
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            waitForFirebase(checkAccess);

            // Enter key to send
            document.getElementById('user-input').addEventListener('keypress', function (e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        };

        // --- WALLPAPER LOADER ---

        // --- CHAT LOGIC ---
        async function sendMessage() {
            const inputEl = document.getElementById('user-input');
            const text = inputEl.value.trim();

            if (!text) return;

            // Check daily message limit (Skip if Custom Key)
            if (!useByoKey && dailyMessageCount >= DAILY_MESSAGE_LIMIT) {
                addMessage("You've reached your daily limit of " + DAILY_MESSAGE_LIMIT + " messages. Please try again tomorrow.", 'ai');
                return;
            }

            // 1. Add User Message
            addMessage(text, 'user');
            inputEl.value = '';

            // 2. Show Loading
            const loadingId = addMessage("Thinking...", 'ai');

            // 3. API Call via Proxy
            try {
                const payload = { prompt: text };

                if (useByoKey) {
                    payload.provider = aiProvider;
                    payload.model = aiModel;
                    payload.apiKey = apiKey;
                    payload.endpoint = getActiveEndpoint();
                }

                const data = await RekindleCloud.request(AI_API_PATH, {
                    method: 'POST',
                    body: payload
                });

                // Remove loading message
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();

                if (data.error) {
                    addMessage("Error: " + (data.error.message || "Unknown AI service error"), 'ai');
                } else if (data.text) {
                    addMessage(data.text, 'ai');
                    // Increment message count only if NOT using BYO Key
                    if (!useByoKey) {
                        await incrementMessageCount();
                    }
                } else {
                    addMessage("Error: Empty response from Oracle.", 'ai');
                }

            } catch (e) {
                const loadingEl = document.getElementById(loadingId);
                if (loadingEl) loadingEl.remove();
                addMessage("Network Error. Check connection.", 'ai');
                console.error(e);
            }
        }

        function copyToNote(text) {
            localStorage.setItem('rekindle_new_note_content', text);
            window.location.href = 'notes.html?action=new_note';
        }

        function addMessage(text, sender) {
            const history = document.getElementById('chat-history');
            const msgDiv = document.createElement('div');
            const id = 'msg-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);
            msgDiv.id = id;
            msgDiv.className = `message ${sender}`;

            if (sender === 'ai' && text !== "Thinking...") {
                try {
                    msgDiv.innerHTML = marked.parse(text);
                } catch (e) {
                    msgDiv.innerText = text;
                }

                // Add Copy to Note Button
                const btn = document.createElement('button');
                btn.className = 'sys-btn';
                btn.style.marginTop = '10px';
                btn.style.display = 'inline-block'; // Ensure it sits on its own line if needed, or inline
                btn.style.fontSize = '0.7rem';
                btn.innerText = 'Copy to Note';
                btn.onclick = () => copyToNote(text);

                // Append a line break or container if needed, but appendChild puts it at end
                msgDiv.appendChild(document.createElement('br'));
                msgDiv.appendChild(btn);

            } else {
                msgDiv.innerText = text;
            }

            history.appendChild(msgDiv);
            history.scrollTop = history.scrollHeight;
            return id;
        }

        function clearChat() {
            document.getElementById('chat-history').innerHTML = '';
            addMessage("Memory cleared.", 'ai');
        }

    </script>

    <script>
        // Helper to sanitize background image URLs from localStorage
        function sanitizeBackgroundImage(imageString) {
            if (!imageString) return '';
            if (imageString.startsWith('url("data:image/png;base64,')) {
                return imageString;
            }
            if (imageString.startsWith('url("') && imageString.endsWith('")')) {
                const url = imageString.substring(5, imageString.length - 2);
                if ((url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) && !url.includes('javascript:')) {
                    return imageString;
                }
            }
            return '';
        }




    </script>
