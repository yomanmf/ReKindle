<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title data-i18n="app.livechess.name">Chess</title>
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js" integrity="sha384-v3Z/Xdw1sCeo6M/geW7sn1Lt9obIm7MhAk8laVV+rvYFmzuWDELOiygx7dVte2dX" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js" integrity="sha384-p62xBRve8PdqGDGASZtZMuHgPsyPcT5VsFwgmz2p4zaFdEtt5ZzNqxK+CLzQS7xP" crossorigin="anonymous"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js" integrity="sha384-fuqdSwJXSvcAuKu5FbSJcHqHK474liv5ji8tuDnHz1rpfrnuXZPdM0oRaSK6c95L" crossorigin="anonymous"></script>
    
    <!-- Chess logic -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js" integrity="sha384-aH7F59TKSh8OEAivbclch9UUnWn/Uy8AQlYYKzpVaQkAp8W6IF2VocW/knEeRwT0" crossorigin="anonymous"></script>

    <script src="theme.js?v=18"></script>

    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            --board-light: #ffffff;
            --board-dark: #a0a0a0;
        }

        * { transition: none !important; animation: none !important; }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;

            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            background-image: repeating-linear-gradient(45deg, #e5e5e5 25%, transparent 25%, transparent 75%, #e5e5e5 75%, #e5e5e5), repeating-linear-gradient(45deg, #e5e5e5 25%, white 25%, white 75%, #e5e5e5 75%, #e5e5e5);
            background-position: 0 0, 2px 2px;
            background-size: 4px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 100%;
            max-min-height: 800px;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .window-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            overflow-y: auto;
            flex-grow: 1;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-family: inherit;
            margin: 10px;
            font-size: 1rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        #status-bar {
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid black;
            padding: 10px 0;
            margin-bottom: 10px;
            background: #eee;
            flex-shrink: 0;
        }

        /* BOARD */
        #board-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 0;
            overflow: hidden;
        }

        #board {
            border: 4px solid black;
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            box-sizing: border-box;
        }

        .square {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            cursor: pointer;
            overflow: hidden;
        }

        .square.light { background-color: var(--board-light); }
        .square.dark { background-color: var(--board-dark); }
        .square.selected { box-shadow: inset 0 0 0 4px black; }
        .square.last-move { background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0, 0, 0, 0.1) 5px, rgba(0, 0, 0, 0.1) 10px); }

        .piece {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            line-height: 1;
            padding-bottom: 5%;
        }

        /* MODALS */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            text-align: center;
        }
        
        .player-list {
            margin: 15px 0;
            text-align: left;
            border: 2px solid black;
            box-shadow: 4px 4px 0 black;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            background: white;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="goHome()">X</div>
            <div class="title-text" data-i18n="app.livechess.name">Chess</div>
        </div>

        <div class="window-content" id="screen-menu">
            <h1 style="font-size: 3rem; margin: 10px 0;">CHESS</h1>
            <p>Real-time Multiplayer.</p>
            <button class="sys-btn" onclick="hostGame()">Host Game</button>
            <button class="sys-btn" onclick="goHome()">Back</button>
        </div>
        
        <div class="window-content" id="screen-loading" style="display:none; justify-content:center;">
            <h2>Loading...</h2>
        </div>

        <div class="window-content" id="screen-lobby" style="display:none;">
            <h2>Lobby</h2>
            <div style="font-size: 1.2rem; margin-bottom: 10px;" id="lobby-status">Waiting for opponent...</div>
            <div class="player-list" id="lobby-players"></div>
            
            <div id="host-controls" style="display:none;">
                <p style="font-size: 0.9rem;">Game starts automatically when an opponent joins.</p>
            </div>
            <button class="sys-btn" onclick="leaveMatch()">Leave Lobby</button>
        </div>

        <div class="window-content" id="screen-game" style="display:none; padding:10px;">
            <div id="status-bar">Waiting...</div>
            
            <div id="player-banner" style="width: 100%; display: flex; justify-content: space-between; margin-bottom: 10px; border: 2px solid black; padding: 5px; background: #fafafa;">
                <div id="player-white" style="display:flex; align-items:center;">
                    <canvas id="avatar-white" width="32" height="32" style="border:1px solid black; width:32px; height:32px; image-rendering:pixelated; background:white;"></canvas>
                    <div style="margin-left:8px;"><div style="font-size:0.7rem; font-weight:bold;">WHITE</div><div id="name-white" style="font-weight:bold;">...</div></div>
                </div>
                <div id="player-black" style="display:flex; align-items:center; flex-direction: row-reverse; text-align: right;">
                    <canvas id="avatar-black" width="32" height="32" style="border:1px solid black; width:32px; height:32px; image-rendering:pixelated; background:white;"></canvas>
                    <div style="margin-right:8px;"><div style="font-size:0.7rem; font-weight:bold;">BLACK</div><div id="name-black" style="font-weight:bold;">...</div></div>
                </div>
            </div>

            <div id="board-container">
                <div id="board"></div>
            </div>

            <div style="margin-top: 10px; display: flex; width: 100%;">
                <button class="sys-btn" style="flex:1" onclick="openResetModal()">New Game</button>
                <button class="sys-btn" style="flex:1" onclick="leaveMatch()">Quit</button>
            </div>
        </div>
        
        <div id="winner-modal" class="modal-overlay">
            <div class="modal-box">
                <h2 id="winner-text">Game Over</h2>
                <button class="sys-btn" onclick="leaveMatch()">Return to Menu</button>
            </div>
        </div>

        <div id="reset-modal" class="modal-overlay">
            <div class="modal-box">
                <h3>Start New Game?</h3>
                <p style="margin: 15px 0;">Current progress will be lost.</p>
                <div style="display: flex; justify-content: center">
                    <button class="sys-btn" onclick="confirmReset()">Yes</button>
                    <button class="sys-btn" onclick="closeResetModal()">No</button>
                </div>
            </div>
        </div>

        <div id="custom-alert-modal" class="modal-overlay">
            <div class="modal-box">
                <h3 id="custom-alert-title">Notice</h3>
                <p id="custom-alert-msg" style="margin: 15px 0;"></p>
                <button class="sys-btn" onclick="closeAlert()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCL6Z5DFTm-pZ_1EZJ_9Ukk9rWDIZky-U",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            databaseURL: "https://rekindle-fork-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const rtdb = firebase.database();
        
        let currentUser = null;
        let matchId = null;
        let isHost = false;
        let matchRef = null;
        let gameState = null;
        let game = new Chess();
        let selectedSquare = null;
        let myColor = null; // 'w' or 'b'
        
        const PIECES = {
            'p': '♟', 'r': '♜', 'n': '♞', 'b': '♝', 'q': '♛', 'k': '♚',
            'P': '♙', 'R': '♖', 'N': '♘', 'B': '♗', 'Q': '♕', 'K': '♔'
        };

        // --- DRAW AVATAR ---
        function drawAvatar(canvasId, seed) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';

            if (Array.isArray(seed)) {
                const gridSize = Math.sqrt(seed.length);
                const pixelSize = canvas.width / gridSize;
                for (let i = 0; i < seed.length; i++) {
                    if (seed[i] === 1) {
                        const x = i % gridSize;
                        const y = Math.floor(i / gridSize);
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
                return;
            }

            let hash = 0;
            const str = String(seed);
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const gridSize = 16;
            const pixelSize = canvas.width / gridSize;
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < gridSize; y++) {
                    const bitIndex = (x * gridSize + y) % 32;
                    const secondary = ((hash >> 3) ^ (hash << 7)) + (y * 17);
                    const val = ((hash >> bitIndex) ^ (secondary >> (bitIndex % 16))) & 1;
                    const distFromCenter = Math.abs(y - 8) + Math.abs(x - 4);
                    const fillChance = distFromCenter < 6 ? val : (val && ((hash >> (x + y)) & 3) === 0);
                    if (fillChance) {
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                        ctx.fillRect((gridSize - 1 - x) * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
        }

        function goHome() {
            window.location.href = 'index.html';
        }

        function showAlert(title, msg) {
            document.getElementById('custom-alert-title').innerText = title;
            document.getElementById('custom-alert-msg').innerText = msg;
            document.getElementById('custom-alert-modal').style.display = 'flex';
        }

        function closeAlert() {
            document.getElementById('custom-alert-modal').style.display = 'none';
        }

        auth.onAuthStateChanged(function(user) {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    name: (user.email ? user.email.split('@')[0] : 'Player')
                };
                checkUrlForMatch();
            } else {
                showAlert("Sign In Required", "Please log in from the home screen first.");
                setTimeout(goHome, 3000);
            }
        });
        
        function checkUrlForMatch() {
            const params = new URLSearchParams(window.location.search);
            const mId = params.get('matchId');
            if (mId) {
                joinMatch(mId);
            } else {
                showScreen('menu');
            }
        }
        
        function showScreen(screen) {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-lobby').style.display = 'none';
            document.getElementById('screen-loading').style.display = 'none';
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-' + screen).style.display = 'flex';
        }
        
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        // ====== MATCHMAKING ======
        
        async function hostGame() {
            showScreen('loading');
            matchId = generateId();
            isHost = true;
            myColor = 'w';
            
            const mmRef = rtdb.ref('matchmaking/chess/' + matchId);
            await mmRef.set({
                hostUid: currentUser.uid,
                hostName: currentUser.name,
                status: 'waiting',
                playerCount: 1,
                maxPlayers: 2,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            
            matchRef = rtdb.ref('games/chess/' + matchId);
            const initialGame = {
                status: 'lobby',
                host: currentUser.uid,
                players: {},
                fen: game.fen(),
                lastMove: null
            };
            initialGame.players[currentUser.uid] = { name: currentUser.name, joinedAt: Date.now(), color: 'w' };
            
            mmRef.onDisconnect().remove();
            matchRef.onDisconnect().remove();
            
            await matchRef.set(initialGame);
            listenToMatch();
            showScreen('lobby');
            document.getElementById('host-controls').style.display = 'block';
        }
        
        async function joinMatch(mId) {
            showScreen('loading');
            matchId = mId;
            isHost = false;
            
            matchRef = rtdb.ref('games/chess/' + matchId);
            const snap = await matchRef.once('value');
            if (!snap.exists()) {
                showAlert("Not Found", "Game not found!");
                goHome();
                return;
            }
            
            const state = snap.val();
            if (state.status === 'playing' && !state.players[currentUser.uid]) {
                showAlert("Error", "Game already started!");
                goHome();
                return;
            }
            
            const players = state.players || {};
            if (state.status === 'lobby' && Object.keys(players).length >= 2 && !players[currentUser.uid]) {
                showAlert("Lobby Full", "Game is full!");
                goHome();
                return;
            }
            
            if (players[currentUser.uid]) {
                myColor = players[currentUser.uid].color;
            } else {
                myColor = 'b';
                await matchRef.child('players').child(currentUser.uid).set({
                    name: currentUser.name,
                    joinedAt: Date.now(),
                    color: 'b'
                });
                
                // Host starts the game when someone joins
                if (Object.keys(players).length === 1) {
                    await startGame();
                }
            }
            
            listenToMatch();
            showScreen('lobby');
        }
        
        async function startGame() {
            // Only host or second player joining can trigger this logic
            // In joinMatch, we trigger it if we are the 2nd player
            await matchRef.update({
                status: 'playing',
                fen: game.fen(),
                turn: 'w'
            });
            
            rtdb.ref('matchmaking/chess/' + matchId).remove();
        }

        function leaveMatch() {
            if (matchRef && currentUser) {
                if (isHost && gameState && gameState.status === 'lobby') {
                    rtdb.ref('matchmaking/chess/' + matchId).remove();
                    matchRef.remove();
                } else {
                    matchRef.child('players').child(currentUser.uid).remove();
                }
            }
            goHome();
        }

        function listenToMatch() {
            matchRef.on('value', function(snap) {
                const data = snap.val();
                if (!data) {
                    showAlert("Game Closed", "The match has been ended.");
                    goHome();
                    return;
                }
                gameState = data;
                
                if (gameState.status === 'lobby') {
                    updateLobbyUI();
                } else if (gameState.status === 'playing') {
                    let justSwitched = false;
                    if (document.getElementById('screen-game').style.display === 'none') {
                        showScreen('game');
                        resizeBoard();
                        justSwitched = true;
                    }
                    if (justSwitched || gameState.fen !== game.fen()) {
                        game = new Chess(gameState.fen);
                        renderBoard();
                        checkStatus();
                        updatePlayerInfo();
                    }
                } else if (gameState.status === 'finished') {
                    document.getElementById('winner-modal').style.display = 'flex';
                    const winnerName = (gameState.players[gameState.winner] || {}).name || 'Someone';
                    document.getElementById('winner-text').innerText = winnerName + " Wins!";
                }
            });
        }

        function updateLobbyUI() {
            const players = Object.entries(gameState.players || {}).map(function(entry) {
                return { uid: entry[0], name: entry[1].name, joinedAt: entry[1].joinedAt };
            }).sort(function(a, b) { return a.joinedAt - b.joinedAt; });
            
            const listDiv = document.getElementById('lobby-players');
            listDiv.innerHTML = players.map(function(p) {
                return '<div style="display:flex; align-items:center; font-weight:bold; font-size:1.1rem; border-bottom:1px solid #eee; padding:5px 0;">' +
                       '<canvas id="avatar-' + p.uid + '" width="32" height="32" style="border:2px solid black; width:32px; height:32px; image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges; image-rendering:pixelated;"></canvas>' +
                       '<span style="margin-left:10px;">' + p.name + '</span></div>';
            }).join('');
            
            // Draw avatars
            setTimeout(function() {
                players.forEach(function(p) {
                    window.rekindleFetchAvatarSeed(rtdb, p.uid, function(seed) {
                        drawAvatar('avatar-' + p.uid, seed);
                    });
                });
            }, 0);
            
            if (players.length >= 2 && gameState.status === 'lobby') {
                document.getElementById('lobby-status').innerText = "Game starting...";
            }
        }

        function updatePlayerInfo() {
            const players = Object.keys(gameState.players || {}).map(k => ({uid: k, ...gameState.players[k]}));
            const whitePlayer = players.find(p => p.color === 'w');
            const blackPlayer = players.find(p => p.color === 'b');

            if (whitePlayer) {
                document.getElementById('name-white').innerText = whitePlayer.name;
                window.rekindleFetchAvatarSeed(rtdb, whitePlayer.uid, function(seed) {
                    drawAvatar('avatar-white', seed);
                });
            }
            if (blackPlayer) {
                document.getElementById('name-black').innerText = blackPlayer.name;
                window.rekindleFetchAvatarSeed(rtdb, blackPlayer.uid, function(seed) {
                    drawAvatar('avatar-black', seed);
                });
            }
        }

        // ====== CHESS UI ======

        function resizeBoard() {
            const container = document.getElementById('board-container');
            const board = document.getElementById('board');
            if (container && board) {
                const size = Math.min(container.clientWidth, container.clientHeight) * 0.95;
                board.style.width = size + 'px';
                board.style.height = size + 'px';
                const fontSize = size / 9;
                const squares = document.querySelectorAll('.square');
                squares.forEach(function(sq) { sq.style.fontSize = fontSize + 'px'; });
            }
        }

        window.addEventListener('resize', resizeBoard);

        function renderBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            
            // Flip board for black player
            let displayRows = myColor === 'b' ? [0, 1, 2, 3, 4, 5, 6, 7] : [7, 6, 5, 4, 3, 2, 1, 0];
            let displayCols = myColor === 'b' ? [7, 6, 5, 4, 3, 2, 1, 0] : [0, 1, 2, 3, 4, 5, 6, 7];

            const position = game.board();

            for (let i = 0; i < displayRows.length; i++) {
                const r = displayRows[i];
                for (let j = 0; j < displayCols.length; j++) {
                    const c = displayCols[j];
                    const squareName = String.fromCharCode(97 + c) + (r + 1);
                    const arrayRow = 7 - r;
                    const squareData = position[arrayRow][c];

                    const div = document.createElement('div');
                    const isLight = (r + c) % 2 !== 0;
                    div.className = 'square ' + (isLight ? 'light' : 'dark');

                    if (selectedSquare === squareName) div.classList.add('selected');
                    
                    if (gameState.lastMove) {
                        if (gameState.lastMove.to === squareName || gameState.lastMove.from === squareName) {
                            div.classList.add('last-move');
                        }
                    }

                    div.onclick = (function(sq) {
                        return function() { handleSquareClick(sq); };
                    })(squareName);

                    if (squareData) {
                        let pKey = squareData.type;
                        if (squareData.color === 'w') pKey = pKey.toUpperCase();
                        div.innerHTML = '<div class="piece">' + PIECES[pKey] + '</div>';
                    }
                    board.appendChild(div);
                }
            }
            resizeBoard();
        }

        function handleSquareClick(square) {
            if (game.game_over()) return;
            if (game.turn() !== myColor) return;

            const piece = game.get(square);
            if (piece && piece.color === myColor) {
                selectedSquare = square;
                renderBoard();
                return;
            }

            if (selectedSquare) {
                try {
                    const move = game.move({
                        from: selectedSquare,
                        to: square,
                        promotion: 'q'
                    });

                    if (move) {
                        selectedSquare = null;
                        const newFen = game.fen();
                        const isOver = game.game_over();
                        
                        const update = {
                            fen: newFen,
                            lastMove: { from: move.from, to: move.to },
                            turn: game.turn()
                        };
                        
                        if (isOver) {
                            update.status = 'finished';
                            if (game.in_checkmate()) {
                                update.winner = currentUser.uid;
                            } else {
                                update.winner = 'draw';
                            }
                        }
                        
                        matchRef.update(update);
                        renderBoard();
                        checkStatus();
                        flashRefresh();
                    } else {
                        selectedSquare = null;
                        renderBoard();
                    }
                } catch (e) {
                    selectedSquare = null;
                    renderBoard();
                }
            }
        }

        function checkStatus() {
            const statusEl = document.getElementById('status-bar');
            let status = "";
            let isMyTurn = false;

            if (game.in_checkmate()) {
                const winnerColor = (game.turn() === 'w') ? 'Black' : 'White';
                status = "Checkmate! " + winnerColor + " wins.";
            } else if (game.in_draw()) {
                status = "Draw.";
            } else {
                const turnColor = (game.turn() === 'w') ? 'White' : 'Black';
                isMyTurn = (game.turn() === myColor);
                status = turnColor + "'s Turn" + (isMyTurn ? " (You)" : "");
                if (game.in_check()) {
                    status += " (Check!)";
                }
            }
            statusEl.innerText = status;
            statusEl.style.background = isMyTurn ? "#000" : "#eee";
            statusEl.style.color = isMyTurn ? "#fff" : "#000";
        }

        function flashRefresh() {
            const mode = (window.rekindleGetDisplayMode ? window.rekindleGetDisplayMode() : localStorage.getItem('rekindle_display_mode')) || 'eink';
            if (mode !== 'eink') return;
            const flash = document.createElement('div');
            flash.style.position = 'fixed';
            flash.style.top = '0';
            flash.style.left = '0';
            flash.style.width = '100%';
            flash.style.height = '100%';
            flash.style.backgroundColor = 'black';
            flash.style.zIndex = '9999';
            flash.style.opacity = '1';
            document.body.appendChild(flash);
            setTimeout(function() {
                if (flash.parentNode) flash.parentNode.removeChild(flash);
            }, 100);
        }

        function openResetModal() {
            document.getElementById('reset-modal').style.display = 'flex';
        }

        function closeResetModal() {
            document.getElementById('reset-modal').style.display = 'none';
        }

        async function confirmReset() {
            if (isHost) {
                game = new Chess();
                await matchRef.update({
                    fen: game.fen(),
                    lastMove: null,
                    turn: 'w',
                    status: 'playing'
                });
            } else {
                showAlert("Host Required", "Only the host can reset the game.");
            }
            closeResetModal();
        }

        if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
    </script>
