<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>Quick Notes</title>
    <style>
        /* SYSTEM 7 / E-INK STYLES */
        :root {
            --bg-color: #ffffff;
            --line-color: #a0c0e0;
            --margin-color: #ffcccc;
            --row-height: 50px;
            --margin-width: 60px;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Courier New", monospace;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: 4px 4px 0px black;
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 700px;
            position: relative;
        }

        /* STANDARD TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* INFO BUTTON */
        .info-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: serif;
            font-style: italic;
            font-size: 0.9rem;
            box-shadow: 2px 2px 0 black;
        }

        .info-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* MANUAL MODE TOGGLE */
        .manual-toggle {
            display: flex;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .manual-toggle-box {
            width: 13px;
            height: 13px;
            border: 2px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.65rem;
            font-weight: bold;
            font-family: sans-serif;
            flex-shrink: 0;
        }

        .manual-toggle-label {
            font-size: 0.7rem;
            font-family: "Courier New", monospace;
            white-space: nowrap;
            line-height: 1;
            margin-left: 4px;
        }

        /* CONVERT BUTTON */
        .convert-btn {
            width: 26px;
            height: 18px;
            border: 2px solid #ccc;
            background: white;
            cursor: default;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.85rem;
            box-shadow: 2px 2px 0 #ccc;
            color: #ccc;
            user-select: none;
        }

        .convert-btn.ready {
            border-color: black;
            box-shadow: 2px 2px 0 black;
            color: black;
            cursor: pointer;
        }

        .convert-btn.ready:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* CONTROLS (Right side of title bar) */
        .header-controls {
            position: absolute;
            right: 10px;
            z-index: 2;
            display: flex;
            align-items: center;
            background: white;
            padding: 0 8px;
        }

        .header-controls > * + * {
            margin-left: 8px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 2px 8px;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            text-transform: uppercase;
        }

        .sys-btn:active {
            box-shadow: none;
            transform: translate(1px, 1px);
            background: black;
            color: white;
        }

        /* NOTEBOOK CONTAINER */
        .notebook-container {
            flex: 1;
            position: relative;
            overflow: hidden;
            display: flex;
            background: white;
        }

        /* LEFT MARGIN */
        .margin-column {
            width: var(--margin-width);
            height: 100%;
            border-right: 2px solid #ff9999;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            background-color: #fff;
            z-index: 5;
        }

        .margin-cell {
            height: var(--row-height);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid transparent;
        }

        /* Delete button only appears when item exists */
        .delete-btn {
            width: 20px;
            height: 20px;
            border: 2px solid black;
            background: white;
            display: none;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
            font-family: sans-serif;
            box-shadow: 2px 2px 0 black;
        }

        .margin-cell.has-item .delete-btn {
            display: flex;
        }

        .delete-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* RIGHT PAPER */
        .paper-column {
            flex: 1;
            position: relative;
            background-attachment: local;
        }

        /* TEXT LAYER */
        .text-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .text-row {
            height: var(--row-height);
            display: flex;
            align-items: center;
            padding-left: 10px;
            font-size: 1.3rem;
            font-family: "Reenie Beanie", "Courier New", cursive;
            color: #000;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .text-row.processing {
            color: #aaa;
            font-style: italic;
        }

        /* CANVAS LAYER */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
            touch-action: none;
            z-index: 10;
        }

        /* MODALS */
        #instructions-modal {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 200;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        .modal-btns {
            margin-top: 15px;
            display: flex;
            justify-content: center;
        }

        .modal-btns > * + * {
            margin-left: 10px;
        }

        /* Override global scaling - only scale title-bar */
        .window {
            zoom: 1 !important;
            transform: none !important;
        }

        .title-bar {
            zoom: var(--rekindle-scale, 1);
        }

        @supports not (zoom: 1) {
            .title-bar {
                transform: scale(var(--rekindle-scale, 1));
                transform-origin: top center;
            }
        }

        .modal-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="theme.js?v=20"></script>
    <script src="js/rekindle-cloud.js?v=2"></script>
    <script src="js/i18n.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="location.href='index'">X</div>
            <span class="title-text" data-i18n="quicknotes.title">Quick Notes</span>
            <div class="header-controls">
                <div class="manual-toggle" onclick="toggleManualMode()" title="Manual conversion mode">
                    <div class="manual-toggle-box" id="manual-toggle-box"></div>
                    <span class="manual-toggle-label">Manual</span>
                </div>
                <div class="convert-btn" id="convert-btn" onclick="processWriting()" title="Convert handwriting to text" style="display:none">v</div>
                <div class="info-btn" onclick="showInstructions()" data-i18n-title="quicknotes.modal.help.title">i</div>
            </div>
        </div>

        <div class="notebook-container">
            <!-- Left Margin: Delete buttons -->
            <div class="margin-column" id="margin-col">
                <!-- Generated by JS -->
            </div>

            <!-- Right Paper: Text + Canvas -->
            <div class="paper-column" id="paper-col">
                <div class="text-layer" id="text-layer">
                    <!-- Generated by JS -->
                </div>
                <canvas id="board"></canvas>
            </div>
        </div>

    </div>

    <!-- INSTRUCTIONS MODAL -->
    <div id="instructions-modal">
        <div class="modal-box">
            <h3 data-i18n="quicknotes.modal.help.title">How to Use</h3>
            <div style="text-align:left; font-size:0.9rem; margin-top:15px;">
                <p><strong data-i18n="quicknotes.modal.help.write_title">1. Write Notes:</strong><br><span data-i18n="quicknotes.modal.help.write_text">Use your pen to write on any empty line.</span></p>
                <p><strong data-i18n="quicknotes.modal.help.delete_title">2. Delete Notes:</strong><br><span data-i18n="quicknotes.modal.help.delete_text">Draw a horizontal line (strike-through) over existing text to delete it, or tap the X button.</span></p>
                <p><strong data-i18n="quicknotes.modal.help.sync_title">3. Sync:</strong><br><span data-i18n="quicknotes.modal.help.sync_text">Changes are automatically saved to your ReKindle notes.</span></p>
            </div>
            <div class="modal-btns">
                <button class="sys-btn" style="padding:8px 20px;" onclick="closeInstructions()" data-i18n="quicknotes.modal.help.btn">Got it</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const OCR_API_PATH = "/ai/ocr";
        let ROW_HEIGHT = 50;
        const NUM_ROWS = 16;
        const AUTO_SEND_DELAY = 3500;

        // Firebase Config
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        // --- STATE ---
        let auth, db;
        let listData = new Array(NUM_ROWS).fill(null);
        let listIds = new Array(NUM_ROWS).fill(null);

        let isDrawing = false;
        let autoSendTimer = null;
        let hasStrokes = false;

        let strokeBuffer = [];
        let minX = Infinity, maxX = -Infinity;
        let minY = Infinity, maxY = -Infinity;

        let currentUser = null;
        let unsubscribe = null;

        let manualMode = localStorage.getItem('quicknotes_manual') === 'true';

        // --- DOM ---
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        const textLayer = document.getElementById('text-layer');
        const marginCol = document.getElementById('margin-col');

        // --- INIT ---
        window.onload = function() {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            initGrid();
            alignRuledLines();
            resizeCanvas();
            updateModeUI();
            window.addEventListener('resize', resizeCanvas);

            // Check First Launch
            if (!localStorage.getItem('quicknotes_seen_instructions')) {
                showInstructions();
            }

            if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
            auth = firebase.auth();
            db = firebase.firestore();
            auth.onAuthStateChanged(function(user) {
                currentUser = user;
                if (user) {
                    initFirebase();
                } else {
                    initLocal();
                }
            });
        };

        function showInstructions() {
            document.getElementById('instructions-modal').style.display = 'flex';
        }

        function closeInstructions() {
            document.getElementById('instructions-modal').style.display = 'none';
            localStorage.setItem('quicknotes_seen_instructions', 'true');
        }

        // --- SYNC INIT ---
        function initFirebase() {
            if (!currentUser) {
                initLocal();
                return;
            }

            // Load from cache first for instant UI
            var cache = localStorage.getItem('rekindle_quicknotes_cache');
            if (cache) {
                try {
                    var parsed = JSON.parse(cache);
                    if (parsed && parsed.length) {
                        for (var i = 0; i < parsed.length && i < NUM_ROWS; i++) {
                            listData[i] = parsed[i].content || '';
                            listIds[i] = parsed[i].id || null;
                        }
                        renderData();
                    }
                } catch (e) { /* ignore cache errors */ }
            }

            // Subscribe to Firestore
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('users').doc(currentUser.uid).collection('quick_notes')
                .orderBy('updated', 'desc')
                .limit(NUM_ROWS)
                .onSnapshot(function(snap) {
                    listData.fill(null);
                    listIds.fill(null);
                    var i = 0;
                    snap.forEach(function(doc) {
                        if (i < NUM_ROWS) {
                            var data = doc.data();
                            listData[i] = data.content || '';
                            listIds[i] = doc.id;
                            i++;
                        }
                    });
                    renderData();
                    // Update cache
                    var cacheArr = [];
                    for (var j = 0; j < NUM_ROWS; j++) {
                        if (listData[j]) {
                            cacheArr.push({ id: listIds[j], content: listData[j] });
                        }
                    }
                    localStorage.setItem('rekindle_quicknotes_cache', JSON.stringify(cacheArr));
                }, function(err) {
                    console.error('Firebase snapshot error:', err);
                    initLocal();
                });
        }

        function initLocal() {
            listData.fill(null);
            listIds.fill(null);
            var localNotes = JSON.parse(localStorage.getItem('rekindle_quicknotes_local')) || [];
            for (var i = 0; i < localNotes.length && i < NUM_ROWS; i++) {
                listData[i] = localNotes[i].content || '';
                listIds[i] = localNotes[i].id || null;
            }
            renderData();
        }

        // --- GRID SETUP ---
        function alignRuledLines() {
            var firstRow = document.querySelector('.text-row');
            var paperCol = document.getElementById('paper-col');
            if (!firstRow || !paperCol) return;
            var h = firstRow.offsetHeight;
            ROW_HEIGHT = h;
            paperCol.style.backgroundImage =
                'linear-gradient(transparent ' + (h - 1) + 'px, #a0c0e0 ' + (h - 1) + 'px, #a0c0e0 ' + h + 'px, transparent ' + h + 'px)';
            paperCol.style.backgroundSize = '100% ' + h + 'px';
        }

        function initGrid() {
            marginCol.innerHTML = '';
            textLayer.innerHTML = '';
            for (var i = 0; i < NUM_ROWS; i++) {
                var mCell = document.createElement('div');
                mCell.className = 'margin-cell';
                mCell.id = 'margin-' + i;
                var btn = document.createElement('div');
                btn.className = 'delete-btn';
                btn.innerText = 'X';
                btn.onclick = (function(idx) {
                    return function() { deleteNote(idx); };
                })(i);
                mCell.appendChild(btn);
                marginCol.appendChild(mCell);

                var tRow = document.createElement('div');
                tRow.className = 'text-row';
                tRow.id = 'text-' + i;
                textLayer.appendChild(tRow);
            }
        }

        function resizeCanvas() {
            var container = document.getElementById('paper-col');
            var dpr = Math.min(window.devicePixelRatio || 1, 1.5);
            canvas.width = container.clientWidth * dpr;
            canvas.height = container.clientHeight * dpr;
            ctx.scale(dpr, dpr);
            resetCanvas();
        }

        function resetCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = 'black';

            hasStrokes = false;
            updateConvertBtn();

            strokeBuffer = [];
            minX = Infinity; maxX = -Infinity;
            minY = Infinity; maxY = -Infinity;
        }

        function toggleManualMode() {
            manualMode = !manualMode;
            localStorage.setItem('quicknotes_manual', manualMode);
            clearTimeout(autoSendTimer);
            updateModeUI();
        }

        function updateModeUI() {
            var toggleBox = document.getElementById('manual-toggle-box');
            var convertBtn = document.getElementById('convert-btn');
            if (toggleBox) toggleBox.textContent = manualMode ? 'v' : '';
            if (convertBtn) convertBtn.style.display = manualMode ? 'flex' : 'none';
            updateConvertBtn();
        }

        function updateConvertBtn() {
            var btn = document.getElementById('convert-btn');
            if (btn) btn.classList.toggle('ready', hasStrokes);
        }

        function renderData() {
            for (var i = 0; i < NUM_ROWS; i++) {
                var textEl = document.getElementById('text-' + i);
                var marginEl = document.getElementById('margin-' + i);

                if (listData[i]) {
                    textEl.innerText = listData[i];
                    marginEl.classList.add('has-item');
                } else {
                    textEl.innerText = '';
                    marginEl.classList.remove('has-item');
                }
            }
        }

        async function deleteNote(i) {
            var id = listIds[i];
            if (!id) {
                listData[i] = null;
                renderData();
                return;
            }

            // Visual feedback
            var textEl = document.getElementById('text-' + i);
            if (textEl) {
                textEl.style.textDecoration = 'line-through';
                textEl.style.color = '#888';
            }

            try {
                if (currentUser) {
                    await db.collection('users').doc(currentUser.uid).collection('quick_notes').doc(id).delete();
                } else {
                    var localNotes = JSON.parse(localStorage.getItem('rekindle_quicknotes_local')) || [];
                    localNotes = localNotes.filter(function(n) { return n.id !== id; });
                    localStorage.setItem('rekindle_quicknotes_local', JSON.stringify(localNotes));
                    initLocal();
                }
            } catch (e) {
                console.error(e);
                if (textEl) {
                    textEl.style.textDecoration = 'none';
                    textEl.style.color = '#000';
                }
            }
        }

        // --- DRAWING ---
        function startDraw(e) {
            if (!e.isPrimary) return;
            e.preventDefault();
            isDrawing = true;
            hasStrokes = true;
            updateConvertBtn();
            clearTimeout(autoSendTimer);
            var y = e.offsetY;
            var x = e.offsetX;

            trackPoint(x, y);
            ctx.beginPath();
            ctx.moveTo(x, y);
        }

        function moveDraw(e) {
            if (!isDrawing) return;
            e.preventDefault();

            if (e.getCoalescedEvents) {
                var events = e.getCoalescedEvents();
                for (var k = 0; k < events.length; k++) {
                    ctx.lineTo(events[k].offsetX, events[k].offsetY);
                    trackPoint(events[k].offsetX, events[k].offsetY);
                }
            } else {
                ctx.lineTo(e.offsetX, e.offsetY);
                trackPoint(e.offsetX, e.offsetY);
            }
            ctx.stroke();
        }

        function endDraw() {
            if (!isDrawing) return;
            isDrawing = false;
            ctx.closePath();
            if (hasStrokes && !manualMode) {
                autoSendTimer = setTimeout(processWriting, AUTO_SEND_DELAY);
            }
        }

        function trackPoint(x, y) {
            strokeBuffer.push(x);
            strokeBuffer.push(y);
        }

        canvas.addEventListener('pointerdown', startDraw);
        canvas.addEventListener('pointermove', moveDraw);
        canvas.addEventListener('pointerup', endDraw);
        canvas.addEventListener('pointerout', endDraw);

        // --- PROCESSING ---
        async function processWriting() {
            if (!hasStrokes || strokeBuffer.length === 0) return;

            // 1. CALCULATE BOUNDS
            minX = Infinity; maxX = -Infinity;
            minY = Infinity; maxY = -Infinity;

            for (var i = 0; i < strokeBuffer.length; i += 2) {
                var x = strokeBuffer[i];
                var y = strokeBuffer[i + 1];
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
            }

            // 2. DETERMINE ROW
            var midY = (minY + maxY) / 2;
            var drawnRowIndex = Math.floor(midY / ROW_HEIGHT);

            // 3. COLLISION CHECK: If row has text, check for strike-through delete
            if (drawnRowIndex >= 0 && drawnRowIndex < NUM_ROWS && listData[drawnRowIndex]) {
                var textEl = document.getElementById('text-' + drawnRowIndex);
                var span = document.createElement('span');
                span.style.font = window.getComputedStyle(textEl).font;
                span.style.visibility = 'hidden';
                span.style.position = 'absolute';
                span.innerText = listData[drawnRowIndex];
                document.body.appendChild(span);
                var textWidth = span.getBoundingClientRect().width;
                document.body.removeChild(span);

                var paddingLeft = 10;
                var textEndX = paddingLeft + textWidth;

                // If scribble is completely to the right, ignore
                if (minX > (textEndX + 20)) {
                    resetCanvas();
                    return;
                }

                var width = maxX - minX;
                var height = maxY - minY;

                var isStrike = (width > 30) && (width > height * 0.5);

                if (isStrike) {
                    resetCanvas();
                    await deleteNote(drawnRowIndex);
                } else {
                    resetCanvas();
                }
                return;
            }

            // 4. FIND FIRST EMPTY ROW
            var rowIndex = -1;
            for (var j = 0; j < NUM_ROWS; j++) {
                if (!listData[j]) {
                    rowIndex = j;
                    break;
                }
            }

            if (rowIndex === -1) {
                resetCanvas();
                return;
            }

            var targetRowText = document.getElementById('text-' + rowIndex);
            var originalText = targetRowText.innerText;
            targetRowText.innerText = window.t ? window.t('quicknotes.status.processing') : 'Processing...';
            targetRowText.classList.add('processing');

            try {
                // 5. CROP & RESIZE
                var padding = 20;
                var cX = Math.max(0, minX - padding);
                var cY = Math.max(0, minY - padding);
                var cW = (maxX - minX) + (padding * 2);
                var cH = (maxY - minY) + (padding * 2);

                if (cW <= 0 || cH <= 0) throw new Error('Invalid Drawing Dimensions');

                var MAX_WIDTH = 512;
                var scale = 1;
                if (cW > MAX_WIDTH) {
                    scale = MAX_WIDTH / cW;
                }

                var finalW = cW * scale;
                var finalH = cH * scale;

                var tempCanvas = document.createElement('canvas');
                tempCanvas.width = finalW;
                tempCanvas.height = finalH;
                var tCtx = tempCanvas.getContext('2d');

                tCtx.fillStyle = '#ffffff';
                tCtx.fillRect(0, 0, finalW, finalH);

                var dpr = Math.min(window.devicePixelRatio || 1, 1.5);

                tCtx.drawImage(
                    canvas,
                    cX * dpr, cY * dpr, cW * dpr, cH * dpr,
                    0, 0, finalW, finalH
                );

                var base64 = tempCanvas.toDataURL('image/jpeg', 0.6).split(',')[1];

                // 6. Send to OCR
                var data = await RekindleCloud.request(OCR_API_PATH, {
                    method: 'POST',
                    body: { image: base64, mimeType: 'JPEG' }
                });

                if (data.text) {
                    var cleanText = data.text.trim();
                    listData[rowIndex] = cleanText;
                    await createNote(cleanText, rowIndex);
                } else {
                    listData[rowIndex] = originalText;
                }
            } catch (err) {
                console.error(err);
                listData[rowIndex] = originalText || (window.t ? window.t('quicknotes.status.error') : 'Error');
            } finally {
                renderData();
                resetCanvas();
                targetRowText.classList.remove('processing');
            }
        }

        async function createNote(text, rowIndex) {
            if (currentUser) {
                var ref = db.collection('users').doc(currentUser.uid).collection('quick_notes').doc();
                await ref.set({
                    content: text,
                    created: firebase.firestore.FieldValue.serverTimestamp(),
                    updated: firebase.firestore.FieldValue.serverTimestamp()
                });
                listIds[rowIndex] = ref.id;
            } else {
                var id = Date.now().toString() + '_' + Math.floor(Math.random() * 1000);
                var localNotes = JSON.parse(localStorage.getItem('rekindle_quicknotes_local')) || [];
                localNotes.unshift({ id: id, content: text });
                localStorage.setItem('rekindle_quicknotes_local', JSON.stringify(localNotes));
                listIds[rowIndex] = id;
            }
        }
    </script>
