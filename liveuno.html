<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title>Uno</title>
    <!-- Firebase App (the core Firebase SDK) is always required and must be listed first -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="theme.js?v=18"></script>

    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        * { transition: none !important; animation: none !important; }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;

            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            background-image: repeating-linear-gradient(45deg, #e5e5e5 25%, transparent 25%, transparent 75%, #e5e5e5 75%, #e5e5e5), repeating-linear-gradient(45deg, #e5e5e5 25%, white 25%, white 75%, #e5e5e5 75%, #e5e5e5);
            background-position: 0 0, 2px 2px;
            background-size: 4px 4px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 100%;
            max-min-height: 800px;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .window-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            overflow-y: auto;
            flex-grow: 1;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-family: inherit;
            margin: 10px;
            font-size: 1rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .sys-btn:disabled {
            color: #999;
            border-color: #999;
            box-shadow: 3px 3px 0 #999;
        }

        #status-bar {
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid black;
            padding: 10px 0;
            margin-bottom: 20px;
            background: #eee;
        }

        /* CARDS */
        .card {
            width: 60px;
            height: 90px;
            border: 2px solid black;
            border-radius: 5px;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 2rem;
            margin: 5px;
            box-shadow: 2px 2px 0 black;
            background-color: white;
            position: relative;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .card:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }
        
        .card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        .card.red { background: repeating-linear-gradient(90deg, #000, #000 2px, #fff 2px, #fff 6px); }
        .card.blue { background: repeating-linear-gradient(0deg, #000, #000 2px, #fff 2px, #fff 6px); }
        .card.green { background: repeating-linear-gradient(45deg, #000, #000 2px, #fff 2px, #fff 6px); }
        .card.yellow { background: repeating-linear-gradient(-45deg, #000, #000 2px, #fff 2px, #fff 6px); }
        .card.wild { background: repeating-linear-gradient(45deg, #000, #000 2px, transparent 2px, transparent 6px), repeating-linear-gradient(-45deg, #000, #000 2px, #fff 2px, #fff 6px); background-color: white; }

        .card-inner {
            width: 80%;
            height: 80%;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: black;
            border: 2px solid black;
            z-index: 1;
        }

        .card-small-top { position: absolute; top: 2px; left: 4px; font-size: 0.6rem; color: black; font-weight: bold; background: white; border: 1px solid black; padding: 0 2px; z-index: 2; border-radius: 2px;}
        .card-small-bottom { position: absolute; bottom: 2px; right: 4px; font-size: 0.6rem; color: black; transform: rotate(180deg); font-weight: bold; background: white; border: 1px solid black; padding: 0 2px; z-index: 2; border-radius: 2px;}
        
        .card-inner-text {
            color: black;
            font-size: 1.5rem;
            text-align: center;
            line-height: 1;
        }

        .card-back {
            background-color: black;
            color: white;
            font-style: italic;
        }

        .card-back .card-inner {
            border: 2px solid white;
            background: black;
        }
        
        .card-back .card-inner-text {
            color: white;
        }

        .hand-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            margin-top: 10px;
            border-top: 2px solid black;
            padding-top: 10px;
        }

        .board-center {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 20px 0;
            width: 100%;
        }
        .board-center > * + * { margin-left: 20px; }
        
        .pile-label {
            font-size: 0.8rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
        }

        .opponents-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            padding: 10px;
            border-bottom: 2px solid black;
        }
        .opponents-container > * + * { margin-left: 10px; }

        .opponent {
            border: 2px solid black;
            padding: 5px 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: #eee;
            box-shadow: 2px 2px 0 black;
        }

        .opponent.active-turn {
            background: black;
            color: white;
            border-width: 3px;
            box-shadow: 4px 4px 0 black;
        }

        /* Color Picker Modal */
        .color-picker {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }
        .color-picker > * + * { margin-left: 10px; }
        .status-bar-inner { display: flex; align-items: center; justify-content: center; }
        .status-bar-inner > * + * { margin-left: 10px; }
        .opponent-card { display: flex; flex-direction: column; align-items: center; }
        .opponent-card > * + * { margin-top: 5px; }
        
        /* MODALS */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 30px;
            width: 80%;
            max-width: 350px;
            text-align: center;
        }
        
        .player-list {
            margin: 15px 0;
            text-align: left;
            border: 2px solid black;
            box-shadow: 4px 4px 0 black;
            padding: 10px;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            background: white;
        }
        .player-list div {
            border-bottom: 1px solid #eee;
            padding: 5px 0;
        }
    </style>
</head>
<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="goHome()">X</div>
            <div class="title-text">Uno</div>
        </div>

        <div class="window-content" id="screen-menu">
            <h1 style="font-size: 3rem; margin: 10px 0;">UNO</h1>
            <p style="text-align:center;">Up to 10 players. Play with friends or add bots.</p>
            <div style="display:flex; flex-wrap:wrap; justify-content:center;">
                <button class="sys-btn" onclick="cycleTotalPlayers()" id="menu-total-btn" style="width:200px;">Players: 4</button>
                <button class="sys-btn" onclick="cycleBots()" id="menu-bots-btn" style="width:200px;">Bots: 0</button>
                <button class="sys-btn" onclick="cycleStacking()" id="menu-stack-btn" style="width:200px;">Stacking: Off</button>
            </div>
                <button class="sys-btn" onclick="hostGame()">Host Game</button>
                <button class="sys-btn" onclick="startSinglePlayer()">Play Solo vs Bots</button>
                <button class="sys-btn" onclick="goHome()">Back</button>
        </div>
        
        <div class="window-content" id="screen-loading" style="display:none; justify-content:center;">
            <h2>Loading...</h2>
        </div>

        <div class="window-content" id="screen-lobby" style="display:none;">
            <h2>Lobby</h2>
            <div style="font-size: 1.2rem; margin-bottom: 10px;" id="lobby-status">Waiting for players...</div>
            <div class="player-list" id="lobby-players"></div>
            
            <div id="host-controls" style="display:none; flex-direction: column; align-items: center; width:100%;">
                <div style="font-size:0.85rem; margin-bottom:4px;">Share this link:</div>
                <div class="copy-link" id="invite-link" style="width:100%; max-width:400px; border:2px solid black; padding:6px 8px; font-family:'Courier New', monospace; font-size:0.85rem; background:white; word-break:break-all; margin:8px 0; box-sizing:border-box;"></div>
                <div style="display:flex; flex-wrap:wrap; justify-content:center;">
                    <button class="sys-btn" onclick="cycleTotalPlayersLobby()" id="lobby-total-btn" style="width:180px;">Players: 4</button>
                    <button class="sys-btn" onclick="cycleBotsLobby()" id="lobby-bots-btn" style="width:180px;">Bots: 0</button>
                    <button class="sys-btn" onclick="cycleStackingLobby()" id="lobby-stack-btn" style="width:180px;">Stacking: Off</button>
                </div>
                <p style="font-size: 0.85rem; margin: 5px 0; text-align:center;">Host starts the game manually.</p>
                <button class="sys-btn" id="btn-force-start" onclick="forceStartGame()">Start Game</button>
            </div>
            <button class="sys-btn" onclick="leaveMatch()">Leave Lobby</button>
        </div>

        <div class="window-content" id="screen-game" style="display:none; padding:10px;">
            <div id="status-bar">Waiting...</div>
            
            <div class="opponents-container" id="opponents-ui">
                <!-- opponents rendered here -->
            </div>
            
            <div class="board-center">
                <div>
                    <div class="pile-label">Draw</div>
                    <div class="card card-back" onclick="drawCard()">
                        <div class="card-inner">
                            <div class="card-inner-text">UNO</div>
                        </div>
                    </div>
                </div>
                <div>
                    <div class="pile-label" id="current-color-label">Discard</div>
                    <div id="discard-pile">
                        <!-- top discard card rendered here -->
                    </div>
                </div>
            </div>
            
            <div style="text-align: left; width: 100%; font-weight: bold; margin-bottom: 5px;">Your Hand:</div>
            <div class="hand-container" id="my-hand">
                <!-- player hand rendered here -->
            </div>
        </div>
        
        <div id="color-modal" class="modal-overlay">
            <div class="modal-box" style="padding: 0; display: flex; flex-direction: column;">
                <div class="title-bar">
                    <div class="title-stripes"></div>
                    <div class="close-box" onclick="document.getElementById('color-modal').style.display='none'">X</div>
                    <div class="title-text">Wildcard</div>
                </div>
                <div style="padding: 20px;">
                    <h2 style="margin-top:0;">Select Pattern</h2>
                    <div class="color-picker" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                        <div class="card red" style="margin:auto" onclick="chooseColor('red')"><div class="card-inner"></div></div>
                        <div class="card blue" style="margin:auto" onclick="chooseColor('blue')"><div class="card-inner"></div></div>
                        <div class="card green" style="margin:auto" onclick="chooseColor('green')"><div class="card-inner"></div></div>
                        <div class="card yellow" style="margin:auto" onclick="chooseColor('yellow')"><div class="card-inner"></div></div>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="winner-modal" class="modal-overlay">
            <div class="modal-box">
                <h2 id="winner-text">Game Over</h2>
                <button class="sys-btn" onclick="leaveMatch()">Return to Menu</button>
            </div>
        </div>

        <div id="custom-alert-modal" class="modal-overlay">
            <div class="modal-box">
                <h3 id="custom-alert-title">Notice</h3>
                <p id="custom-alert-msg" style="margin: 15px 0;"></p>
                <button class="sys-btn" onclick="closeAlert()">OK</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCL6Z5DFTm-pZ_1EZJ_9Ukk9rWDIZky-U",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            databaseURL: "https://rekindle-fork-default-rtdb.europe-west1.firebasedatabase.app",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const rtdb = firebase.database();
        
        let currentUser = null;
        let matchId = null;
        let isHost = false;
        let matchRef = null;
        let gameState = null;
        let myTurn = false;
        
        let pendingPlayCard = null; // Store card played before color picked
        
        let localTotalPlayers = 4;
        let localBots = 0;
        let localStacking = false;
        
        let botTimer = null;
        let afkTimer = null;
        let singleModeAutoStart = false;
        const BOT_DELAY_MS = 1500;
        const AFK_TIMEOUT_MS = 30000;
        let serverTimeOffset = 0;
        rtdb.ref('.info/serverTimeOffset').on('value', snap => { serverTimeOffset = snap.val() || 0; });
        function serverTime() { return Date.now() + serverTimeOffset; }
        
        function goHome() {
            window.location.href = 'index.html';
        }

        function showAlert(title, msg) {
            const titleEl = document.getElementById('custom-alert-title');
            const msgEl = document.getElementById('custom-alert-msg');
            const modalEl = document.getElementById('custom-alert-modal');
            if (titleEl) titleEl.innerText = title;
            if (msgEl) msgEl.innerText = msg;
            if (modalEl) modalEl.style.display = 'flex';
        }

        function closeAlert() {
            const modalEl = document.getElementById('custom-alert-modal');
            if (modalEl) modalEl.style.display = 'none';
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = {
                    uid: user.uid,
                    name: (user.email ? user.email.split('@')[0] : 'Player')
                };
                checkUrlForMatch();
            } else {
                showAlert("Sign In Required", "Please log in from the home screen first.");
                setTimeout(goHome, 3000);
            }
        });
        
        function checkUrlForMatch() {
            const params = new URLSearchParams(window.location.search);
            const mId = params.get('matchId');
            const single = params.get('single');
            if (mId) {
                joinMatch(mId);
            } else if (single === '1') {
                singleModeAutoStart = true;
                startSinglePlayer();
            } else {
                showScreen('menu');
            }
        }

        function startSinglePlayer() {
            localTotalPlayers = 4;
            localBots = 3;
            localStacking = false;
            hostGame();
        }
        
        function showScreen(screen) {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-lobby').style.display = 'none';
            document.getElementById('screen-loading').style.display = 'none';
            document.getElementById('screen-game').style.display = 'none';
            document.getElementById('screen-' + screen).style.display = 'flex';
            if (screen === 'menu') updateMenuSettingsUI();
        }
        
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function updateMenuSettingsUI() {
            document.getElementById('menu-total-btn').innerText = 'Players: ' + localTotalPlayers;
            document.getElementById('menu-bots-btn').innerText = 'Bots: ' + localBots;
            document.getElementById('menu-stack-btn').innerText = 'Stacking: ' + (localStacking ? 'On' : 'Off');
        }

        function cycleTotalPlayers() {
            localTotalPlayers = localTotalPlayers >= 10 ? 2 : localTotalPlayers + 1;
            updateMenuSettingsUI();
        }
        function cycleBots() {
            localBots = localBots >= localTotalPlayers - 1 ? 0 : localBots + 1;
            updateMenuSettingsUI();
        }
        function cycleStacking() {
            localStacking = !localStacking;
            updateMenuSettingsUI();
        }

        function cycleTotalPlayersLobby() {
            if (!isHost || !gameState) return;
            const settings = gameState.settings || {};
            const next = settings.totalPlayers >= 10 ? 2 : (settings.totalPlayers || 4) + 1;
            matchRef.child('settings').update({ totalPlayers: next });
        }
        function cycleBotsLobby() {
            if (!isHost || !gameState) return;
            const settings = gameState.settings || {};
            const total = settings.totalPlayers || 4;
            const next = settings.bots >= total - 1 ? 0 : (settings.bots || 0) + 1;
            matchRef.child('settings').update({ bots: next });
        }
        function cycleStackingLobby() {
            if (!isHost || !gameState) return;
            const settings = gameState.settings || {};
            matchRef.child('settings').update({ stacking: !settings.stacking });
        }

        // ====== MATCHMAKING ======
        
        async function hostGame() {
            showScreen('loading');
            matchId = generateId();
            isHost = true;
            
            const mmRef = rtdb.ref(`matchmaking/uno/${matchId}`);
            await mmRef.set({
                hostUid: currentUser.uid,
                hostName: currentUser.name,
                status: 'waiting',
                playerCount: 1,
                maxPlayers: 10,
                createdAt: firebase.database.ServerValue.TIMESTAMP
            });
            
            matchRef = rtdb.ref(`games/uno/${matchId}`);
            const initialGame = {
                status: 'lobby',
                host: currentUser.uid,
                players: {},
                settings: {
                    totalPlayers: localTotalPlayers,
                    bots: localBots,
                    stacking: localStacking
                },
                countdown: 0
            };
            initialGame.players[currentUser.uid] = { name: currentUser.name, joinedAt: Date.now(), isHost: true };
            
            // Clean up lobby listing if host disconnects, but keep the game so others can continue
            mmRef.onDisconnect().remove();
            // Do NOT remove matchRef on disconnect — host migration keeps the game alive.
            
            await matchRef.set(initialGame);
            listenToMatch();
            showScreen('lobby');
            document.getElementById('host-controls').style.display = 'flex';
            document.getElementById('invite-link').innerText = window.location.origin + window.location.pathname + '?matchId=' + matchId;
        }
        
        async function joinMatch(mId) {
            showScreen('loading');
            matchId = mId;
            isHost = false;
            
            matchRef = rtdb.ref(`games/uno/${matchId}`);
            const snap = await matchRef.once('value');
            if (!snap.exists()) {
                showAlert("Not Found", "Game not found!");
                goHome();
                return;
            }
            
            const state = snap.val();
            // Rejoining host gets host back
            if (state.host === currentUser.uid) isHost = true;
            
            if (state.status === 'playing' && !state.players[currentUser.uid]) {
                showAlert("Error", "Game already started!");
                goHome();
                return;
            }
            
            if (state.status === 'lobby' && Object.keys(state.players || {}).length >= 10 && !state.players[currentUser.uid]) {
                showAlert("Lobby Full", "Lobby is full! Max 10 players.");
                goHome();
                return;
            }
            
            // Add self to players (preserve joinedAt on rejoin)
            if (!state.players[currentUser.uid]) {
                await matchRef.child('players').child(currentUser.uid).set({
                    name: currentUser.name,
                    joinedAt: Date.now(),
                    isHost: isHost
                });
            } else {
                const existing = state.players[currentUser.uid];
                await matchRef.child('players').child(currentUser.uid).update({
                    name: currentUser.name,
                    isHost: isHost || existing.isHost || false
                });
            }
            
            // Update matchmaking count
            const mmRef = rtdb.ref(`matchmaking/uno/${matchId}`);
            const mmSnap = await mmRef.once('value');
            if (mmSnap.exists()) {
                const count = Object.keys(state.players || {}).length + 1;
                await mmRef.update({ playerCount: count });
            }
            
            listenToMatch();
            showScreen('lobby');
        }
        
        function leaveMatch() {
            if (matchRef && currentUser && gameState) {
                const isPlaying = gameState.status === 'playing';
                const updates = {};
                updates['players/' + currentUser.uid] = null;
                updates['hands/' + currentUser.uid] = null;
                
                if (isPlaying) {
                    const playerOrder = gameState.playerOrder || [];
                    const idx = playerOrder.indexOf(currentUser.uid);
                    if (idx !== -1) {
                        const newOrder = playerOrder.slice();
                        newOrder.splice(idx, 1);
                        if (newOrder.length === 0) {
                            matchRef.remove();
                            rtdb.ref(`matchmaking/uno/${matchId}`).onDisconnect().cancel();
                            matchRef.onDisconnect().cancel();
                            window.location.href = 'index.html';
                            return;
                        }
                        updates['playerOrder'] = newOrder;
                        
                        let turnIndex = gameState.turnIndex || 0;
                        if (idx < turnIndex) turnIndex--;
                        updates['turnIndex'] = turnIndex % newOrder.length;
                        updates['turnStartedAt'] = firebase.database.ServerValue.TIMESTAMP;
                    }
                }
                
                // In lobby, if no humans would remain, destroy the lobby
                if (gameState.status === 'lobby') {
                    const remainingHumans = Object.entries(gameState.players || {})
                        .filter(([uid, p]) => uid !== currentUser.uid && !p.isBot);
                    if (remainingHumans.length === 0) {
                        rtdb.ref(`matchmaking/uno/${matchId}`).remove();
                        matchRef.remove();
                        rtdb.ref(`matchmaking/uno/${matchId}`).onDisconnect().cancel();
                        matchRef.onDisconnect().cancel();
                        window.location.href = 'index.html';
                        return;
                    }
                }
                
                matchRef.update(updates);
                rtdb.ref(`matchmaking/uno/${matchId}`).onDisconnect().cancel();
                matchRef.onDisconnect().cancel();
            }
            window.location.href = 'index.html';
        }
        
        function updateLobbyUI() {
            const players = Object.entries(gameState.players || {}).map(([uid, p]) => ({ uid, ...p })).sort((a,b) => a.joinedAt - b.joinedAt);
            const listDiv = document.getElementById('lobby-players');
            
            listDiv.innerHTML = players.map(p => `
                <div style="display:flex; align-items:center; font-weight:bold; font-size:1.1rem; border-bottom:1px solid #eee; padding:5px 0;">
                    <canvas id="avatar-${p.uid}" width="32" height="32" style="border:2px solid black; width:32px; height:32px; image-rendering:-webkit-optimize-contrast; image-rendering:crisp-edges; image-rendering:pixelated;"></canvas>
                    <span style="margin-left:10px;">${p.isBot ? '(bot) ' : ''}${p.name}${p.uid === gameState.host ? ' (host)' : ''}</span>
                </div>
            `).join('');
            
            // Draw avatars
            setTimeout(() => {
                players.forEach(p => {
                    if (p.isBot) {
                        drawAvatar(`avatar-${p.uid}`, p.uid);
                    } else {
                        window.rekindleFetchAvatarSeed(rtdb, p.uid, seed => {
                            drawAvatar(`avatar-${p.uid}`, seed);
                        });
                    }
                });
            }, 0);
            
            // Sync local settings with lobby state
            const settings = gameState.settings || {};
            localTotalPlayers = settings.totalPlayers || 4;
            localBots = settings.bots || 0;
            localStacking = !!settings.stacking;
            
            document.getElementById('lobby-total-btn').innerText = 'Players: ' + localTotalPlayers;
            document.getElementById('lobby-bots-btn').innerText = 'Bots: ' + localBots;
            document.getElementById('lobby-stack-btn').innerText = 'Stacking: ' + (localStacking ? 'On' : 'Off');
            
            const humanCount = players.filter(p => !p.isBot).length;
            const botCount = players.filter(p => p.isBot).length;
            document.getElementById('lobby-status').innerText = `Waiting... (${humanCount} human${humanCount !== 1 ? 's' : ''}, ${botCount} bot${botCount !== 1 ? 's' : ''})`;
            
            if (isHost) {
                document.getElementById('host-controls').style.display = 'flex';
                document.getElementById('invite-link').innerText = window.location.origin + window.location.pathname + '?matchId=' + matchId;
            } else {
                document.getElementById('host-controls').style.display = 'none';
            }
        }
        
        // --- DRAW AVATAR ---
        function escapeHtml(text) {
            if (text == null) return "";
            return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function drawAvatar(canvasId, seed) {
            const canvas = document.getElementById(canvasId);
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#000';

            if (Array.isArray(seed)) {
                const gridSize = Math.sqrt(seed.length);
                const pixelSize = canvas.width / gridSize;
                for (let i = 0; i < seed.length; i++) {
                    if (seed[i] === 1) {
                        const x = i % gridSize;
                        const y = Math.floor(i / gridSize);
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
                return;
            }

            let hash = 0;
            const str = String(seed);
            for (let i = 0; i < str.length; i++) {
                hash = str.charCodeAt(i) + ((hash << 5) - hash);
            }
            const gridSize = 16;
            const pixelSize = canvas.width / gridSize;
            for (let x = 0; x < 8; x++) {
                for (let y = 0; y < gridSize; y++) {
                    const bitIndex = (x * gridSize + y) % 32;
                    const secondary = ((hash >> 3) ^ (hash << 7)) + (y * 17);
                    const val = ((hash >> bitIndex) ^ (secondary >> (bitIndex % 16))) & 1;
                    const distFromCenter = Math.abs(y - 8) + Math.abs(x - 4);
                    const fillChance = distFromCenter < 6 ? val : (val && ((hash >> (x + y)) & 3) === 0);
                    if (fillChance) {
                        ctx.fillRect(x * pixelSize, y * pixelSize, pixelSize, pixelSize);
                        ctx.fillRect((gridSize - 1 - x) * pixelSize, y * pixelSize, pixelSize, pixelSize);
                    }
                }
            }
        }
        
        function forceStartGame() {
            if (!isHost) return;
            const humanCount = Object.keys(gameState.players || {}).filter(uid => !uid.startsWith('bot_')).length;
            const settings = gameState.settings || {};
            const bots = settings.bots || 0;
            const total = humanCount + bots;
            
            if (total < 2) {
                showAlert("Need Players", "Need at least 2 total players.");
                return;
            }
            if (total > 10) {
                showAlert("Too Many", "Max 10 players total.");
                return;
            }
            startGame();
        }

        function listenToMatch() {
            matchRef.on('value', snap => {
                const data = snap.val();
                if (!data) {
                    // Game deleted
                    showAlert("Game Closed", "The match has been ended.");
                    goHome();
                    return;
                }
                gameState = data;
                
                // Host migration: if current host is gone, oldest remaining human becomes host
                const playerIds = Object.keys(gameState.players || {});
                if (playerIds.length > 0 && !gameState.players[gameState.host]) {
                    const humans = Object.entries(gameState.players || {})
                        .filter(([uid, p]) => !p.isBot)
                        .sort((a,b) => a[1].joinedAt - b[1].joinedAt);
                    if (humans.length > 0) {
                        const newHost = humans[0][0];
                        if (newHost === currentUser.uid) {
                            const hostName = gameState.players[newHost].name;
                            matchRef.update({ host: newHost });
                            rtdb.ref(`matchmaking/uno/${matchId}`).update({ hostUid: newHost, hostName: hostName });
                        }
                    }
                }
                
                isHost = (gameState.host === currentUser.uid);
                
                if (gameState.status === 'lobby') {
                    if (document.getElementById('screen-lobby').style.display === 'none') {
                        showScreen('lobby');
                    }
                    updateLobbyUI();
                    if (singleModeAutoStart && isHost) {
                        singleModeAutoStart = false;
                        forceStartGame();
                    }
                } else if (gameState.status === 'playing') {
                    if (document.getElementById('screen-game').style.display === 'none') {
                        showScreen('game');
                    }
                    updateGameUI();
                    scheduleBotTurn();
                    scheduleAfkSkip();
                } else if (gameState.status === 'finished') {
                    document.getElementById('winner-modal').style.display = 'flex';
                    const winnerName = (gameState.players[gameState.winner] || {}).name || 'Someone';
                    document.getElementById('winner-text').innerText = winnerName + ' Wins!';
                }
            });
        }
        
        // ====== GAME LOGIC ======
        
        function generateDeck() {
            const colors = ['red', 'blue', 'green', 'yellow'];
            const deck = [];
            let rId = 0;
            
            for (let c of colors) {
                deck.push({ id: rId++, color: c, type: '0' });
                for(let i=1; i<=9; i++) {
                    deck.push({ id: rId++, color: c, type: i.toString() });
                    deck.push({ id: rId++, color: c, type: i.toString() });
                }
                deck.push({ id: rId++, color: c, type: 'Skip' }); deck.push({ id: rId++, color: c, type: 'Skip' });
                deck.push({ id: rId++, color: c, type: 'Rev' }); deck.push({ id: rId++, color: c, type: 'Rev' });
                deck.push({ id: rId++, color: c, type: '+2' }); deck.push({ id: rId++, color: c, type: '+2' });
            }
            for(let i=0; i<4; i++) {
                deck.push({ id: rId++, color: 'wild', type: 'Wild' });
                deck.push({ id: rId++, color: 'wild', type: '+4' });
            }
            
            // Shuffle
            for (let i = deck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [deck[i], deck[j]] = [deck[j], deck[i]];
            }
            return deck;
        }

        async function startGame() {
            if (!isHost) return;
            
            const humanPlayers = Object.entries(gameState.players || {})
                .filter(([uid]) => !uid.startsWith('bot_'))
                .sort((a,b) => a[1].joinedAt - b[1].joinedAt);
            const humanIds = humanPlayers.map(([uid]) => uid);
            
            const settings = gameState.settings || {};
            const totalPlayers = Math.min(10, Math.max(2, settings.totalPlayers || 4));
            const desiredBots = Math.min(totalPlayers - 1, Math.max(0, settings.bots || 0));
            const actualBots = Math.min(desiredBots, totalPlayers - humanIds.length);
            
            const botIds = [];
            for (let i = 1; i <= actualBots; i++) botIds.push('bot_' + i);
            
            const playerOrder = humanIds.concat(botIds);
            const players = Object.assign({}, gameState.players);
            
            botIds.forEach(botId => {
                players[botId] = { name: 'Bot ' + botId.split('_')[1], joinedAt: Date.now() + botId.charCodeAt(0), isBot: true };
            });
            
            // Remove stale bot entries if settings reduced bot count
            Object.keys(players).forEach(uid => {
                if (uid.startsWith('bot_') && !botIds.includes(uid)) delete players[uid];
            });
            
            const deck = generateDeck();
            const hands = {};
            
            playerOrder.forEach(uid => {
                hands[uid] = deck.splice(0, 7);
            });
            
            // First card
            let firstCard = deck.pop();
            while(firstCard.color === 'wild' || firstCard.type === 'Rev' || firstCard.type === 'Skip' || firstCard.type === '+2') {
                deck.unshift(firstCard);
                firstCard = deck.pop();
            }
            
            await matchRef.update({
                status: 'playing',
                players: players,
                deck: deck,
                discard: [firstCard],
                hands: hands,
                playerOrder: playerOrder,
                turnIndex: 0,
                direction: 1,
                currentColor: firstCard.color,
                drawStack: 0,
                turnStartedAt: firebase.database.ServerValue.TIMESTAMP,
                countdown: null
            });
            
            rtdb.ref(`matchmaking/uno/${matchId}`).remove();
            rtdb.ref(`matchmaking/uno/${matchId}`).onDisconnect().cancel();
        }
        
        function renderCard(card, onClick) {
            const isWild = card.color === 'wild';
            const displayText = escapeHtml(isWild && card.type === '+4' ? '+4' : card.type);
            const clickAttr = onClick ? `onclick="${escapeHtml(onClick)}"` : '';
            if (card === 'back') {
                return `
                    <div class="card card-back" ${clickAttr}>
                        <div class="card-inner">
                            <div class="card-inner-text">UNO</div>
                        </div>
                    </div>
                `;
            }
            return `
                <div class="card ${card.color || ''}" ${clickAttr}>
                    <div class="card-small-top">${displayText}</div>
                    <div class="card-inner">
                        <div class="card-inner-text">
                            ${displayText}
                        </div>
                    </div>
                    <div class="card-small-bottom">${displayText}</div>
                </div>
            `;
        }

        function updateGameUI() {
            const playerOrder = gameState.playerOrder || [];
            const turnId = playerOrder[gameState.turnIndex];
            myTurn = (turnId === currentUser.uid);
            
            // Status bar
            const turnPlayer = gameState.players[turnId] || {};
            const turnName = turnId === currentUser.uid ? "Your Turn!" : escapeHtml(turnPlayer.name) + "'s Turn";
            const turnStatusBar = document.getElementById('status-bar');
            const directionArrow = (gameState.direction || 1) === 1 ? '→' : '←';
            turnStatusBar.innerHTML = `
                <div class="status-bar-inner">
                    <canvas id="status-avatar" width="24" height="24" style="border:1px solid black; width:24px; height:24px; image-rendering:pixelated; background:white;"></canvas>
                    <span>${turnName}</span>
                    <span style="margin-left:10px; font-size:1.2rem;" title="Direction of play">${directionArrow}</span>
                </div>
            `;
            turnStatusBar.style.background = myTurn ? '#000' : '#eee';
            turnStatusBar.style.color = myTurn ? '#fff' : '#000';
            
            // Draw status avatar
            setTimeout(() => {
                if (turnPlayer.isBot) {
                    drawAvatar('status-avatar', turnId);
                } else {
                    window.rekindleFetchAvatarSeed(rtdb, turnId, seed => {
                        drawAvatar('status-avatar', seed);
                    });
                }
            }, 0);
            
            const discardPile = gameState.discard || [];
            const topCard = discardPile[discardPile.length - 1];
            
            // Discard pile
            document.getElementById('discard-pile').innerHTML = renderCard(topCard);
            const patternNames = { red: 'Vertical', blue: 'Horizontal', green: 'Diag Up', yellow: 'Diag Down', wild: 'Wild' };
            document.getElementById('current-color-label').innerText = 'Discard (' + (patternNames[gameState.currentColor] || 'Any') + ')';
            document.getElementById('current-color-label').style.color = 'black';
            
            // Draw pile label with stack indicator
            const drawStack = gameState.drawStack || 0;
            document.querySelector('.board-center .pile-label').innerText = drawStack > 0 ? 'Draw (+' + drawStack + ')' : 'Draw';
            
            // My Hand
            const myCards = (gameState.hands || {})[currentUser.uid] || [];
            const handDiv = document.getElementById('my-hand');
            handDiv.innerHTML = '';
            
            const settings = gameState.settings || {};
            myCards.forEach((card, index) => {
                const canPlay = myTurn && isPlayable(card, topCard, gameState.currentColor, drawStack, settings.stacking);
                const clickFn = canPlay ? 'tryPlayCard(' + index + ')' : '';
                handDiv.innerHTML += renderCard(card, clickFn);
                // Make unplayable cards translucent if it's my turn
                if (myTurn && !canPlay) {
                    handDiv.lastElementChild.classList.add('disabled');
                }
            });
            
            // Opponents
            const oppDiv = document.getElementById('opponents-ui');
            oppDiv.innerHTML = '';
            playerOrder.forEach(uid => {
                if (uid !== currentUser.uid) {
                    const count = ((gameState.hands || {})[uid] || []).length;
                    const isActive = (uid === turnId);
                    const p = gameState.players[uid] || {};
                    oppDiv.innerHTML += `
                        <div class="opponent opponent-card ${isActive ? 'active-turn' : ''}" style="display:flex; flex-direction:column; align-items:center;">
                            <canvas id="game-avatar-${uid}" width="32" height="32" style="border:2px solid black; width:32px; height:32px; image-rendering:pixelated; background:white;"></canvas>
                            <div>${isActive ? '▶ ' : ''}${escapeHtml(p.name)}</div>
                            <div style="font-size:0.8rem; font-weight:normal;">${count} cards</div>
                        </div>
                    `;
                }
            });

            // Draw game avatars
            setTimeout(() => {
                playerOrder.forEach(uid => {
                    if (uid !== currentUser.uid) {
                        const p = gameState.players[uid] || {};
                        if (p.isBot) {
                            drawAvatar(`game-avatar-${uid}`, uid);
                        } else {
                            window.rekindleFetchAvatarSeed(rtdb, uid, seed => {
                                drawAvatar(`game-avatar-${uid}`, seed);
                            });
                        }
                    }
                });
            }, 0);
        }
        
        function isPlayable(card, topCard, currentColor, drawStack, stackingEnabled) {
            if (drawStack > 0) {
                if (!stackingEnabled) return false;
                // When stacking, only +2 or +4 can be played on top of an active stack
                return (card.type === '+2' || card.type === '+4');
            }
            if (card.color === 'wild') return true;
            if (card.color === currentColor) return true;
            if (card.type === topCard.type) return true;
            return false;
        }

        function ensureDeckHasCards(deck, discard, needed) {
            deck = deck || [];
            discard = discard || [];
            if (deck.length >= needed) return { deck: deck, discard: discard };

            const top = discard.pop();
            const rest = discard.slice();
            for (let i = rest.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                const tmp = rest[i];
                rest[i] = rest[j];
                rest[j] = tmp;
            }
            deck = deck.concat(rest);
            discard = top ? [top] : [];
            return { deck: deck, discard: discard };
        }

        async function drawCards(playerId, count) {
            let deck = gameState.deck || [];
            let discard = gameState.discard || [];
            const hand = (gameState.hands || {})[playerId] || [];

            const ensured = ensureDeckHasCards(deck, discard, count);
            deck = ensured.deck;
            discard = ensured.discard;

            for (let i = 0; i < count; i++) {
                if (deck.length === 0) break;
                hand.push(deck.pop());
            }

            const nextIdx = getNextTurnIndex(1);

            await matchRef.update({
                deck: deck,
                discard: discard,
                ['hands/' + playerId]: hand,
                turnIndex: nextIdx,
                drawStack: 0,
                turnStartedAt: firebase.database.ServerValue.TIMESTAMP
            });
        }

        async function drawCard() {
            if (!myTurn) return;
            const drawStack = gameState.drawStack || 0;
            if (drawStack > 0) {
                await drawCards(currentUser.uid, drawStack);
            } else {
                await drawCards(currentUser.uid, 1);
            }
        }
        
        function tryPlayCard(index) {
            if (!myTurn) return;
            const myCards = gameState.hands[currentUser.uid] || [];
            const card = myCards[index];
            const topCard = (gameState.discard || [])[(gameState.discard || []).length - 1];
            const drawStack = gameState.drawStack || 0;
            const settings = gameState.settings || {};
            
            if (!isPlayable(card, topCard, gameState.currentColor, drawStack, settings.stacking)) return;
            
            if (card.color === 'wild') {
                pendingPlayCard = { index: index, card: card };
                document.getElementById('color-modal').style.display = 'flex';
                return;
            }
            
            playCard(currentUser.uid, index, card, card.color);
        }
        
        function chooseColor(color) {
            document.getElementById('color-modal').style.display = 'none';
            if (pendingPlayCard) {
                playCard(currentUser.uid, pendingPlayCard.index, pendingPlayCard.card, color);
                pendingPlayCard = null;
            }
        }
        
        async function playCard(playerId, index, card, chosenColor) {
            const playerCards = (gameState.hands || {})[playerId] || [];
            playerCards.splice(index, 1);
            
            const discard = (gameState.discard || []).slice();
            discard.push(card);
            
            let direction = gameState.direction || 1;
            let drawStack = gameState.drawStack || 0;
            let steps = 1;
            
            if (card.type === 'Rev') {
                direction *= -1;
                if (gameState.playerOrder.length === 2) {
                    steps = 2;
                }
            } else if (card.type === 'Skip') {
                steps = 2;
            } else if (card.type === '+2') {
                drawStack += 2;
            } else if (card.type === '+4') {
                drawStack += 4;
            }
            
            const nextIdx = getNextTurnIndex(steps, direction);
            
            const updates = {
                discard: discard,
                ['hands/' + playerId]: playerCards,
                direction: direction,
                currentColor: chosenColor,
                turnIndex: nextIdx,
                drawStack: drawStack,
                turnStartedAt: firebase.database.ServerValue.TIMESTAMP
            };
            
            if (playerCards.length === 0) {
                updates.status = 'finished';
                updates.winner = playerId;
            }
            
            await matchRef.update(updates);
        }
        
        function getNextTurnIndex(steps, dir = gameState.direction) {
            const len = gameState.playerOrder.length;
            let idx = gameState.turnIndex + (steps * dir);
            while (idx < 0) idx += len;
            return idx % len;
        }

        function chooseBestColor(hand, card) {
            if (card.color !== 'wild') return card.color;
            const colorCounts = { red: 0, blue: 0, green: 0, yellow: 0 };
            hand.forEach(function(c) {
                if (colorCounts[c.color] !== undefined) colorCounts[c.color]++;
            });
            let best = 'red';
            let bestCount = -1;
            for (const c in colorCounts) {
                if (colorCounts[c] > bestCount) {
                    bestCount = colorCounts[c];
                    best = c;
                }
            }
            return best;
        }

        function scheduleBotTurn() {
            if (botTimer) { clearTimeout(botTimer); botTimer = null; }
            if (!isHost || !gameState || gameState.status !== 'playing') return;

            const playerOrder = gameState.playerOrder || [];
            const turnId = playerOrder[gameState.turnIndex];
            if (!turnId || !turnId.startsWith('bot_')) return;

            botTimer = setTimeout(function() {
                if (!gameState || gameState.status !== 'playing') return;
                const currentTurnId = gameState.playerOrder[gameState.turnIndex];
                if (currentTurnId !== turnId) return;
                executeBotTurn(turnId);
            }, BOT_DELAY_MS);
        }

        async function executeBotTurn(botId) {
            if (!isHost || !gameState || gameState.status !== 'playing') return;
            const playerOrder = gameState.playerOrder || [];
            if (playerOrder[gameState.turnIndex] !== botId) return;

            const botCards = gameState.hands[botId] || [];
            const topCard = (gameState.discard || [])[(gameState.discard || []).length - 1];
            const drawStack = gameState.drawStack || 0;
            const settings = gameState.settings || {};

            const playable = [];
            botCards.forEach(function(card, idx) {
                if (isPlayable(card, topCard, gameState.currentColor, drawStack, settings.stacking)) {
                    playable.push({ index: idx, card: card });
                }
            });

            if (playable.length > 0) {
                let choice = playable[0];
                if (drawStack > 0) {
                    const stackers = playable.filter(function(p) { return p.card.type === '+2' || p.card.type === '+4'; });
                    if (stackers.length > 0) choice = stackers[0];
                }
                const chosenColor = chooseBestColor(botCards, choice.card);
                await playCard(botId, choice.index, choice.card, chosenColor);
            } else {
                if (drawStack > 0) {
                    await drawCards(botId, drawStack);
                } else {
                    await drawCards(botId, 1);
                }
            }
        }

        function scheduleAfkSkip() {
            if (afkTimer) { clearTimeout(afkTimer); afkTimer = null; }
            if (!isHost || !gameState || gameState.status !== 'playing') return;

            const playerOrder = gameState.playerOrder || [];
            const turnId = playerOrder[gameState.turnIndex];
            if (!turnId) return;

            const turnStartedAt = gameState.turnStartedAt;
            if (typeof turnStartedAt !== 'number') return; // Wait for server timestamp to resolve

            const elapsed = serverTime() - turnStartedAt;
            const remaining = Math.max(1000, AFK_TIMEOUT_MS - elapsed);

            afkTimer = setTimeout(function() {
                if (!gameState || gameState.status !== 'playing') return;
                const currentTurnId = gameState.playerOrder[gameState.turnIndex];
                if (currentTurnId !== turnId) return;
                performAfkAction(turnId);
            }, remaining);
        }

        async function performAfkAction(playerId) {
            if (!isHost || !gameState || gameState.status !== 'playing') return;
            const playerOrder = gameState.playerOrder || [];
            if (playerOrder[gameState.turnIndex] !== playerId) return;

            const drawStack = gameState.drawStack || 0;
            if (drawStack > 0) {
                await drawCards(playerId, drawStack);
            } else {
                await drawCards(playerId, 1);
            }
        }
        
        // Apply wallpaper when loaded
        window.addEventListener('load', () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
        });
    </script>
