<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Wikipedia</title>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            /* Default Background (Overridden by JS) */
            /* Background managed by settings */

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            /* FIX: Centers Vertically */
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        /* CLOSE BUTTON (HOME) */
        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* TOOLBAR */
        .toolbar {
            display: flex;
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
        }
        .toolbar > * + * {
            margin-left: 10px;
}

        input[type="text"] {
            flex-grow: 1;
            padding: 6px;
            font-family: inherit;
            font-size: 1rem;
            border: 2px solid black;
            border-radius: 0;
        }

        button {
            background: white;
            border: 2px solid black;
            padding: 6px 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.9rem;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: none;
            background: black;
            color: white;
        }

        /* CONTENT AREA */
        #content-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 30px;
            background: white;
            font-family: "Georgia", "Times New Roman", serif;
            line-height: 1.6;
            font-size: 1.1rem;
        }

        /* WIKIPEDIA CONTENT STYLING */
        #article-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            border-bottom: 4px double black;
            padding-bottom: 10px;
            font-family: "Helvetica Neue", sans-serif;
        }

        #article-body p {
            margin-bottom: 1.5em;
        }

        #article-body h2 {
            font-family: "Helvetica Neue", sans-serif;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
            margin-top: 30px;
        }

        /* Hide some Wikipedia clutter */
        .mw-editsection,
        .hatnote,
        .ambox {
            display: none !important;
        }

        /* Make tables scrollable if too wide */
        table {
            display: block;
            overflow-x: auto;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th,
        td {
            border: 1px solid #ccc;
            padding: 5px;
            font-size: 0.9rem;
        }

        /* STANDARD MODAL SYSTEM */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-family: "Geneva", "Verdana", sans-serif;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            padding: 20px;
            box-shadow: 6px 6px 0 black;
            max-width: 300px;
            width: 80%;
            text-align: center;
        }

        .modal-text {
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.4;
            color: black;
        }

        .modal-btns {
            display: flex;
            justify-content: center;
        }

        .modal-btns > * + * {
            margin-left: 10px;
}

        .modal-btn {
            background: white;
            border: 2px solid black;
            padding: 6px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
        }

        .modal-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }
    </style>
    <script src="theme.js?v=21"></script>
    <script src="js/i18n.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <!-- Home Button -->
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="wikipedia.title">Wikipedia</span>
        </div>

        <div class="toolbar">
            <button onclick="loadRandom()" data-i18n="wikipedia.btn.random">Random</button>
            <input type="text" id="search-input" placeholder="Search..." onkeypress="handleKey(event)" data-i18n-placeholder="wikipedia.ph.search">
            <button onclick="searchWiki()" data-i18n="wikipedia.btn.go">Go</button>
        </div>

        <div id="content-area">
            <h1 id="article-title" data-i18n="wikipedia.welcome.title">Welcome</h1>
            <div id="article-body">
                <p data-i18n="wikipedia.welcome.desc">Enter a topic above or click "Random" to start reading.</p>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "https://en.wikipedia.org/w/api.php";

        window.onload = function () {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
        };

        // Helper to HTML-escape text
        function escapeHTML(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Helper to sanitize background image URLs from localStorage
        function sanitizeBackgroundImage(imageString) {
            if (!imageString) return '';
            if (imageString.startsWith('url("data:image/png;base64,')) {
                return imageString;
            }
            if (imageString.startsWith('url("') && imageString.endsWith('")')) {
                const url = imageString.substring(5, imageString.length - 2);
                if ((url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) && !url.includes('javascript:')) {
                    return imageString;
                }
            }
            return '';
        }

        // --- WALLPAPER LOADER
        function showModal(msg, isConfirm = false, callback = null) {
            const overlay = document.getElementById('modal-overlay');
            const messageEl = document.getElementById('modal-message');
            const btnsEl = document.getElementById('modal-btns');
            messageEl.textContent = msg;
            if (isConfirm) {
                btnsEl.innerHTML = `<button class="modal-btn" id="modal-cancel">${window.t ? window.t('common.cancel', 'Cancel') : 'Cancel'}</button><button class="modal-btn" id="modal-ok">${window.t ? window.t('common.ok', 'OK') : 'OK'}</button>`;
                document.getElementById('modal-cancel').onclick = () => { overlay.style.display = 'none'; if (callback) callback(false); };
                document.getElementById('modal-ok').onclick = () => { overlay.style.display = 'none'; if (callback) callback(true); };
            } else {
                btnsEl.innerHTML = `<button class="modal-btn" onclick="hideModal()">${window.t ? window.t('common.ok', 'OK') : 'OK'}</button>`;
            }
            overlay.style.display = 'flex';
        }
        function hideModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function handleEnter(e) {
            if (e.key === 'Enter') searchWiki();
        }

        async function searchWiki() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            document.getElementById('article-body').innerHTML = `<i>${window.t ? window.t('wikipedia.msg.searching', 'Searching...') : 'Searching...'}</i>`;

            // 1. Search for the title
            const searchUrl = `${API_BASE}?action=opensearch&search=${encodeURIComponent(query)}&limit=1&format=json&origin=*`;

            try {
                const res = await fetch(searchUrl);
                const data = await res.json();

                if (data[1] && data[1].length > 0) {
                    const title = data[1][0];
                    loadArticle(title);
                } else {
                    document.getElementById('article-title').innerText = window.t ? window.t('wikipedia.msg.not_found', 'Not Found') : "Not Found";
                    document.getElementById('article-body').innerText = window.t ? window.t('wikipedia.msg.empty', 'No articles found matching that query.') : "No articles found matching that query.";
                }
            } catch (e) {
                showModal(window.t ? window.t('wikipedia.msg.error_connect', 'Error connecting to Wikipedia.') : "Error connecting to Wikipedia.");
            }
        }

        async function loadRandom() {
            document.getElementById('article-body').innerHTML = `<i>${window.t ? window.t('wikipedia.msg.randomizing', 'Spinning the globe...') : 'Spinning the globe...'}</i>`;
            const url = `${API_BASE}?action=query&list=random&rnnamespace=0&rnlimit=1&format=json&origin=*`;

            try {
                const res = await fetch(url);
                const data = await res.json();
                const title = data.query.random[0].title;
                loadArticle(title);
            } catch (e) {
                showModal(window.t ? window.t('wikipedia.msg.error_load', 'Error loading Wikipedia content.') : "Error loading Wikipedia content.");
            }
        }

        async function loadArticle(title) {
            document.getElementById('search-input').value = title;
            document.getElementById('article-title').innerText = title;
            document.getElementById('article-body').innerText = window.t ? window.t('wikipedia.msg.loading', 'Loading article...') : "Loading article..."; // Use innerText for safety

            // Fetch parsed HTML
            const url = `${API_BASE}?action=parse&page=${encodeURIComponent(title)}&prop=text&format=json&origin=*&mobileformat=1`;

            try {
                const res = await fetch(url);
                const data = await res.json();

                if (data.parse && data.parse.text) {
                    let htmlContent = data.parse.text['*'];

                    document.getElementById('article-body').innerHTML = htmlContent; // Changed to innerHTML to render Wiki content

                    // Make links work internally
                    document.querySelectorAll('#article-body a').forEach(link => {
                        link.onclick = (e) => {
                            e.preventDefault();
                            const href = link.getAttribute('href');
                            if (href && href.startsWith('/wiki/')) {
                                const newTitle = decodeURIComponent(href.replace('/wiki/', ''));
                                loadArticle(newTitle);
                            }
                        };
                    });

                    // Scroll top
                    document.getElementById('content-area').scrollTop = 0;

                } else {
                    document.getElementById('article-body').innerText = window.t ? window.t('wikipedia.msg.error_parse', 'Error parsing article.') : "Error parsing article.";
                }
            } catch (e) {
                document.getElementById('article-body').innerText = window.t ? window.t('wikipedia.msg.error_load', 'Error loading article content.') : "Error loading article content.";
            }
        }



    </script>
    <script src="https://cdn.counter.dev/script.js" data-id="4e551911-0e5d-4c48-91a6-b828c3301675" data-utcoffset="11"></script>
    <!-- STANDARD MODAL POPUP -->
    <div id="modal-overlay">
        <div class="modal-box">
            <div id="modal-message" class="modal-text"></div>
            <div id="modal-btns" class="modal-btns"></div>
        </div>
    </div>


</body></html>
