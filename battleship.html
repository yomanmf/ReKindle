<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Battleship</title>
    <style>
        /* SYSTEM 7 / E-INK AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        * {
            transition: none !important;
            animation: none !important;
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: fit-content;
            width: 100%;
            max-width: 800px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* CONTENT AREA */
        .window-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
            overflow-y: auto;
            position: relative;
        }

        /* STATUS / HUD */
        .hud {
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid black;
            padding-bottom: 5px;
            font-family: "Courier New", monospace;
            font-weight: bold;
            font-size: 1rem;
        }

        .fleet-row {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .fleet-block {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .fleet-status {
            display: flex;
            margin-top: 4px;
            height: 10px;
        }
        .fleet-status > * + * {
            margin-left: 5px;
        }

        .ship-pip {
            width: 10px;
            height: 10px;
            border: 1px solid black;
            background: white;
        }

        .ship-pip.sunk {
            background: black;
        }

        /* GRIDS */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            grid-template-rows: repeat(10, 1fr);
            gap: 1px;
            background: black;
            border: 2px solid black;
            width: 100%;
            max-width: 100%;
            margin-bottom: 20px;
            min-height: 250px;
        }

        .grid-container.small {
            max-width: 200px;
            min-height: 120px;
            margin-bottom: 10px;
        }

        .cell {
            background: white;
            position: relative;
            cursor: pointer;
        }

        .cell.ship {
            background: black;
        }

        .cell.miss {
            background: white;
        }

        .cell.miss::after {
            content: "•";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: black;
        }

        .cell.hit {
            background: white;
        }

        .cell.hit::after {
            content: "X";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.2rem;
            font-weight: 900;
            color: black;
        }

        .cell.hover-valid {
            background: #999;
        }

        .cell.hover-invalid {
            background: repeating-linear-gradient(45deg, #fff, #fff 2px, #000 2px, #000 4px);
        }

        .cell.disabled {
            cursor: default;
            pointer-events: none;
        }

        .grid-label {
            font-size: 0.8rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            width: 100%;
            justify-content: center;
            margin-top: auto;
        }
        .controls > * + * {
            margin-left: 10px;
        }

        button {
            background: white;
            border: 2px solid black;
            padding: 10px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-size: 1rem;
            text-transform: uppercase;
            flex: 1;
        }

        button:active {
            transform: translate(2px, 2px);
            box-shadow: none;
            background: black;
            color: white;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* SCREENS */
        .screen {
            width: 100%;
            min-height: 300px;
            display: none;
            flex-direction: column;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* STANDARD MODAL POPUP */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-family: "Geneva", "Verdana", sans-serif;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            padding: 20px;
            box-shadow: 6px 6px 0 black;
            max-width: 300px;
            width: 80%;
            text-align: center;
        }

        .modal-text {
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.4;
            color: black;
        }

        .modal-btns {
            display: flex;
            justify-content: center;
        }
        .modal-btns > * + * {
            margin-left: 10px;
        }

        .modal-btn {
            background: white;
            border: 2px solid black;
            padding: 6px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
        }

        .modal-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }
    </style>
    <script src="js/i18n.js"></script>
    <script src="theme.js?v=20"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'" data-i18n="battleship.btn.close">X</div>
            <span class="title-text" data-i18n="battleship.title">Battleship</span>
        </div>

        <div class="window-content">

            <div id="setup-screen" class="screen">
                <div class="hud" id="setup-msg" data-i18n="battleship.setup.p1">Place Carrier (5)</div>
                <div class="grid-container" id="setup-board"></div>
                <div class="controls">
                    <button onclick="rotateShip()" data-i18n="battleship.btn.rotate">Rotate</button>
                    <button onclick="resetSetup()" data-i18n="battleship.btn.clear">Clear</button>
                    <button onclick="autoPlacePlayer()" data-i18n="battleship.btn.auto">Auto</button>
                </div>
            </div>

            <div id="game-screen" class="screen">
                <div class="hud" id="game-msg">Your Turn</div>

                <div class="fleet-row">
                    <div class="fleet-block">
                        <div>CPU Fleet</div>
                        <div class="fleet-status" id="enemy-fleet"></div>
                    </div>
                    <div class="fleet-block">
                        <div>Your Fleet</div>
                        <div class="fleet-status" id="player-fleet"></div>
                    </div>
                </div>

                <div class="grid-label">Enemy Grid - Tap to Fire</div>
                <div class="grid-container" id="game-board"></div>

                <div class="grid-label">Your Fleet</div>
                <div class="grid-container small" id="player-board"></div>

                <div class="controls">
                    <button onclick="initGame()" data-i18n="tictactoe.btn.reset">New Game</button>
                </div>
            </div>

        </div>
    </div>

    <!-- STANDARD MODAL POPUP -->
    <div id="modal-overlay">
        <div class="modal-box">
            <div id="modal-message" class="modal-text"></div>
            <div id="modal-btns" class="modal-btns"></div>
        </div>
    </div>

    <script>
        function showModal(msg, isConfirm, callback) {
            const overlay = document.getElementById('modal-overlay');
            const messageEl = document.getElementById('modal-message');
            const btnsEl = document.getElementById('modal-btns');
            messageEl.textContent = msg;
            if (isConfirm) {
                btnsEl.innerHTML = '<button class="modal-btn" id="modal-cancel">' + (window.t ? window.t('battleship.btn.cancel') : 'Cancel') + '</button><button class="modal-btn" id="modal-ok">' + (window.t ? window.t('battleship.btn.ok') : 'OK') + '</button>';
                document.getElementById('modal-cancel').onclick = function () { overlay.style.display = 'none'; if (callback) callback(false); };
                document.getElementById('modal-ok').onclick = function () { overlay.style.display = 'none'; if (callback) callback(true); };
            } else {
                btnsEl.innerHTML = '<button class="modal-btn" onclick="hideModal()">' + (window.t ? window.t('battleship.btn.ok') : 'OK') + '</button>';
            }
            overlay.style.display = 'flex';
        }
        function hideModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        function interpolate(str, vars) {
            if (!str) return str;
            return str.replace(/\$\{(\w+)\}/g, function(match, key) {
                return vars[key] !== undefined ? vars[key] : match;
            });
        }

        // --- CONFIG ---
        const BOARD_SIZE = 10;
        const SHIPS = [
            { name: "Carrier", size: 5 },
            { name: "Battleship", size: 4 },
            { name: "Cruiser", size: 3 },
            { name: "Submarine", size: 3 },
            { name: "Destroyer", size: 2 }
        ];

        // --- STATE ---
        let state = {
            phase: 'setup',
            placingShipIdx: 0,
            isHorizontal: true,
            player: { board: [], ships: [], shots: [] },
            cpu: { board: [], ships: [], shots: [] },
            cpuHunt: {
                active: false,
                hits: [],
                targets: [],
                direction: null,
                firstHit: null
            }
        };

        // --- INIT ---
        window.onload = function () {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            initGame();
            window.addEventListener('resize', resizeBoards);
            setTimeout(resizeBoards, 200);
        };

        function resizeBoards() {
            const setup = document.getElementById('setup-board');
            const game = document.getElementById('game-board');
            const player = document.getElementById('player-board');

            const setSize = function (el) {
                if (el) {
                    const width = el.offsetWidth;
                    if (width > 0) {
                        el.style.height = width + 'px';
                    }
                }
            };

            setSize(setup);
            setSize(game);
            setSize(player);
        }

        function initGame() {
            state.player.board = createEmptyBoard();
            state.cpu.board = createEmptyBoard();
            state.player.ships = [];
            state.cpu.ships = [];
            state.player.shots = [];
            state.cpu.shots = [];
            state.placingShipIdx = 0;
            state.isHorizontal = true;
            state.cpuHunt = { active: false, hits: [], targets: [], direction: null, firstHit: null };
            state.phase = 'setup';

            showScreen('setup-screen');
            renderSetupBoard();
            updateSetupMsg();
        }

        function createEmptyBoard() {
            const b = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                b[y] = [];
                for (let x = 0; x < BOARD_SIZE; x++) {
                    b[y][x] = 0;
                }
            }
            return b;
        }

        function showScreen(id) {
            const screens = document.querySelectorAll('.screen');
            for (let i = 0; i < screens.length; i++) {
                screens[i].classList.remove('active');
            }
            document.getElementById(id).classList.add('active');
            resizeBoards();
            setTimeout(resizeBoards, 50);
            setTimeout(resizeBoards, 300);
        }

        // --- SETUP LOGIC ---
        function updateSetupMsg() {
            const shipDef = SHIPS[state.placingShipIdx];
            const shipName = window.t ? window.t('battleship.ship.' + shipDef.name.toLowerCase()) : shipDef.name;
            const template = window.t ? window.t('battleship.setup.msg') : '${pName}: Place ${ship} (${size})';
            document.getElementById('setup-msg').innerText = interpolate(template, { pName: 'You', ship: shipName, size: shipDef.size });
        }

        function rotateShip() {
            state.isHorizontal = !state.isHorizontal;
        }

        function resetSetup() {
            state.player.board = createEmptyBoard();
            state.player.ships = [];
            state.placingShipIdx = 0;
            renderSetupBoard();
            updateSetupMsg();
        }

        function autoPlacePlayer() {
            state.player.board = createEmptyBoard();
            state.player.ships = [];
            placeShipsRandomly(state.player);
            state.placingShipIdx = SHIPS.length;
            startGame();
        }

        function placeShipsRandomly(player) {
            for (let i = 0; i < SHIPS.length; i++) {
                let placed = false;
                let attempts = 0;
                while (!placed && attempts < 1000) {
                    attempts++;
                    const x = Math.floor(Math.random() * BOARD_SIZE);
                    const y = Math.floor(Math.random() * BOARD_SIZE);
                    const horizontal = Math.random() < 0.5;
                    if (isValidPlacement(player.board, x, y, SHIPS[i].size, horizontal)) {
                        const coords = [];
                        for (let j = 0; j < SHIPS[i].size; j++) {
                            const px = horizontal ? x + j : x;
                            const py = horizontal ? y : y + j;
                            player.board[py][px] = 1;
                            coords.push({ x: px, y: py });
                        }
                        player.ships.push({ hits: 0, size: SHIPS[i].size, coords: coords });
                        placed = true;
                    }
                }
            }
        }

        function renderSetupBoard() {
            const container = document.getElementById('setup-board');
            container.innerHTML = '';

            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (state.player.board[y][x] === 1) cell.classList.add('ship');
                    cell.onclick = function () { tryPlaceShip(x, y); };
                    container.appendChild(cell);
                }
            }
            resizeBoards();
        }

        function tryPlaceShip(x, y) {
            const shipDef = SHIPS[state.placingShipIdx];

            if (isValidPlacement(state.player.board, x, y, shipDef.size, state.isHorizontal)) {
                const coords = [];
                for (let i = 0; i < shipDef.size; i++) {
                    const px = state.isHorizontal ? x + i : x;
                    const py = state.isHorizontal ? y : y + i;
                    state.player.board[py][px] = 1;
                    coords.push({ x: px, y: py });
                }
                state.player.ships.push({ hits: 0, size: shipDef.size, coords: coords });

                state.placingShipIdx++;

                if (state.placingShipIdx >= SHIPS.length) {
                    startGame();
                } else {
                    renderSetupBoard();
                    updateSetupMsg();
                }
            } else {
                const msg = document.getElementById('setup-msg');
                const original = msg.innerText;
                msg.innerText = window.t ? window.t('battleship.setup.invalid') : "Invalid Position!";
                setTimeout(function () { msg.innerText = original; }, 1000);
            }
        }

        function isValidPlacement(board, x, y, size, horizontal) {
            if (horizontal) {
                if (x + size > BOARD_SIZE) return false;
                for (let i = 0; i < size; i++) {
                    if (board[y][x + i] !== 0) return false;
                }
            } else {
                if (y + size > BOARD_SIZE) return false;
                for (let i = 0; i < size; i++) {
                    if (board[y + i][x] !== 0) return false;
                }
            }
            return true;
        }

        // --- GAME START ---
        function startGame() {
            placeShipsRandomly(state.cpu);
            state.phase = 'play';
            showScreen('game-screen');
            document.getElementById('game-msg').innerText = window.t ? window.t('battleship.turn.your') : "Your Turn";
            renderGameBoard();
            renderPlayerBoard();
            renderFleetStatus();
        }

        // --- GAMEPLAY ---
        function renderGameBoard() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            const enemy = state.cpu;

            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';

                    const val = enemy.board[y][x];
                    if (val === 2) cell.classList.add('miss');
                    else if (val === 3) cell.classList.add('hit');

                    if (val === 0 || val === 1) {
                        cell.onclick = function () { fireShot(x, y); };
                    } else {
                        cell.classList.add('disabled');
                    }

                    container.appendChild(cell);
                }
            }
            resizeBoards();
        }

        function renderPlayerBoard() {
            const container = document.getElementById('player-board');
            container.innerHTML = '';

            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const val = state.player.board[y][x];
                    if (val === 1) cell.classList.add('ship');
                    else if (val === 2) cell.classList.add('miss');
                    else if (val === 3) cell.classList.add('hit');
                    cell.classList.add('disabled');
                    container.appendChild(cell);
                }
            }
            resizeBoards();
        }

        function renderFleetStatus() {
            const enemyContainer = document.getElementById('enemy-fleet');
            enemyContainer.innerHTML = '';
            state.cpu.ships.forEach(function (ship) {
                const pip = document.createElement('div');
                pip.className = 'ship-pip';
                if (ship.hits >= ship.size) pip.classList.add('sunk');
                enemyContainer.appendChild(pip);
            });

            const playerContainer = document.getElementById('player-fleet');
            playerContainer.innerHTML = '';
            state.player.ships.forEach(function (ship) {
                const pip = document.createElement('div');
                pip.className = 'ship-pip';
                if (ship.hits >= ship.size) pip.classList.add('sunk');
                playerContainer.appendChild(pip);
            });
        }

        function fireShot(x, y) {
            const enemy = state.cpu;
            const val = enemy.board[y][x];

            if (val === 1) {
                enemy.board[y][x] = 3;
                document.getElementById('game-msg').innerText = window.t ? window.t('battleship.msg.hit') : "HIT!";
                updateShipHits(state.cpu, x, y);
                renderGameBoard();
                renderFleetStatus();

                if (checkWin(state.cpu)) {
                    setTimeout(function () {
                        showModal(window.t ? window.t('battleship.msg.win.you', 'You Win!') : "You Win!");
                    }, 500);
                    return;
                }
                // Player gets another turn after hit? Traditional Battleship: yes, keep turn
                // We'll keep player's turn after hit.
            } else {
                enemy.board[y][x] = 2;
                document.getElementById('game-msg').innerText = window.t ? window.t('battleship.msg.miss') : "MISS";
                renderGameBoard();
                setTimeout(cpuTurn, 1000);
            }
        }

        function updateShipHits(player, x, y) {
            for (let i = 0; i < player.ships.length; i++) {
                const ship = player.ships[i];
                for (let j = 0; j < ship.coords.length; j++) {
                    if (ship.coords[j].x === x && ship.coords[j].y === y) {
                        ship.hits++;
                        return;
                    }
                }
            }
        }

        function checkWin(enemy) {
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    if (enemy.board[y][x] === 1) return false;
                }
            }
            return true;
        }

        // --- CPU TURN ---
        function cpuTurn() {
            document.getElementById('game-msg').innerText = window.t ? window.t('battleship.turn.cpu', 'CPU Thinking...') : "CPU Thinking...";

            const move = getCpuShot();
            if (!move) return;
            const x = move.x;
            const y = move.y;

            const val = state.player.board[y][x];
            let result = '';
            if (val === 1) {
                state.player.board[y][x] = 3;
                updateShipHits(state.player, x, y);
                result = window.t ? window.t('battleship.msg.hit') : "HIT";
                document.getElementById('game-msg').innerText = 'CPU ' + result + ' at ' + String.fromCharCode(65 + x) + (y + 1);

                // Update hunt state
                if (!state.cpuHunt.active) {
                    state.cpuHunt.active = true;
                    state.cpuHunt.firstHit = { x: x, y: y };
                    state.cpuHunt.hits = [{ x: x, y: y }];
                    state.cpuHunt.direction = null;
                    addAdjacentTargets(x, y);
                } else {
                    state.cpuHunt.hits.push({ x: x, y: y });
                    if (state.cpuHunt.direction === null && state.cpuHunt.hits.length >= 2) {
                        const first = state.cpuHunt.firstHit;
                        const last = state.cpuHunt.hits[state.cpuHunt.hits.length - 1];
                        if (last.x === first.x) state.cpuHunt.direction = 'vertical';
                        else if (last.y === first.y) state.cpuHunt.direction = 'horizontal';
                        // Refine targets along direction
                        refineTargets();
                    } else {
                        addAdjacentTargets(x, y);
                    }
                }

                renderPlayerBoard();
                renderFleetStatus();

                if (checkWin(state.player)) {
                    setTimeout(function () {
                        showModal(window.t ? window.t('battleship.msg.win.cpu', 'CPU Wins!') : "CPU Wins!");
                    }, 500);
                    return;
                }

                // CPU gets another turn if hit
                setTimeout(cpuTurn, 1000);
                return;
            } else {
                state.player.board[y][x] = 2;
                result = window.t ? window.t('battleship.msg.miss') : "MISS";
                document.getElementById('game-msg').innerText = 'CPU ' + result + ' at ' + String.fromCharCode(65 + x) + (y + 1);
                renderPlayerBoard();

                // If we were hunting in a direction and missed, reverse direction
                if (state.cpuHunt.active && state.cpuHunt.direction !== null) {
                    reverseHuntDirection();
                }
            }

            // End CPU turn, back to player
            setTimeout(function () {
            document.getElementById('game-msg').innerText = window.t ? window.t('battleship.turn.your', 'Your Turn') : "Your Turn";
            }, 1000);
        }

        function getCpuShot() {
            // If hunting, take a target from the hunt list
            while (state.cpuHunt.active && state.cpuHunt.targets.length > 0) {
                const target = state.cpuHunt.targets.shift();
                if (!state.cpu.shots[target.y + '-' + target.x]) {
                    state.cpu.shots[target.y + '-' + target.x] = true;
                    return target;
                }
            }

            // Reset hunt if no targets left
            state.cpuHunt.active = false;
            state.cpuHunt.hits = [];
            state.cpuHunt.targets = [];
            state.cpuHunt.direction = null;
            state.cpuHunt.firstHit = null;

            // Random shot
            const available = [];
            for (let y = 0; y < BOARD_SIZE; y++) {
                for (let x = 0; x < BOARD_SIZE; x++) {
                    const val = state.player.board[y][x];
                    if (val === 0 || val === 1) {
                        available.push({ x: x, y: y });
                    }
                }
            }
            if (available.length === 0) return null;
            const choice = available[Math.floor(Math.random() * available.length)];
            state.cpu.shots[choice.y + '-' + choice.x] = true;
            return choice;
        }

        function addAdjacentTargets(x, y) {
            const dirs = [{ x: 0, y: -1 }, { x: 0, y: 1 }, { x: -1, y: 0 }, { x: 1, y: 0 }];
            for (let i = 0; i < dirs.length; i++) {
                const nx = x + dirs[i].x;
                const ny = y + dirs[i].y;
                if (nx >= 0 && nx < BOARD_SIZE && ny >= 0 && ny < BOARD_SIZE) {
                    const val = state.player.board[ny][nx];
                    if ((val === 0 || val === 1) && !state.cpu.shots[ny + '-' + nx]) {
                        state.cpuHunt.targets.push({ x: nx, y: ny });
                    }
                }
            }
        }

        function refineTargets() {
            // Keep only targets along the discovered direction
            const first = state.cpuHunt.firstHit;
            const last = state.cpuHunt.hits[state.cpuHunt.hits.length - 1];
            const newTargets = [];
            if (state.cpuHunt.direction === 'horizontal') {
                if (last.x + 1 < BOARD_SIZE) newTargets.push({ x: last.x + 1, y: last.y });
                if (first.x - 1 >= 0) newTargets.push({ x: first.x - 1, y: first.y });
            } else {
                if (last.y + 1 < BOARD_SIZE) newTargets.push({ x: last.x, y: last.y + 1 });
                if (first.y - 1 >= 0) newTargets.push({ x: first.x, y: first.y - 1 });
            }
            // Filter out already-shot
            state.cpuHunt.targets = [];
            for (let i = 0; i < newTargets.length; i++) {
                const t = newTargets[i];
                const val = state.player.board[t.y][t.x];
                if ((val === 0 || val === 1) && !state.cpu.shots[t.y + '-' + t.x]) {
                    state.cpuHunt.targets.push(t);
                }
            }
        }

        function reverseHuntDirection() {
            // If we missed going one way, try the other end of the ship
            const first = state.cpuHunt.firstHit;
            state.cpuHunt.targets = [];
            if (state.cpuHunt.direction === 'horizontal') {
                if (first.x - 1 >= 0) state.cpuHunt.targets.push({ x: first.x - 1, y: first.y });
            } else {
                if (first.y - 1 >= 0) state.cpuHunt.targets.push({ x: first.x, y: first.y - 1 });
            }
            // Filter
            const filtered = [];
            for (let i = 0; i < state.cpuHunt.targets.length; i++) {
                const t = state.cpuHunt.targets[i];
                const val = state.player.board[t.y][t.x];
                if ((val === 0 || val === 1) && !state.cpu.shots[t.y + '-' + t.x]) {
                    filtered.push(t);
                }
            }
            state.cpuHunt.targets = filtered;
        }
