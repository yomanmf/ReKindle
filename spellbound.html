<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Spelling Bee</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="js/i18n.js"></script>

    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            --hex-bg: #ffffff;
            --hex-border: #000000;
            --center-hex-bg: #000000;
            --center-hex-text: #ffffff;
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #e5e5e5;
            /* Background managed by settings */

            margin: 0;
            padding: 20px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            overflow: hidden;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: fit-content;
            /* ADAPTIVE HEIGHT */
            max-min-height: 95vh;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        /* CLOSE BUTTON */
        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* TABS */
        .tabs {
            display: flex;
            width: 100%;
            border-bottom: 2px solid black;
            background: #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-right: 2px solid black;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 2px solid black;
            background: #eee;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab.active {
            background: white;
            border-bottom: none;
            /* Connects to content */
        }

        /* SCORE BAR & RANK */
        .score-bar {
            width: 100%;
            background: white;
            border-bottom: 2px solid black;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 5px 0;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .score-divider {
            width: 2px;
            height: 15px;
            background: black;
            margin: 0 10px;
        }

        #rank-display {
            text-transform: uppercase;
        }

        /* GAME CONTENT */
        .window-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
        }

        /* INPUT AREA */
        #input-display {
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
            border-bottom: 2px solid #ccc;
            width: 80%;
        }

        .cursor {
            display: inline-block;
            width: 2px;
            height: 30px;
            background-color: black;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        /* HONEYCOMB GRID */
        .honeycomb {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .hex-row {
            display: flex;
            justify-content: center;
            margin-bottom: 5px;
        }

        .hex-btn {
            width: 70px;
            height: 60px;
            background-color: var(--hex-bg);
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            color: black;
            border: none;
        }

        .hex-wrapper {
            width: 74px;
            height: 64px;
            background: black;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 4px;
        }

        .hex-btn:active {
            background-color: #ddd;
        }

        .center-hex .hex-btn {
            background-color: var(--center-hex-bg);
            color: var(--center-hex-text);
        }

        /* CONTROLS */
        .controls {
            display: flex;
            margin-bottom: 20px;
        }

        .controls>*+* {
            margin-left: 20px;
        }

        button.ctrl-btn {
            background: white;
            border: 2px solid black;
            border-radius: 20px;
            padding: 10px 20px;
            font-weight: bold;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
        }

        button.ctrl-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* MESSAGE TOAST */
        #message-toast {
            position: absolute;
            top: 60px;
            background: black;
            color: white;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
            display: none;
            z-index: 10;
        }

        /* WORD LIST */
        #found-words {
            width: 100%;
            border-top: 2px solid black;
            padding-top: 10px;
            display: flex;
            flex-wrap: wrap;
            font-size: 0.9rem;
            justify-content: center;
            overflow-y: auto;
            max-height: 150px;
        }

        #found-words>*+* {
            margin-left: 10px;
        }

        .found-word {
            text-transform: capitalize;
            padding: 2px 5px;
        }

        /* GENERATING OVERLAY */
        #loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #ccc;
            border-top: 4px solid #000;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* CONFIRMATION MODAL */
        #new-game-modal {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 4px 4px 0px #000000;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .modal-buttons>*+* {
            margin-left: 10px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 5px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
        }

        .sys-btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* STANDARD MODAL SYSTEM */
        #modal-overlay, .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            font-family: "Geneva", "Verdana", sans-serif;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            padding: 20px;
            box-shadow: 6px 6px 0 black;
            max-width: 300px;
            width: 80%;
            text-align: center;
        }

        .modal-text {
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.4;
            color: black;
        }

        .modal-btns {
            display: flex;
            justify-content: center;
        }

        .modal-btns>*+* {
            margin-left: 10px;
        }

        .modal-btn {
            background: white;
            border: 2px solid black;
            padding: 6px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
        }

        .modal-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }
    </style>
    <script src="time.js"></script>
    <script src="theme.js?v=21"></script>
    <script src="js/rekindle-cloud.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <!-- Home Button -->
            <div class="close-box" onclick="window.location.href='index'">X</div>

            <span class="title-text" data-i18n="spellbound.title">Spelling Bee</span>

            <!-- Stats Button -->
            <div id="stats-btn" class="close-box" style="left:auto; right:10px; width:auto; padding:0 5px;" onclick="showStatsModal()">Stats</div>

            <!-- New Game Button (Unlimited Mode) -->
            <div id="new-game-btn" class="close-box" style="left:35px; right:auto; width:auto; padding:0 5px; display:none;" onclick="confirmNewGame()">New</div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-daily" onclick="switchMode('daily')">Daily</div>
            <div class="tab" id="tab-unlimited" onclick="switchMode('unlimited')">Unlimited</div>
        </div>

        <div class="score-bar">
            <span id="rank-display">Beginner</span>
            <div class="score-divider"></div>
            <span id="score-area">0</span><span style="font-size:0.8rem; margin-left:2px; color:#666;" id="score-max"></span>
        </div>

        <div class="window-content">
            <div id="message-toast"></div>

            <div id="input-display">
                <span id="current-word"></span><span class="cursor"></span>
            </div>

            <div class="honeycomb">
                <div class="hex-row">
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-1" onclick="tapLetter(1)"></div>
                    </div>
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-2" onclick="tapLetter(2)"></div>
                    </div>
                </div>
                <div class="hex-row">
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-3" onclick="tapLetter(3)"></div>
                    </div>
                    <div class="hex-wrapper center-hex">
                        <div class="hex-btn" id="hex-0" onclick="tapLetter(0)"></div>
                    </div>
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-4" onclick="tapLetter(4)"></div>
                    </div>
                </div>
                <div class="hex-row">
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-5" onclick="tapLetter(5)"></div>
                    </div>
                    <div class="hex-wrapper">
                        <div class="hex-btn" id="hex-6" onclick="tapLetter(6)"></div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" onclick="deleteLetter()" data-i18n="spellbound.btn.delete">Delete</button>
                <button class="ctrl-btn" onclick="shuffleLetters()" data-i18n="spellbound.btn.shuffle">Shuffle</button>
                <button class="ctrl-btn" onclick="submitWord()" data-i18n="spellbound.btn.enter">Enter</button>
            </div>

            <div id="found-words">
                <!-- Words go here -->
            </div>
        </div>

        <!-- GENERATING OVERLAY -->
        <div id="loading-overlay">
            <div class="spinner"></div>
            <h3 style="margin:0;" data-i18n="spellbound.loading.generating">Generating...</h3>
            <p style="font-size:0.8rem; color:#666;" id="loading-msg" data-i18n="spellbound.loading.dict">Consulting
                dictionary...</p>
        </div>

        <div id="new-game-modal">
            <div class="modal-box">
                <h3 data-i18n="spellbound.modal.new.title">New Game?</h3>
                <p data-i18n="spellbound.modal.new.text">Generate a brand new puzzle? Current progress will be saved.
                </p>
                <div class="modal-buttons">
                    <button class="sys-btn" onclick="startNewGameAction()" data-i18n="spellbound.btn.yes">Yes</button>
                    <button class="sys-btn" onclick="closeModal('new-game-modal')"
                        data-i18n="spellbound.btn.no">No</button>
                </div>
            </div>
        </div>

        <!-- Stats Modal (System 7 Style) -->
        <div id="stats-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center;">
            <div class="modal-box" style="max-width: 350px;">
                <div class="close-box" style="left: auto; right: 8px; top: 8px;" onclick="closeStatsModal()">X</div>
                <div class="modal-title" style="font-weight:bold; margin-bottom:10px; font-size:1.1rem; text-transform:uppercase;">Current Game</div>
                
                <div style="font-size:1.5rem; font-weight:bold; margin-bottom:5px;" id="stat-rank-name">Beginner</div>
                <div style="font-size:0.9rem; margin-bottom:15px;">Score: <span id="stat-current-score" style="font-weight:bold;">0</span> / <span id="stat-max-score">0</span></div>

                <div class="modal-title" style="font-weight:bold; margin-bottom:10px; font-size:1.1rem; text-transform:uppercase;">Lifetime Stats</div>
                
                <div style="display:flex; justify-content:center; margin-bottom:20px;">
                    <div style="display:flex; flex-direction:column; align-items:center; margin:0 5px; width:65px;">
                        <div style="font-size:1.6rem; font-weight:bold;" id="stat-played">0</div>
                        <div style="font-size:0.7rem; text-align:center; line-height:1.2;">Played</div>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center; margin:0 5px; width:65px;">
                        <div style="font-size:1.6rem; font-weight:bold;" id="stat-words">0</div>
                        <div style="font-size:0.7rem; text-align:center; line-height:1.2;">Words Found</div>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center; margin:0 5px; width:65px;">
                        <div style="font-size:1.6rem; font-weight:bold;" id="stat-genius">0</div>
                        <div style="font-size:0.7rem; text-align:center; line-height:1.2;">Genius Reached</div>
                    </div>
                    <div style="display:flex; flex-direction:column; align-items:center; margin:0 5px; width:65px;">
                        <div style="font-size:1.6rem; font-weight:bold;" id="stat-queen">0</div>
                        <div style="font-size:0.7rem; text-align:center; line-height:1.2;">Queen Bees</div>
                    </div>
                </div>

                <div style="display:flex; justify-content:center; margin-top:15px;">
                    <button onclick="closeStatsModal()" style="padding:5px 15px; border:2px solid black; background:white; font-weight:bold; font-family:inherit; cursor:pointer; box-shadow:2px 2px 0 black;" onmousedown="this.style.boxShadow='none'; this.style.transform='translate(2px, 2px)'; this.style.background='black'; this.style.color='white';" onmouseup="this.style.boxShadow='2px 2px 0 black'; this.style.transform='none'; this.style.background='white'; this.style.color='black';">Close</button>
                </div>
            </div>
        </div>

        <!-- STANDARD MODAL POPUP -->
        <div id="modal-overlay" class="modal-overlay">
            <div class="modal-box">
                <div id="modal-message" class="modal-text"></div>
                <div id="modal-btns" class="modal-btns"></div>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };
        // --- CONFIGURATION ---
        function showModal(msg, isConfirm = false, callback = null) {
            const overlay = document.getElementById('modal-overlay');
            const messageEl = document.getElementById('modal-message');
            const btnsEl = document.getElementById('modal-btns');
            messageEl.textContent = msg;
            if (isConfirm) {
                const cancelTxt = window.t ? window.t('spellbound.btn.cancel') : 'Cancel';
                const okTxt = window.t ? window.t('spellbound.btn.ok') : 'OK';
                btnsEl.innerHTML = `<button class="modal-btn" id="modal-cancel">${cancelTxt}</button><button class="modal-btn" id="modal-ok">${okTxt}</button>`;
                document.getElementById('modal-cancel').onclick = () => { overlay.style.display = 'none'; if (callback) callback(false); };
                document.getElementById('modal-ok').onclick = () => { overlay.style.display = 'none'; if (callback) callback(true); };
            } else {
                const okTxt = window.t ? window.t('spellbound.btn.ok') : 'OK';
                btnsEl.innerHTML = `<button class="modal-btn" onclick="hideModal()">${okTxt}</button>`;
            }
            overlay.style.display = 'flex';
        }
        function hideModal() { document.getElementById('modal-overlay').style.display = 'none'; }

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();



        // Note: Persistence disabled due to IndexedDB hangs on some browsers (Safari)


        // db.enablePersistence({ synchronizeTabs: true }) ...

        // --- DICTIONARY URL ---
        const CORS_PROXY = RekindleCloud.apiBase + '/content/proxy';
        const NYT_URL = 'https://www.nytimes.com/puzzles/spelling-bee';
        const DICT_URL = 'https://raw.githubusercontent.com/dolph/dictionary/master/popular.txt'; // Fallback

        // --- STATE ---
        const LS_KEY = 'spellbound_state_v2';

        let currentMode = 'daily'; // 'daily' or 'unlimited'

        let state = {
            daily: {
                found: [],
                score: 0,
                puzzle: null
            },
            unlimited: {
                found: [],
                score: 0,
                puzzle: null
            }
        };

        let cachedDictionary = null;
        let currentUser = null;

        // --- INIT ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();

            auth.onAuthStateChanged(user => {
                currentUser = user;
                startSession();
            });
        };

        // Helper to HTML-escape text
        function escapeHTML(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // Helper to sanitize background image URLs from localStorage
        function sanitizeBackgroundImage(imageString) {
            if (!imageString) return '';
            if (imageString.startsWith('url("data:image/png;base64,')) {
                return imageString;
            }
            if (imageString.startsWith('url("') && imageString.endsWith('")')) {
                const url = imageString.substring(5, imageString.length - 2);
                if ((url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) && !url.includes('javascript:')) {
                    return imageString;
                }
            }
            return '';
        }


        async function startSession() {
            const overlay = document.getElementById('loading-overlay');
            // Try to load state
            await loadState();

            // Initialize Daily Mode by default
            await initGame('daily');
        }

        async function switchMode(mode) {
            if (currentMode === mode) return;

            // UI Update
            document.getElementById('tab-daily').classList.toggle('active', mode === 'daily');
            document.getElementById('tab-unlimited').classList.toggle('active', mode === 'unlimited');
            document.getElementById('new-game-btn').style.display = mode === 'unlimited' ? 'flex' : 'none';

            // Clear previous messages
            document.getElementById('message-toast').style.display = 'none';

            currentMode = mode;

            // First time switching to Unlimited
            if (mode === 'unlimited' && !state.unlimited.puzzle) {
                // Eager render to show loading state immediately
                await startNewUnlimitedGame();
            } else {
                // Re-render board for the selected mode
                loadModeState();
            }
        }

        async function initGame(mode) {
            currentMode = mode;
            // Eager render to show saved state immediately
            loadModeState();

            if (mode === 'daily') {
                if (!state.daily.puzzle) {
                    await fetchNYTSpellingBee();
                }
            } else {
                if (!state.unlimited.puzzle) {
                    await startNewUnlimitedGame();
                }
            }
        }

        function loadModeState() {
            const activeState = state[currentMode];
            input = "";
            document.getElementById('current-word').innerText = "";
            renderFoundWords();
            renderBoard();
            updateScoreDisplay();
        }

        function confirmNewGame() {
            if (currentMode !== 'unlimited') return; // Cannot restart daily
            showModal(window.t ? window.t('spellbound.modal.new.text') : "Generate a brand new puzzle? Current progress will be saved.", true, (confirmed) => {
                if(confirmed) {
                    startNewUnlimitedGame();
                }
            });
        }

        async function startNewUnlimitedGame() {
            const overlay = document.getElementById('loading-overlay');
            overlay.style.display = 'flex';
            document.getElementById('loading-msg').innerText = window.t ? window.t('spellbound.loading.dict') : "Generating puzzle...";
            setTimeout(() => generatePuzzleFromDict(), 50); 
        }

        function setPuzzleData(puzzleData) {
            state[currentMode].puzzle = puzzleData;
            state[currentMode].found = [];
            state[currentMode].score = 0;
            state[currentMode].maxScore = 0;
            state[currentMode].rank = "Beginner"; // Track current highest rank

            if (!state.stats) state.stats = {};
            state.stats.gamesPlayed = (state.stats.gamesPlayed || 0) + 1;

            calculateScore(); // Re-calculate maxScore before saving
            saveState(); 
            loadModeState();

            showToast(window.t ? window.t('spellbound.toast.ready') : "Puzzle Ready!");
            document.getElementById('loading-overlay').style.display = 'none';
        }

        async function fetchNYTSpellingBee() {
            const overlay = document.getElementById('loading-overlay');
            const msg = document.getElementById('loading-msg');

            try {
                if (state.daily.puzzle) return; // Already fetched

                msg.innerText = window.t ? window.t('spellbound.loading.dict') : "Connecting to NYT...";
                
                // Fetch via CORS Proxy
                const targetUrl = encodeURIComponent(NYT_URL);
                const reqUrl = CORS_PROXY + '?url=' + targetUrl;
                const res = await fetch(reqUrl);
                const text = await res.text();

                // Extract gameData JSON
                const startStr = 'window.gameData = ';
                const startIdx = text.indexOf(startStr);
                
                if (startIdx === -1) {
                    throw new Error("Could not find game data on NYT page.");
                }

                let jsonStr = text.substring(startIdx + startStr.length);
                const endIdx = jsonStr.indexOf('</scr' + 'ipt>');
                
                if (endIdx === -1) {
                    throw new Error("Could not find end of game data.");
                }

                jsonStr = jsonStr.substring(0, endIdx).trim();
                // NYT script often ends with semicolon
                if (jsonStr.endsWith(';')) jsonStr = jsonStr.slice(0, -1);

                msg.innerText = window.t ? window.t('spellbound.loading.pangrams') : "Parsing puzzle data...";
                const data = JSON.parse(jsonStr);
                const today = data.today;

                if (!today || !today.centerLetter || !today.outerLetters || !today.answers) {
                    throw new Error("Invalid puzzle data structure.");
                }

                const puzzleData = {
                    center: today.centerLetter.toUpperCase(),
                    outers: today.outerLetters.map(l => l.toUpperCase()),
                    valid: today.answers.map(w => w.toUpperCase()),
                    pangrams: today.pangrams.map(w => w.toUpperCase())
                };

                // Shuffle outers for display like NYT does
                for (let i = puzzleData.outers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [puzzleData.outers[i], puzzleData.outers[j]] = [puzzleData.outers[j], puzzleData.outers[i]];
                }

                setPuzzleData(puzzleData);
            } catch (e) {
                console.error("NYT Fetch failed: ", e);
                overlay.style.display = 'none';
                showModal(window.t ? window.t('spellbound.error.generate') : "Failed to fetch NYT daily puzzle. Check internet connection.");
            }
        }

        async function generatePuzzleFromDict() {
            const overlay = document.getElementById('loading-overlay');
            const msg = document.getElementById('loading-msg');

            try {
                let words = cachedDictionary;

                if (!words) {
                    msg.innerText = window.t ? window.t('spellbound.loading.dict') : "Downloading dictionary (200KB)...";
                    const res = await fetch(DICT_URL);
                    const text = await res.text();
                    words = text.split('\n')
                        .map(w => w.trim().toUpperCase())
                        .filter(w => w.length >= 4 && /^[A-Z]+$/.test(w));

                    cachedDictionary = words;
                }

                msg.innerText = window.t ? window.t('spellbound.loading.pangrams') : "Mining pangrams...";

                // 1. Find Pangrams (Words with exactly 7 unique letters)
                const pangrams = words.filter(w => new Set(w).size === 7);

                if (pangrams.length === 0) throw new Error("No pangrams found in dictionary.");

                // 2. Pick a random pangram to serve as the base
                const baseWord = pangrams[Math.floor(Math.random() * pangrams.length)];

                // 3. Extract unique letters
                const uniqueChars = Array.from(new Set(baseWord));

                // 4. Pick center letter
                const center = uniqueChars[Math.floor(Math.random() * 7)];
                const outers = uniqueChars.filter(c => c !== center);

                msg.innerText = window.t ? window.t('spellbound.loading.validation') : "Validating words...";

                // 5. Find all valid words
                const validWords = words.filter(w => {
                    if (!w.includes(center)) return false;
                    for (let char of w) {
                        if (!uniqueChars.includes(char)) return false;
                    }
                    return true;
                });

                // Shuffle outers for display
                for (let i = outers.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [outers[i], outers[j]] = [outers[j], outers[i]];
                }

                const puzzleData = {
                    center: center,
                    outers: outers,
                    valid: validWords
                };

                setPuzzleData(puzzleData);

            } catch (e) {
                console.error(e);
                overlay.style.display = 'none';
                showModal(window.t ? window.t('spellbound.error.generate') : "Failed to generate puzzle. Check internet connection.");
            }
        }

        // --- DATA SYNC ---
        async function loadState() {
            // Local load first
            const savedState = localStorage.getItem(LS_KEY);
            if (savedState) {
                try {
                    const parsed = JSON.parse(savedState);
                    if (parsed.daily && parsed.unlimited) {
                        // Discard daily if date changed
                        const todayStr = (window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date()).toDateString();
                        if (parsed.savedDate !== todayStr) {
                            parsed.daily = { found: [], score: 0, puzzle: null };
                        }
                        
                        state = parsed;
                    }
                } catch (e) {
                    console.error("Failed to load state locally", e);
                }
            }

            // Sync down stats and progress from firebase if logged in
            if (currentUser) {
                try {
                    const doc = await db.collection('leaderboard_spellingbee').doc(currentUser.uid).get();
                    if (doc.exists) {
                        const data = doc.data();
                        let updatedLocal = false;

                        const todayStr = (window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date()).toDateString();

                        if (data.daily && data.daily.puzzle && data.savedDate === todayStr) {
                            const localFoundLen = (state.daily.found || []).length;
                            const remoteFoundLen = (data.daily.found || []).length;
                            if (!state.daily.puzzle || (state.daily.puzzle.center === data.daily.puzzle.center && remoteFoundLen > localFoundLen)) {
                                state.daily = data.daily;
                                state.savedDate = data.savedDate;
                                updatedLocal = true;
                            }
                        }

                        if (data.unlimited && data.unlimited.puzzle) {
                            const localFoundLen = (state.unlimited.found || []).length;
                            const remoteFoundLen = (data.unlimited.found || []).length;
                            if (!state.unlimited.puzzle || (state.unlimited.puzzle.center === data.unlimited.puzzle.center && remoteFoundLen > localFoundLen)) {
                                state.unlimited = data.unlimited;
                                updatedLocal = true;
                            }
                        }

                        if (data.stats) {
                            if (!state.stats) {
                                state.stats = data.stats;
                                updatedLocal = true;
                            } else {
                                if ((data.stats.gamesPlayed || 0) > (state.stats.gamesPlayed || 0)) { state.stats.gamesPlayed = data.stats.gamesPlayed; updatedLocal = true; }
                                if ((data.stats.geniuses || 0) > (state.stats.geniuses || 0)) { state.stats.geniuses = data.stats.geniuses; updatedLocal = true; }
                                if ((data.stats.queenBees || 0) > (state.stats.queenBees || 0)) { state.stats.queenBees = data.stats.queenBees; updatedLocal = true; }
                                if ((data.stats.wordsFound || 0) > (state.stats.wordsFound || 0)) { state.stats.wordsFound = data.stats.wordsFound; updatedLocal = true; }
                            }
                        }

                        if (updatedLocal) {
                            localStorage.setItem(LS_KEY, JSON.stringify(state));
                        }
                    }
                } catch (e) {
                    console.error("Failed to sync from Firebase", e);
                }
            }
        }

        async function saveState() {
            const todayStr = (window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date()).toDateString();
            state.savedDate = todayStr;
            localStorage.setItem(LS_KEY, JSON.stringify(state));
            
            // Sync to Firebase if logged in
            if (currentUser && state.stats) {
                try {
                    // Spelling bee primary leaderboard metric? Let's use total words found lifetime.
                    let score = state.stats.wordsFound || 0; 
                    let username = currentUser.email ? currentUser.email.split('@')[0] : "Guest";

                    const saveData = {
                        username: username,
                        score: score,
                        stats: state.stats,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    };
                    
                    if (state.daily) saveData.daily = state.daily;
                    if (state.unlimited) saveData.unlimited = state.unlimited;
                    if (state.savedDate) saveData.savedDate = state.savedDate;

                    await db.collection('leaderboard_spellingbee').doc(currentUser.uid).set(saveData, { merge: true });
                } catch (e) {
                    console.error("Failed to save state to Firebase", e);
                }
            }
        }

        // --- RENDERERS ---
        function renderBoard() {
            const currentPuzzle = state[currentMode].puzzle;
            if (!currentPuzzle) return;
            document.getElementById('hex-0').innerText = escapeHTML(currentPuzzle.center);
            for (let i = 0; i < 6; i++) {
                document.getElementById(`hex-${i + 1}`).innerText = currentPuzzle.outers[i];
            }
        }

        function renderFoundWords() {
            const found = state[currentMode].found;
            const container = document.getElementById('found-words');
            container.innerHTML = found.map(w => {
                const uniqueChars = new Set(w.split(''));
                if (uniqueChars.size === 7) {
                    return `<span class="found-word" style="background: black; color: white; padding: 2px 6px; border-radius: 4px; border: 1px solid black;">${escapeHTML(w)}</span>`;
                }
                return `<span class="found-word">${escapeHTML(w)}</span>`;
            }).join(" • ");
        }

        // --- ACTIONS ---
        function tapLetter(index) {
            const currentPuzzle = state[currentMode].puzzle;
            if (!currentPuzzle) return;
            let char = "";
            if (index === 0) char = currentPuzzle.center;
            else char = escapeHTML(currentPuzzle.outers[index - 1]);

            input += char;
            updateInputDisplay();
        }

        function deleteLetter() {
            input = input.slice(0, -1);
            updateInputDisplay();
        }

        function updateInputDisplay() {
            document.getElementById('current-word').innerText = escapeHTML(input);
        }

        function shuffleLetters() {
            const currentPuzzle = state[currentMode].puzzle;
            if (!currentPuzzle) return;
            for (let i = currentPuzzle.outers.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentPuzzle.outers[i], currentPuzzle.outers[j]] = [currentPuzzle.outers[j], currentPuzzle.outers[i]];
            }
            renderBoard();
        }

        function submitWord() {
            const currentPuzzle = state[currentMode].puzzle;
            const found = state[currentMode].found;
            if (!currentPuzzle) return;
            const word = input;

            // Always clear input as soon as possible after enter
            input = "";
            updateInputDisplay();

            if (word.length < 4) {
                showToast(window.t ? window.t('spellbound.toast.short') : "Too short");
                return;
            }

            if (!word.includes(currentPuzzle.center)) {
                showToast(window.t ? window.t('spellbound.toast.center') : "Must use center letter");
                return;
            }

            if (found.includes(word)) {
                showToast(window.t ? window.t('spellbound.toast.found') : "Already found");
                return;
            }

            if (currentPuzzle.valid.includes(word)) {
                found.push(word);

                let points = word.length === 4 ? 1 : word.length;
                const uniqueChars = new Set(word.split(''));
                let isPangram = false;
                if (uniqueChars.size === 7) {
                    points += 7; // Pangram bonus
                    isPangram = true;
                }

                state[currentMode].score += points;

                // Lifetime tracking
                if (!state.stats) state.stats = {};
                state.stats.wordsFound = (state.stats.wordsFound || 0) + 1;

                // Track Ranks
                const newRank = getRank(state[currentMode].score, state[currentMode].maxScore);
                const oldRank = state[currentMode].rank || "Beginner";
                
                let toastMsg = "";
                if (isPangram) {
                    const pangramTxt = window.t ? window.t('spellbound.toast.pangram') : "Pangram! +${points}";
                    toastMsg = pangramTxt.replace('${points}', points);
                } else {
                    const niceTxt = window.t ? window.t('spellbound.toast.nice') : "Nice! +${points}";
                    toastMsg = niceTxt.replace('${points}', points);
                }

                if (newRank !== oldRank) {
                    state[currentMode].rank = newRank;
                    if (newRank === 'Genius') state.stats.geniuses = (state.stats.geniuses || 0) + 1;
                    if (newRank === 'Queen Bee') state.stats.queenBees = (state.stats.queenBees || 0) + 1;
                    showToast(toastMsg + " • Rank up: " + newRank + "!");
                } else {
                    showToast(toastMsg);
                }

                saveState();

                updateScoreDisplay();
                renderFoundWords();
            } else {
                showToast(window.t ? window.t('spellbound.toast.invalid') : "Not in word list");
            }
        }

        function calculateScore() {
            const currentPuzzle = state[currentMode].puzzle;
            if (!currentPuzzle) return;

            // Calculate max score
            let maxPoints = 0;
            currentPuzzle.valid.forEach(w => {
                let pts = w.length === 4 ? 1 : w.length;
                if (new Set(w).size === 7) pts += 7;
                maxPoints += pts;
            });
            state[currentMode].maxScore = maxPoints;

            // Calculate current score
            state[currentMode].score = 0;
            state[currentMode].found.forEach(word => {
                let points = word.length === 4 ? 1 : word.length;
                const uniqueChars = new Set(word.split(''));
                if (uniqueChars.size === 7) points += 7;
                state[currentMode].score += points;
            });
            
            updateScoreDisplay();
        }

        function getRank(score, maxScore) {
            if (maxScore === 0) return "Beginner";
            const pct = score / maxScore;
            if (pct >= 1.0) return "Queen Bee";
            if (pct >= 0.70) return "Genius";
            if (pct >= 0.50) return "Amazing";
            if (pct >= 0.40) return "Great";
            if (pct >= 0.25) return "Nice";
            if (pct >= 0.15) return "Solid";
            if (pct >= 0.08) return "Good";
            if (pct >= 0.05) return "Moving Up";
            if (pct >= 0.02) return "Good Start";
            return "Beginner";
        }

        function updateScoreDisplay() {
            const currentPuzzle = state[currentMode].puzzle;
            if (!currentPuzzle) return;

            const score = state[currentMode].score;
            const maxScore = state[currentMode].maxScore || 1;
            const rank = getRank(score, maxScore);

            document.getElementById('score-area').innerText = score;
            document.getElementById('rank-display').innerText = rank;
            document.getElementById('score-max').innerText = `/ ${maxScore}`;
        }

        // --- STATS MODAL ---
        function showStatsModal() {
            const currentPuzzle = state[currentMode].puzzle;
            if (currentPuzzle) {
                const score = state[currentMode].score;
                const maxScore = state[currentMode].maxScore || 1;
                document.getElementById('stat-rank-name').innerText = getRank(score, maxScore);
                document.getElementById('stat-current-score').innerText = score;
                document.getElementById('stat-max-score').innerText = maxScore;
            }

            if (state.stats) {
                document.getElementById('stat-played').innerText = state.stats.gamesPlayed || 0;
                document.getElementById('stat-words').innerText = state.stats.wordsFound || 0;
                document.getElementById('stat-genius').innerText = state.stats.geniuses || 0;
                document.getElementById('stat-queen').innerText = state.stats.queenBees || 0;
            }

            document.getElementById('stats-modal').style.display = 'flex';
        }

        function closeStatsModal() {
            document.getElementById('stats-modal').style.display = 'none';
        }

        function showToast(msg) {
            const toast = document.getElementById('message-toast');
            toast.innerText = msg;
            toast.style.display = 'block';
            setTimeout(() => {
                toast.style.display = 'none';
            }, 1500);
        }




    </script>
