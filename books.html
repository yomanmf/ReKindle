<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Books</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        * {
            transition: none !important;
            animation: none !important;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 700px;
            position: relative;
            z-index: 1;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px; bottom: 4px; left: 4px; right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px; width: 18px; height: 18px;
            border: 2px solid black; background: white;
            z-index: 2; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold; font-family: sans-serif; font-size: 0.9rem;
            line-height: 1; box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black; color: white; transform: translate(1px, 1px); box-shadow: none;
        }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 2px solid black;
            background: #eee;
            flex-shrink: 0;
        }

        .tab-btn {
            flex: 1; padding: 10px; text-align: center; border-right: 1px solid black;
            background: #eee; cursor: pointer; font-weight: bold; font-size: 0.9rem;
        }

        .tab-btn:last-child { border-right: none; }

        .tab-btn.active {
            background: white; border-bottom: 2px solid white; margin-bottom: -2px; z-index: 10;
        }

        /* CONTENT AREA */
        .window-content {
            flex-grow: 1; overflow: hidden; display: flex; flex-direction: column; background: white;
        }

        /* VIEWS */
        #saved-view {
            display: flex; flex-direction: column; height: 100%;
        }

        #log-view {
            display: none; flex-direction: column; height: 100%; overflow-y: auto;
        }

        /* LOG VIEW STYLES */
        .period-controls {
            display: flex; justify-content: space-between; align-items: center; padding: 10px;
            border-bottom: 2px solid black; background: #eee; flex-shrink: 0;
        }
        .period-display { font-weight: bold; font-size: 1rem; text-transform: uppercase; }
        .nav-btn {
            background: white; border: 2px solid black; padding: 5px 15px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0 black;
        }
        .nav-btn:active { background: black; color: white; box-shadow: none; transform: translate(1px, 1px); }
        .day-row { display: flex; border-bottom: 1px solid #ccc; flex: 1; min-height: 50px; align-items: stretch; }
        .day-row:last-child { border-bottom: none; }
        .day-label {
            width: 60px; background: #fafafa; border-right: 2px solid black; display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
        }
        .day-num { font-weight: bold; font-size: 1.1rem; }
        .day-name { font-size: 0.7rem; color: #666; text-transform: uppercase; }
        .day-row.today .day-label { background: black; color: white; }
        .day-row.today .day-name { color: #ddd; }
        .slots-container { flex-grow: 1; display: flex; align-items: center; padding: 5px; overflow-x: auto; scrollbar-width: none; }
        .slots-container > * + * { margin-left: 5px; }
        .slot {
            flex: 1; min-width: 40px; height: 80%; border: 1px solid #999; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: bold; cursor: pointer; border-radius: 2px;
        }
        .slot.filled { background: black; color: white; border-color: black; }
        .total-display {
            width: 70px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-family: monospace; border-left: 1px solid #ccc; background: #f9f9f9; font-size: 0.9rem; flex-shrink: 0;
        }
        .log-container { flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }

        /* SEARCH BAR */
        .search-bar { padding: 10px; border-bottom: 2px solid black; display: flex; background: #fff; flex-shrink:0; }
        .search-bar > * + * { margin-left: 10px; }
        input { flex-grow: 1; padding: 8px; border: 2px solid black; font-family: inherit; font-size: 1rem; }

        /* SYSTEM BUTTONS */
        .sys-btn {
            background: white; border: 2px solid black; padding: 8px 15px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0 black; font-size: 0.9rem; font-family: inherit;
        }
        .sys-btn:active { background: black; color: white; box-shadow: none; transform: translate(2px, 2px); }
        .sys-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* LISTS */
        .scrollable-container {
            flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column;
        }
        .list-section-title {
            font-weight: bold; background: #eee; padding: 6px 10px; border-bottom: 2px solid black; 
            text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;
        }
        .book-list { padding: 10px; }
        .book-item {
            display: flex; border: 1px solid #ccc; margin-bottom: 10px; padding: 10px; align-items: flex-start; cursor: pointer;
        }
        .book-item:active { background-color: #eee; }
        .book-cover { width: 60px; height: 90px; background: #eee; border: 1px solid black; margin-right: 15px; object-fit: cover; flex-shrink: 0; }
        .book-info { flex-grow: 1; }
        .book-title { font-weight: bold; font-size: 1.1rem; margin-bottom: 4px; }
        .book-author { font-style: italic; font-size: 0.9rem; color: #555; margin-bottom: 10px; }
        .book-user-rating { color: black; font-size: 1.1rem; letter-spacing: 2px; }

        /* AUTH MESSAGE */
        .auth-msg { padding: 20px; text-align: center; display: none; }

        /* --- MODAL STYLES --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255, 255, 255, 0.8); z-index: 9999; display: none; align-items: center; justify-content: center;
        }
        .modal-window {
            background: white; border: 2px solid black; box-shadow: 4px 4px 0px #000000; width: 85%; max-width: 450px; display: flex; flex-direction: column; max-height: 90vh;
        }
        .modal-body { padding: 20px; font-size: 1rem; overflow-y: auto; }
        .modal-footer { padding: 0 20px 20px 20px; display: flex; justify-content: center; flex-wrap: wrap; }
        .modal-footer > * { margin: 5px; }

        .details-header { display: flex; text-align: left; border-bottom: 1px solid #ccc; padding-bottom: 15px; margin-bottom: 15px; }
        .details-header > * + * { margin-left: 15px; }
        .details-cover { width: 90px; height: 135px; object-fit: cover; border: 1px solid black; flex-shrink: 0; }
        .details-info { flex-grow: 1; display: flex; flex-direction: column; }
        .details-title { font-size: 1.2rem; font-weight: 900; line-height: 1.2; margin-bottom: 5px; }
        .details-author { font-size: 1rem; font-style: italic; color: #555; margin-bottom: 5px; }
        .details-meta { font-size: 0.85rem; color: #444; margin-bottom: 8px; }
        .rating-stars { color: black; font-weight: bold; margin-bottom: 8px; letter-spacing: 2px; }
        .genre-tags { display: flex; flex-wrap: wrap; margin-bottom: 5px; }
        .genre-tags > * + * { margin-left: 6px; }
        .genre-pill { background: #eee; border: 1px solid #999; padding: 2px 8px; font-size: 0.75rem; border-radius: 12px; white-space: nowrap; }

        .details-blurb {
            font-family: "Georgia", serif; font-size: 0.95rem; line-height: 1.5; text-align: left;
            max-height: 200px; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: #fafafa; border: 1px solid #eee;
        }

        .external-links { display: flex; justify-content: center; margin-bottom: 5px; }
        .external-links > * + * { margin-left: 15px; }
        .ext-link { text-decoration: none; color: black; border-bottom: 1px solid black; font-size: 0.85rem; font-weight: bold; cursor: pointer; }

        /* USER REVIEW SECTION */
        .user-review-section { display: flex; flex-direction: column; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid #ccc; }
        .user-review-title { font-size: 1rem; font-weight: bold; margin-bottom: 10px; text-align: left; }
        .modal-textarea { width: 100%; height: 70px; border: 2px solid black; font-family: inherit; font-size: 0.9rem; padding: 5px; box-sizing: border-box; resize: none; margin-bottom: 10px; }
        .user-rating-stars { display: flex; font-size: 1.8rem; cursor: pointer; justify-content: center; margin-bottom: 10px; }
        .user-rating-stars .star { margin: 0 4px; color: #ddd; }
        .user-rating-stars .star.active { color: black; }

        .status-toggle-wrapper { text-align: center; margin-bottom: 15px; }
        .status-toggle { padding:6px; font-weight:bold; border: 2px solid black; font-family:inherit; font-size: 0.9rem; }

        /* GENERIC MODAL */
        #generic-modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); z-index: 10000; align-items: center; justify-content: center; font-family: "Geneva", "Verdana", sans-serif; }
        .generic-modal-box { background: white; border: 2px solid black; padding: 20px; box-shadow: 6px 6px 0 black; max-width: 300px; width: 80%; text-align: center; }
        .generic-modal-text { margin-bottom: 20px; font-weight: bold; line-height: 1.4; color: black; }
        .generic-modal-btns { display: flex; justify-content: center; }
        .generic-modal-btns > * + * { margin-left: 10px; }
        .generic-modal-btn { background: white; border: 2px solid black; padding: 6px 20px; font-weight: bold; cursor: pointer; box-shadow: 2px 2px 0 black; font-family: inherit; }
        .generic-modal-btn:active { background: black; color: white; transform: translate(1px, 1px); box-shadow: none; }
    </style>
    <link rel="stylesheet" href="css/custom-select.css">
    <script src="time.js"></script>
    <script src="theme.js?v=18"></script>
    <script src="js/i18n.js"></script>
    <script src="js/custom-select.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index.html'">X</div>
            <span class="title-text" data-i18n="books.title">Books</span>
        </div>

        <div class="tabs">
            <div class="tab-btn active" id="tab-saved" onclick="switchTab('saved')" data-i18n="books.tab.list">My Books</div>
            <div class="tab-btn" id="tab-log" onclick="switchTab('log')" data-i18n="reading.tab.log">Reading Log</div>
        </div>

        <div class="window-content">
            <div id="auth-msg-saved" class="auth-msg" data-i18n="books.msg.auth">
                Please log in on the Home screen to save books.
            </div>

            <!-- MY BOOKS TAB -->
            <div id="saved-view">
                <!-- INLINE SEARCH -->
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="Title or Author..." onkeypress="handleEnter(event)" data-i18n-placeholder="books.ph.search">
                    <button class="sys-btn" id="search-go-btn" onclick="searchBooks()" data-i18n="books.btn.go">Go</button>
                    <button class="sys-btn" id="search-clear-btn" style="display:none;" onclick="clearSearch()">X</button>
                </div>

                <div class="scrollable-container" id="results-container" style="display:none;">
                    <div class="book-list" id="results-list">
                        <div style="text-align:center; padding:20px; color:#666;" data-i18n="books.msg.empty_search">Type a book to search.</div>
                    </div>
                </div>

                <div class="scrollable-container" id="library-container">
                    <div class="list-section-title" id="title-want-read">Want to Read</div>
                    <div class="book-list" id="want-to-read-list"></div>

                    <div class="list-section-title" id="title-read">Read</div>
                    <div class="book-list" id="read-list"></div>
                </div>
            </div>

            <!-- LOG TAB -->
            <div id="log-view">
                <div class="period-controls">
                    <button class="nav-btn" onclick="changeWeek(-1)">&lt;</button>
                    <span class="period-display" id="current-period-label">...</span>
                    <button class="nav-btn" onclick="changeWeek(1)">&gt;</button>
                </div>
                <div class="log-container" id="reading-log-list"></div>
            </div>

        </div>
    </div>

    <!-- DETAILS MODAL -->
    <div id="details-modal" class="modal-overlay">
        <div class="modal-window">
            <div class="title-bar">
                <div class="title-stripes"></div>
                <div class="close-box" onclick="closeModal('details-modal')">X</div>
                <span class="title-text" data-i18n="books.modal.details">Details</span>
            </div>
            <div class="modal-body" id="details-content"></div>
            <div class="modal-footer" id="details-footer"></div>
        </div>
    </div>

    <!-- GENERIC MODAL -->
    <div id="generic-modal-overlay">
        <div class="generic-modal-box">
            <div id="generic-modal-message" class="generic-modal-text"></div>
            <div id="generic-modal-btns" class="generic-modal-btns"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        function showModal(msg, isConfirm = false, callback = null) {
            const overlay = document.getElementById('generic-modal-overlay');
            const messageEl = document.getElementById('generic-modal-message');
            const btnsEl = document.getElementById('generic-modal-btns');
            messageEl.textContent = msg;
            if (isConfirm) {
                btnsEl.innerHTML = '<button class="generic-modal-btn" id="modal-cancel">Cancel</button><button class="generic-modal-btn" id="modal-ok">OK</button>';
                document.getElementById('modal-cancel').onclick = () => { overlay.style.display = 'none'; if (callback) callback(false); };
                document.getElementById('modal-ok').onclick = () => { overlay.style.display = 'none'; if (callback) callback(true); };
            } else {
                btnsEl.innerHTML = '<button class="generic-modal-btn" onclick="hideModal()">OK</button>';
            }
            overlay.style.display = 'flex';
        }
        function hideModal() { document.getElementById('generic-modal-overlay').style.display = 'none'; }

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // --- STATE ---
        let currentUser = null;
        let currentView = 'saved';
        let currentBookDetails = null;
        let currentReviewRating = 0;
        let reviewSaveTimeout = null;

        // Log Tracker State
        let readingData = {};
        let currentStart = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date(); 
        let today = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
        const INTERVALS = [15, 30, 45, 60, 75, 90, 105, 120];

        // --- INIT ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            initCurrentWeek();

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    loadSavedBooks();
                    loadCloudDataLog();
                } else {
                    document.getElementById('saved-view').style.display = 'none';
                    document.getElementById('auth-msg-saved').style.display = 'block';
                    loadLocalDataLog();
                }
            });
        };

        // --- NAVIGATION ---
        function switchTab(tab) {
            currentView = tab;

            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');

            document.getElementById('saved-view').style.display = 'none';
            document.getElementById('log-view').style.display = 'none';

            if (tab === 'saved') {
                if (currentUser) document.getElementById('saved-view').style.display = 'flex';
                else document.getElementById('auth-msg-saved').style.display = 'block';
            } else if (tab === 'log') {
                document.getElementById('log-view').style.display = 'flex';
                document.getElementById('auth-msg-saved').style.display = 'none';
                renderLogView();
            }
        }

        // --- SEARCH INLINE ---
        function handleEnter(e) { if (e.key === 'Enter') searchBooks(); }

        function clearSearch() {
            document.getElementById('search-input').value = '';
            document.getElementById('results-container').style.display = 'none';
            document.getElementById('library-container').style.display = 'flex';
            document.getElementById('search-go-btn').style.display = 'block';
            document.getElementById('search-clear-btn').style.display = 'none';
        }

        async function searchBooks() {
            const query = document.getElementById('search-input').value.trim();
            if (!query) return;

            document.getElementById('library-container').style.display = 'none';
            document.getElementById('results-container').style.display = 'flex';
            document.getElementById('search-go-btn').style.display = 'none';
            document.getElementById('search-clear-btn').style.display = 'block';

            const list = document.getElementById('results-list');
            list.innerHTML = '<div style="text-align:center; padding:20px;">Searching Library...</div>';

            try {
                const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=15`);
                const data = await res.json();

                list.innerHTML = '';

                if (data.docs.length === 0) {
                    list.innerHTML = '<div style="text-align:center; padding:20px;">No books found.</div>';
                    return;
                }

                data.docs.forEach(book => {
                    const coverUrl = book.cover_i
                        ? `https://covers.openlibrary.org/b/id/${book.cover_i}-M.jpg`
                        : 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';

                    const author = book.author_name ? book.author_name[0] : "Unknown Author";
                    const title = book.title;
                    const coverId = book.cover_i || "";
                    const key = book.key || "";
                    const year = book.first_publish_year || "";
                    const rating = book.ratings_average || 0;

                    const item = document.createElement('div');
                    item.className = 'book-item';
                    const bookData = { title, author, coverId, coverUrl, key, year, rating };

                    item.onclick = () => openDetails(bookData, 'search');

                    item.innerHTML = `
                        <img src="${coverUrl}" class="book-cover">
                        <div class="book-info">
                            <div class="book-title">${title}</div>
                            <div class="book-author">${author}</div>
                        </div>
                    `;
                    list.appendChild(item);
                });
            } catch (e) {
                list.innerHTML = '<div style="text-align:center; padding:20px;">Search failed. Check internet.</div>';
            }
        }

        // --- FIRESTORE ---
        function saveBook(bookData, statusValue) {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).collection('reading_list').add({
                title: bookData.title,
                author: bookData.author,
                coverId: bookData.coverId,
                key: bookData.key || "",
                year: bookData.year || "",
                rating: bookData.rating || 0,
                status: statusValue,
                userRating: 0,
                userNotes: "",
                addedAt: firebase.firestore.FieldValue.serverTimestamp()
            }).then(() => {
                closeModal('details-modal');
                clearSearch(); // Bring them back to the library view seeing their new book!
            }).catch((e) => showModal("Error saving book."));
        }

        function loadSavedBooks() {
            if (!currentUser) return;
            db.collection('users').doc(currentUser.uid).collection('reading_list')
                .orderBy('addedAt', 'desc')
                .onSnapshot((snapshot) => {
                    const wantList = document.getElementById('want-to-read-list');
                    const readList = document.getElementById('read-list');
                    wantList.innerHTML = '';
                    readList.innerHTML = '';

                    let wantCount = 0;
                    let readCount = 0;

                    snapshot.forEach(doc => {
                        const book = doc.data();
                        const status = book.status || 'read'; // Fallback to 'read' for legacy un-categorized items
                        const coverUrl = book.coverId
                            ? `https://covers.openlibrary.org/b/id/${book.coverId}-M.jpg`
                            : 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=';

                        const bookData = { ...book, docId: doc.id, coverUrl, status };

                        const item = document.createElement('div');
                        item.className = 'book-item';
                        item.onclick = () => openDetails(bookData, 'saved');

                        let userStars = "";
                        if (status === 'read' && book.userRating) {
                            userStars = "★".repeat(book.userRating) + "☆".repeat(5 - book.userRating);
                        }

                        item.innerHTML = `
                            <img src="${coverUrl}" class="book-cover">
                            <div class="book-info">
                                <div class="book-title">${book.title}</div>
                                <div class="book-author">${book.author}</div>
                                ${userStars ? `<div class="book-user-rating">${userStars}</div>` : ''}
                            </div>
                        `;

                        if (status === 'want_to_read') {
                            wantList.appendChild(item);
                            wantCount++;
                        } else {
                            readList.appendChild(item);
                            readCount++;
                        }
                    });

                    // Hide empty states nicely
                    if(wantCount === 0) wantList.innerHTML = `<div style="color:#666; font-style:italic; padding:10px;">No books here.</div>`;
                    if(readCount === 0) readList.innerHTML = `<div style="color:#666; font-style:italic; padding:10px;">No books here.</div>`;
                });
        }

        // --- BOOK DETAILS MODAL ---
        async function fetchExtendedDetails(bookData) {
            try {
                // Primary: Try OpenLibrary which doesn't have strict rate limits
                if(bookData.key) {
                    const res = await fetch(`https://openlibrary.org${bookData.key}.json`);
                    if(res.ok) {
                        const data = await res.json();
                        let desc = "No description available.";
                        if (data.description) {
                            desc = typeof data.description === 'string' ? data.description : (data.description.value || desc);
                        }
                        
                        return {
                            description: desc,
                            publishedDate: data.first_publish_date || bookData.year || "",
                            categories: data.subjects || [],
                            rating: bookData.rating || 0
                        };
                    }
                }
            } catch(e) {}
            
            // Fallback: Google Books. Do not reuse the Firebase browser key here:
            // it is restricted to Firebase APIs and the production site referrer.
            try {
                if(bookData.title) {
                    const q = `intitle:${encodeURIComponent(bookData.title)}+inauthor:${encodeURIComponent(bookData.author)}`;
                    const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${q}&maxResults=1`);
                    if(!res.ok) return null; // Abort quietly on 429
                    
                    const data = await res.json();
                    if (data.items && data.items.length > 0) {
                        const info = data.items[0].volumeInfo;
                        return {
                            description: info.description || "No description available.",
                            publishedDate: info.publishedDate || "",
                            categories: info.categories || [],
                            rating: info.averageRating || 0
                        };
                    }
                }
            } catch (e) {}
            return null;
        }

        function generateStars(rating) {
            if (!rating) return "☆☆☆☆☆";
            const full = Math.floor(rating);
            const half = rating % 1 >= 0.5 ? 1 : 0;
            const empty = 5 - full - half;
            return "★".repeat(full) + (half ? "½" : "") + "☆".repeat(empty);
        }

        function changeBookStatus(newVal) {
            if (currentUser && currentBookDetails && currentBookDetails.docId) {
                db.collection('users').doc(currentUser.uid).collection('reading_list').doc(currentBookDetails.docId).update({ status: newVal });
                currentBookDetails.status = newVal;
            }
            
            const reviewWrapper = document.getElementById('user-review-wrapper');
            if(reviewWrapper) {
                reviewWrapper.style.display = (newVal === 'read') ? 'flex' : 'none';
            }
        }

        async function openDetails(bookData, context) {
            currentBookDetails = bookData;
            const modal = document.getElementById('details-modal');
            const content = document.getElementById('details-content');
            const footer = document.getElementById('details-footer');

            let yearDisplay = bookData.year ? `Published: ${bookData.year}` : "";
            let stars = generateStars(bookData.rating);

            let reviewHtml = "";
            let statusHtml = "";

            if (context === 'saved') {
                currentReviewRating = bookData.userRating || 0;
                
                statusHtml = `
                    <div class="status-toggle-wrapper">
                        <select class="status-toggle" onchange="changeBookStatus(this.value)">
                            <option value="want_to_read" ${bookData.status === 'want_to_read' ? 'selected' : ''}>⏳ Want to Read</option>
                            <option value="read" ${bookData.status === 'read' ? 'selected' : ''}>✅ Read</option>
                        </select>
                    </div>
                `;

                reviewHtml = `
                    <div class="user-review-section" id="user-review-wrapper" style="display: ${bookData.status === 'read' ? 'flex' : 'none'};">
                        <div class="user-review-title">My Review</div>
                        <div class="user-rating-stars" id="user-stars">
                            <span class="star" onclick="setUserStar(1)">★</span>
                            <span class="star" onclick="setUserStar(2)">★</span>
                            <span class="star" onclick="setUserStar(3)">★</span>
                            <span class="star" onclick="setUserStar(4)">★</span>
                            <span class="star" onclick="setUserStar(5)">★</span>
                        </div>
                        <textarea id="user-notes" class="modal-textarea" placeholder="Add notes about this book..." onchange="delaySaveReview()" onkeyup="delaySaveReview()"></textarea>
                    </div>
                `;
            }

            content.innerHTML = `
                <div class="details-header">
                    <img src="${bookData.coverUrl}" class="details-cover">
                    <div class="details-info">
                        <div class="details-title">${bookData.title}</div>
                        <div class="details-author">by ${bookData.author}</div>
                        <div class="details-meta" id="pub-date">${yearDisplay}</div>
                        <div class="rating-stars" id="rating-stars">${stars}</div>
                        <div class="genre-tags" id="genre-tags"></div>
                    </div>
                </div>

                ${statusHtml}
                ${reviewHtml}

                <div class="external-links">
                    <a href="https://www.amazon.com/s?k=${encodeURIComponent(bookData.title + ' ' + bookData.author)}" target="_blank" class="ext-link">Amazon</a>
                    <a href="https://www.goodreads.com/search?q=${encodeURIComponent(bookData.title)}" target="_blank" class="ext-link">Goodreads</a>
                </div>

                <div class="details-blurb" id="blurb-box">
                    <div style="text-align:center; font-style:italic; color:#666;">Loading details...</div>
                </div>
            `;

            if (context === 'search') {
                footer.innerHTML = `
                    <button class="sys-btn" onclick="triggerSave('read')">+ Log Read</button>
                    <button class="sys-btn" onclick="triggerSave('want_to_read')">+ Want</button>
                    <button class="sys-btn" onclick="closeModal('details-modal')">Close</button>
                `;
            } else {
                footer.innerHTML = `
                    <button class="sys-btn" style="color:red;" onclick="triggerDelete('${bookData.docId}')">Remove</button>
                    <button class="sys-btn" onclick="closeModal('details-modal')">Close</button>
                `;
                if (bookData.userNotes) document.getElementById('user-notes').value = bookData.userNotes;
                renderUserStars(currentReviewRating);
            }

            modal.style.display = 'flex';

            // Initialize custom selects inside the newly rendered modal content
            if (typeof initCustomSelects === 'function') {
                initCustomSelects();
            }

            const details = await fetchExtendedDetails(bookData);
            if (details) {
                const blurbBox = document.getElementById('blurb-box');
                if (blurbBox) blurbBox.innerHTML = details.description;
                const genreContainer = document.getElementById('genre-tags');
                if (genreContainer && details.categories) {
                    genreContainer.innerHTML = details.categories.slice(0, 3).map(c => `<span class="genre-pill">${c}</span>`).join('');
                }
                if (details.publishedDate) {
                    const pubEl = document.getElementById('pub-date');
                    if (pubEl) pubEl.innerText = `Published: ${details.publishedDate}`;
                }
            } else {
                const blurbBox = document.getElementById('blurb-box');
                if (blurbBox) blurbBox.innerHTML = "No description available.";
            }
        }

        function setUserStar(n) {
            currentReviewRating = n;
            renderUserStars(n);
            delaySaveReview();
        }

        function renderUserStars(n) {
            const stars = document.querySelectorAll('#user-stars .star');
            if (!stars.length) return;
            stars.forEach((s, idx) => {
                if (idx < n) s.classList.add('active');
                else s.classList.remove('active');
            });
        }

        function delaySaveReview() {
            clearTimeout(reviewSaveTimeout);
            reviewSaveTimeout = setTimeout(() => { saveReview(); }, 600);
        }

        function saveReview() {
            if (!currentUser || !currentBookDetails || !currentBookDetails.docId) return;
            const userNotes = document.getElementById('user-notes') ? document.getElementById('user-notes').value.trim() : "";
            db.collection('users').doc(currentUser.uid).collection('reading_list').doc(currentBookDetails.docId).update({
                userNotes: userNotes, userRating: currentReviewRating
            });
            currentBookDetails.userNotes = userNotes;
            currentBookDetails.userRating = currentReviewRating;
        }

        function triggerSave(status) { if (currentBookDetails) saveBook(currentBookDetails, status); }

        function triggerDelete(docId) {
            if (currentUser && docId) {
                showModal("Delete book from library?", true, (confirmed) => {
                    if (confirmed) {
                        db.collection('users').doc(currentUser.uid).collection('reading_list').doc(docId).delete();
                        closeModal('details-modal');
                    }
                });
            }
        }

        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- READING LOG LOGIC ---
        function initCurrentWeek() {
            const day = currentStart.getDay(); 
            const diff = currentStart.getDate() - day + (day === 0 ? -6 : 1);
            currentStart.setDate(diff);
        }

        function loadLocalDataLog() {
            readingData = JSON.parse(localStorage.getItem('reading_log_data')) || {};
            if (currentView === 'log') renderLogView();
        }

        function loadCloudDataLog() {
            db.collection('users').doc(currentUser.uid).collection('reading_logs')
                .onSnapshot(snap => {
                    readingData = {};
                    snap.forEach(doc => { readingData[doc.id] = doc.data().minutes; });
                    if (currentView === 'log') renderLogView();
                });
        }

        function saveLogData(dateKey, minutes) {
            if (minutes === 0) delete readingData[dateKey];
            else readingData[dateKey] = minutes;

            if (currentUser) {
                const docRef = db.collection('users').doc(currentUser.uid).collection('reading_logs').doc(dateKey);
                if (minutes === 0) docRef.delete();
                else docRef.set({ minutes: minutes });
            } else {
                localStorage.setItem('reading_log_data', JSON.stringify(readingData));
            }
            renderLogView();
        }

        function changeWeek(delta) { currentStart.setDate(currentStart.getDate() + (delta * 7)); renderLogView(); }

        function renderLogView() {
            const container = document.getElementById('reading-log-list');
            container.innerHTML = '';
            const weekEnd = new Date(currentStart); weekEnd.setDate(currentStart.getDate() + 6);
            const lang = document.documentElement.lang || 'en';
            
            const startStr = window.rekindleFormatWallDate ? window.rekindleFormatWallDate(currentStart, { month: 'short', day: 'numeric' }) : (window.rekindleFormatTime ? window.rekindleFormatTime(currentStart, { month: 'short', day: 'numeric' }) : currentStart.toLocaleDateString(lang, { month: 'short', day: 'numeric' }));
            const endStr = window.rekindleFormatWallDate ? window.rekindleFormatWallDate(weekEnd, { month: 'short', day: 'numeric' }) : (window.rekindleFormatTime ? window.rekindleFormatTime(weekEnd, { month: 'short', day: 'numeric' }) : weekEnd.toLocaleDateString(lang, { month: 'short', day: 'numeric' }));

            document.getElementById('current-period-label').innerText = `${startStr} - ${endStr}`;

            for (let i = 0; i < 7; i++) {
                const dateObj = new Date(currentStart);
                dateObj.setDate(currentStart.getDate() + i);
                const y = dateObj.getFullYear();
                const m = String(dateObj.getMonth() + 1).padStart(2, '0');
                const d = String(dateObj.getDate()).padStart(2, '0');
                const dateKey = `${y}-${m}-${d}`;
                const dayNum = dateObj.getDate();
                const dayName = window.rekindleFormatWallDate ? window.rekindleFormatWallDate(dateObj, { weekday: 'short' }) : (window.rekindleFormatTime ? window.rekindleFormatTime(dateObj, { weekday: 'short' }) : dateObj.toLocaleDateString(lang, { weekday: 'short' }));
                const currentMinutes = readingData[dateKey] || 0;
                const isToday = (dateObj.toDateString() === today.toDateString());

                const row = document.createElement('div');
                row.className = `day-row ${isToday ? 'today' : ''}`;
                row.innerHTML = `<div class="day-label"><span class="day-num">${dayNum}</span><span class="day-name">${dayName}</span></div>`;

                const slotsContainer = document.createElement('div');
                slotsContainer.className = 'slots-container';
                INTERVALS.forEach(val => {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    if (currentMinutes >= val) slot.classList.add('filled');
                    let labelText = val;
                    if (val === 60) labelText = window.t ? window.t('reading.hour', '1h') : '1h';
                    else if (val === 120) labelText = window.t ? window.t('reading.hours', '2h+') : '2h+';
                    else labelText = window.t ? window.t('reading.minutes', '{{n}}m').replace('{{n}}', val) : val + 'm';
                    
                    slot.innerText = labelText;
                    slot.onclick = () => { saveLogData(dateKey, (currentMinutes === val) ? 0 : val); };
                    slotsContainer.appendChild(slot);
                });
                row.appendChild(slotsContainer);

                const total = document.createElement('div');
                total.className = 'total-display';
                const minsText = window.t ? window.t('reading.minutes', '{{n}}m').replace('{{n}}', currentMinutes) : currentMinutes + 'm';
                total.innerText = currentMinutes > 0 ? minsText : "-";
                row.appendChild(total);
                container.appendChild(row);
            }
        }
    </script>
</body>
