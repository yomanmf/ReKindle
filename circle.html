<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title>Perfect Circle</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="js/i18n.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #e5e5e5;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            touch-action: none;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: fit-content;
            max-height: 95vh;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .leaderboard-btn {
            position: absolute;
            right: 10px;
            z-index: 2;
            cursor: pointer;
            background: white;
            border: 2px solid black;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
            text-transform: uppercase;
        }

        .leaderboard-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            overflow-y: auto;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin-bottom: 10px;
            font-family: "Courier New", monospace;
            font-weight: bold;
            font-size: 1.1rem;
            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        #gameCanvas {
            border: 4px solid black;
            background-color: #fff;
            display: block;
            image-rendering: pixelated;
            max-width: 100%;
            cursor: crosshair;
            touch-action: none;
        }

        .instruction {
            font-size: 0.85rem;
            color: #555;
            margin-top: 8px;
            text-align: center;
        }

        .result-display {
            font-family: "Courier New", monospace;
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
            min-height: 1.6rem;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            margin-top: 10px;
            text-transform: uppercase;
            font-family: inherit;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        #start-game-modal,
        #result-modal,
        #leaderboard-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 4px double black;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 10;
            width: 80%;
            max-width: 300px;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.5);
        }

        .lb-list {
            text-align: left;
            margin-top: 10px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #eee;
            font-family: "Courier New", monospace;
            font-size: 0.9rem;
        }

        .lb-row.me {
            background: black;
            color: white;
        }

        /* Override global scaling - only scale title-bar */
        .window {
            zoom: 1 !important;
            transform: none !important;
        }

        .title-bar {
            zoom: var(--rekindle-scale, 1);
        }

        @supports not (zoom: 1) {
            .title-bar {
                transform: scale(var(--rekindle-scale, 1));
                transform-origin: top center;
            }
        }
    </style>
    <script src="theme.js?v=20"></script>
</head>

<body>
    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="circle.title">Perfect Circle</span>
            <button class="leaderboard-btn" onclick="openLeaderboard()" data-i18n="circle.btn.leaderboard">Leaderboard</button>
        </div>

        <div class="window-content">
            <div class="score-board">
                <span><span data-i18n="circle.label.score">Score</span>: <span id="score">--</span></span>
                <span><span data-i18n="circle.label.high_score">High</span>: <span id="high-score">--</span></span>
            </div>

            <canvas id="gameCanvas" width="320" height="320"></canvas>
            <div class="instruction" id="instruction-text" data-i18n="circle.msg.draw">Draw a circle as close to perfect as you can!</div>
            <div class="result-display" id="result-text"></div>
            <button class="sys-btn" id="retry-btn" onclick="resetGame()" style="display:none;" data-i18n="circle.btn.retry">Retry</button>
        </div>

        <div id="start-game-modal" style="display: block;">
            <h2 data-i18n="circle.label.ready">Ready?</h2>
            <p data-i18n="circle.msg.draw">Draw a circle as close to perfect as you can!</p>
            <button class="sys-btn" onclick="startGame()" data-i18n="circle.btn.start">Start</button>
        </div>

        <div id="result-modal">
            <h2 data-i18n="circle.label.result_title">Result</h2>
            <p id="result-modal-text" style="font-family: 'Courier New', monospace; font-size: 1.2rem; font-weight: bold;"></p>
            <button class="sys-btn" onclick="resetGame()" data-i18n="circle.btn.retry">Retry</button>
        </div>

        <div id="leaderboard-modal">
            <h3 data-i18n="circle.label.top_scores">Top Circles</h3>
            <div class="lb-list" id="lb-content" data-i18n="circle.status.loading">Loading...</div>
            <button class="sys-btn" onclick="document.getElementById('leaderboard-modal').style.display='none'" data-i18n="circle.btn.close">Close</button>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        } else {
            firebase.app();
        }
        const db = firebase.firestore();
        const auth = firebase.auth();

        // --- USER STATE ---
        let uid = null;
        let username = "Guest";
        let personalHighScore = 0;

        // --- GAME CONFIG ---
        const CANVAS_SIZE = 320;
        const MIN_POINTS = 15;
        const MIN_RADIUS = 30;
        const CLOSE_THRESHOLD = 0.18; // 18% of mean radius

        // --- GAME STATE ---
        let canvas, ctx;
        let isDrawing = false;
        let points = [];
        let hasResult = false;

        // --- INIT ---
        window.addEventListener('pageshow', function () {
            initializePage();
        });

        function initializePage() {
            const onAuthReady = new Promise(function (resolve) {
                if (auth.currentUser) {
                    uid = auth.currentUser.uid;
                    username = auth.currentUser.email.split('@')[0];
                    return resolve();
                }
                const unsubscribe = auth.onAuthStateChanged(function (user) {
                    if (user) {
                        uid = user.uid;
                        username = user.email.split('@')[0];
                    }
                    unsubscribe();
                    return resolve();
                });
            });

            onAuthReady.then(function () {
                initGame();
            });
        }

        function initGame() {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            // Mouse events
            canvas.addEventListener('mousedown', onPointerDown);
            canvas.addEventListener('mousemove', onPointerMove);
            window.addEventListener('mouseup', onPointerUp);

            // Touch events
            canvas.addEventListener('touchstart', function (e) {
                e.preventDefault();
                onPointerDown(e.touches[0]);
            }, { passive: false });
            canvas.addEventListener('touchmove', function (e) {
                e.preventDefault();
                onPointerMove(e.touches[0]);
            }, { passive: false });
            window.addEventListener('touchend', function (e) {
                if (!isDrawing) return;
                e.preventDefault();
                onPointerUp();
            }, { passive: false });

            loadPersonalHighScore();
        }

        function startGame() {
            document.getElementById('start-game-modal').style.display = 'none';
            resetGame();
        }

        function resetGame() {
            points = [];
            isDrawing = false;
            hasResult = false;
            document.getElementById('result-modal').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'none';
            document.getElementById('score').innerText = '--';
            document.getElementById('result-text').innerText = '';
            document.getElementById('instruction-text').style.display = 'block';
            drawBlank();
        }

        function drawBlank() {
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
            // Draw faint crosshair center
            ctx.strokeStyle = '#ddd';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(CANVAS_SIZE / 2, 0);
            ctx.lineTo(CANVAS_SIZE / 2, CANVAS_SIZE);
            ctx.moveTo(0, CANVAS_SIZE / 2);
            ctx.lineTo(CANVAS_SIZE, CANVAS_SIZE / 2);
            ctx.stroke();
        }

        function getCanvasPos(evt) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            return {
                x: (evt.clientX - rect.left) * scaleX,
                y: (evt.clientY - rect.top) * scaleY
            };
        }

        function onPointerDown(evt) {
            if (hasResult) return;
            isDrawing = true;
            points = [];
            const pos = getCanvasPos(evt);
            points.push(pos);
            drawBlank();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 2;
        }

        function onPointerMove(evt) {
            if (!isDrawing || hasResult) return;
            const pos = getCanvasPos(evt);
            const last = points[points.length - 1];
            const dist = Math.sqrt(Math.pow(pos.x - last.x, 2) + Math.pow(pos.y - last.y, 2));
            if (dist < 1) return; // Skip very close points
            points.push(pos);
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function onPointerUp() {
            if (!isDrawing || hasResult) return;
            isDrawing = false;
            evaluateCircle();
        }

        function evaluateCircle() {
            // Compute centroid
            let sumX = 0, sumY = 0;
            for (let i = 0; i < points.length; i++) {
                sumX += points[i].x;
                sumY += points[i].y;
            }
            const cx = sumX / points.length;
            const cy = sumY / points.length;

            // Compute radii
            let radii = [];
            let sumR = 0;
            for (let i = 0; i < points.length; i++) {
                const r = Math.sqrt(Math.pow(points[i].x - cx, 2) + Math.pow(points[i].y - cy, 2));
                radii.push(r);
                sumR += r;
            }
            const meanR = sumR / radii.length;

            if (meanR < MIN_RADIUS) {
                document.getElementById('result-text').innerText = window.t ? window.t('circle.msg.too_small') : 'Draw a bigger circle!';
                document.getElementById('retry-btn').style.display = 'inline-block';
                hasResult = true;
                return;
            }

            if (points.length < MIN_POINTS) {
                document.getElementById('result-text').innerText = window.t ? window.t('circle.msg.slow_down') : 'Slow down!';
                document.getElementById('retry-btn').style.display = 'inline-block';
                hasResult = true;
                return;
            }

            // Check if loop is closed
            const first = points[0];
            const last = points[points.length - 1];
            const loopDist = Math.sqrt(Math.pow(last.x - first.x, 2) + Math.pow(last.y - first.y, 2));
            if (loopDist > meanR * CLOSE_THRESHOLD) {
                document.getElementById('result-text').innerText = window.t ? window.t('circle.msg.not_closed') : 'Close the loop! End near where you started.';
                document.getElementById('retry-btn').style.display = 'inline-block';
                hasResult = true;
                return;
            }

            // Compute mean absolute deviation from mean radius
            let sumDev = 0;
            for (let i = 0; i < radii.length; i++) {
                sumDev += Math.abs(radii[i] - meanR);
            }
            const mad = sumDev / radii.length;

            // Score: lower deviation = higher score
            let rawScore = 100 - (mad / meanR * 280);
            if (rawScore < 0) rawScore = 0;
            if (rawScore > 100) rawScore = 100;
            const score = Math.round(rawScore * 10) / 10; // 1 decimal

            // Draw ideal circle for comparison
            ctx.beginPath();
            ctx.arc(cx, cy, meanR, 0, 2 * Math.PI);
            ctx.strokeStyle = '#aaa';
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw center
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(cx, cy, 3, 0, 2 * Math.PI);
            ctx.fill();

            // Show result
            document.getElementById('score').innerText = score.toFixed(1) + '%';
            const resultMsg = window.t ? window.t('circle.msg.result').replace('{score}', score.toFixed(1)) : 'Your circle is ' + score.toFixed(1) + '% perfect!';
            document.getElementById('result-text').innerText = resultMsg;
            document.getElementById('instruction-text').style.display = 'none';
            document.getElementById('retry-btn').style.display = 'inline-block';
            hasResult = true;

            // Save high score
            const intScore = Math.round(score * 10); // Store as 0-1000 for 1 decimal precision
            saveHighScore(intScore);

            // Also show modal
            const modalText = document.getElementById('result-modal-text');
            modalText.innerText = score.toFixed(1) + '%';
            document.getElementById('result-modal').style.display = 'block';
        }

        // --- HIGHSCORE LOGIC ---
        async function loadPersonalHighScore() {
            const localHigh = localStorage.getItem('circle_highscore');
            if (localHigh) personalHighScore = parseInt(localHigh);

            if (uid) {
                try {
                    const doc = await db.collection('leaderboard_circle').doc(uid).get();
                    if (doc.exists) {
                        const cloudHigh = doc.data().score;
                        if (cloudHigh > personalHighScore) {
                            personalHighScore = cloudHigh;
                            localStorage.setItem('circle_highscore', cloudHigh);
                        }
                    }
                } catch (e) { console.error(e); }
            }
            const displayHigh = personalHighScore > 0 ? (personalHighScore / 10).toFixed(1) + '%' : '--';
            document.getElementById('high-score').innerText = displayHigh;
        }

        async function saveHighScore(newScore) {
            if (newScore > personalHighScore) {
                personalHighScore = newScore;
                const displayHigh = (personalHighScore / 10).toFixed(1) + '%';
                document.getElementById('high-score').innerText = displayHigh;
                localStorage.setItem('circle_highscore', personalHighScore);

                if (uid) {
                    db.collection('leaderboard_circle').doc(uid).set({
                        username: username,
                        score: newScore,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        // --- LEADERBOARD UI ---
        async function openLeaderboard() {
            const modal = document.getElementById('leaderboard-modal');
            modal.style.display = 'block';
            const list = document.getElementById('lb-content');
            list.innerText = window.t ? window.t('circle.status.loading') : 'Loading...';
            list.removeAttribute('data-i18n');

            const user = auth.currentUser;
            if (user) {
                try {
                    const snapshot = await db.collection('leaderboard_circle')
                        .orderBy('score', 'desc')
                        .limit(10)
                        .get();

                    list.innerHTML = '';
                    if (snapshot.empty) {
                        list.innerText = window.t ? window.t('circle.status.no_scores') : 'No scores yet!';
                        return;
                    }
                    let rank = 1;
                    snapshot.forEach(function (doc) {
                        const data = doc.data();
                        const isMe = (doc.id === user.uid);
                        const div = document.createElement('div');
                        div.className = 'lb-row' + (isMe ? ' me' : '');

                        const rankSpan = document.createElement('span');
                        const scoreVal = data.score ? (data.score / 10).toFixed(1) + '%' : '0%';
                        rankSpan.textContent = rank + '. ' + escapeHtml(data.username);
                        const scoreSpan = document.createElement('span');
                        scoreSpan.textContent = scoreVal;

                        div.appendChild(rankSpan);
                        div.appendChild(scoreSpan);
                        list.appendChild(div);
                        rank++;
                    });
                } catch (e) {
                    console.error('Error loading leaderboard:', e);
                    list.innerText = window.t ? window.t('circle.status.error_loading') : 'Error loading scores.';
                }
            } else {
                list.innerText = window.t ? window.t('circle.status.login_required') : 'Log in to see global scores.';
            }
        }
    </script>

    <script>
        function sanitizeBackgroundImage(imageString) {
            if (!imageString) return '';
            if (imageString.startsWith('url("data:image/png;base64,')) {
                return imageString;
            }
            if (imageString.startsWith('url("') && imageString.endsWith('")')) {
                const url = imageString.substring(5, imageString.length - 2);
                if ((url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) && !url.includes('javascript:')) {
                    return imageString;
                }
            }
            return '';
        }
    </script>
    <script src="https://cdn.counter.dev/script.js" data-id="4e551911-0e5d-4c48-91a6-b828c3301675" data-utcoffset="11"></script>
