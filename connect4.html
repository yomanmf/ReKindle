
<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Connect 4</title>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            --chip-p1: #000000;
            --chip-p2: #ffffff;
        }

        * {
            transition: none !important;
            animation: none !important;
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: fit-content;
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* CONTENT */
        .window-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            overflow-y: auto;
        }

        /* STATUS BAR */
        #status-bar {
            width: 100%;
            text-align: center;
            font-weight: bold;
            font-size: 1.1rem;
            border: 2px solid black;
            padding: 8px 0;
            margin-bottom: 15px;
            background: #eee;
            font-family: "Courier New", monospace;
        }

        /* GAME BOARD */
        .board-wrapper {
            background: black;
            padding: 6px;
            border: 2px solid black;
            border-bottom-width: 8px;
            width: 100%;
            max-width: 100%;
            box-sizing: border-box;
        }

        .board {
            display: grid;
            gap: 4px;
            background: white;
            padding: 4px;
            width: 100%;
            box-sizing: border-box;
        }

        .column {
            display: flex;
            flex-direction: column;
            cursor: pointer;
            flex-grow: 1;
        }

        .column > * + * {
            margin-top: 4px;
        }

        .column:hover {
            background-color: #f0f0f0;
        }

        .column.disabled {
            cursor: default;
            pointer-events: none;
        }
        .column.disabled:hover {
            background-color: transparent;
        }

        .slot {
            width: 100%;
            border: 2px solid #999;
            border-radius: 50%;
            background: white;
            position: relative;
            box-sizing: border-box;
        }

        .chip {
            width: 80%;
            height: 80%;
            border-radius: 50%;
            border: 2px solid black;
            box-sizing: border-box;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .chip.p1 {
            background-color: var(--chip-p1);
        }

        .chip.p2 {
            background-color: var(--chip-p2);
            background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, #999 2px, #999 3px);
        }

        .slot.winner {
            background-color: black;
            border-color: black;
        }

        .slot.winner .chip {
            filter: invert(1);
        }

        /* CONTROLS */
        .controls {
            margin-top: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
        }
        .controls > * + * {
            margin-left: 10px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 10px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            text-transform: uppercase;
            flex: 1;
            max-width: 150px;
        }

        .sys-btn.active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        .sys-btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }
    </style>
    <script src="js/i18n.js"></script>
    <script src="theme.js?v=21"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'" data-i18n="battleship.btn.close">X</div>
            <span class="title-text" data-i18n="connect4.title">Connect 4</span>
        </div>

        <div class="window-content">
            <div id="status-bar" data-i18n="connect4.turn.p1">Your Turn (Black)</div>

            <div class="board-wrapper">
                <div class="board" id="game-board">
                </div>
            </div>

            <div class="controls">
                <button class="sys-btn" id="btn-easy" onclick="setDifficulty('easy')" data-i18n="tictactoe.difficulty.easy">Easy</button>
                <button class="sys-btn" id="btn-hard" onclick="setDifficulty('hard')" data-i18n="tictactoe.difficulty.hard">Hard</button>
                <button class="sys-btn" onclick="toggleMode()" id="mode-btn" data-i18n="connect4.btn.mode" data-i18n-args="{&quot;num&quot;: 4}">Mode: 4</button>
                <button class="sys-btn" onclick="resetGame()" data-i18n="connect4.btn.restart">Restart</button>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        const HUMAN = 1;
        const CPU = 2;

        let ROWS = 6;
        let COLS = 7;
        let WIN_LENGTH = 4;
        let difficulty = 'hard';

        // --- STATE ---
        let board = [];
        let currentPlayer = HUMAN;
        let gameActive = true;
        let cpuTimer = null;

        // --- INIT ---
        window.onload = function () {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            setDifficulty('hard');
            window.addEventListener('resize', resizeSlots);
        };

        function setDifficulty(level) {
            difficulty = level;
            document.querySelectorAll('.sys-btn').forEach(function (b) { b.classList.remove('active'); });
            document.getElementById('btn-' + level).classList.add('active');
            resetGame();
        }

        function initGame() {
            board = [];
            for (let c = 0; c < COLS; c++) {
                board[c] = [];
                for (let r = 0; r < ROWS; r++) {
                    board[c][r] = 0;
                }
            }
            currentPlayer = HUMAN;
            gameActive = true;
            if (cpuTimer) {
                clearTimeout(cpuTimer);
                cpuTimer = null;
            }
            updateStatus();
            renderBoard();
        }

        function toggleMode() {
            if (WIN_LENGTH === 4) {
                setMode(5);
            } else {
                setMode(4);
            }
        }

        function setMode(num) {
            WIN_LENGTH = num;
            if (num === 4) {
                ROWS = 6;
                COLS = 7;
                const title4 = window.t ? window.t('connect4.title.4inrow') : "4 in a Row";
                document.querySelector('.title-text').innerText = title4;
            } else {
                ROWS = 7;
                COLS = 9;
                const title5 = window.t ? window.t('connect4.title.5inrow') : "5 in a Row";
                document.querySelector('.title-text').innerText = title5;
            }
            const modeBtn = document.getElementById('mode-btn');
            const template = window.t ? window.t('connect4.btn.mode') : "Mode: ${num}";
            modeBtn.innerText = template.replace('${num}', num);
            initGame();
        }

        // --- RENDER ---
        function renderBoard() {
            const container = document.getElementById('game-board');
            container.innerHTML = '';
            container.style.gridTemplateColumns = "repeat(" + COLS + ", 1fr)";

            for (let c = 0; c < COLS; c++) {
                const colDiv = document.createElement('div');
                colDiv.className = 'column';
                if (!gameActive || currentPlayer !== HUMAN) {
                    colDiv.classList.add('disabled');
                }
                colDiv.onclick = function () { dropPiece(c); };

                for (let r = ROWS - 1; r >= 0; r--) {
                    const slot = document.createElement('div');
                    slot.className = 'slot';
                    slot.id = "slot-" + c + "-" + r;

                    const cellVal = board[c][r];
                    if (cellVal !== 0) {
                        const chip = document.createElement('div');
                        chip.className = "chip " + (cellVal === HUMAN ? 'p1' : 'p2');
                        slot.appendChild(chip);
                    }

                    colDiv.appendChild(slot);
                }
                container.appendChild(colDiv);
            }

            setTimeout(resizeSlots, 0);
        }

        function resizeSlots() {
            const columns = document.querySelectorAll('.column');
            if (columns.length === 0) return;

            const width = columns[0].clientWidth;
            const slots = document.querySelectorAll('.slot');
            for (let i = 0; i < slots.length; i++) {
                slots[i].style.height = width + 'px';
            }
        }

        // --- LOGIC ---
        function dropPiece(colIdx) {
            if (!gameActive || currentPlayer !== HUMAN) return;

            const colArr = board[colIdx];
            const rowIdx = getLowestEmptyRow(colArr);

            if (rowIdx === -1) return;

            board[colIdx][rowIdx] = currentPlayer;
            updateSlot(colIdx, rowIdx);

            const winCoords = checkWin(colIdx, rowIdx);
            if (winCoords) {
                endGame(HUMAN, winCoords);
                return;
            }
            if (checkDraw()) {
                endGame('draw', null);
                return;
            }

            currentPlayer = CPU;
            updateStatus();
            renderBoard();

            cpuTimer = setTimeout(function () {
                const cpuCol = getCpuMove();
                if (cpuCol !== -1) {
                    const cpuRow = getLowestEmptyRow(board[cpuCol]);
                    board[cpuCol][cpuRow] = CPU;
                    updateSlot(cpuCol, cpuRow);

                    const cpuWinCoords = checkWin(cpuCol, cpuRow);
                    if (cpuWinCoords) {
                        endGame(CPU, cpuWinCoords);
                        return;
                    }
                    if (checkDraw()) {
                        endGame('draw', null);
                        return;
                    }
                    currentPlayer = HUMAN;
                    updateStatus();
                    renderBoard();
                }
            }, 700);
        }

        function getLowestEmptyRow(colArr) {
            for (let i = 0; i < colArr.length; i++) {
                if (colArr[i] === 0) return i;
            }
            return -1;
        }

        function updateSlot(c, r) {
            const slot = document.getElementById("slot-" + c + "-" + r);
            if (!slot) return;
            const chip = document.createElement('div');
            chip.className = "chip " + (board[c][r] === HUMAN ? 'p1' : 'p2');
            slot.appendChild(chip);
        }

        function endGame(winner, winCoords) {
            gameActive = false;
            if (cpuTimer) {
                clearTimeout(cpuTimer);
                cpuTimer = null;
            }
            if (winner === 'draw') {
                document.getElementById('status-bar').innerText = window.t ? window.t('connect4.msg.draw') : "Draw!";
            } else if (winner === HUMAN) {
                const template = window.t ? window.t('connect4.msg.win') : "${pName} Wins!";
                document.getElementById('status-bar').innerText = template.replace('${pName}', 'You');
                highlightWin(winCoords);
            } else {
                const template = window.t ? window.t('connect4.msg.win') : "${pName} Wins!";
                document.getElementById('status-bar').innerText = template.replace('${pName}', 'CPU');
                highlightWin(winCoords);
            }
            renderBoard();
            flashScreen();
        }

        function updateStatus() {
            if (currentPlayer === HUMAN) {
                document.getElementById('status-bar').innerText = window.t ? window.t('connect4.turn.p1') : "Your Turn (Black)";
            } else {
                document.getElementById('status-bar').innerText = window.t ? window.t('connect4.turn.p2') : "CPU Thinking...";
            }
        }

        function checkDraw() {
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    if (board[c][r] === 0) return false;
                }
            }
            return true;
        }

        function checkWin(c, r) {
            const player = board[c][r];
            const directions = [
                [[0, 1], [0, -1]], // Vertical
                [[1, 0], [-1, 0]], // Horizontal
                [[1, 1], [-1, -1]], // Diagonal /
                [[1, -1], [-1, 1]]  // Diagonal \
            ];

            for (let a = 0; a < directions.length; a++) {
                const axis = directions[a];
                let count = 1;
                let winningSlots = [{ c: c, r: r }];

                for (let d = 0; d < axis.length; d++) {
                    const dir = axis[d];
                    let dc = dir[0];
                    let dr = dir[1];
                    let nextC = c + dc;
                    let nextR = r + dr;

                    while (
                        nextC >= 0 && nextC < COLS &&
                        nextR >= 0 && nextR < ROWS &&
                        board[nextC][nextR] === player
                    ) {
                        count++;
                        winningSlots.push({ c: nextC, r: nextR });
                        nextC += dc;
                        nextR += dr;
                    }
                }

                if (count >= WIN_LENGTH) return winningSlots;
            }
            return null;
        }

        function highlightWin(coords) {
            for (let i = 0; i < coords.length; i++) {
                const pos = coords[i];
                const el = document.getElementById("slot-" + pos.c + "-" + pos.r);
                if (el) el.classList.add('winner');
            }
        }

        function resetGame() {
            initGame();
        }

        function flashScreen() {
            const content = document.querySelector('.window-content');
            content.style.filter = "invert(1)";
            setTimeout(function () {
                content.style.filter = "invert(0)";
            }, 300);
        }

        // --- CPU AI ---
        function getCpuMove() {
            if (difficulty === 'easy') {
                return getCpuMoveEasy();
            }
            return getCpuMoveHard();
        }

        function getCpuMoveEasy() {
            const validCols = [];
            for (let c = 0; c < COLS; c++) {
                if (getLowestEmptyRow(board[c]) !== -1) validCols.push(c);
            }
            if (validCols.length === 0) return -1;

            // 1. Win if possible
            for (let i = 0; i < validCols.length; i++) {
                const c = validCols[i];
                const r = getLowestEmptyRow(board[c]);
                board[c][r] = CPU;
                const wins = checkWin(c, r) !== null;
                board[c][r] = 0;
                if (wins) return c;
            }
            // 2. Block human win
            for (let i = 0; i < validCols.length; i++) {
                const c = validCols[i];
                const r = getLowestEmptyRow(board[c]);
                board[c][r] = HUMAN;
                const wins = checkWin(c, r) !== null;
                board[c][r] = 0;
                if (wins) return c;
            }
            // 3. Random
            return validCols[Math.floor(Math.random() * validCols.length)];
        }

        function getCpuMoveHard() {
            const validCols = [];
            for (let c = 0; c < COLS; c++) {
                if (getLowestEmptyRow(board[c]) !== -1) validCols.push(c);
            }
            if (validCols.length === 0) return -1;

            let bestCol = validCols[0];
            let bestScore = -Infinity;
            for (let i = 0; i < validCols.length; i++) {
                const c = validCols[i];
                const r = getLowestEmptyRow(board[c]);
                board[c][r] = CPU;
                const score = minimax(board, 0, false, -Infinity, Infinity);
                board[c][r] = 0;
                if (score > bestScore) {
                    bestScore = score;
                    bestCol = c;
                }
            }
            return bestCol;
        }

        function minimax(b, depth, isMaximizing, alpha, beta) {
            // Check terminal
            for (let c = 0; c < COLS; c++) {
                for (let r = 0; r < ROWS; r++) {
                    if (b[c][r] !== 0) {
                        const win = checkWin(c, r);
                        if (win) {
                            return b[c][r] === CPU ? 1000000 - depth : depth - 1000000;
                        }
                    }
                }
            }
            if (checkDraw()) return 0;
            if (depth >= 4) return evaluateBoard(b);

            const validCols = [];
            for (let c = 0; c < COLS; c++) {
                if (getLowestEmptyRow(b[c]) !== -1) validCols.push(c);
            }

            if (isMaximizing) {
                let maxEval = -Infinity;
                for (let i = 0; i < validCols.length; i++) {
                    const c = validCols[i];
                    const r = getLowestEmptyRow(b[c]);
                    b[c][r] = CPU;
                    const evalScore = minimax(b, depth + 1, false, alpha, beta);
                    b[c][r] = 0;
                    maxEval = Math.max(maxEval, evalScore);
                    alpha = Math.max(alpha, evalScore);
                    if (beta <= alpha) break;
                }
                return maxEval;
            } else {
                let minEval = Infinity;
                for (let i = 0; i < validCols.length; i++) {
                    const c = validCols[i];
                    const r = getLowestEmptyRow(b[c]);
                    b[c][r] = HUMAN;
                    const evalScore = minimax(b, depth + 1, true, alpha, beta);
                    b[c][r] = 0;
                    minEval = Math.min(minEval, evalScore);
                    beta = Math.min(beta, evalScore);
                    if (beta <= alpha) break;
                }
                return minEval;
            }
        }

        function evaluateBoard(b) {
            let score = 0;
            // Center column preference
            const center = Math.floor(COLS / 2);
            for (let r = 0; r < ROWS; r++) {
                if (b[center][r] === CPU) score += 6;
                else if (b[center][r] === HUMAN) score -= 6;
            }
            // Evaluate all windows of length WIN_LENGTH
            score += evaluateWindows(b, HUMAN, CPU);
            return score;
        }

        function evaluateWindows(b, p1, p2) {
            let score = 0;
            // Horizontal
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c <= COLS - WIN_LENGTH; c++) {
                    score += scoreWindow(getWindow(b, c, r, 1, 0), p2, p1);
                }
            }
            // Vertical
            for (let r = 0; r <= ROWS - WIN_LENGTH; r++) {
                for (let c = 0; c < COLS; c++) {
                    score += scoreWindow(getWindow(b, c, r, 0, 1), p2, p1);
                }
            }
            // Diagonal /
            for (let r = 0; r <= ROWS - WIN_LENGTH; r++) {
                for (let c = 0; c <= COLS - WIN_LENGTH; c++) {
                    score += scoreWindow(getWindow(b, c, r, 1, 1), p2, p1);
                }
            }
            // Diagonal \
            for (let r = WIN_LENGTH - 1; r < ROWS; r++) {
                for (let c = 0; c <= COLS - WIN_LENGTH; c++) {
                    score += scoreWindow(getWindow(b, c, r, 1, -1), p2, p1);
                }
            }
            return score;
        }

        function getWindow(b, c, r, dc, dr) {
            const window = [];
            for (let i = 0; i < WIN_LENGTH; i++) {
                window.push(b[c + i * dc][r + i * dr]);
            }
            return window;
        }

        function scoreWindow(window, cpu, human) {
            let cpuCount = 0;
            let humanCount = 0;
            let emptyCount = 0;
            for (let i = 0; i < window.length; i++) {
                if (window[i] === cpu) cpuCount++;
                else if (window[i] === human) humanCount++;
                else emptyCount++;
            }

            if (cpuCount === 4) return 100000;
            if (humanCount === 4) return -100000;
            if (cpuCount === 3 && emptyCount === 1) return 50;
            if (humanCount === 3 && emptyCount === 1) return -80;
            if (cpuCount === 2 && emptyCount === 2) return 10;
            if (humanCount === 2 && emptyCount === 2) return -15;
            return 0;
        }
    </script>
