<!DOCTYPE html><html lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    
    <title>Read Later</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js" defer></script>
    <script src="js/rekindle-cloud.js" defer></script>

    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 85vh;
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .title-controls {
            position: absolute;
            right: 10px;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .title-controls > * + * {
            margin-left: 10px;
        }

        .icon-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            padding: 0;
            flex-shrink: 0;
        }

        .icon-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .icon-contract { display: none; }
        .window.fullscreen .icon-expand { display: none; }
        .window.fullscreen .icon-contract { display: inline; }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            z-index: 2000;
            transform-origin: top left !important;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 4px 10px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.8rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .window-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 0;
            background: white;
            display: flex;
            flex-direction: column;
        }

        .task-list {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            align-content: start;
        }

        .card {
            border: 2px solid black;
            background: white;
            box-shadow: 4px 4px 0 black;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            position: relative;
            height: 250px;
        }

        .card:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0 black;
        }

        .card-img-container {
            height: 120px;
            border-bottom: 2px solid black;
            background: #eee;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #888;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: -webkit-optimize-contrast;
            image-rendering: crisp-edges;
        }

        .card-content {
            padding: 10px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            overflow: hidden;
        }

        .card-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 5px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.2;
        }

        .card-domain {
            font-size: 0.75rem;
            color: #666;
            margin-bottom: 5px;
            font-family: monospace;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-excerpt {
            font-size: 0.8rem;
            color: #333;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            flex-grow: 1;
        }

        .card-delete {
            position: absolute;
            top: 5px;
            right: 5px;
            width: 24px;
            height: 24px;
            background: white;
            border: 2px solid black;
            box-shadow: 2px 2px 0 black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 0.85rem;
            z-index: 10;
        }

        .card-delete:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        .add-task-wrapper {
            border-top: 2px solid black;
            padding: 8px;
            display: flex;
            background: #eee;
        }

        .add-task-wrapper > * + * {
            margin-left: 5px;
        }

        .add-task-input {
            flex-grow: 1;
            border: 2px solid black;
            padding: 8px;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .add-btn {
            background: white;
            border: 2px solid black;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            padding: 0 15px;
        }

        .add-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        #status-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #eee;
            border-top: 2px solid black;
            padding: 5px;
            font-size: 0.8rem;
            text-align: center;
            box-sizing: border-box;
        }
        
        /* STANDARD MODAL SYSTEM */
        #generic-modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 10003;
            align-items: center;
            justify-content: center;
            font-family: "Geneva", "Verdana", sans-serif;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            padding: 20px;
            box-shadow: 6px 6px 0 black;
            max-width: 300px;
            width: 80%;
            text-align: center;
        }

        .modal-text {
            margin-bottom: 20px;
            font-weight: bold;
            line-height: 1.4;
            color: black;
        }

        .modal-btns {
            display: flex;
            justify-content: center;
        }

        .modal-btns > * + * {
            margin-left: 10px;
        }

        .modal-btn {
            background: white;
            border: 2px solid black;
            padding: 6px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
        }

        .modal-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }
    </style>
    <script src="theme.js?v=18" defer></script>
    <script src="js/i18n.js" defer></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" id="app-title" data-i18n="readlater.title">Read Later</span>
            <div class="title-controls">
                <button class="sys-btn" onclick="refreshData()" style="padding: 2px 6px; height: 22px; font-size: 0.7rem;" data-i18n="common.refresh">Refresh</button>
                <button class="icon-btn" onclick="toggleFullScreen()" title="Full Screen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
                        <path class="icon-expand" d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"></path>
                        <path class="icon-contract" d="M21 9H15V3M21 3l-6 6M3 15h6v6M3 21l6-6"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="window-content" id="dashboard" style="padding-bottom: 40px;">
            <div class="task-list" id="urls-list">
                <div style="padding:20px;text-align:center;color:#888;">Loading...</div>
            </div>
            <div class="add-task-wrapper">
                <input type="text" class="add-task-input" id="new-url-input" placeholder="https://..." data-i18n-placeholder="readlater.ph.new">
                <button class="add-btn" onclick="addUrl()">Add</button>
            </div>
        </div>

        <div id="status-bar" data-i18n="readlater.status.ready">Ready.</div>
    </div>

    <!-- STANDARD MODAL POPUP -->
    <div id="generic-modal-overlay">
        <div class="modal-box">
            <div id="modal-message" class="modal-text"></div>
            <div id="modal-btns" class="modal-btns"></div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        // --- STATE ---
        let currentUser = null;
        let readLaterItems = [];
        let db = null;
        let auth = null;

        // --- INIT ---
        window.onload = function () {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();

            function showModal(msg, isConfirm = false, callback = null) {
                const overlay = document.getElementById('generic-modal-overlay');
                const messageEl = document.getElementById('modal-message');
                const btnsEl = document.getElementById('modal-btns');
                messageEl.textContent = msg;
                if (isConfirm) {
                    btnsEl.innerHTML = '<button class="modal-btn" id="modal-cancel">Cancel</button><button class="modal-btn" id="modal-ok">OK</button>';
                    if(window.t) {
                        document.getElementById('modal-cancel').innerText = window.t('common.cancel', 'Cancel');
                        document.getElementById('modal-ok').innerText = window.t('common.ok', 'OK');
                    }
                    document.getElementById('modal-cancel').onclick = () => { overlay.style.display = 'none'; if (callback) callback(false); };
                    document.getElementById('modal-ok').onclick = () => { overlay.style.display = 'none'; if (callback) callback(true); };
                } else {
                    btnsEl.innerHTML = '<button class="modal-btn" onclick="hideModal()">OK</button>';
                    if(window.t) document.querySelector('#modal-btns .modal-btn').innerText = window.t('common.ok', 'OK');
                }
                overlay.style.display = 'flex';
            }
            window.showModal = showModal;
            function hideModal() { document.getElementById('generic-modal-overlay').style.display = 'none'; }
            window.hideModal = hideModal;

            try {
                firebase.initializeApp(firebaseConfig);
                auth = firebase.auth();
                db = firebase.firestore();

                // Native Enter Key Listener
                document.getElementById('new-url-input').addEventListener("keypress", (e) => {
                    if (e.key === "Enter") addUrl();
                });

                auth.onAuthStateChanged(user => {
                    if (user) {
                        currentUser = user;
                        document.getElementById('status-bar').innerText = window.t('status.synced', 'Synced: ') + currentUser.email;
                        loadCloudItems();
                    } else {
                        document.getElementById('status-bar').innerText = window.t('status.guest', 'Guest Mode - Local Storage');
                        loadLocalItems();
                    }
                });
            } catch (e) {
                console.error("Firebase init failed", e);
                loadLocalItems();
            }

            window.toggleFullScreen = function () {
                document.querySelector('.window').classList.toggle('fullscreen');
            };
        };

        function escapeHTML(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        function refreshData() {
            if (currentUser) loadCloudItems();
            else loadLocalItems();
        }

        function renderItems() {
            const list = document.getElementById('urls-list');
            list.innerHTML = '';

            if (readLaterItems.length === 0) {
                list.style.display = 'block';
                list.innerHTML = '<div style="padding:20px;text-align:center;color:#888;">' + (window.t ? window.t('common.empty', 'No links saved yet.') : 'No links saved yet.') + '</div>';
                return;
            }

            list.style.display = 'grid';

            readLaterItems.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => openUrl(item.url);

                const deleteBtn = document.createElement('div');
                deleteBtn.className = 'card-delete';
                deleteBtn.innerText = 'X';
                deleteBtn.onclick = (e) => {
                    e.stopPropagation();
                    deleteItem(item.id);
                };
                card.appendChild(deleteBtn);

                const imgContainer = document.createElement('div');
                imgContainer.className = 'card-img-container';
                if (item.image) {
                    const img = document.createElement('img');
                    img.className = 'card-img';
                    img.src = item.image;
                    imgContainer.appendChild(img);
                } else {
                    imgContainer.innerText = window.t ? window.t('readlater.nopreview', 'No Preview') : 'No Preview';
                }
                card.appendChild(imgContainer);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'card-content';

                const titleDiv = document.createElement('div');
                titleDiv.className = 'card-title';
                titleDiv.innerText = item.title || item.url;
                contentDiv.appendChild(titleDiv);

                if (item.siteName) {
                    const domainDiv = document.createElement('div');
                    domainDiv.className = 'card-domain';
                    domainDiv.innerText = item.siteName;
                    contentDiv.appendChild(domainDiv);
                }

                if (item.excerpt) {
                    const excerptDiv = document.createElement('div');
                    excerptDiv.className = 'card-excerpt';
                    excerptDiv.innerText = item.excerpt;
                    contentDiv.appendChild(excerptDiv);
                }

                card.appendChild(contentDiv);
                list.appendChild(card);
            });
        }

        function openUrl(url) {
            let targetUrl = url;
            if (!targetUrl.startsWith('http://') && !targetUrl.startsWith('https://')) {
                targetUrl = 'https://' + targetUrl;
            }
            window.location.href = 'browser?url=' + encodeURIComponent(targetUrl) + '&lite=true&return=readlater';
        }

        // --- Local Storage ---
        function loadLocalItems() {
            readLaterItems = JSON.parse(localStorage.getItem('rekindle_readlater_local')) || [];
            renderItems();
        }

        function saveLocalItems() {
            localStorage.setItem('rekindle_readlater_local', JSON.stringify(readLaterItems));
            renderItems();
        }

        // --- Cloud Storage ---
        let unsubscribe = null;
        function loadCloudItems() {
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection('users').doc(currentUser.uid).collection('readlater').orderBy('created', 'desc')
                .onSnapshot(snap => {
                    readLaterItems = [];
                    snap.forEach(doc => {
                        readLaterItems.push({ id: doc.id, ...doc.data() });
                    });
                    renderItems();
                }, error => {
                    console.error("Error fetching read later items:", error);
                    // Fallback to local if permissions fail or offline
                    loadLocalItems();
                });
        }

        const READER_API_PATH = "/content/reader";

        function timeoutPromise(ms, promise) {
            return new Promise((resolve, reject) => {
                const timer = setTimeout(() => { reject(new Error("Timeout")) }, ms);
                promise.then(value => { clearTimeout(timer); resolve(value); })
                       .catch(reason => { clearTimeout(timer); reject(reason); });
            });
        }

        async function addUrl() {
            const inp = document.getElementById('new-url-input');
            let urlVal = inp.value.trim();
            if (!urlVal) return;

            if (!urlVal.startsWith('http://') && !urlVal.startsWith('https://')) {
                urlVal = 'https://' + urlVal;
            }

            const addBtn = document.querySelector('.add-btn');
            addBtn.innerText = window.t ? window.t('common.processing', 'Processing...') : 'Processing...';
            addBtn.disabled = true;

            let meta = {
                title: urlVal,
                siteName: '',
                excerpt: '',
                image: ''
            };

            try {
                const article = await timeoutPromise(15000, RekindleCloud.request(`${READER_API_PATH}?url=${encodeURIComponent(urlVal)}`));
                if (article) {
                    meta.title = article.title || urlVal;
                    meta.siteName = article.siteName || new URL(urlVal).hostname;
                    meta.excerpt = article.excerpt || '';
                    
                    if (article.content) {
                        const parser = new DOMParser();
                        const doc = parser.parseFromString(article.content, 'text/html');
                        const img = doc.querySelector('img');
                        if (img && img.src) {
                            meta.image = img.src;
                        }
                    }
                }
            } catch (e) {
                console.warn("Failed to fetch metadata, falling back to basic url", e);
                try { meta.siteName = new URL(urlVal).hostname; } catch(ex){}
            }

            const newDoc = {
                url: urlVal,
                title: meta.title,
                siteName: meta.siteName,
                excerpt: meta.excerpt,
                image: meta.image,
                created: currentUser && db ? firebase.firestore.FieldValue.serverTimestamp() : Date.now()
            };

            if (currentUser && db) {
                db.collection('users').doc(currentUser.uid).collection('readlater').add(newDoc)
                .catch(e => {
                    console.error("Error adding doc: ", e);
                    window.showModal(window.t ? window.t('error.generic', 'An error occurred.') : 'An error occurred.');
                });
            } else {
                readLaterItems.unshift({ id: Date.now().toString(), ...newDoc });
                saveLocalItems();
            }

            inp.value = '';
            addBtn.innerText = window.t ? window.t('common.add', 'Add') : 'Add';
            addBtn.disabled = false;
        }

        function deleteItem(id) {
            if (currentUser && db) {
                db.collection('users').doc(currentUser.uid).collection('readlater').doc(id).delete();
            } else {
                readLaterItems = readLaterItems.filter(t => t.id !== id);
                saveLocalItems();
            }
        }

    </script>
</body></html>
