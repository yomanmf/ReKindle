<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title>Manga Reader</title>
    <!-- Dependencies -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/localforage/1.10.0/localforage.min.js" integrity="sha384-MTDrIlFOzEqpmOxY6UIA/1Zkh0a64UlmJ6R0UrZXqXCPx99siPGi8EmtQjIeCcTH" crossorigin="anonymous"></script>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        * {
            transition: none !important;
            animation: none !important;
        }

        body {
            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 900px;
            position: relative;
        }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            margin: 0;
            z-index: 2000;
            transform-origin: top left !important;
        }

        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
            font-family: "Helvetica Neue", sans-serif;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        #back-btn {
            display: none;
            position: absolute;
            left: 36px;
            width: auto;
            padding: 0 6px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.7rem;
            line-height: 18px;
            box-shadow: 2px 2px 0 black;
        }

        #back-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* TABS */
        .tabs {
            display: flex;
            border-bottom: 2px solid black;
            background: #eee;
        }

        /* CONTROLS (Right side of Title Bar) */
        .title-controls {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .icon-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            padding: 0;
            flex-shrink: 0;
        }

        .icon-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* Icon State Toggles */
        .icon-contract {
            display: none;
        }

        .window.fullscreen .icon-expand {
            display: none;
        }

        .window.fullscreen .icon-contract {
            display: inline;
        }

        .tab {
            padding: 10px 20px;
            border-right: 2px solid black;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .tab.active {
            background: white;
            border-bottom: 2px solid white;
            margin-bottom: -2px;
        }

        /* CONTENT */
        .window-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px;
            background: white;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 20px;
            align-content: start;
        }

        .card {
            background: white;
            border: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            position: relative;
        }

        .card:active {
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .cover-img {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            border: 1px solid #000;
            margin-bottom: 10px;
            background: #eee;
            image-rendering: auto;
            /* Allow covers to be smooth if they aren't pixel art */
        }

        .book-title {
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 4px;
            line-height: 1.2;
        }

        .book-author {
            font-size: 0.8rem;
            font-style: italic;
            color: #555;
            margin-bottom: 8px;
        }

        .book-type {
            font-size: 0.7rem;
            background: #000;
            color: #fff;
            padding: 2px 4px;
            border-radius: 2px;
            align-self: flex-start;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .btn {
            background: white;
            border: 2px solid black;
            padding: 6px 12px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            box-shadow: 2px 2px 0 black;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .btn:disabled {
            background: #ccc;
            color: #666;
            box-shadow: none;
            cursor: default;
            transform: none;
            border-color: #999;
        }

        /* READER VIEW */
        #reader-view {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: white;
            z-index: 10;
            flex-direction: column;
        }

        .reader-content {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fdfdfd;
            position: relative;
        }

        .reader-page {
            max-width: 100%;
            max-height: 100%;
            width: auto;
            height: auto;
            display: block;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast;
        }

        /* Tap Zones for page navigation */
        .tap-zone {
            position: absolute;
            top: 0;
            height: 100%;
            z-index: 5;
            cursor: pointer;
        }

        .tap-zone-prev {
            left: 0;
            width: 30%;
        }

        .tap-zone-next {
            right: 0;
            width: 70%;
        }

        #status-bar {
            border-top: 2px solid black;
            padding: 4px;
            font-size: 0.75rem;
            background: #eee;
            text-align: center;
            flex-shrink: 0;
            font-family: sans-serif;
        }

        /* Hide chapter select custom-select-container by default */
        #chapter-select-wrapper {
            display: none;
            position: relative;
            z-index: 100;
        }

        /* Ensure title bar is above reader-view (z-index: 10) so dropdown renders on top */
        .title-bar {
            overflow: visible;
            z-index: 20;
        }

        /* Ensure the chapter custom-select options render above everything */
        #chapter-select-wrapper .custom-select-container {
            z-index: 9000;
        }

        #chapter-select-wrapper .custom-options {
            z-index: 9999;
            min-width: 160px;
        }
    </style>
    <script src="theme.js?v=21"></script>
    <script src="js/rekindle-cloud.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/custom-select.js"></script>
    <link rel="stylesheet" href="css/custom-select.css">
</head>

<body>
    <script>window.location.replace('index');</script>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="location.href='index'">X</div>
            <div id="back-btn" onclick="closeReader()">Back</div>
            <span class="title-text" id="app-title" data-i18n="manga.title">Manga</span>
            <div class="title-controls">
                <div id="language-select-wrapper" style="display: none; margin-right: 8px;">
                    <select id="language-select" onchange="changeReadingLanguage(this.value)"
                        style="border: 2px solid black; padding: 2px 4px; font-family: inherit; font-size: 0.75rem; background: white; outline: none; box-shadow: 1px 1px 0 black; max-width: 100px;">
                    </select>
                </div>
                <div id="chapter-select-wrapper" style="margin-right: 8px;">
                    <select id="chapter-select" class="no-custom-select" onchange="loadChapter(parseInt(this.value))">
                    </select>
                </div>
                <button class="icon-btn" onclick="toggleFullScreen()" title="Full Screen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="square" stroke-linejoin="miter">
                        <path class="icon-expand" d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"></path>
                        <path class="icon-contract" d="M21 9H15V3M21 3l-6 6M3 15h6v6M3 21l6-6"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-library" onclick="switchTab('library')" data-i18n="manga.tab.library">
                Library</div>
            <div class="tab" id="tab-store" onclick="switchTab('store')" data-i18n="manga.tab.store">Store</div>
        </div>

        <div class="window-content">
            <!-- LIBRARY VIEW -->
            <div id="view-library" class="grid"></div>

            <!-- STORE VIEW -->
            <div id="view-store" style="display: none;">
                <!-- Store Controls -->
                <div id="store-controls"
                    style="margin-bottom: 15px; display: grid; grid-template-columns: 1fr; gap: 8px;">
                    <div style="display: grid; grid-template-columns: 1fr auto; gap: 8px;">
                        <input type="text" id="store-search" placeholder="Search manga..."
                            data-i18n-placeholder="manga.store.search" onkeydown="if(event.keyCode===13)doStoreSearch()"
                            style="border: 2px solid black; padding: 6px 10px; font-family: inherit; font-size: 0.85rem; box-sizing: border-box; outline: none;">
                        <button class="btn" onclick="doStoreSearch()" style="white-space: nowrap;">Search</button>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;">
                        <select id="store-category" onchange="doStoreSearch()"
                            style="border: 2px solid black; padding: 4px 6px; font-family: inherit; font-size: 0.8rem; background: white; outline: none;">
                            <option value="">All Categories</option>
                            <option value="391b0423-d847-456f-aff0-8b0cfc03066b">Action</option>
                            <option value="87cc87cd-a395-47af-b27a-93258283bbc6">Adventure</option>
                            <option value="4d32cc48-9f00-4cca-9b5a-a839f0764984">Comedy</option>
                            <option value="b9af3a63-f058-46de-a9a0-e0c13906197a">Drama</option>
                            <option value="cdc58593-87dd-415e-bbc0-2ec27bf404cc">Fantasy</option>
                            <option value="cdad7e68-1419-41dd-bdce-27753074a640">Horror</option>
                            <option value="a3c67850-4684-404e-9b7f-c69850ee5da6">Mystery</option>
                            <option value="423e2eae-a7a2-4a8b-ac03-a8351462d71d">Romance</option>
                            <option value="256c8bd9-4904-4f7b-a3a0-b7c22b1c7c99">Sci-Fi</option>
                            <option value="e5301a23-ebd9-49dd-a0cb-2add944c7c9b">Slice of Life</option>
                            <option value="69964a64-2f90-4d33-beeb-f3ed2875eb4c">Sports</option>
                            <option value="f8f62932-27da-4fe4-8ee1-6779a8c5edba">Thriller</option>
                        </select>
                        <select id="store-language" onchange="doStoreSearch()"
                            style="border: 2px solid black; padding: 4px 6px; font-family: inherit; font-size: 0.8rem; background: white; outline: none;">
                            <option value="">Any Language</option>
                            <option value="en" selected>English</option>
                            <option value="ja">Japanese</option>
                            <option value="ko">Korean</option>
                            <option value="zh">Chinese</option>
                            <option value="es">Spanish</option>
                            <option value="fr">French</option>
                            <option value="de">German</option>
                            <option value="pt-br">Portuguese</option>
                        </select>
                        <select id="store-sort" onchange="doStoreSearch()"
                            style="border: 2px solid black; padding: 4px 6px; font-family: inherit; font-size: 0.8rem; background: white; outline: none;">
                            <option value="rating">Top Rated</option>
                            <option value="followedCount">Most Popular</option>
                            <option value="latestUploadedChapter">Recently Updated</option>
                            <option value="createdAt">Newest</option>
                            <option value="title">Alphabetical</option>
                        </select>
                    </div>
                </div>
                <div id="store-results" class="grid"></div>
            </div>

            <!-- READER VIEW -->
            <div id="reader-view">
                <div class="reader-content" id="reader-content">
                </div>
                <div class="tap-zone tap-zone-prev" onclick="prevPage()"></div>
                <div class="tap-zone tap-zone-next" onclick="nextPage()"></div>
            </div>
        </div>

        <div id="status-bar" data-i18n="manga.msg.loading">Loading...</div>
    </div>

    <script>
        // --- MANGADEX API INTEGRATION ---
        const API_BASE = "https://api.mangadex.org";
        let library = [];
        let currentStorePage = 0;
        let isLoadingStore = false;
        let currentReading = null;
        let currentPage = 0;
        let currentChapterList = [];
        let currentChapterIndex = 0;
        let isLoadingNextChapter = false;
        // Resolve system language; 'auto' isn't a MangaDex language so fall back to 'en'
        const _sysLang = localStorage.getItem('rekindle_language') || 'en';
        let currentReadingLanguage = (_sysLang === 'auto') ? 'en' : _sysLang;
        let storeSearchQuery = '';
        let storeCategory = '';
        let storeLanguage = 'en';
        let storeSort = 'rating';

        window.onload = async () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            if (window.rekindleApplyScale) window.rekindleApplyScale();
            if (window.rekindleAutoDetectScale) window.rekindleAutoDetectScale();
            if (window.rekindleApplyDefaultFullscreen) window.rekindleApplyDefaultFullscreen();

            await loadLibrary();
            switchTab('library'); // default

            document.getElementById('status-bar').innerText = window.t('manga.msg.ready') || 'Ready';
        };

        async function loadLibrary() {
            try {
                let saved = await localforage.getItem('manga_library');
                if (saved && Array.isArray(saved)) {
                    let needsMigration = false;

                    saved = saved.map(item => {
                        if (item.cover) {
                            const oldProxies = [
                                { match: 'api.allorigins.win/raw?url=', split: 'url=' },
                                { match: 'api.codetabs.com/v1/proxy?quest=', split: 'quest=' },
                                { match: 'thingproxy.freeboard.io/fetch/', split: 'fetch/' },
                                { match: 'cors-anywhere.herokuapp.com/', split: 'herokuapp.com/' }
                            ];

                            for (let proxy of oldProxies) {
                                if (item.cover.includes(proxy.match)) {
                                    const rawUrl = item.cover.split(proxy.split)[1];
                                    if (rawUrl) {
                                        // The split string might already be encoded or not, 
                                        // but safely re-wrapping it via our new proxy format.
                                        // Note: split[1] leaves it encoded if it was encoded.
                                        const cleanUrl = decodeURIComponent(rawUrl);
                                        item.cover = RekindleCloud.apiBase + '/content/proxy?url=' + encodeURIComponent(cleanUrl);
                                        needsMigration = true;
                                        break;
                                    }
                                }
                            }
                        }
                        return item;
                    });

                    library = saved;

                    if (needsMigration) {
                        await saveLibrary();
                        console.log("Migrated legacy proxy URLs in library covers.");
                    }
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function saveLibrary() {
            try {
                await localforage.setItem('manga_library', library);
            } catch (e) {
                console.error(e);
                showStatus("Storage Error!");
            }
        }

        function switchTab(tab) {
            document.getElementById('tab-library').classList.remove('active');
            document.getElementById('tab-store').classList.remove('active');
            document.getElementById('view-library').style.display = 'none';
            document.getElementById('view-store').style.display = 'none';

            document.getElementById('tab-' + tab).classList.add('active');
            if (tab === 'library') {
                document.getElementById('view-library').style.display = 'grid';
            } else {
                document.getElementById('view-' + tab).style.display = 'block';
            }

            if (tab === 'library') {
                renderLibrary();
            } else if (tab === 'store') {
                if (document.getElementById('store-results').innerHTML === '') {
                    loadStore(0);
                }
            }
        }

        function doStoreSearch() {
            storeSearchQuery = document.getElementById('store-search').value.trim();
            storeCategory = document.getElementById('store-category').value;
            storeLanguage = document.getElementById('store-language').value;
            storeSort = document.getElementById('store-sort').value;
            currentStorePage = 0;
            loadStore(0);
        }

        function showStatus(msg) {
            document.getElementById('status-bar').innerText = msg;
        }

        async function fetchCORS(url) {
            const PROXIES = [
                RekindleCloud.apiBase + "/content/proxy?url="
            ];

            let lastError = null;
            for (let proxyBase of PROXIES) {
                try {
                    const res = await fetch(proxyBase + encodeURIComponent(url));
                    if (res.ok) {
                        return res;
                    }
                } catch (e) {
                    console.warn("Proxy failed:", proxyBase, e);
                    lastError = e;
                }
            }
            throw new Error("All CORS proxies failed: " + (lastError ? lastError.message : ""));
        }

        async function loadStore(offset) {
            if (isLoadingStore) return;
            isLoadingStore = true;
            showStatus("Loading MangaDex Catalog...");

            var container = document.getElementById('store-results');
            if (offset === 0) container.innerHTML = '';

            try {
                var apiUrl = API_BASE + '/manga?limit=20&offset=' + offset + '&includes[]=cover_art';

                // Sort order
                if (storeSort === 'title') {
                    apiUrl += '&order[title]=asc';
                } else {
                    apiUrl += '&order[' + storeSort + ']=desc';
                }

                // Search
                if (storeSearchQuery) {
                    apiUrl += '&title=' + encodeURIComponent(storeSearchQuery);
                }

                // Category
                if (storeCategory) {
                    apiUrl += '&includedTags[]=' + storeCategory;
                }

                // Language
                if (storeLanguage) {
                    apiUrl += '&availableTranslatedLanguage[]=' + storeLanguage;
                }

                var res = await fetchCORS(apiUrl);

                const data = await res.json();

                if (data.data.length === 0 && offset === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1; text-align: center;">Store is empty.</div>';
                    return;
                }

                data.data.forEach(manga => {
                    const title = manga.attributes.title.en || Object.values(manga.attributes.title)[0] || "Unknown";
                    let coverFileName = null;

                    // Find cover art in relationships
                    for (let rel of manga.relationships) {
                        if (rel.type === 'cover_art' && rel.attributes && rel.attributes.fileName) {
                            coverFileName = rel.attributes.fileName;
                            break;
                        }
                    }

                    // Construct cover URL
                    let coverUrl = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450"><rect width="300" height="450" fill="%23ccc"/></svg>';
                    if (coverFileName) {
                        const rawUrl = `https://uploads.mangadex.org/covers/${manga.id}/${coverFileName}.256.jpg`;
                        coverUrl = RekindleCloud.apiBase + '/content/proxy?url=' + encodeURIComponent(rawUrl);
                    }

                    const isAdded = library.some(libItem => libItem.id === manga.id);
                    const card = document.createElement('div');
                    card.className = 'card';

                    card.innerHTML =
                        '<img src="' + coverUrl + '" class="cover-img" onerror="this.src=\'data:image/svg+xml;utf8,<svg xmlns=&quot;http://www.w3.org/2000/svg&quot; width=&quot;300&quot; height=&quot;450&quot;><rect width=&quot;300&quot; height=&quot;450&quot; fill=&quot;%23ccc&quot;/></svg>\'">' +
                        '<div class="book-title">' + escapeHtml(title) + '</div>' +
                        '<div class="book-author" style="text-transform: capitalize">' + manga.attributes.status + '</div>';

                    const btn = document.createElement('button');
                    btn.className = 'btn';
                    btn.style.marginTop = 'auto';
                    if (isAdded) {
                        btn.innerText = window.t('manga.msg.added') || "Added";
                        btn.disabled = true;
                    } else {
                        btn.innerText = window.t('manga.btn.add') || "+ Add";
                        btn.onclick = (e) => {
                            e.stopPropagation();
                            addToLibrary({
                                id: manga.id,
                                title: title,
                                cover: coverUrl,
                                type: 'manga',
                                author: manga.attributes.status // lazy but works for now
                            });
                            btn.innerText = window.t('manga.msg.added') || "Added";
                            btn.disabled = true;
                        };
                    }

                    card.appendChild(btn);
                    container.appendChild(card);
                });

                // Add "Load More" button
                const moreBtn = document.createElement('button');
                moreBtn.className = 'btn';
                moreBtn.style.gridColumn = '1/-1';
                moreBtn.style.marginTop = '20px';
                moreBtn.innerText = "Load More";
                moreBtn.onclick = () => {
                    moreBtn.remove();
                    currentStorePage += 20;
                    loadStore(currentStorePage);
                };
                container.appendChild(moreBtn);

                showStatus(window.t('manga.msg.ready') || "Ready");
            } catch (e) {
                console.error(e);
                showStatus("Failed to load store: " + e.message);
                if (offset === 0) container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: red;">Network Error loading MangaDex.</div>';
            } finally {
                isLoadingStore = false;
            }
        }

        function escapeHtml(unsafe) {
            return (unsafe || '').replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        async function renderLibrary() {
            const container = document.getElementById('view-library');
            container.innerHTML = '';

            if (library.length === 0) {
                const emptyMsg = window.t('manga.msg.empty_library') || 'Your library is empty. Go to the Store to add some.';
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center;" data-i18n="manga.msg.empty_library">' + emptyMsg + '</div>';
                return;
            }

            // Load all progress at once
            let allProgress = {};
            try {
                allProgress = await localforage.getItem('manga_progress') || {};
            } catch (e) { }

            library.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                const savedProgress = allProgress[item.id] || { chapter: 0, page: 0, chapterNum: '' };
                const savedPage = (typeof savedProgress === 'object') ? savedProgress.page : savedProgress;
                const savedChapterNum = (typeof savedProgress === 'object') ? (savedProgress.chapterNum || '') : '';
                const savedChapter = (typeof savedProgress === 'object') ? savedProgress.chapter : 0;
                let progressText = '';
                if (savedPage > 0 || savedChapter > 0) {
                    var chLabel = savedChapterNum ? ('Ch ' + savedChapterNum) : (savedChapter > 0 ? ('Ch ' + (savedChapter + 1)) : '');
                    var label = chLabel ? (chLabel + ', P ' + (savedPage + 1)) : ((window.t('manga.msg.page') || 'Page') + ' ' + (savedPage + 1));
                    progressText = '<div style="font-size:0.7rem; background:#000; color:#fff; padding:2px 6px; display:inline-block; margin-bottom:4px;">' + label + '</div>';
                }

                // X remove button at top-right
                const removeBtn = document.createElement('div');
                removeBtn.style.cssText = 'position:absolute; top:4px; right:4px; width:18px; height:18px; border:2px solid black; background:white; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:0.8rem; cursor:pointer; z-index:3; box-shadow:1px 1px 0 black;';
                removeBtn.innerText = 'X';
                removeBtn.onclick = function (e) {
                    e.stopPropagation();
                    removeFromLibrary(item.id);
                };

                card.innerHTML =
                    '<img src="' + item.cover + '" class="cover-img">' +
                    '<div class="book-title">' + escapeHtml(item.title) + '</div>' +
                    '<div class="book-author">' + escapeHtml(item.author) + '</div>' +
                    progressText;

                card.appendChild(removeBtn);

                const btnRead = document.createElement('button');
                btnRead.className = 'btn';
                btnRead.style.marginTop = 'auto';
                btnRead.innerText = (savedPage > 0) ? (window.t('manga.btn.continue') || 'Continue') : (window.t('manga.btn.read') || 'Read');
                btnRead.onclick = (e) => {
                    e.stopPropagation();
                    openReader(item);
                };

                card.appendChild(btnRead);
                container.appendChild(card);
            });
        }

        async function addToLibrary(item) {
            if (!library.some(libItem => libItem.id === item.id)) {
                library.push(item);
                await saveLibrary();
            }
        }

        async function removeFromLibrary(id) {
            library = library.filter(item => item.id !== id);
            await saveLibrary();
            renderLibrary();
        }

        // --- READING PROGRESS ---
        async function saveProgress(mangaId, chapterIdx, pageIdx, chapterNum) {
            try {
                const progress = await localforage.getItem('manga_progress') || {};
                progress[mangaId] = { chapter: chapterIdx, page: pageIdx, chapterNum: chapterNum || '', language: currentReadingLanguage || 'en' };
                await localforage.setItem('manga_progress', progress);
            } catch (e) {
                console.error('Failed to save progress:', e);
            }
        }

        async function getProgress(mangaId) {
            try {
                const progress = await localforage.getItem('manga_progress') || {};
                const val = progress[mangaId];
                if (!val) return { chapter: 0, page: 0 };
                if (typeof val === 'number') return { chapter: 0, page: val };
                return val;
            } catch (e) {
                return { chapter: 0, page: 0 };
            }
        }

        // --- READER LOGIC ---
        let isReaderOpen = false;

        function getLanguageName(code) {
            const names = {
                'en': 'English', 'ja': 'Japanese', 'ko': 'Korean',
                'zh': 'Chinese (Simp)', 'zh-hk': 'Chinese (Trad)',
                'es': 'Spanish', 'es-la': 'Spanish (LA)', 'fr': 'French',
                'de': 'German', 'pt-br': 'Portuguese (BR)', 'pt': 'Portuguese',
                'it': 'Italian', 'ru': 'Russian', 'ar': 'Arabic',
                'tr': 'Turkish', 'vi': 'Vietnamese', 'th': 'Thai',
                'id': 'Indonesian', 'pl': 'Polish', 'uk': 'Ukrainian',
                'nl': 'Dutch', 'hu': 'Hungarian', 'ro': 'Romanian',
                'cs': 'Czech', 'bg': 'Bulgarian', 'fi': 'Finnish',
                'sv': 'Swedish', 'no': 'Norwegian', 'da': 'Danish',
                'he': 'Hebrew', 'ms': 'Malay', 'hi': 'Hindi',
                'mn': 'Mongolian', 'fa': 'Persian', 'sr': 'Serbian',
                'ca': 'Catalan', 'lt': 'Lithuanian', 'hr': 'Croatian'
            };
            return names[code] || code.toUpperCase();
        }

        async function openReader(item) {
            currentReading = item;
            currentReading.loadedOnce = false;
            isReaderOpen = true;
            document.getElementById('reader-view').style.display = 'flex';
            document.getElementById('view-library').style.display = 'none';
            document.getElementById('view-store').style.display = 'none';

            // Show back button, update title, hide tabs
            document.getElementById('back-btn').style.display = 'block';
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('app-title').innerText = item.title;

            const content = document.getElementById('reader-content');
            content.innerHTML = '<div style="padding: 20px;">Fetching available languages...</div>';

            // Fetch a page of the chapter feed without a language filter to discover available languages.
            // This reuses the same proxy+endpoint that chapter loading already uses successfully.
            try {
                var langRes = await fetchCORS(API_BASE + '/manga/' + item.id + '/feed?limit=100&order[chapter]=asc');
                var langData = await langRes.json();
                var langSet = new Set();
                if (langData.data) {
                    langData.data.forEach(function (ch) {
                        if (ch.attributes && ch.attributes.translatedLanguage) {
                            langSet.add(ch.attributes.translatedLanguage);
                        }
                    });
                }
                var availableLangs = Array.from(langSet).sort(function (a, b) {
                    if (a === 'en') return -1;
                    if (b === 'en') return 1;
                    return a.localeCompare(b);
                });
                if (availableLangs.length === 0) availableLangs = ['en'];

                var langSelect = document.getElementById('language-select');
                langSelect.innerHTML = '';
                availableLangs.forEach(function (lang) {
                    var opt = document.createElement('option');
                    opt.value = lang;
                    opt.innerText = getLanguageName(lang);
                    langSelect.appendChild(opt);
                });

                // Restore saved language if still available, else prefer 'en', else first
                var savedProgress = await getProgress(item.id);
                var preferred = (savedProgress && savedProgress.language) || currentReadingLanguage;
                if (availableLangs.includes(preferred)) {
                    currentReadingLanguage = preferred;
                } else if (availableLangs.includes('en')) {
                    currentReadingLanguage = 'en';
                } else {
                    currentReadingLanguage = availableLangs[0];
                }
                langSelect.value = currentReadingLanguage;
                document.getElementById('language-select-wrapper').style.display = availableLangs.length > 1 ? 'inline-block' : 'none';
            } catch (e) {
                currentReadingLanguage = 'en';
                document.getElementById('language-select-wrapper').style.display = 'none';
            }

            await loadChaptersForLanguage(currentReadingLanguage);
        }

        async function changeReadingLanguage(lang) {
            currentReadingLanguage = lang;
            if (currentReading) {
                currentReading.loadedOnce = false;
                await loadChaptersForLanguage(lang);
            }
        }

        async function loadChaptersForLanguage(language) {
            if (!currentReading) return;

            const content = document.getElementById('reader-content');
            content.innerHTML = '<div style="padding: 20px;">Fetching chapters...</div>';

            try {
                // Paginate through all chapters (MangaDex returns max 100 per request)
                var allChapters = [];
                var fetchOffset = 0;
                var hasMore = true;
                while (hasMore) {
                    var url = API_BASE + '/manga/' + currentReading.id + '/feed?translatedLanguage[]=' + language + '&order[chapter]=asc&limit=100&offset=' + fetchOffset;
                    var res = await fetchCORS(url);
                    var data = await res.json();
                    if (data.data && data.data.length > 0) {
                        allChapters = allChapters.concat(data.data);
                        fetchOffset += data.data.length;
                        if (data.data.length < 100 || (data.total && fetchOffset >= data.total)) {
                            hasMore = false;
                        }
                        content.innerHTML = '<div style="padding: 20px;">Fetching chapters... (' + allChapters.length + ' found)</div>';
                    } else {
                        hasMore = false;
                    }
                }

                if (allChapters.length === 0) {
                    content.innerHTML = '<div style="padding: 20px;">No chapters found for this language.</div>';
                    return;
                }

                // Filter out chapters with 0 pages (unless they are external links)
                var validChapters = allChapters.filter(function (ch) {
                    return ch.attributes && ch.attributes.pages > 0;
                });

                // Deduplicate: keep only the first occurrence of each chapter number
                var seenChapterNums = {};
                validChapters = validChapters.filter(function (ch) {
                    var chNum = ch.attributes.chapter;
                    if (!chNum) return true;
                    if (seenChapterNums[chNum]) return false;
                    seenChapterNums[chNum] = true;
                    return true;
                });

                // If no internal chapters, check if the first is external
                if (validChapters.length === 0 && allChapters[0] && allChapters[0].attributes && allChapters[0].attributes.externalUrl) {
                    currentChapterList = [allChapters[0]];
                    currentChapterIndex = 0;
                    await loadChapter(currentChapterIndex);
                    return;
                }

                if (validChapters.length === 0) {
                    content.innerHTML = '<div style="padding: 20px;">No readable chapters found.</div>';
                    return;
                }

                currentChapterList = validChapters;

                // Get saved progress — reset chapter to 0 when language changes
                var savedProgress = await getProgress(currentReading.id);
                var restoringLanguage = savedProgress && savedProgress.language === language;
                currentChapterIndex = restoringLanguage ? (savedProgress.chapter || 0) : 0;
                if (currentChapterIndex >= validChapters.length) currentChapterIndex = 0;

                // Populate chapter dropdown
                var chapterSelect = document.getElementById('chapter-select');
                chapterSelect.innerHTML = '';
                validChapters.forEach(function (ch, idx) {
                    var opt = document.createElement('option');
                    opt.value = idx;
                    var chNum = ch.attributes.chapter ? ('Ch ' + ch.attributes.chapter) : '';
                    var chTitle = ch.attributes.title || '';
                    var displayTitle = chNum;
                    if (chTitle) {
                        displayTitle += displayTitle ? (': ' + chTitle) : chTitle;
                    }
                    if (!displayTitle) displayTitle = 'Part ' + (idx + 1);
                    opt.innerText = displayTitle;
                    chapterSelect.appendChild(opt);
                });
                chapterSelect.value = currentChapterIndex;

                // Reinitialize custom-select for the chapter dropdown
                var existingCustom = chapterSelect.parentNode.querySelector('.custom-select-container');
                if (existingCustom) existingCustom.remove();
                delete chapterSelect.dataset.customSelectInitialized;
                try {
                    new CustomSelect(chapterSelect);
                } catch (csErr) {
                    console.warn('CustomSelect init failed, using native select:', csErr);
                    chapterSelect.style.display = 'inline-block';
                    chapterSelect.style.border = '2px solid black';
                    chapterSelect.style.padding = '2px 4px';
                    chapterSelect.style.fontSize = '11px';
                    chapterSelect.style.fontFamily = 'inherit';
                    chapterSelect.style.background = 'white';
                    chapterSelect.style.boxShadow = '1px 1px 0 black';
                    chapterSelect.style.maxWidth = '140px';
                }

                document.getElementById('chapter-select-wrapper').style.display = 'inline-block';

                await loadChapter(currentChapterIndex);

            } catch (e) {
                content.innerHTML = '<div style="padding: 20px; color: red;">Error: ' + e.message + '</div>';
            }
        }

        async function loadChapter(chapterIndex) {
            if (chapterIndex < 0 || chapterIndex >= currentChapterList.length) return;

            isLoadingNextChapter = true;
            currentChapterIndex = chapterIndex;

            // Sync dropdown
            var chapterSelect = document.getElementById('chapter-select');
            if (chapterSelect) {
                chapterSelect.value = chapterIndex;
            }

            var chapterObj = currentChapterList[chapterIndex];
            var content = document.getElementById('reader-content');

            // Handle external chapters
            if (chapterObj.attributes && chapterObj.attributes.pages === 0 && chapterObj.attributes.externalUrl) {
                content.innerHTML =
                    '<div style="padding: 20px; text-align: center;">' +
                    '<p style="margin-bottom: 20px; font-weight: bold;">This chapter is officially hosted externally.</p>' +
                    '<a href="' + chapterObj.attributes.externalUrl + '" target="_blank" style="display: inline-block; padding: 10px 20px; background: black; color: white; text-decoration: none; font-weight: bold; font-family: sans-serif; box-shadow: 2px 2px 0 #555;">' +
                    'Read on external site</a></div>';
                isLoadingNextChapter = false;
                return;
            }

            var chNum = chapterObj.attributes.chapter ? ('Ch ' + chapterObj.attributes.chapter) : ('Part ' + (chapterIndex + 1));
            content.innerHTML = '<div style="padding: 20px;">Fetching ' + chNum + ' (' + (chapterIndex + 1) + ' of ' + currentChapterList.length + ')...</div>';

            try {
                var url = API_BASE + '/at-home/server/' + chapterObj.id;
                var res = await fetchCORS(url);
                var data = await res.json();

                var baseUrl = data.baseUrl;
                var hash = data.chapter.hash;
                var pages = data.chapter.data;

                if (!pages || pages.length === 0) {
                    content.innerHTML = '<div style="padding: 20px;">No pages found in this chapter.</div>';
                    isLoadingNextChapter = false;
                    return;
                }

                var imageUrls = pages.map(function (file) {
                    var rawUrl = baseUrl + '/data/' + hash + '/' + file;
                    return RekindleCloud.apiBase + '/content/proxy?url=' + encodeURIComponent(rawUrl);
                });

                currentReading.pages = imageUrls;

                // Restore progress on initial load, otherwise start at page 0
                if (!currentReading.loadedOnce) {
                    var savedProgress = await getProgress(currentReading.id);
                    currentPage = savedProgress.page || 0;
                    if (currentPage >= imageUrls.length) currentPage = 0;
                    currentReading.loadedOnce = true;
                } else {
                    currentPage = 0;
                }

                updateMangaPage();

            } catch (e) {
                content.innerHTML = '<div style="padding: 20px; color: red;">Error: ' + e.message + '</div>';
            }
            isLoadingNextChapter = false;
        }

        function toggleFullScreen() {
            var win = document.querySelector('.window');
            win.classList.toggle('fullscreen');
        }

        function closeReader() {
            isReaderOpen = false;
            document.getElementById('reader-view').style.display = 'none';
            document.getElementById('reader-content').innerHTML = '';

            // Hide back button, show tabs
            document.getElementById('back-btn').style.display = 'none';
            document.querySelector('.tabs').style.display = 'flex';

            // Hide chapter and language dropdowns
            document.getElementById('chapter-select-wrapper').style.display = 'none';
            document.getElementById('language-select-wrapper').style.display = 'none';

            // Restore active tab view
            var activeTab = document.querySelector('.tab.active');
            if (activeTab && activeTab.id === 'tab-library') {
                document.getElementById('view-library').style.display = 'grid';
            } else if (activeTab && activeTab.id === 'tab-store') {
                document.getElementById('view-store').style.display = 'block';
            } else {
                document.getElementById('view-library').style.display = 'grid';
            }

            // Restore title
            document.getElementById('app-title').innerText = 'Manga';

            // Reset status bar
            showStatus(window.t('manga.msg.ready') || 'Ready');
            currentReading = null;

            // Refresh library to show updated progress
            renderLibrary();
        }

        function updateMangaPage() {
            if (!currentReading || !currentReading.pages) return;

            const pages = currentReading.pages;
            const content = document.getElementById('reader-content');
            content.innerHTML = '';

            const img = document.createElement('img');
            img.src = pages[currentPage];
            img.className = 'reader-page';

            showStatus('Loading ' + (currentPage + 1) + ' / ' + pages.length + '...');
            img.onload = function () {
                showStatus((currentPage + 1) + ' / ' + pages.length);
            };
            img.onerror = function () {
                showStatus('Error loading page ' + (currentPage + 1));
            };

            content.appendChild(img);
            content.scrollTop = 0;

            // Save progress
            var chapterNum = '';
            if (currentChapterList && currentChapterList[currentChapterIndex]) {
                chapterNum = currentChapterList[currentChapterIndex].attributes.chapter || '';
            }
            saveProgress(currentReading.id, currentChapterIndex, currentPage, chapterNum);
        }

        function prevPage() {
            if (!isReaderOpen) return;
            if (currentReading && currentReading.pages && currentPage > 0) {
                currentPage--;
                updateMangaPage();
            } else if (currentReading && currentPage === 0 && currentChapterIndex > 0 && !isLoadingNextChapter) {
                loadChapter(currentChapterIndex - 1);
            }
        }

        function nextPage() {
            if (!isReaderOpen) return;
            if (currentReading && currentReading.pages && currentPage < currentReading.pages.length - 1) {
                currentPage++;
                updateMangaPage();
            } else if (currentReading && currentReading.pages && currentPage >= currentReading.pages.length - 1 && currentChapterIndex < currentChapterList.length - 1 && !isLoadingNextChapter) {
                loadChapter(currentChapterIndex + 1);
            }
        }
    </script>
</body>
