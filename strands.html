<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title>Strands</title>
    <script src="js/i18n.js"></script>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #e5e5e5;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: fit-content;
            max-min-height: 95vh;
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* TABS */
        .tabs {
            display: flex;
            width: 100%;
            border-bottom: 2px solid black;
            background: #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            border-right: 2px solid black;
            cursor: pointer;
            font-weight: bold;
            border-bottom: 2px solid black;
            background: #eee;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab.active {
            background: white;
            border-bottom: none;
        }

        /* WINDOW CONTENT */
        .window-content {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
            background: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* CLUE BAR */
        #clue-bar {
            width: 100%;
            background: black;
            color: white;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 8px;
            box-sizing: border-box;
        }

        /* STATUS / MESSAGE */
        #status-msg {
            font-size: 0.9rem;
            font-weight: bold;
            min-height: 24px;
            text-align: center;
            margin-bottom: 8px;
        }

        /* GRID */
        #grid-container {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 0;
            background: transparent;
            width: 100%;
            max-width: 360px;
            box-sizing: border-box;
            margin-bottom: 10px;
            position: relative;
        }

        #path-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .cell {
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            width: 100%;
            height: 0;
            padding-bottom: 100%;
            position: relative;
            box-sizing: border-box;
            z-index: 2;
        }

        .cell-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 55%;
            height: 55%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            background: white;
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .cell.selected .cell-circle {
            background: black;
            color: white;
            border-color: black;
        }

        .cell.hinted .cell-circle {
            background: #f5f5f5;
            border: 2px dashed #999;
        }

        .cell.covered .cell-circle {
            background: white;
            border-color: #999;
        }

        .cell.spangram-cell .cell-circle {
            background: white;
            border-color: black;
        }

        /* CONTROLS */
        .controls-row {
            display: flex;
            justify-content: center;
            width: 100%;
            max-width: 360px;
            margin-bottom: 10px;
        }

        .controls-row>*+* {
            margin-left: 10px;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 8px 16px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.9rem;
        }

        .sys-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .sys-btn:active:not(:disabled) {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        /* PROGRESS / HINT BAR */
        #hint-bar {
            width: 100%;
            max-width: 360px;
            border: 2px solid black;
            padding: 6px;
            font-size: 0.85rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            box-sizing: border-box;
            background: white;
        }

        .hint-progress {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid black;
            margin: 0 2px;
            vertical-align: middle;
        }

        .hint-progress.filled {
            background: black;
        }

        /* FOUND WORDS (hidden — words are shown on the board as paths) */
        #found-words {
            display: none;
        }

        /* MODAL */
        .modal-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 20px;
            width: 260px;
            text-align: center;
        }

        .modal-btns {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .modal-btns>*+* {
            margin-left: 10px;
        }
    </style>
    <script src="theme.js?v=18"></script>
    <script src="js/rekindle-cloud.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="strands.title">Strands</span>

            <div id="new-game-btn" class="close-box"
                style="left:auto; right:10px; width:auto; padding:0 5px; display:none;"
                onclick="openNewGameModal()">New</div>
        </div>

        <div class="tabs">
            <div class="tab active" id="tab-daily" onclick="switchMode('daily')">Daily</div>
            <div class="tab" id="tab-unlimited" onclick="switchMode('unlimited')">Unlimited</div>
        </div>

        <div class="window-content">
            <div id="clue-bar" data-i18n="strands.label.loading">Loading puzzle...</div>
            <div id="status-msg"></div>

            <div id="grid-container"></div>

            <div class="controls-row">
                <button class="sys-btn" onclick="clearSelection()" data-i18n="strands.btn.clear">Clear</button>
                <button class="sys-btn" onclick="submitWord()" data-i18n="strands.btn.submit">Submit</button>
                <button class="sys-btn" id="hint-btn" onclick="useHint()" data-i18n="strands.btn.hint">Hint</button>
            </div>

            <div id="hint-bar">
                <span data-i18n="strands.label.hints">Hint progress:</span>
                <span id="hint-progress-1" class="hint-progress"></span>
                <span id="hint-progress-2" class="hint-progress"></span>
                <span id="hint-progress-3" class="hint-progress"></span>
            </div>

            <div id="found-words"></div>
        </div>
    </div>

    <!-- NEW GAME MODAL -->
    <div id="new-game-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 data-i18n="strands.modal.new.title">Start New Game?</h3>
            <p data-i18n="strands.modal.new.body">Current progress will be lost.</p>
            <div class="modal-btns">
                <button class="sys-btn" onclick="confirmNewGame()" data-i18n="strands.modal.new.yes">Yes</button>
                <button class="sys-btn" onclick="closeNewGameModal()" data-i18n="strands.modal.new.cancel">Cancel</button>
            </div>
        </div>
    </div>

    <!-- WIN MODAL -->
    <div id="win-modal" class="modal-overlay">
        <div class="modal-box">
            <h3 data-i18n="strands.modal.win.title">Puzzle Solved!</h3>
            <p id="win-msg" data-i18n="strands.modal.win.body">Great job finding all the words.</p>
            <div class="modal-btns">
                <button class="sys-btn" onclick="closeWinModal()" data-i18n="strands.modal.win.close">Close</button>
                <button class="sys-btn" id="win-new-btn" onclick="closeWinModal(); confirmNewGame();"
                    data-i18n="strands.modal.win.new">New Game</button>
            </div>
        </div>
    </div>

    <script>
        // --- STATE ---
        const COLS = 6;
        const ROWS = 8;
        const LS_KEY = 'strands_state_v1';

        let currentMode = 'daily';
        let currentPuzzle = null;
        let selectedPath = [];
        let foundThemeWords = [];
        let foundSpangram = false;
        let hintWordsFound = 0;
        let totalHintsUsed = 0;
        let hintedCells = [];
        let gameOver = false;
        let solutionsSet = new Set();
        let themeWordsSet = new Set();
        let foundPaths = [];
        let coveredCells = new Set();

        // --- PROXY FETCH ---
        async function fetchWithProxy(targetUrl) {
            const proxies = [
                function (url) { return RekindleCloud.apiBase + '/content/proxy?url=' + encodeURIComponent(url); }
            ];

            function fetchWithTimeout(url, ms) {
                return new Promise(function (resolve, reject) {
                    const controller = new AbortController();
                    const id = setTimeout(function () { controller.abort(); }, ms || 8000);
                    fetch(url, { signal: controller.signal })
                        .then(function (res) { clearTimeout(id); resolve(res); })
                        .catch(function (err) { clearTimeout(id); reject(err); });
                });
            }

            for (let i = 0; i < proxies.length; i++) {
                try {
                    const res = await fetchWithTimeout(proxies[i](targetUrl));
                    if (res.ok) return res;
                } catch (e) {
                    console.warn('Proxy failed', e);
                }
            }
            throw new Error('All proxies failed');
        }

        // --- INIT ---
        window.onload = function () {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            loadState();
            // Sync tab visuals to restored mode
            document.getElementById('tab-daily').classList.toggle('active', currentMode === 'daily');
            document.getElementById('tab-unlimited').classList.toggle('active', currentMode === 'unlimited');
            initGame(currentMode);
            window.addEventListener('resize', function () {
                if (currentPuzzle) drawPaths();
            });
        };

        let pendingMode = null;

        function switchMode(mode) {
            if (currentMode === mode) return;
            pendingMode = mode;
            openNewGameModal();
        }

        function applyModeSwitch() {
            if (!pendingMode) return;
            currentMode = pendingMode;
            pendingMode = null;
            document.getElementById('tab-daily').classList.toggle('active', currentMode === 'daily');
            document.getElementById('tab-unlimited').classList.toggle('active', currentMode === 'unlimited');
            saveState();
        }

        function cancelModeSwitch() {
            pendingMode = null;
        }

        async function initGame(mode) {
            currentMode = mode;
            gameOver = false;
            updateControls();
            selectedPath = [];
            foundThemeWords = [];
            foundSpangram = false;
            hintWordsFound = 0;
            totalHintsUsed = 0;
            hintedCells = [];
            solutionsSet = new Set();
            themeWordsSet = new Set();
            foundPaths = [];
            coveredCells = new Set();

            const saved = loadSavedGame(mode);
            if (saved && saved.puzzle && isSameDateAsToday(saved.puzzle.printDate, mode)) {
                restoreGame(saved);
            } else {
                await fetchNewPuzzle(mode);
            }
        }

        function isSameDateAsToday(dateStr, mode) {
            if (mode === 'unlimited') return false; // Unlimited always fetches new unless explicitly saved
            const now = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
            const today = formatDate(now);
            return dateStr === today;
        }

        function formatDate(date) {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return y + '-' + m + '-' + d;
        }

        function getRandomDate() {
            const start = new Date('2024-03-04');
            const end = new Date();
            end.setDate(end.getDate() - 1);
            const randomTime = start.getTime() + Math.random() * (end.getTime() - start.getTime());
            const randomDate = new Date(randomTime);
            return formatDate(randomDate);
        }

        async function fetchNewPuzzle(mode) {
            setStatus(window.t ? window.t('strands.status.loading', 'Fetching puzzle...') : 'Fetching puzzle...');

            let dateStr;
            if (mode === 'daily') {
                const now = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
                dateStr = formatDate(now);
            } else {
                dateStr = getRandomDate();
            }

            try {
                const url = 'https://www.nytimes.com/svc/strands/v2/' + dateStr + '.json';
                const res = await fetchWithProxy(url);
                const data = await res.json();

                if (data.status !== 'OK' || !data.startingBoard) {
                    throw new Error('Invalid puzzle data');
                }

                loadPuzzle(data);
            } catch (e) {
                console.error('Fetch error', e);
                setStatus(window.t ? window.t('strands.status.error', 'Error loading puzzle. Retrying...') : 'Error loading puzzle. Retrying...');
                setTimeout(function () { fetchNewPuzzle(mode); }, 1500);
            }
        }

        function loadPuzzle(data) {
            currentPuzzle = {
                id: data.id,
                printDate: data.printDate,
                clue: data.clue,
                spangram: data.spangram.toUpperCase(),
                themeWords: data.themeWords.map(function (w) { return w.toUpperCase(); }),
                board: data.startingBoard.map(function (r) { return r.toUpperCase(); })
            };

            if (data.solutions && Array.isArray(data.solutions)) {
                data.solutions.forEach(function (w) { solutionsSet.add(w.toUpperCase()); });
            }
            currentPuzzle.themeWords.forEach(function (w) { themeWordsSet.add(w); });
            themeWordsSet.add(currentPuzzle.spangram);

            renderGrid();
            updateUI();
            setStatus(window.t ? window.t('strands.status.ready', 'Tap letters to form a word.') : 'Tap letters to form a word.');
            saveGame();
        }

        function restoreGame(saved) {
            currentPuzzle = saved.puzzle;
            foundThemeWords = saved.foundThemeWords || [];
            foundSpangram = saved.foundSpangram || false;
            hintWordsFound = saved.hintWordsFound || 0;
            totalHintsUsed = saved.totalHintsUsed || 0;
            hintedCells = saved.hintedCells || [];
            gameOver = saved.gameOver || false;
            foundPaths = saved.foundPaths || [];
            coveredCells = new Set();
            foundPaths.forEach(function (fp) {
                fp.path.forEach(function (idx) { coveredCells.add(idx); });
            });

            if (saved.solutions) {
                saved.solutions.forEach(function (w) { solutionsSet.add(w); });
            }
            if (currentPuzzle) {
                currentPuzzle.themeWords.forEach(function (w) { themeWordsSet.add(w); });
                themeWordsSet.add(currentPuzzle.spangram);
            }

            renderGrid();
            updateUI();
            setStatus(window.t ? window.t('strands.status.resumed', 'Game resumed.') : 'Game resumed.');
        }

        // --- RENDER ---
        function renderGrid() {
            const container = document.getElementById('grid-container');
            container.innerHTML = '';

            if (!currentPuzzle) return;

            // Create SVG overlay first (goes behind cells)
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.id = 'path-overlay';
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            container.appendChild(svg);

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const idx = r * COLS + c;
                    cell.id = 'cell-' + idx;
                    cell.innerHTML = '<div class="cell-circle">' + currentPuzzle.board[r][c] + '</div>';
                    cell.onclick = function () { handleCellClick(idx); };
                    container.appendChild(cell);
                }
            }

            // Apply hinted cells
            hintedCells.forEach(function (idx) {
                const el = document.getElementById('cell-' + idx);
                if (el) el.classList.add('hinted');
            });

            // Apply covered cells
            foundPaths.forEach(function (fp) {
                fp.path.forEach(function (idx) {
                    const el = document.getElementById('cell-' + idx);
                    if (el) {
                        el.classList.add('covered');
                        if (fp.isSpangram) el.classList.add('spangram-cell');
                    }
                });
            });

            drawPaths();
        }

        function updateControls() {
            const btn = document.getElementById('new-game-btn');
            if (currentMode === 'unlimited') {
                btn.style.display = 'flex';
            } else {
                btn.style.display = 'none';
            }
        }

        function updateUI() {
            if (!currentPuzzle) return;

            // Clue
            const clueEl = document.getElementById('clue-bar');
            clueEl.innerText = currentPuzzle.clue;
            clueEl.removeAttribute('data-i18n');

            // Hint progress
            const availableHints = Math.floor(hintWordsFound / 3);
            let filled = hintWordsFound % 3;
            if (availableHints > 0 && filled === 0) filled = 3;
            for (let i = 1; i <= 3; i++) {
                const el = document.getElementById('hint-progress-' + i);
                if (!el) continue;
                el.className = 'hint-progress';
                if (i <= filled) el.classList.add('filled');
            }

            // Hint button
            const hintBtn = document.getElementById('hint-btn');
            hintBtn.disabled = !(hintWordsFound >= 3 && !gameOver);

            // Found words are shown as snake paths on the board
        }

        function setStatus(msg) {
            document.getElementById('status-msg').innerText = msg;
        }

        // --- INTERACTION ---
        function handleCellClick(index) {
            if (gameOver || !currentPuzzle) return;
            if (coveredCells.has(index)) return;

            // If clicking the last selected cell, submit
            if (selectedPath.length > 0 && selectedPath[selectedPath.length - 1] === index) {
                submitWord();
                return;
            }

            // If already in path, trim back to this point
            const existingIndex = selectedPath.indexOf(index);
            if (existingIndex !== -1) {
                selectedPath = selectedPath.slice(0, existingIndex + 1);
                refreshSelection();
                return;
            }

            // If first selection or adjacent, add
            if (selectedPath.length === 0 || isAdjacent(selectedPath[selectedPath.length - 1], index)) {
                selectedPath.push(index);
                refreshSelection();
            } else {
                // Start new path from this cell
                selectedPath = [index];
                refreshSelection();
            }
        }

        function isAdjacent(i1, i2) {
            const r1 = Math.floor(i1 / COLS);
            const c1 = i1 % COLS;
            const r2 = Math.floor(i2 / COLS);
            const c2 = i2 % COLS;
            const dr = Math.abs(r1 - r2);
            const dc = Math.abs(c1 - c2);
            return dr <= 1 && dc <= 1 && !(dr === 0 && dc === 0);
        }

        function refreshSelection() {
            document.querySelectorAll('.cell').forEach(function (el) {
                el.classList.remove('selected');
            });
            selectedPath.forEach(function (idx) {
                const el = document.getElementById('cell-' + idx);
                if (el) el.classList.add('selected');
            });
        }

        function clearSelection() {
            selectedPath = [];
            refreshSelection();
        }

        function drawPaths() {
            const svg = document.getElementById('path-overlay');
            if (!svg) return;
            svg.innerHTML = '';

            const container = document.getElementById('grid-container');
            const containerRect = container.getBoundingClientRect();

            const sampleCell = document.getElementById('cell-0');
            let strokeWidth = 42;
            if (sampleCell) {
                const rect = sampleCell.getBoundingClientRect();
                strokeWidth = rect.width * 0.72;
            }

            foundPaths.forEach(function (fp) {
                const points = fp.path.map(function (idx) {
                    const cell = document.getElementById('cell-' + idx);
                    if (!cell) return null;
                    const cellRect = cell.getBoundingClientRect();
                    const x = cellRect.left - containerRect.left + cellRect.width / 2;
                    const y = cellRect.top - containerRect.top + cellRect.height / 2;
                    return x + ',' + y;
                }).filter(function (p) { return p !== null; }).join(' ');

                if (!points) return;

                const polyline = document.createElementNS('http://www.w3.org/2000/svg', 'polyline');
                polyline.setAttribute('points', points);
                polyline.setAttribute('fill', 'none');
                if (fp.isSpangram) {
                    polyline.setAttribute('stroke', 'black');
                } else {
                    polyline.setAttribute('stroke', '#ccc');
                }
                polyline.setAttribute('stroke-width', strokeWidth);
                polyline.setAttribute('stroke-linecap', 'round');
                polyline.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(polyline);
            });
        }

        function getWordFromPath() {
            if (!currentPuzzle || selectedPath.length === 0) return '';
            let word = '';
            for (let i = 0; i < selectedPath.length; i++) {
                const idx = selectedPath[i];
                const r = Math.floor(idx / COLS);
                const c = idx % COLS;
                word += currentPuzzle.board[r][c];
            }
            return word;
        }

        function submitWord() {
            if (!currentPuzzle || selectedPath.length === 0 || gameOver) return;

            const word = getWordFromPath();

            if (word.length < 4 && !themeWordsSet.has(word)) {
                setStatus(window.t ? window.t('strands.msg.too_short', 'Too short.') : 'Too short.');
                clearSelection();
                return;
            }

            // Check spangram
            if (word === currentPuzzle.spangram && !foundSpangram) {
                foundSpangram = true;
                foundPaths.push({ word: word, path: selectedPath.slice(), isSpangram: true });
                selectedPath.forEach(function (idx) {
                    coveredCells.add(idx);
                    const el = document.getElementById('cell-' + idx);
                    if (el) {
                        el.classList.add('covered');
                        el.classList.add('spangram-cell');
                    }
                });
                drawPaths();
                setStatus(window.t ? window.t('strands.msg.spangram', 'Spangram found!') : 'Spangram found!');
                clearSelection();
                updateUI();
                checkWin();
                saveGame();
                return;
            }

            // Check theme word
            if (currentPuzzle.themeWords.indexOf(word) !== -1 && foundThemeWords.indexOf(word) === -1) {
                foundThemeWords.push(word);
                foundPaths.push({ word: word, path: selectedPath.slice(), isSpangram: false });
                selectedPath.forEach(function (idx) {
                    coveredCells.add(idx);
                    const el = document.getElementById('cell-' + idx);
                    if (el) el.classList.add('covered');
                });
                drawPaths();
                setStatus(window.t ? window.t('strands.msg.theme_word', 'Theme word found!') : 'Theme word found!');
                clearSelection();
                updateUI();
                checkWin();
                saveGame();
                return;
            }

            // Check valid hint word
            if (solutionsSet.has(word)) {
                hintWordsFound++;
                setStatus(window.t ? window.t('strands.msg.hint_word', 'Valid word! (${n}/3)').replace('${n}', hintWordsFound % 3 || 3) : 'Valid word! (' + (hintWordsFound % 3 || 3) + '/3)');
                clearSelection();
                updateUI();
                saveGame();
                return;
            }

            setStatus(window.t ? window.t('strands.msg.invalid', 'Not a valid word.') : 'Not a valid word.');
            clearSelection();
        }

        function useHint() {
            if (!currentPuzzle || gameOver) return;
            if (hintWordsFound < 3) return;

            // Collect unfound targets: spangram first, then theme words
            const targets = [];
            if (!foundSpangram) {
                targets.push(currentPuzzle.spangram);
            }
            for (let i = 0; i < currentPuzzle.themeWords.length; i++) {
                if (foundThemeWords.indexOf(currentPuzzle.themeWords[i]) === -1) {
                    targets.push(currentPuzzle.themeWords[i]);
                }
            }

            if (targets.length === 0) {
                updateUI();
                return;
            }

            // Try to find a hint cell across targets and their letters
            let pick = null;
            let letter = '';

            // Shuffle targets so we don't always pick the same word
            const shuffledTargets = targets.slice().sort(function () { return Math.random() - 0.5; });

            for (let t = 0; t < shuffledTargets.length && pick === null; t++) {
                const word = shuffledTargets[t];
                // Try each unique letter in the word in random order
                const uniqueLetters = [];
                const seen = {};
                for (let i = 0; i < word.length; i++) {
                    if (!seen[word[i]]) {
                        seen[word[i]] = true;
                        uniqueLetters.push(word[i]);
                    }
                }
                const shuffledLetters = uniqueLetters.slice().sort(function () { return Math.random() - 0.5; });

                for (let l = 0; l < shuffledLetters.length && pick === null; l++) {
                    const ch = shuffledLetters[l];
                    const candidates = [];
                    for (let r = 0; r < ROWS; r++) {
                        for (let c = 0; c < COLS; c++) {
                            if (currentPuzzle.board[r][c] === ch) {
                                const idx = r * COLS + c;
                                if (hintedCells.indexOf(idx) === -1 && !coveredCells.has(idx)) {
                                    candidates.push(idx);
                                }
                            }
                        }
                    }
                    if (candidates.length > 0) {
                        pick = candidates[Math.floor(Math.random() * candidates.length)];
                        letter = ch;
                    }
                }
            }

            if (pick !== null) {
                // Deduct credits only on success
                hintWordsFound -= 3;
                totalHintsUsed++;
                hintedCells.push(pick);
                const el = document.getElementById('cell-' + pick);
                if (el) el.classList.add('hinted');
                setStatus(window.t ? window.t('strands.msg.hint_revealed', 'Hint: look for ${letter}').replace('${letter}', letter) : 'Hint: look for ' + letter);
            } else {
                setStatus(window.t ? window.t('strands.msg.no_hint', 'No new hints available.') : 'No new hints available.');
            }

            updateUI();
            saveGame();
        }

        function checkWin() {
            if (!currentPuzzle) return;
            const allThemeFound = foundThemeWords.length === currentPuzzle.themeWords.length;
            if (allThemeFound && foundSpangram) {
                gameOver = true;
                setStatus(window.t ? window.t('strands.msg.win', 'You solved it!') : 'You solved it!');
                setTimeout(function () {
                    document.getElementById('win-msg').innerText =
                        (window.t ? window.t('strands.modal.win.body', 'Great job finding all the words.') : 'Great job finding all the words.') +
                        ' Hints used: ' + totalHintsUsed;
                    document.getElementById('win-new-btn').style.display = currentMode === 'unlimited' ? 'inline-block' : 'none';
                    document.getElementById('win-modal').style.display = 'flex';
                }, 400);
                saveGame();
            }
        }

        // --- SAVE / LOAD ---
        function saveGame() {
            if (!currentPuzzle) return;
            const data = {
                mode: currentMode,
                puzzle: currentPuzzle,
                foundThemeWords: foundThemeWords,
                foundSpangram: foundSpangram,
                hintWordsFound: hintWordsFound,
                totalHintsUsed: totalHintsUsed,
                hintedCells: hintedCells,
                gameOver: gameOver,
                solutions: Array.from(solutionsSet),
                foundPaths: foundPaths
            };
            localStorage.setItem(LS_KEY + '_' + currentMode, JSON.stringify(data));
        }

        function loadSavedGame(mode) {
            const raw = localStorage.getItem(LS_KEY + '_' + mode);
            if (!raw) return null;
            try {
                return JSON.parse(raw);
            } catch (e) {
                return null;
            }
        }

        function loadState() {
            const raw = localStorage.getItem(LS_KEY + '_mode');
            if (raw) currentMode = raw;
        }

        function saveState() {
            localStorage.setItem(LS_KEY + '_mode', currentMode);
        }

        // --- MODALS ---
        function openNewGameModal() {
            document.getElementById('new-game-modal').style.display = 'flex';
        }

        function closeNewGameModal() {
            document.getElementById('new-game-modal').style.display = 'none';
            cancelModeSwitch();
        }

        function confirmNewGame() {
            // Apply pending mode switch before closing modal (closeNewGameModal cancels it)
            if (pendingMode) {
                applyModeSwitch();
            }
            closeNewGameModal();
            localStorage.removeItem(LS_KEY + '_' + currentMode);
            initGame(currentMode);
        }

        function closeWinModal() {
            document.getElementById('win-modal').style.display = 'none';
        }

        // --- KEYBOARD SUPPORT ---
        document.addEventListener('keydown', function (e) {
            if (gameOver) return;
            if (e.key === 'Enter' || e.key === 'Return') {
                submitWord();
            } else if (e.key === 'Escape' || e.key === 'Esc') {
                clearSelection();
            }
        });
    </script>
