<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>Notes</title>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="time.js"></script>
    <script src="js/i18n.js"></script>
    <style>
        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: -webkit-optimize-contrast;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            /* Background managed by settings */

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            width: 100%;
            min-height: 90vh;
            max-width: 800px;
            position: relative;
        }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            z-index: 2000;
            transform-origin: top left !important;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
        }

        /* CLOSE BUTTON (HOME) */
        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .icon-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            padding: 0;
            flex-shrink: 0;
        }

        .icon-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* Icon State Toggles */
        .icon-contract {
            display: none;
        }

        .window.fullscreen .icon-expand {
            display: none;
        }

        .window.fullscreen .icon-contract {
            display: inline;
        }

        /* CONTROLS */
        .controls {
            position: absolute;
            right: 35px;
            z-index: 1;
            display: flex;
            align-items: center;
        }

        .controls>*+* {
            margin-left: 10px;
        }

        .title-controls {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 4px 10px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-size: 0.8rem;
        }

        .sys-btn:active,
        .sys-btn.active-format {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .sort-select {
            padding: 3px 5px;
            font-weight: normal;
            border-radius: 0;
            appearance: none;
            -webkit-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="black" height="14" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 2px center;
            padding-right: 20px;
        }

        /* WINDOW CONTENT */
        .window-content {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            background: white;
        }

        /* VIEWS */
        .view {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }

        /* LIST VIEW */
        #list-view {
            padding: 0;
            overflow-y: auto;
        }

        .note-item {
            padding: 15px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .note-item:hover {
            background-color: #eee;
        }

        .note-title {
            font-weight: bold;
            font-size: 1.1rem;
        }

        .note-date {
            font-size: 0.8rem;
            color: #666;
        }

        /* EDITOR VIEW */
        #editor-view {
            display: none;
            flex-direction: column;
        }

        .editor-toolbar {
            padding: 8px;
            border-bottom: 2px solid black;
            display: flex;
            background: #eee;
            flex-shrink: 0;
        }

        .editor-toolbar>*+* {
            margin-left: 10px;
        }

        #note-title-input {
            flex-grow: 1;
            border: 2px solid black;
            padding: 5px;
            font-family: inherit;
            font-weight: bold;
            font-size: 1.1rem;
        }

        #note-content {
            flex-grow: 1;
            width: 100%;
            border: none;
            padding: 20px;
            font-family: "Courier New", Courier, monospace;
            font-size: 1.2rem;
            line-height: 1.5;
            resize: none;
            box-sizing: border-box;
            outline: none;
            overflow-y: auto;
            background: white;
            white-space: pre-wrap;
        }

        #note-content:empty:before {
            content: attr(data-placeholder);
            color: #888;
        }

        /* STATUS BAR */
        #status-bar {
            border-top: 2px solid black;
            padding: 4px;
            font-size: 0.75rem;
            background: #eee;
            text-align: center;
            flex-shrink: 0;
        }

        /* MODAL OVERLAY */
        #modal-overlay {
            display: none;
            position: fixed;
            /* Changed to fixed for fullscreen */
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.9);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 8px 8px 0 black;
            padding: 20px;
            width: 300px;
            text-align: center;
        }

        .modal-buttons {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .modal-buttons>*+* {
            margin-left: 10px;
        }
    </style>
    <script src="theme.js?v=17"></script>
    <script src="time.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/custom-select.js"></script>
    <link rel="stylesheet" href="css/custom-select.css">
</head>

<body>

    <div class="window">
        <!-- PERSISTENT WINDOW HEADER -->
        <div class="title-bar">
            <div class="title-stripes"></div>

            <!-- Home Button -->
            <div class="close-box" onclick="window.location.href='index'">X</div>

            <span class="title-text" data-i18n="notes.title">Notes</span>

            <div class="controls" id="list-controls">
                <select id="sort-select" class="sys-btn sort-select" onchange="changeSortMode(event)" title="Sort Notes">
                    <option value="updated_desc" data-i18n="notes.sort.newest">Newest</option>
                    <option value="updated_asc" data-i18n="notes.sort.oldest">Oldest</option>
                    <option value="alpha_asc" data-i18n="notes.sort.a_z">Title (A-Z)</option>
                    <option value="alpha_desc" data-i18n="notes.sort.z_a">Title (Z-A)</option>
                </select>
                <button class="sys-btn" onclick="createNote()" data-i18n="notes.btn.new">+ New</button>
            </div>
            <div class="title-controls">
                <button class="icon-btn" onclick="toggleFullScreen()" title="Full Screen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="square" stroke-linejoin="miter">
                        <path class="icon-expand" d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"></path>
                        <path class="icon-contract" d="M21 9H15V3M21 3l-6 6M3 15h6v6M3 21l6-6"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="window-content">
            <!-- LIST VIEW -->
            <div id="list-view" class="view">
                <div style="padding:20px; text-align:center; color:#666;" data-i18n="common.loading">Loading notes...
                </div>
            </div>

            <!-- EDITOR VIEW -->
            <div id="editor-view" class="view">
                <div class="editor-toolbar">
                    <button class="sys-btn" onclick="showList()" data-i18n="common.back">Back</button>
                    <input type="text" id="note-title-input" placeholder="Untitled Note" oninput="saveCurrentNote()"
                        data-i18n-placeholder="notes.ph.title">
                    <button class="sys-btn" id="btn-bold" onmousedown="applyFormat(event, 'bold')"
                        ontouchstart="applyFormat(event, 'bold')" title="Bold"><b>B</b></button>
                    <button class="sys-btn" id="btn-italic" onmousedown="applyFormat(event, 'italic')"
                        ontouchstart="applyFormat(event, 'italic')" title="Italic"><i>I</i></button>
                    <button class="sys-btn" id="btn-underline" onmousedown="applyFormat(event, 'underline')"
                        ontouchstart="applyFormat(event, 'underline')" title="Underline"><u>U</u></button>
                    <button class="sys-btn" onclick="downloadTXT()" title="Download TXT" data-i18n-title="notes.btn.txt_title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="square" stroke-linejoin="miter">
                            <path d="M12 2v14M7 11l5 5 5-5M4 22h16"></path>
                        </svg>
                    </button>
                    <button class="sys-btn" onclick="promptDelete()" data-i18n="common.delete">Delete</button>
                </div>
                <div id="note-content" contenteditable="true" data-placeholder="Type here..."
                    oninput="saveCurrentNote()" onkeyup="updateFormatButtons()" onmouseup="updateFormatButtons()"></div>
            </div>
        </div>
        <div id="status-bar" data-i18n="status.guest">Local Mode</div>
    </div>

    <!-- DELETE MODAL -->
    <div id="modal-overlay">
        <div class="modal-box">
            <h3 data-i18n="notes.modal.delete.title">Delete Note?</h3>
            <p data-i18n="notes.modal.delete.desc">Are you sure you want to delete this note?</p>
            <div class="modal-buttons">
                <button class="sys-btn" onclick="confirmDelete()" data-i18n="common.delete">Delete</button>
                <button class="sys-btn" onclick="closeModal()" data-i18n="common.cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE CONFIG ---
        const firebaseConfig = {
            apiKey: "AIzaSyDY7x7vVmlYUyVZNLuCCmIQYa6PWFVfZqQ",
            authDomain: "rekindle-dd1fa.firebaseapp.com",
            projectId: "rekindle-dd1fa",
            storageBucket: "rekindle-dd1fa.firebasestorage.app",
            messagingSenderId: "748026882518",
            appId: "1:748026882518:web:6877dd4329318070c11c77"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Configure for Safari/Mac compatibility (fixes CORS errors)
        if (db.settings) {
            try {
                db.settings({
                    experimentalForceLongPolling: true,
                    merge: true
                });
            } catch (e) { console.warn("Settings error:", e); }
        }

        // Note: Persistence disabled due to IndexedDB hangs on some browsers (Safari)
        // db.enablePersistence({ synchronizeTabs: true }) ...

        // --- STATE ---
        let notes = [];
        const NOTES_CACHE_KEY = 'rekindle_notes_cache';
        let currentNoteId = null;
        let currentUser = null;
        let saveTimer = null;
        let unsubscribe = null; // To handle unsubscription
        let currentSortMode = localStorage.getItem('rekindle_notes_sort') || 'updated_desc';

        // --- INIT ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            if (window.rekindleApplyDefaultFullscreen) window.rekindleApplyDefaultFullscreen();

            // Check for incoming note action
            let pendingNoteContent = null;
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('action') === 'new_note') {
                pendingNoteContent = localStorage.getItem('rekindle_new_note_content');
                localStorage.removeItem('rekindle_new_note_content');
                // Clean URL
                window.history.replaceState({}, document.title, "notes.html");
            }

            // Set initial sort mode in UI
            const sortSelect = document.getElementById('sort-select');
            if (sortSelect) sortSelect.value = currentSortMode;

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    document.getElementById('status-bar').innerText = window.t('status.synced', "Synced: ") + user.email;
                    // Load from cache first for instant display
                    loadCachedNotes();
                    loadCloudNotes();
                } else {
                    document.getElementById('status-bar').innerText = window.t('status.guest', "Guest Mode (Local)");
                    loadLocalNotes();
                }

                if (pendingNoteContent) {
                    createNote(pendingNoteContent);
                }
            });
        };

        // Helper to HTML-escape text
        function escapeHTML(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }




        // --- DATA MANAGEMENT ---

        // --- DATA MANAGEMENT ---

        function loadLocalNotes() {
            // Legacy local storage (guest mode)
            notes = JSON.parse(localStorage.getItem('rekindle_notes')) || [];
            renderList();
        }

        function loadCachedNotes() {
            // Authenticated cache
            try {
                const cached = localStorage.getItem(NOTES_CACHE_KEY);
                if (cached) {
                    notes = JSON.parse(cached);
                    renderList();
                    console.log("Loaded " + notes.length + " notes from cache.");
                }
            } catch (e) { console.error("Cache load error", e); }
        }

        function updateCache() {
            if (!currentUser) return;
            try {
                localStorage.setItem(NOTES_CACHE_KEY, JSON.stringify(notes));
            } catch (e) { console.error("Cache save error", e); }
        }

        function loadCloudNotes() {
            if (unsubscribe) unsubscribe();

            const notesRef = db.collection('users').doc(currentUser.uid).collection('notes');

            // Standard sync: Listen to all changes, but UI is already populated from cache.
            // Using onSnapshot ensures we catch deletions and new additions.
            // The cache gives us the "instant load", Firestore gives us the "sync".

            unsubscribe = notesRef.orderBy('updated', 'desc')
                .onSnapshot((snapshot) => {
                    const cloudNotes = [];
                    snapshot.forEach(doc => {
                        let data = doc.data();
                        data.id = doc.id;
                        cloudNotes.push(data);
                    });

                    if (cloudNotes.length > 0 || snapshot.size === 0) {
                        notes = cloudNotes;
                        updateCache(); // Update cache with fresh source of truth
                        renderList();
                    }
                }, (error) => {
                    console.error("Error getting notes: ", error);
                    document.getElementById('status-bar').innerText = window.t('status.offline', "Offline. Using Cache.");
                    // We already loaded from cache, so just keep showing that.
                });
        }

        function saveNoteData(note) {
            if (!currentUser) {
                localStorage.setItem('rekindle_notes', JSON.stringify(notes));
            } else {
                // Optimistic UI update already happened in array
                updateCache();

                clearTimeout(saveTimer);
                saveTimer = setTimeout(() => {
                    document.getElementById('status-bar').innerText = window.t('notes.status.saving', "Saving...");
                    db.collection('users').doc(currentUser.uid).collection('notes').doc(note.id).set({
                        title: note.title,
                        content: note.content,
                        updated: note.updated
                    }).then(() => {
                        document.getElementById('status-bar').innerText = window.t('notes.status.saved', "Saved.");
                        setTimeout(() => { document.getElementById('status-bar').innerText = window.t('status.synced', "Synced: ") + currentUser.email; }, 2000);
                    }).catch((e) => {
                        document.getElementById('status-bar').innerText = window.t('notes.status.failed', "Save Failed.");
                        console.error(e);
                    });
                }, 1000);
            }
        }

        function deleteNoteData(id) {
            if (!currentUser) {
                notes = notes.filter(n => n.id !== id);
                localStorage.setItem('rekindle_notes', JSON.stringify(notes));
                renderList();
            } else {
                // Optimistic delete
                notes = notes.filter(n => n.id !== id);
                updateCache();
                renderList();

                db.collection('users').doc(currentUser.uid).collection('notes').doc(id).delete().catch(err => {
                    console.error("Delete failed", err);
                    // If failed, re-loading from cloud (next refresh) will restore it, which is acceptable consistency.
                });
            }
        }

        // --- UI LOGIC ---

        function changeSortMode(e) {
            currentSortMode = e.target.value;
            localStorage.setItem('rekindle_notes_sort', currentSortMode);
            renderList();
        }

        function renderList() {
            const container = document.getElementById('list-view');
            container.innerHTML = '';

            if (notes.length === 0) {
                container.innerHTML = `<div style="padding:40px; text-align:center; font-style:italic;">${window.t('notes.empty', 'No notes. Tap "+ New" to write.')}</div>`;
                return;
            }            notes.sort((a, b) => {
                const titleA = (a.title || window.t('notes.label.untitled', 'Untitled')).toLowerCase();
                const titleB = (b.title || window.t('notes.label.untitled', 'Untitled')).toLowerCase();
                
                switch (currentSortMode) {
                    case 'updated_asc':
                        return a.updated - b.updated;
                    case 'alpha_asc':
                        return titleA.localeCompare(titleB);
                    case 'alpha_desc':
                        return titleB.localeCompare(titleA);
                    case 'updated_desc':
                    default:
                        return b.updated - a.updated;
                }
            });

            notes.forEach(note => {
                const div = document.createElement('div');
                div.className = 'note-item';
                div.onclick = () => openNote(note.id);

                // Use formatting helper to ensure timezone respect
                const date = window.rekindleFormatTime ? window.rekindleFormatTime(new Date(note.updated)) : new Date(note.updated).toLocaleDateString();
                const title = note.title || window.t('notes.label.untitled', 'Untitled');

                div.innerHTML = `
                    <span class="note-title">${title}</span>
                    <span class="note-date">${date}</span>
                `;
                container.appendChild(div);
            });
        }

        function createNote(initialContent = '') {
            const newNote = {
                id: currentUser ? db.collection('users').doc().id : Date.now().toString(),
                title: '',
                content: initialContent || '',
                updated: Date.now()
            };

            if (!currentUser) {
                notes.push(newNote);
            }

            saveNoteData(newNote);
            openNote(newNote.id, newNote);
        }

        function openNote(id, noteObj = null) {
            currentNoteId = id;
            const note = noteObj || notes.find(n => n.id === id);

            if (!note) return;

            document.getElementById('note-title-input').value = note.title;
            document.getElementById('note-content').innerHTML = (note.content || '').replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');

            document.getElementById('list-view').style.display = 'none';
            document.getElementById('list-controls').style.display = 'none';
            document.getElementById('editor-view').style.display = 'flex';
        }

        function saveCurrentNote() {
            if (!currentNoteId) return;

            let note = notes.find(n => n.id === currentNoteId);

            if (!note) {
                // Should be in list, if not, recreate obj
                note = { id: currentNoteId };
                // But we need to push it if it's new to the array?
                // createNote() pushes it. openNote() finds it.
                // If deep linking or error, safegaurd:
                if (!notes.find(n => n.id === currentNoteId)) notes.push(note);
            }

            note.title = document.getElementById('note-title-input').value;
            note.content = document.getElementById('note-content').innerHTML;
            note.updated = Date.now();

            saveNoteData(note);
        }

        // --- MODAL LOGIC ---
        function promptDelete() {
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        function confirmDelete() {
            deleteNoteData(currentNoteId);
            closeModal();
            showList();
        }

        function showList() {
            currentNoteId = null;
            document.getElementById('editor-view').style.display = 'none';
            document.getElementById('list-controls').style.display = 'flex';
            document.getElementById('list-view').style.display = 'block';
            renderList();
        }

        function toggleFullScreen() {
            document.querySelector('.window').classList.toggle('fullscreen');
        }

        function applyFormat(e, command) {
            e.preventDefault();
            document.execCommand(command, false, null);
            updateFormatButtons();
        }

        function updateFormatButtons() {
            if (document.getElementById('editor-view').style.display !== 'flex') return;
            const formats = ['bold', 'italic', 'underline'];
            formats.forEach(format => {
                const btn = document.getElementById('btn-' + format);
                if (btn) {
                    if (document.queryCommandState(format)) {
                        btn.classList.add('active-format');
                    } else {
                        btn.classList.remove('active-format');
                    }
                }
            });
        }

        function downloadTXT() {
            if (!currentNoteId) return;
            const note = notes.find(n => n.id === currentNoteId);
            if (!note) return;

            const tempDiv = document.createElement('div');
            tempDiv.innerHTML = note.content;
            
            tempDiv.style.position = 'absolute';
            tempDiv.style.left = '-9999px';
            tempDiv.style.whiteSpace = 'pre-wrap';
            document.body.appendChild(tempDiv);
            
            const textContent = tempDiv.innerText || tempDiv.textContent || "";
            document.body.removeChild(tempDiv);

            const blob = new Blob([textContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = (note.title || window.t('notes.label.untitled', 'Untitled')) + '.txt';
            a.style.display = 'none';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

    </script>
