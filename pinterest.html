<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">
    <title data-i18n="pinterest.title">Pinterest</title>
    <style>
        /* E-INK COMPATIBILITY */
        *,
        *::before,
        *::after {
            transition: none !important;
            animation: none !important;
        }

        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: 90vh;
            width: 100%;
            max-width: 650px;
            position: relative;
        }

        .window.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            width: calc(100vw / var(--rekindle-scale, 1));
            height: calc(100vh / var(--rekindle-scale, 1));
            max-width: none;
            max-height: none;
            border: none;
            box-shadow: none;
            z-index: 2000;
            transform-origin: top left !important;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .title-controls {
            position: absolute;
            right: 10px;
            z-index: 2;
            display: flex;
            align-items: center;
        }

        .icon-btn {
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 2px 2px 0 black;
            padding: 0;
        }

        .icon-btn:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .icon-contract {
            display: none;
        }

        .window.fullscreen .icon-expand {
            display: none;
        }

        .window.fullscreen .icon-contract {
            display: inline;
        }

        .logout-btn {
            margin-right: 8px;
            font-size: 0.8rem;
            padding: 2px 6px;
            border: 2px solid black;
            background: white;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            font-weight: bold;
            font-family: inherit;
        }

        .logout-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        /* CONTENT AREA */
        .content {
            flex-grow: 1;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* APP VIEWS */
        .app-view {
            display: none;
            flex-direction: column;
            height: 100%;
        }

        .scroll-list {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            background: white;
        }

        /* LOGIN VIEW */
        #login-view {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 20px;
            text-align: center;
            overflow-y: auto;
            background: white;
            z-index: 10;
        }

        .login-card {
            border: 2px solid black;
            padding: 30px;
            max-width: 320px;
            width: 100%;
            background: #fafafa;
            box-shadow: 4px 4px 0 #ccc;
        }

        .login-card h2 {
            margin-top: 0;
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            font-size: 1rem;
            margin-top: 10px;
            font-family: inherit;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .sys-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 3px 3px 0 black;
        }

        /* TOOLBAR */
        .toolbar {
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .toolbar input {
            flex-grow: 1;
            border: 2px solid black;
            padding: 8px;
            font-family: inherit;
            font-size: 1rem;
            margin-right: 10px;
            box-sizing: border-box;
        }

        .toolbar .sys-btn {
            margin-top: 0;
            padding: 8px 14px;
            font-size: 0.9rem;
            box-shadow: 2px 2px 0 black;
        }

        .toolbar .sys-btn:active {
            transform: translate(2px, 2px);
        }

        /* PIN CARD */
        .pin-card {
            border-bottom: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .pin-card:active {
            background: black;
            color: white;
        }

        .pin-card:active .pin-title {
            color: white;
        }

        .pin-card:active .pin-desc {
            color: #ddd;
        }

        .pin-card:active .pin-domain {
            color: #ccc;
        }

        .pin-title {
            font-weight: bold;
            font-size: 1rem;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .pin-desc {
            font-size: 0.9rem;
            color: #444;
            line-height: 1.4;
            margin-bottom: 8px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .pin-image {
            max-width: 100%;
            max-height: 120px;
            border: 2px solid black;
            margin-bottom: 8px;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
        }

        .pin-domain {
            font-size: 0.8rem;
            color: #666;
            font-weight: bold;
        }

        /* BOARD CARD */
        .board-card {
            border-bottom: 2px solid black;
            padding: 15px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .board-card:active {
            background: black;
            color: white;
        }

        .board-name {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 4px;
        }

        .board-meta {
            font-size: 0.8rem;
            color: #666;
        }

        .board-card:active .board-meta {
            color: #ccc;
        }

        /* BOARDS GRID */
        #boards-list {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            align-content: flex-start;
        }

        #boards-list .board-card {
            width: calc(50% - 20px);
            margin: 10px;
            border: 2px solid black;
            box-shadow: 3px 3px 0 black;
            min-height: 100px;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        #boards-list .board-card:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        /* PINS GRID (for search + board pins) */
        .pins-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 10px;
            gap: 10px;
            align-content: start;
        }

        .pins-grid .pin-card {
            border: 2px solid black;
            box-shadow: 3px 3px 0 black;
            padding: 10px;
        }

        .pins-grid .pin-card:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        .pins-grid .pin-image {
            width: 100%;
            height: auto;
            max-height: none;
            display: block;
            margin-bottom: 8px;
        }

        .pins-grid .pin-title {
            font-size: 0.9rem;
        }

        .pins-grid .pin-desc {
            display: none;
        }

        /* PROFILE */
        .profile-header {
            padding: 20px;
            border-bottom: 2px solid black;
            background: #fafafa;
            text-align: center;
        }

        .profile-name {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .profile-handle {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 10px;
        }

        .profile-boards-section {
            border-top: 2px solid black;
            padding: 15px;
        }

        .profile-section-title {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        #profile-boards {
            display: flex;
            flex-wrap: wrap;
            padding: 10px;
            align-content: flex-start;
        }

        #profile-boards .board-card {
            width: calc(50% - 20px);
            margin: 10px;
            border: 2px solid black;
            box-shadow: 3px 3px 0 black;
            min-height: 100px;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }

        #profile-boards .board-card:active {
            box-shadow: none;
            transform: translate(3px, 3px);
        }

        /* STATUS MSG */
        .status-msg {
            color: red;
            font-weight: bold;
            margin-top: 10px;
            font-size: 0.9rem;
            min-height: 1.2em;
        }

        /* LOADING */
        .loading {
            padding: 20px;
            text-align: center;
            font-style: italic;
        }

        .empty-msg {
            padding: 30px;
            text-align: center;
            font-style: italic;
            color: #666;
        }

        /* BOTTOM NAV */
        .bottom-nav {
            height: 50px;
            border-top: 2px solid black;
            display: none;
            background: white;
            justify-content: space-around;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-item {
            flex-grow: 1;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-right: 1px solid #ccc;
        }

        .nav-item:last-child {
            border-right: none;
        }

        .nav-item:active,
        .nav-item.active {
            background: #eee;
            box-shadow: inset 2px 2px 5px rgba(0, 0, 0, 0.2);
        }

        .nav-label {
            font-size: 0.8rem;
            font-weight: bold;
        }

        /* SUB HEADER (for back navigation) */
        .sub-header {
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .sub-header .sys-btn {
            margin-top: 0;
            margin-right: 10px;
            padding: 4px 10px;
            font-size: 0.8rem;
            box-shadow: 2px 2px 0 black;
        }

        .sub-header .sys-btn:active {
            transform: translate(2px, 2px);
        }

        .sub-header-title {
            font-weight: bold;
            font-size: 1rem;
        }

        /* LOAD MORE */
        .load-more-wrap {
            width: 100%;
            padding: 10px;
            box-sizing: border-box;
        }

        .load-more-btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: white;
            border: 2px solid black;
            box-shadow: 2px 2px 0 black;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
        }

        .load-more-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .load-more-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: 2px 2px 0 black;
        }

        /* PIN DETAIL */
        .pin-detail-image {
            max-width: 100%;
            max-height: 300px;
            border: 2px solid black;
            margin-bottom: 12px;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
        }

        .pin-detail-title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        .pin-detail-desc {
            font-size: 0.95rem;
            color: #333;
            line-height: 1.5;
            margin-bottom: 12px;
            white-space: pre-wrap;
        }

        .pin-detail-source {
            font-size: 0.85rem;
            color: #555;
            margin-bottom: 8px;
        }

        /* SAVE MODAL */
        .save-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .save-modal-box {
            background: white;
            border: 2px solid black;
            box-shadow: 4px 4px 0 black;
            width: 90%;
            max-width: 400px;
            max-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        .save-modal-title {
            padding: 12px;
            border-bottom: 2px solid black;
            font-weight: bold;
            font-size: 1rem;
        }

        .save-modal-list {
            overflow-y: auto;
            flex: 1;
        }

        .save-modal-item {
            padding: 12px;
            border-bottom: 1px solid #ccc;
            cursor: pointer;
            font-size: 0.95rem;
        }

        .save-modal-item:active {
            background: black;
            color: white;
        }

        .save-modal-close {
            padding: 10px;
            border-top: 2px solid black;
            text-align: center;
        }

        .pin-detail-actions {
            margin-top: 12px;
        }

        .pin-detail-actions .sys-btn {
            margin-right: 8px;
            margin-bottom: 8px;
        }


    </style>

    <!-- Firebase for Pro Gate -->
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script src="theme.js?v=18"></script>
    <script src="pro-gate.js"></script>
    <script src="js/i18n.js"></script>
</head>

<body>
    <div class="window">
        <!-- TITLE BAR -->
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="pinterest.title">Pinterest</span>
            <div class="title-controls">
                <button id="logout-btn" class="logout-btn" onclick="app.logout()" style="display:none;"
                    data-i18n="pinterest.logout.btn">Disconnect</button>
                <button class="icon-btn" onclick="app.toggleFullScreen()" title="Full Screen">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"
                        stroke-linecap="square" stroke-linejoin="miter">
                        <path class="icon-expand" d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"></path>
                        <path class="icon-contract" d="M21 9H15V3M21 3l-6 6M3 15h6v6M3 21l6-6"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="content">
            <!-- LOGIN VIEW -->
            <div id="login-view">
                <div class="login-card">
                    <h2 data-i18n="pinterest.login.title">Pinterest</h2>
                    <p data-i18n="pinterest.login.desc" style="font-size:0.9rem; margin-bottom:20px;">Connect your
                        Pinterest account to browse ideas, search pins, and view your boards.</p>
                    <button class="sys-btn" onclick="app.connect()" data-i18n="pinterest.login.btn">Connect
                        Pinterest</button>
                    <div id="login-status" class="status-msg"></div>
                </div>
            </div>

            <!-- SAVED VIEW -->
            <div id="saved-view" class="app-view">
                <div class="toolbar">
                    <input type="text" id="saved-search-input" data-i18n-placeholder="pinterest.search.placeholder"
                        placeholder="Search your pins..." onkeypress="app.handleSavedSearchKey(event)">
                    <button class="sys-btn" onclick="app.performSavedSearch()"
                        data-i18n="pinterest.search.btn">Search</button>
                    <button class="sys-btn" id="saved-clear-btn" onclick="app.clearSavedSearch()"
                        style="display:none;margin-left:8px;" data-i18n="pinterest.search.clear">Clear</button>
                </div>
                <div id="saved-results" class="scroll-list">
                    <div class="loading" data-i18n="pinterest.loading">Loading...</div>
                </div>
            </div>

            <!-- BOARDS VIEW -->
            <div id="boards-view" class="app-view">
                <div id="boards-list" class="scroll-list">
                    <div class="loading" data-i18n="pinterest.loading">Loading...</div>
                </div>
            </div>

            <!-- BOARD PINS VIEW -->
            <div id="board-pins-view" class="app-view">
                <div class="sub-header">
                    <button class="sys-btn" onclick="app.showBoards()">&lt; Back</button>
                    <span id="board-pins-title" class="sub-header-title">Board</span>
                </div>
                <div id="board-pins-list" class="scroll-list"></div>
            </div>

            <!-- PIN DETAIL VIEW -->
            <div id="pin-detail-view" class="app-view">
                <div class="sub-header">
                    <button class="sys-btn" onclick="app.hidePinDetail()">&lt; Back</button>
                    <span class="sub-header-title" data-i18n="pinterest.pin.detail.title">Pin</span>
                </div>
                <div id="pin-detail-container" class="scroll-list"></div>
            </div>

            <!-- PROFILE VIEW -->
            <div id="profile-view" class="app-view">
                <div id="profile-container" class="scroll-list">
                    <div class="profile-header">
                        <div id="profile-name" class="profile-name">User</div>
                        <div id="profile-handle" class="profile-handle">@user</div>
                        <button class="sys-btn" onclick="app.logout()"
                            data-i18n="pinterest.logout.btn">Disconnect</button>
                    </div>
                    <div class="profile-boards-section">
                        <div id="profile-boards"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <div id="bottom-nav" class="bottom-nav">
            <div class="nav-item active" onclick="app.switchTab('saved')">
                <span class="nav-label" data-i18n="pinterest.tab.saved">Saved</span>
            </div>
            <div class="nav-item" onclick="app.switchTab('profile')">
                <span class="nav-label" data-i18n="pinterest.tab.profile">Boards</span>
            </div>
        </div>

        <!-- SAVE MODAL -->
        <div id="save-modal" class="save-modal">
            <div class="save-modal-box">
                <div class="save-modal-title" data-i18n="pinterest.save.title">Save to Board</div>
                <div id="save-boards-list" class="save-modal-list"></div>
                <div class="save-modal-close">
                    <button class="sys-btn" onclick="app.hideSavePicker()" data-i18n="pinterest.save.cancel">Cancel</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIG ---
        // Replace with your Pinterest App ID from https://developers.pinterest.com
        const PINTEREST_CLIENT_ID = "1574822";
        const WORKER_BASE = "https://rekindle-pinterest.timjarnott.workers.dev";
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        const app = {
            token: null,
            refreshToken: null,
            tokenExpiry: 0,
            currentTab: 'search',
            currentBoardId: null,
            currentBoardName: '',
            savedBookmark: '',
            boardPinsBookmark: '',
            savedPinMap: {},
            pendingSavePinId: null,
            savedSearchQuery: '',

            init() {
                if (window.I18n) window.I18n.init();
                if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
                if (window.rekindleApplyScale) window.rekindleApplyScale();

                // Check for OAuth callback
                const urlParams = new URLSearchParams(window.location.search);
                const code = urlParams.get('code');
                const state = urlParams.get('state');
                const error = urlParams.get('error');

                if (error) {
                    document.getElementById('login-status').textContent = "Connection cancelled or failed.";
                    this.showLogin();
                    return;
                }

                if (code) {
                    // Verify state
                    const savedState = localStorage.getItem('pinterest_oauth_state');
                    if (savedState && savedState !== state) {
                        document.getElementById('login-status').textContent = "Security error: state mismatch.";
                        this.showLogin();
                        return;
                    }
                    localStorage.removeItem('pinterest_oauth_state');
                    this.exchangeCode(code);
                    return;
                }

                // Check for saved token
                const savedToken = localStorage.getItem('pinterest_access_token');
                const savedRefresh = localStorage.getItem('pinterest_refresh_token');
                const savedExpiry = localStorage.getItem('pinterest_token_expiry');

                if (savedToken) {
                    this.token = savedToken;
                    this.refreshToken = savedRefresh;
                    this.tokenExpiry = parseInt(savedExpiry || '0', 10);

                    // Refresh if expired or about to expire (within 5 min)
                    if (this.tokenExpiry && Date.now() >= this.tokenExpiry - 300000) {
                        this.doRefresh();
                    } else {
                        this.showApp();
                    }
                } else {
                    this.showLogin();
                }
            },

            // --- OAuth Flow ---
            connect() {
                if (PINTEREST_CLIENT_ID === "YOUR_PINTEREST_APP_ID") {
                    document.getElementById('login-status').textContent = "App not configured. Set PINTEREST_CLIENT_ID.";
                    return;
                }

                const state = this.randomString(32);
                localStorage.setItem('pinterest_oauth_state', state);

                const scopes = "pins:read boards:read user_accounts:read pins:read_secret boards:read_secret pins:write boards:write";
                const authUrl = `https://www.pinterest.com/oauth/?client_id=${PINTEREST_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=code&scope=${encodeURIComponent(scopes)}&state=${state}`;

                window.location.href = authUrl;
            },

            async exchangeCode(code) {
                const statusEl = document.getElementById('login-status');
                statusEl.textContent = "Connecting...";

                try {
                    const res = await fetch(`${WORKER_BASE}/oauth`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ code, redirect_uri: REDIRECT_URI })
                    });

                    const data = await res.json();

                    if (data.access_token) {
                        this.token = data.access_token;
                        this.refreshToken = data.refresh_token;
                        // Pinterest tokens expire in 30 days; use expires_in if provided
                        const expiresIn = data.expires_in || (30 * 24 * 60 * 60);
                        this.tokenExpiry = Date.now() + (expiresIn * 1000);

                        localStorage.setItem('pinterest_access_token', this.token);
                        localStorage.setItem('pinterest_refresh_token', this.refreshToken || '');
                        localStorage.setItem('pinterest_token_expiry', this.tokenExpiry.toString());

                        // Clean URL
                        window.history.replaceState({}, document.title, window.location.pathname);
                        this.showApp();
                    } else {
                        statusEl.textContent = data.error_description || data.error || "Connection failed.";
                    }
                } catch (e) {
                    statusEl.textContent = "Network error. Please try again.";
                }
            },

            async doRefresh() {
                if (!this.refreshToken) {
                    this.logout();
                    return;
                }
                try {
                    const res = await fetch(`${WORKER_BASE}/refresh`, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ refresh_token: this.refreshToken })
                    });
                    const data = await res.json();
                    if (data.access_token) {
                        this.token = data.access_token;
                        const expiresIn = data.expires_in || (30 * 24 * 60 * 60);
                        this.tokenExpiry = Date.now() + (expiresIn * 1000);
                        localStorage.setItem('pinterest_access_token', this.token);
                        localStorage.setItem('pinterest_token_expiry', this.tokenExpiry.toString());
                        if (data.refresh_token) {
                            this.refreshToken = data.refresh_token;
                            localStorage.setItem('pinterest_refresh_token', this.refreshToken);
                        }
                        this.showApp();
                    } else {
                        this.logout();
                    }
                } catch (e) {
                    this.logout();
                }
            },

            // --- UI Navigation ---
            showLogin() {
                document.getElementById('login-view').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'none';
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('logout-btn').style.display = 'none';
            },

            showApp() {
                document.getElementById('login-view').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'flex';
                document.getElementById('logout-btn').style.display = 'inline-block';
                this.switchTab('saved');
            },

            switchTab(tabName) {
                this.currentTab = tabName;

                document.querySelectorAll('.nav-item').forEach(t => t.classList.remove('active'));
                const tabs = ['saved', 'profile'];
                const idx = tabs.indexOf(tabName);
                if (idx >= 0) document.querySelectorAll('.nav-item')[idx].classList.add('active');

                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('login-view').style.display = 'none';

                document.querySelector('.window').classList.toggle('fullscreen');
            },

            logout() {
                this.token = null;
                this.refreshToken = null;
                this.tokenExpiry = 0;
                this.savedBookmark = '';
                this.boardPinsBookmark = '';
                localStorage.removeItem('pinterest_access_token');
                localStorage.removeItem('pinterest_refresh_token');
                localStorage.removeItem('pinterest_token_expiry');
                document.getElementById('boards-list').dataset.loaded = 'false';
                document.getElementById('saved-results').dataset.loaded = 'false';
                this.showLogin();
            },

            // --- API Helpers ---
            async apiGet(endpoint, params = {}) {
                if (!this.token) throw new Error("Not authenticated");

                const url = new URL(`${WORKER_BASE}/api${endpoint}`);
                Object.entries(params).forEach(([k, v]) => url.searchParams.append(k, v));

                let lastError;
                for (let attempt = 0; attempt < 3; attempt++) {
                    try {
                        const res = await fetch(url.toString(), {
                            headers: { "Authorization": `Bearer ${this.token}` }
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            throw new Error(data.message || data.error || `HTTP ${res.status}`);
                        }
                        return data;
                    } catch (e) {
                        lastError = e;
                        if (attempt < 2) {
                            await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
                        }
                    }
                }
                throw lastError;
            },

            async apiPost(endpoint, body) {
                if (!this.token) throw new Error("Not authenticated");

                const url = `${WORKER_BASE}/api${endpoint}`;
                let lastError;
                for (let attempt = 0; attempt < 3; attempt++) {
                    try {
                        const res = await fetch(url, {
                            method: "POST",
                            headers: {
                                "Authorization": `Bearer ${this.token}`,
                                "Content-Type": "application/json"
                            },
                            body: JSON.stringify(body)
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            throw new Error(data.message || data.error || `HTTP ${res.status}`);
                        }
                        return data;
                    } catch (e) {
                        lastError = e;
                        if (attempt < 2) {
                            await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
                        }
                    }
                }
                throw lastError;
            },

            async apiDelete(endpoint) {
                if (!this.token) throw new Error("Not authenticated");

                const url = `${WORKER_BASE}/api${endpoint}`;
                let lastError;
                for (let attempt = 0; attempt < 3; attempt++) {
                    try {
                        const res = await fetch(url, {
                            method: "DELETE",
                            headers: {
                                "Authorization": `Bearer ${this.token}`,
                                "Content-Type": "application/json"
                            }
                        });
                        const data = await res.json();
                        if (!res.ok) {
                            throw new Error(data.message || data.error || `HTTP ${res.status}`);
                        }
                        return data;
                    } catch (e) {
                        lastError = e;
                        if (attempt < 2) {
                            await new Promise(r => setTimeout(r, 800 * (attempt + 1)));
                        }
                    }
                }
                throw lastError;
            },

            // --- Saved Pins ---
            async loadSaved() {
                const container = document.getElementById('saved-results');
                if (container.dataset.loaded === 'true' && !this.savedSearchQuery) return;

                container.innerHTML = '<div class="loading">Loading saved pins...</div>';
                this.savedBookmark = '';
                this.savedSearchQuery = '';
                document.getElementById('saved-search-input').value = '';
                document.getElementById('saved-clear-btn').style.display = 'none';

                try {
                    const data = await this.apiGet('/pins', { page_size: 20 });
                    this.savedBookmark = data.bookmark || '';
                    this.renderPins(data.items || [], container, false);
                    this.renderLoadMore(container, 'saved');
                    container.dataset.loaded = 'true';
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            handleSavedSearchKey(e) {
                if (e.key === 'Enter') this.performSavedSearch();
            },

            async performSavedSearch() {
                const query = document.getElementById('saved-search-input').value.trim();
                if (!query) return;

                this.savedSearchQuery = query;
                const container = document.getElementById('saved-results');
                container.innerHTML = '<div class="loading">Searching...</div>';
                document.getElementById('saved-clear-btn').style.display = 'inline-block';

                try {
                    const data = await this.apiGet('/search/pins', { query: query, page_size: 20, topic_based: true });
                    this.savedBookmark = data.bookmark || '';
                    this.renderPins(data.items || [], container, false);
                    this.renderLoadMore(container, 'saved');
                } catch (e) {
                    let msg = this.escapeHtml(e.message);
                    container.innerHTML = `<div class="empty-msg">Error: ${msg}</div>`;
                }
            },

            clearSavedSearch() {
                document.getElementById('saved-search-input').value = '';
                document.getElementById('saved-clear-btn').style.display = 'none';
                this.savedSearchQuery = '';
                document.getElementById('saved-results').dataset.loaded = 'false';
                this.loadSaved();
            },

            async loadMoreSaved() {
                if (!this.savedBookmark) return;
                const btn = document.getElementById('load-more-saved');
                if (btn) btn.disabled = true;
                try {
                    let data;
                    if (this.savedSearchQuery) {
                        data = await this.apiGet('/search/pins', { query: this.savedSearchQuery, page_size: 20, bookmark: this.savedBookmark, topic_based: true });
                    } else {
                        data = await this.apiGet('/pins', { page_size: 20, bookmark: this.savedBookmark });
                    }
                    this.savedBookmark = data.bookmark || '';
                    const container = document.getElementById('saved-results');
                    this.renderPins(data.items || [], container, true);
                    this.renderLoadMore(container, 'saved');
                } catch (e) {
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Error. Try Again';
                    }
                }
            },

            // --- Boards ---
            async loadBoards() {
                const container = document.getElementById('boards-list');
                if (container.dataset.loaded === 'true') return;

                container.innerHTML = '<div class="loading">Loading boards...</div>';

                try {
                    const data = await this.apiGet('/boards', { page_size: 50 });
                    this.renderBoards(data.items || [], container);
                    container.dataset.loaded = 'true';
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            renderBoards(boards, container) {
                container.innerHTML = '';

                if (boards.length === 0) {
                    container.innerHTML = '<div class="empty-msg" data-i18n="pinterest.boards.empty">No boards found.</div>';
                    return;
                }

                boards.forEach(board => {
                    const el = document.createElement('div');
                    el.className = 'board-card';

                    let coverHtml = '';
                    if (board.media && board.media.pin_thumbnail_urls && board.media.pin_thumbnail_urls[0]) {
                        coverHtml = `<img src="${this.escapeHtml(board.media.pin_thumbnail_urls[0])}" style="width:100%;height:60px;object-fit:cover;border:1px solid black;margin-bottom:8px;image-rendering:pixelated;" alt="">`;
                    }

                    el.innerHTML = `
                        ${coverHtml}
                        <div class="board-name">${this.escapeHtml(board.name || 'Untitled')}</div>
                        <div class="board-meta">${board.pin_count || 0} pins &middot; ${this.escapeHtml(board.privacy || 'Public')}</div>
                    `;
                    el.onclick = () => this.loadBoardPins(board.id, board.name);
                    container.appendChild(el);
                });
            },

            async loadBoardPins(boardId, boardName) {
                this.currentBoardId = boardId;
                this.currentBoardName = boardName;
                this.boardPinsBookmark = '';
                document.getElementById('board-pins-title').textContent = this.escapeHtml(boardName || 'Board');

                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('board-pins-view').style.display = 'flex';

                const container = document.getElementById('board-pins-list');
                container.innerHTML = '<div class="loading">Loading pins...</div>';

                try {
                    const data = await this.apiGet(`/boards/${boardId}/pins`, { page_size: 25 });
                    this.boardPinsBookmark = data.bookmark || '';
                    this.renderPins(data.items || [], container, false);
                    this.renderLoadMore(container, 'board');
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            async loadMoreBoardPins() {
                if (!this.boardPinsBookmark || !this.currentBoardId) return;
                const btn = document.getElementById('load-more-board');
                if (btn) btn.disabled = true;
                try {
                    const data = await this.apiGet(`/boards/${this.currentBoardId}/pins`, { page_size: 25, bookmark: this.boardPinsBookmark });
                    this.boardPinsBookmark = data.bookmark || '';
                    const container = document.getElementById('board-pins-list');
                    this.renderPins(data.items || [], container, true);
                    this.renderLoadMore(container, 'board');
                } catch (e) {
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Error. Try Again';
                    }
                }
            },

            showBoards() {
                this.currentBoardId = null;
                this.currentBoardName = '';
                document.getElementById('board-pins-view').style.display = 'none';
                document.getElementById('profile-view').style.display = 'flex';
            },

            // --- Pin Rendering ---
            renderPins(pins, container, append) {
                if (!append) {
                    container.innerHTML = '';
                    container.classList.add('pins-grid');
                }

                if (pins.length === 0 && !append) {
                    container.innerHTML = '<div class="empty-msg">No pins found.</div>';
                    return;
                }

                pins.forEach(pin => {
                    const el = document.createElement('div');
                    el.className = 'pin-card';

                    let imgHtml = '';
                    const imgObj = this.getPinImage(pin, '600x') || this.getPinImage(pin, '400x') || this.getPinImage(pin, '150x');
                    if (imgObj) {
                        imgHtml = `<img class="pin-image" src="${this.escapeHtml(imgObj.url)}" alt="${this.escapeHtml(pin.alt_text || pin.title || '')}" loading="lazy">`;
                    }

                    const title = pin.title || 'Untitled Pin';
                    const domain = pin.link ? this.getDomain(pin.link) : '';

                    el.innerHTML = `
                        ${imgHtml}
                        <div class="pin-title">${this.escapeHtml(title)}</div>
                        ${domain ? `<div class="pin-domain">${this.escapeHtml(domain)}</div>` : ''}
                    `;

                    el.onclick = () => this.showPinDetail(pin);
                    container.appendChild(el);
                });
            },

            getPinImage(pin, size) {
                if (pin && pin.media && pin.media.images && pin.media.images[size]) {
                    return pin.media.images[size];
                }
                return null;
            },

            getDomain(url) {
                try {
                    return new URL(url).hostname.replace('www.', '');
                } catch (e) {
                    return '';
                }
            },

            renderLoadMore(container, type) {
                const existing = container.querySelector('.load-more-wrap');
                if (existing) existing.remove();

                let hasMore = false;
                if (type === 'saved' && this.savedBookmark) hasMore = true;
                if (type === 'board' && this.boardPinsBookmark) hasMore = true;

                if (!hasMore) return;

                const wrap = document.createElement('div');
                wrap.className = 'load-more-wrap';
                const btn = document.createElement('button');
                btn.className = 'load-more-btn';
                btn.id = 'load-more-' + type;
                btn.textContent = 'Load More';
                if (type === 'saved') btn.onclick = () => this.loadMoreSaved();
                if (type === 'board') btn.onclick = () => this.loadMoreBoardPins();
                wrap.appendChild(btn);
                container.appendChild(wrap);
            },

            // --- Pin Detail ---
            showPinDetail(pin) {
                const container = document.getElementById('pin-detail-container');
                container.innerHTML = '<div class="loading">Loading...</div>';
                document.querySelectorAll('.app-view').forEach(v => v.style.display = 'none');
                document.getElementById('pin-detail-view').style.display = 'flex';
                document.getElementById('bottom-nav').style.display = 'none';

                const title = pin.title || 'Untitled Pin';
                const imgObj = this.getPinImage(pin, '1200x') || this.getPinImage(pin, '600x') || this.getPinImage(pin, '400x') || this.getPinImage(pin, '150x');
                const domain = pin.link ? this.getDomain(pin.link) : '';

                let imgHtml = '';
                if (imgObj) {
                    imgHtml = `<img class="pin-detail-image" src="${this.escapeHtml(imgObj.url)}" alt="${this.escapeHtml(pin.alt_text || title || '')}">`;
                }

                let descHtml = '';
                if (pin.description) {
                    descHtml = `<div class="pin-detail-desc">${this.escapeHtml(pin.description)}</div>`;
                }

                let linkHtml = '';
                if (pin.link) {
                    linkHtml = `
                        <div class="pin-detail-source">
                            <span data-i18n="pinterest.pin.source">Source:</span>
                            <a href="${this.escapeHtml(pin.link)}" target="_blank" style="color:#000;text-decoration:underline;word-break:break-all;">${this.escapeHtml(domain || pin.link)}</a>
                        </div>
                        <a href="${this.escapeHtml(pin.link)}" target="_blank" class="sys-btn" style="display:inline-block;text-decoration:none;margin-top:10px;" data-i18n="pinterest.pin.open">Open Source</a>
                    `;
                }

                const isSaved = !!this.savedPinMap[pin.id];
                const saveBtnHtml = `<button id="pin-detail-save-btn" class="sys-btn" style="margin-top:10px;" data-i18n="${isSaved ? 'pinterest.pin.unsave' : 'pinterest.pin.save'}">${isSaved ? 'Unsave' : 'Save'}</button>`;

                container.innerHTML = `
                    <div style="padding:15px;">
                        ${imgHtml}
                        <div class="pin-detail-title">${this.escapeHtml(title)}</div>
                        ${descHtml}
                        <div class="pin-detail-actions">
                            ${saveBtnHtml}
                            ${linkHtml}
                        </div>
                    </div>
                `;

                const saveBtn = document.getElementById('pin-detail-save-btn');
                if (saveBtn) {
                    saveBtn.onclick = () => this.handleSaveClick(pin.id);
                }
            },

            handleSaveClick(pinId) {
                if (this.savedPinMap[pinId]) {
                    this.unsavePin(pinId);
                } else {
                    this.showSavePicker(pinId);
                }
            },

            async showSavePicker(pinId) {
                this.pendingSavePinId = pinId;
                const container = document.getElementById('save-boards-list');
                container.innerHTML = '<div class="loading">Loading boards...</div>';
                document.getElementById('save-modal').style.display = 'flex';

                try {
                    const data = await this.apiGet('/boards', { page_size: 50 });
                    this.renderSaveBoards(data.items || [], container);
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            hideSavePicker() {
                document.getElementById('save-modal').style.display = 'none';
                this.pendingSavePinId = null;
            },

            renderSaveBoards(boards, container) {
                container.innerHTML = '';
                if (boards.length === 0) {
                    container.innerHTML = '<div class="empty-msg" data-i18n="pinterest.boards.empty">No boards found.</div>';
                    return;
                }
                boards.forEach(board => {
                    const el = document.createElement('div');
                    el.className = 'save-modal-item';
                    el.textContent = board.name || 'Untitled';
                    el.onclick = () => this.doSave(this.pendingSavePinId, board.id);
                    container.appendChild(el);
                });
            },

            async doSave(pinId, boardId) {
                const container = document.getElementById('save-boards-list');
                container.innerHTML = '<div class="loading">Saving...</div>';
                try {
                    const data = await this.apiPost(`/pins/${pinId}/save`, { board_id: boardId });
                    this.savedPinMap[pinId] = data.id;
                    this.hideSavePicker();
                    this.refreshSaveButton(pinId);
                } catch (e) {
                    let msg = this.escapeHtml(e.message);
                    if (msg.indexOf("token does not have sufficient permissions") !== -1 || msg.indexOf("Missing:") !== -1) {
                        msg += '. Please disconnect and reconnect Pinterest to update permissions.';
                    }
                    container.innerHTML = `<div class="empty-msg">Error: ${msg}</div><button class="sys-btn" onclick="app.logout()" style="margin-top:10px;" data-i18n="pinterest.logout.btn">Disconnect</button>`;
                }
            },

            async unsavePin(pinId) {
                const savedId = this.savedPinMap[pinId];
                if (!savedId) return;
                try {
                    await this.apiDelete(`/pins/${savedId}`);
                    delete this.savedPinMap[pinId];
                    this.refreshSaveButton(pinId);
                } catch (e) {
                    const container = document.getElementById('pin-detail-container');
                    const errDiv = document.createElement('div');
                    errDiv.className = 'empty-msg';
                    errDiv.textContent = 'Error: ' + e.message;
                    container.appendChild(errDiv);
                }
            },

            refreshSaveButton(pinId) {
                const btn = document.getElementById('pin-detail-save-btn');
                if (!btn) return;
                const isSaved = !!this.savedPinMap[pinId];
                btn.textContent = isSaved ? 'Unsave' : 'Save';
                btn.setAttribute('data-i18n', isSaved ? 'pinterest.pin.unsave' : 'pinterest.pin.save');
            },

            hidePinDetail() {
                document.getElementById('pin-detail-view').style.display = 'none';
                document.getElementById('bottom-nav').style.display = 'flex';

                if (this.currentTab === 'saved') {
                    document.getElementById('saved-view').style.display = 'flex';
                } else if (this.currentTab === 'profile') {
                    if (this.currentBoardId) {
                        document.getElementById('board-pins-view').style.display = 'flex';
                    } else {
                        document.getElementById('profile-view').style.display = 'flex';
                    }
                }
            },

            // --- Profile ---
            async loadProfile() {
                const container = document.getElementById('profile-container');

                try {
                    const data = await this.apiGet('/user_account');
                    const username = data.username || 'User';
                    const profileImage = data.profile_image || '';

                                ${data.board_count != null ? `<div style="margin:0 10px;"><strong>${data.board_count}</strong><br>Boards</div>` : ''}
                                ${data.pin_count != null ? `<div style="margin:0 10px;"><strong>${data.pin_count}</strong><br>Pins</div>` : ''}
                                ${data.follower_count != null ? `<div style="margin:0 10px;"><strong>${data.follower_count}</strong><br>Followers</div>` : ''}
                            </div>
                        `;
                    }

                    let imgHtml = '';
                    if (profileImage) {
                        imgHtml = `<img src="${this.escapeHtml(profileImage)}" style="width:80px;height:80px;border:2px solid black;border-radius:50%;margin-bottom:10px;background:#ccc;object-fit:cover;image-rendering:pixelated;" alt="Profile">`;
                    }

                    let aboutHtml = '';
                    if (about) {
                        aboutHtml = `<div style="margin-top:10px;font-size:0.9rem;color:#444;max-width:300px;margin-left:auto;margin-right:auto;">${this.escapeHtml(about)}</div>`;
                    }

                    let websiteHtml = '';
                    if (website) {
                        websiteHtml = `<div style="margin-top:8px;font-size:0.85rem;"><a href="${this.escapeHtml(website)}" target="_blank" style="color:#000;text-decoration:underline;">${this.escapeHtml(website.replace(/^https?:\/\//, ''))}</a></div>`;
                    }

                    container.innerHTML = `
                        <div class="profile-header">
                            ${imgHtml}
                            <div class="profile-name">${this.escapeHtml(username)}</div>
                            <div class="profile-handle">@${this.escapeHtml(username)}</div>
                            ${aboutHtml}
                            ${websiteHtml}
                            ${statsHtml}
                            <button class="sys-btn" onclick="app.logout()" data-i18n="pinterest.logout.btn" style="margin-top:15px;">Disconnect</button>
                        </div>
                        <div class="profile-boards-section">
                            <div id="profile-boards"></div>
                        </div>
                    `;

                    this.loadProfileBoards();
                } catch (e) {
                    container.innerHTML = `
                        <div class="profile-header">
                            <div class="profile-name">User</div>
                            <div class="profile-handle">@user</div>
                            <div style="margin-top:10px;color:red;font-size:0.85rem;">Failed to load profile.<br>${this.escapeHtml(e.message)}</div>
                            <button class="sys-btn" onclick="app.logout()" data-i18n="pinterest.logout.btn" style="margin-top:15px;">Disconnect</button>
                        </div>
                    `;
                }
            },

            async loadProfileBoards() {
                const container = document.getElementById('profile-boards');
                if (!container) return;
                container.innerHTML = '<div class="loading">Loading boards...</div>';
                try {
                    const data = await this.apiGet('/boards', { page_size: 50 });
                    this.renderBoards(data.items || [], container);
                } catch (e) {
                    container.innerHTML = `<div class="empty-msg">Error: ${this.escapeHtml(e.message)}</div>`;
                }
            },

            // --- Utilities ---
            escapeHtml(text) {
                if (!text) return '';
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            },

            randomString(len) {
                const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
                let result = '';
                for (let i = 0; i < len; i++) {
                    result += chars.charAt(Math.floor(Math.random() * chars.length));
                }
                return result;
            }
        };

        // --- Init ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            if (window.rekindleApplyScale) window.rekindleApplyScale();
            if (window.rekindleAutoDetectScale) window.rekindleAutoDetectScale();
            if (window.rekindleApplyDefaultFullscreen) window.rekindleApplyDefaultFullscreen();

            if (window.rekindleProGate) {
                window.rekindleProGate.check(isPro => {
                    if (isPro) {
                        app.init();
                    }
                });
            } else {
                app.init();
            }
        };
    </script>
</body>

</html>
