<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>Crossy</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="js/i18n.js"></script>

    <style>
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
            --rekindle-scale: 1;
        }

        * {
            transition: none !important;
            animation: none !important;
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: -moz-crisp-edges;
            image-rendering: -o-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -ms-interpolation-mode: nearest-neighbor;

            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
            background-color: #e5e5e5;

            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
            touch-action: none;
        }

        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 560px;
            min-height: fit-content;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            zoom: 1 !important;
            transform: none !important;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
            zoom: var(--rekindle-scale, 1);
        }

        @supports not (zoom: 1) {
            .title-bar {
                transform: scale(var(--rekindle-scale, 1));
                transform-origin: top center;
            }
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        .leaderboard-btn {
            position: absolute;
            right: 10px;
            z-index: 2;
            cursor: pointer;
            background: white;
            border: 2px solid black;
            padding: 2px 8px;
            font-size: 0.75rem;
            font-weight: bold;
            box-shadow: 2px 2px 0 black;
            font-family: inherit;
            text-transform: uppercase;
        }

        .leaderboard-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .window-content {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            position: relative;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 320px;
            margin-bottom: 12px;
            font-family: "Courier New", monospace;
            font-weight: bold;
            font-size: 1rem;
            border: 2px solid black;
            padding: 8px 12px;
            box-shadow: 3px 3px 0 black;
            background: white;
            box-sizing: border-box;
        }

        canvas {
            border: 4px solid black;
            background-color: #fff;
            display: block;
            image-rendering: pixelated;
            width: 100%;
            max-width: 512px;
            height: auto;
            box-shadow: 4px 4px 0 black;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            margin-top: 15px;
            width: 100%;
            max-width: 200px;
        }

        .ctrl-btn {
            aspect-ratio: 1/1;
            background: white;
            border: 2px solid black;
            font-size: 1.5rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 3px 3px 0 black;
            border-radius: 6px;
            user-select: none;
        }

        .ctrl-btn:active {
            background: black;
            color: white;
            transform: translate(2px, 2px);
            box-shadow: none;
        }

        .btn-up {
            grid-column: 2;
            grid-row: 1;
        }

        .btn-left {
            grid-column: 1;
            grid-row: 2;
        }

        .btn-down {
            grid-column: 2;
            grid-row: 2;
        }

        .btn-right {
            grid-column: 3;
            grid-row: 2;
        }

        #game-over,
        #leaderboard-modal,
        #start-game-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            border: 4px double black;
            padding: 20px;
            text-align: center;
            display: none;
            z-index: 10;
            width: 80%;
            max-width: 300px;
            box-shadow: 8px 8px 0 rgba(0, 0, 0, 0.5);
        }

        .sys-btn {
            background: white;
            border: 2px solid black;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(2px, 2px);
        }

        .lb-list {
            text-align: left;
            margin-top: 10px;
            margin-bottom: 10px;
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        .lb-row {
            display: flex;
            justify-content: space-between;
            padding: 5px;
            border-bottom: 1px solid #eee;
            font-family: "Courier New", monospace;
            font-size: 0.9rem;
        }

        .lb-row.me {
            background: black;
            color: white;
        }

        .help-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 10px;
            color: #333;
        }
    </style>
    <script src="theme.js?v=18"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="crossy.title">Crossy</span>
            <button class="leaderboard-btn" onclick="openLeaderboard()"
                data-i18n="crossy.btn.leaderboard">Leaderboard</button>
        </div>

        <div class="window-content">
            <div class="score-board">
                <span><span data-i18n="crossy.label.score">Score</span>: <span id="score">0</span></span>
                <span><span data-i18n="crossy.label.high_score">High</span>: <span id="high-score">0</span></span>
            </div>

            <canvas id="gameCanvas" width="256" height="256"></canvas>

            <div class="controls">
                <div class="ctrl-btn btn-up" onpointerdown="handleInput('ArrowUp', event)">▲</div>
                <div class="ctrl-btn btn-left" onpointerdown="handleInput('ArrowLeft', event)">◀</div>
                <div class="ctrl-btn btn-down" onpointerdown="handleInput('ArrowDown', event)">▼</div>
                <div class="ctrl-btn btn-right" onpointerdown="handleInput('ArrowRight', event)">▶</div>
            </div>

            <div class="help-text" data-i18n="crossy.help">Use arrows to cross roads and rivers.</div>
        </div>

        <div id="game-over">
            <h2 data-i18n="crossy.label.game_over">SPLAT!</h2>
            <p><span data-i18n="crossy.label.score">Score</span>: <span id="final-score">0</span></p>

ht="1" shape-rendering="crispEdges" fill="white"></rect><rect x="17" y="21" width="1" height="1" shape-rendering="crispEdges" fill="white"></rect><rect x="18" y="21" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="12" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="13" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="14" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="15" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="16" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="17" y="22" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="13" y="23" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="16" y="23" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="13" y="24" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="16" y="24" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="13" y="25" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="14" y="25" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="16" y="25" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="17" y="25" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect><rect x="18" y="25" width="1" height="1" shape-rendering="crispEdges" fill="black"></rect></svg></div>

        <div id="leaderboard-modal">

                data-i18n="crossy.btn.close">Close</button>

    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCCL6Z5DFTm-pZ_1EZJ_9Ukk9rWDIZky-U",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };

        if (typeof firebase !== 'undefined' && typeof firebase.initializeApp === 'function') {
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
            } else {
                firebase.app();
            }
        }
        const db = (typeof firebase !== 'undefined' && typeof firebase.firestore === 'function') ? firebase.firestore() : null;
        const auth = (typeof firebase !== 'undefined' && typeof firebase.auth === 'function') ? firebase.auth() : null;

        let uid = null;
        let username = "Guest";
        let personalHighScore = 0;

        const COLS = 8;
        const ROWS_VISIBLE = 8;
        const TILE = 32;
        const SPRITE_SIZE = 32;
        const CANVAS_W = COLS * TILE;
        const CANVAS_H = ROWS_VISIBLE * TILE;
        const BLACK_SPEED = 2 / TILE;
        const JAGGED_STEP = 8;
        const JAGGED_PATTERN = [-2, 1, -1, 2, 0, -1, 1, -2];
        const BLACK_KILL_OFFSET = Math.max.apply(null, JAGGED_PATTERN) / TILE;
        const RIVER_ROW = 1;
        const ROAD_ROW = 2;
        const GRASS_ROW = 0;
        const TREE_ROW = 3;

        const SPRITES = {
            CHICKEN: 0,
            CAR: 1,
            TRUCK: 2,
            LOG: 3,
            TREE: 4,
            GRASS: 5,
            ROAD: 6,
            RIVER: 7,
            SAFE_ZONE: 8
        };

        // Sprite sheet layout. Your file is 96x96, so use 'grid3x3'.
        // Other options: 'horizontal' (1x9 strip), 'vertical' (9x1 strip).
        const SPRITE_SHEET_LAYOUT = 'grid3x3';

        // Per-sprite collision hitboxes in sprite-local pixels (32x32 source).
        // Adjust these if your sprite art differs.
        const HITBOXES = {
            CAR: { x: 4, y: 10, w: 24, h: 12 },
            TRUCK: { x: 2, y: 8, w: 28, h: 16 },
            LOG: { x: 2, y: 12, w: 28, h: 8 },
            TREE: { x: 6, y: 2, w: 20, h: 28 },
            PLAYER: { x: 8, y: 6, w: 16, h: 20 }
        };

        function getHitboxX(itemX, len, type) {
            const hb = HITBOXES[type];
            const offset = hb.x / TILE;
            const width = hb.w / TILE;
            return {
                min: itemX + offset,
                max: itemX + (len - 1) + offset + width
            };
        }

        function getPlayerHitboxX() {
            const hb = HITBOXES.PLAYER;
            const offset = hb.x / TILE;
            const width = hb.w / TILE;
            return {
                min: player.x + offset,
                max: player.x + offset + width
            };
        }

        function overlapX(a, b) {
            return a.max > b.min && a.min < b.max;
        }

        let canvas, ctx;
        let spriteSheet = null;
        let spriteLoaded = false;
        let highScoreLoaded = false;
        let gameLoop;
        let lastTick = 0;
        let tickAccumulator = 0;
        let tickInterval = 220;
        let isGameOver = false;
        let isPaused = false;
        let score = 0;
        let topRow = 0;
        let player = { x: 3, y: 0, facing: 1 };
        let rows = [];
        let inputQueue = [];
        let cameraY = 0;
        let blackY = -1;
        let blackMoving = false;

        function rowType(y) {
            const cycle = ((y % 4) + 4) % 4;
            if (cycle === 0) return GRASS_ROW;
            if (cycle === 1) return ROAD_ROW;
            if (cycle === 2) return GRASS_ROW;
            return RIVER_ROW;
        }

        function generateRow(y) {
            const type = rowType(y);
            const row = {
                y: y,
                type: type,
                items: [],
                speed: 0,
                direction: 1,
                treeMask: []
            };

            if (type === ROAD_ROW) {
                row.direction = (y % 2 === 0) ? 1 : -1;
                row.speed = 0.04 + Math.min(0.12, score * 0.002);
                const spacing = Math.max(3, 6 - Math.floor(score / 20));
                const offset = Math.floor(Math.random() * COLS);
                for (let i = 0; i < COLS; i += spacing) {
                    const sprite = Math.random() < 0.5 ? SPRITES.CAR : SPRITES.TRUCK;
                    row.items.push({ x: (i + offset) % COLS, len: 1, sprite: sprite });
                }
            } else if (type === RIVER_ROW) {
                row.direction = (y % 2 === 1) ? 1 : -1;
                row.speed = 0.03 + Math.min(0.10, score * 0.0015);
                row.scrollOffset = 0;
                const spacing = Math.max(4, 7 - Math.floor(score / 25));
                const offset = Math.floor(Math.random() * COLS);
                for (let i = 0; i < COLS; i += spacing) {
                    row.items.push({ x: (i + offset) % COLS, len: 2 + Math.floor(Math.random() * 3) });
                }
            } else if (type === GRASS_ROW && y !== 0) {
                const treeCount = Math.min(4, Math.floor(score / 30) + Math.floor(Math.random() * 2));
                for (let i = 0; i < treeCount; i++) {
                    const tx = Math.floor(Math.random() * COLS);
                    if (y === player.y) {
                        const treeHb = getHitboxX(tx, 1, 'TREE');
                        const playerHb = getPlayerHitboxX();
                        if (overlapX(playerHb, treeHb)) continue;
                    }
                    row.treeMask[tx] = true;
                }
            }

            return row;
        }

        function ensureRows() {
            const maxY = cameraY + ROWS_VISIBLE + 2;
            while (rows.length === 0 || rows[rows.length - 1].y < maxY) {
                const nextY = rows.length === 0 ? 0 : rows[rows.length - 1].y + 1;
                rows.push(generateRow(nextY));
            }
        }

        window.addEventListener('pageshow', function () {
            initializePage();
        });

        function initializePage() {
            const onAuthReady = new Promise(function (resolve) {
                if (auth && auth.currentUser) {
                    uid = auth.currentUser.uid;
                    username = auth.currentUser.email ? auth.currentUser.email.split('@')[0] : "Guest";
                    return resolve();
                }
                if (!auth) return resolve();
                const unsubscribe = auth.onAuthStateChanged(function (user) {
                    if (user) {
                        uid = user.uid;
                        username = user.email ? user.email.split('@')[0] : "Guest";
                    }
                    unsubscribe();
                    return resolve();
                });
            });

            onAuthReady.then(function () {
                initGame();
            });
        }

        function initGame() {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            canvas = document.getElementById('gameCanvas');
            ctx = canvas.getContext('2d');

            loadSpriteSheet();

            document.addEventListener('keydown', function (e) {
                if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].indexOf(e.key) !== -1) {
                    e.preventDefault();
                }
                handleInput(e.key);
            });

            loadPersonalHighScore().then(function () {
                highScoreLoaded = true;
                updateStartButton();
            });
        }

        function loadSpriteSheet() {
            const img = new Image();
            img.onload = function () {
                spriteSheet = img;
                spriteLoaded = true;
                console.log('crossysprites.png loaded:', img.width + 'x' + img.height);
                console.log('Layout:', SPRITE_SHEET_LAYOUT);
                drawDebugInfo();
                updateStartButton();
            };
            img.onerror = function () {
                console.error('Failed to load crossysprites.png');
                showLoadError('Sprite sheet failed to load. Check that crossysprites.png exists.');
            };
            img.src = 'crossysprites.png';
        }

        function detectSpriteLayout() {
            if (SPRITE_SHEET_LAYOUT !== 'auto') return SPRITE_SHEET_LAYOUT;

            const w = spriteSheet.width;
            const h = spriteSheet.height;
            const ratio = w / h;

            if (ratio >= 6) return 'horizontal';
            if (ratio <= 0.2) return 'vertical';
            return 'grid3x3';
        }

        function getSpriteCoords(index) {
            const layout = detectSpriteLayout();
            if (layout === 'horizontal') {
                return { x: index * SPRITE_SIZE, y: 0, w: SPRITE_SIZE, h: SPRITE_SIZE };
            }
            if (layout === 'vertical') {
                return { x: 0, y: index * SPRITE_SIZE, w: SPRITE_SIZE, h: SPRITE_SIZE };
            }
            // grid3x3
            const col = index % 3;
            const row = Math.floor(index / 3);
            return { x: col * SPRITE_SIZE, y: row * SPRITE_SIZE, w: SPRITE_SIZE, h: SPRITE_SIZE };
        }

        function showLoadError(msg) {
            const modal = document.getElementById('start-game-modal');
            if (modal) {
                const p = modal.querySelector('p');
                if (p) p.innerText = msg;
            }
        }

        function drawDebugInfo() {
            if (!spriteSheet) return;
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('debug') !== '1') return;

            console.log('Sprite sheet size:', spriteSheet.width + 'x' + spriteSheet.height);
            console.log('Layout:', SPRITE_SHEET_LAYOUT);

            // Draw a tiny preview of each sprite across the top of the canvas
            ctx.fillStyle = 'white';
            ctx.fillRect(0, 0, CANVAS_W, 44);
            for (let i = 0; i < 9; i++) {
                const c = getSpriteCoords(i);
                ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, i * 34 + 2, 2, 32, 32);
                ctx.strokeStyle = 'black';
                ctx.strokeRect(i * 34 + 2, 2, 32, 32);
                ctx.fillStyle = 'black';
                ctx.font = '10px monospace';
                ctx.fillText(String(i), i * 34 + 14, 42);
            }
        }

        function updateStartButton() {
            if (spriteLoaded && highScoreLoaded) {
                const startButton = document.querySelector('#start-game-modal .sys-btn');
                startButton.disabled = false;
                startButton.innerText = window.t ? window.t('crossy.btn.start') : "Start Game";
                startButton.removeAttribute('data-i18n');
            }
        }

        function startGame() {
            document.getElementById('start-game-modal').style.display = 'none';
            resetGame();
        }

        async function loadPersonalHighScore() {
            const localHigh = localStorage.getItem('crossy_highscore');
            if (localHigh) personalHighScore = parseInt(localHigh);

            if (uid && db) {
                try {
                    const doc = await db.collection('leaderboard_crossy').doc(uid).get();
                    if (doc.exists) {
                        const cloudHigh = doc.data().score;
                        if (cloudHigh > personalHighScore) {
                            personalHighScore = cloudHigh;
                            localStorage.setItem('crossy_highscore', cloudHigh);
                        }
                    }
                } catch (e) { console.error(e); }
            }
            document.getElementById('high-score').innerText = personalHighScore;
        }

        async function saveHighScore(newScore) {
            if (newScore > personalHighScore) {
                personalHighScore = newScore;
                document.getElementById('high-score').innerText = personalHighScore;
                localStorage.setItem('crossy_highscore', personalHighScore);

                if (uid && db) {
                    try {
                        await db.collection('leaderboard_crossy').doc(uid).set({
                            username: username,
                            score: newScore,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch (e) { console.error(e); }
                }
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.appendChild(document.createTextNode(text));
            return div.innerHTML;
        }

        async function openLeaderboard() {
            const modal = document.getElementById('leaderboard-modal');
            modal.style.display = 'block';
            const list = document.getElementById('lb-content');
            list.innerText = window.t ? window.t('crossy.status.loading') : 'Loading...';
            list.removeAttribute('data-i18n');

            const user = auth ? auth.currentUser : null;
            if (user && db) {
                try {
                    const snapshot = await db.collection('leaderboard_crossy')
                        .orderBy('score', 'desc')
                        .limit(10)
                        .get();

                    list.innerHTML = '';
                    if (snapshot.empty) {
                        list.innerText = window.t ? window.t('crossy.status.no_scores') : "No scores yet!";
                        return;
                    }
                    let rank = 1;
                    snapshot.forEach(function (doc) {
                        const data = doc.data();
                        const isMe = (doc.id === user.uid);
                        const div = document.createElement('div');
                        div.className = 'lb-row ' + (isMe ? 'me' : '');

                        const rankSpan = document.createElement('span');
                        rankSpan.textContent = rank + '. ' + escapeHtml(data.username);
                        const scoreSpan = document.createElement('span');
                        scoreSpan.textContent = data.score;

                        div.appendChild(rankSpan);
                        div.appendChild(scoreSpan);
                        list.appendChild(div);
                        rank++;
                    });
                } catch (e) {
                    console.error("Error loading leaderboard:", e);
                    list.innerText = window.t ? window.t('crossy.status.error_loading') : "Error loading scores.";
                }
            } else {
                list.innerText = window.t ? window.t('crossy.status.login_required') : "Log in to see global scores.";
            }
        }

        function resetGame() {
            isGameOver = false;
            isPaused = false;
            document.getElementById('game-over').style.display = 'none';
            score = 0;
            topRow = 0;
            cameraY = 0;
            blackY = -1;
            blackMoving = false;
            document.getElementById('score').innerText = score;

            player = { x: 3, y: 0, facing: 1 };
            rows = [];
            inputQueue = [];
            ensureRows();

            if (gameLoop) cancelAnimationFrame(gameLoop);
            lastTick = performance.now();
            tickAccumulator = 0;
            gameLoop = requestAnimationFrame(loop);
        }

        function handleInput(key, event) {
            if (event) event.preventDefault();
            if (isGameOver || isPaused) return;
            if (inputQueue.length > 2) return;
            if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].indexOf(key) !== -1) {
                inputQueue.push(key);
            }
        }

        function tryMove(dx, dy) {
            const nx = player.x + dx;
            const ny = player.y + dy;

            if (dy > 0) blackMoving = true;

            if (nx < 0 || nx >= COLS) return;

            const currentRow = rows.find(function (r) { return r.y === player.y; });
            const nextRow = rows.find(function (r) { return r.y === ny; });

            if (dy !== 0 && currentRow && currentRow.type === RIVER_ROW) {
                let onLog = false;
                const playerHb = getPlayerHitboxX();
                currentRow.items.forEach(function (item) {
                    const itemHb = getHitboxX(item.x, item.len, 'LOG');
                    if (overlapX(playerHb, itemHb)) onLog = true;
                });
                if (!onLog) {
                    endGame();
                    return;
                }
            }

            if (nextRow && nextRow.treeMask) {
                const playerHbMin = nx + HITBOXES.PLAYER.x / TILE;
                const playerHbMax = playerHbMin + HITBOXES.PLAYER.w / TILE;
                const playerHb = { min: playerHbMin, max: playerHbMax };
                for (let tx = Math.floor(playerHbMin); tx <= Math.floor(playerHbMax); tx++) {
                    if (nextRow.treeMask[tx]) {
                        const treeHb = getHitboxX(tx, 1, 'TREE');
                        if (overlapX(playerHb, treeHb)) return;
                    }
                }
            }

            if (dx < 0) player.facing = -1;
            if (dx > 0) player.facing = 1;

            player.x = nx;
            player.y = ny;

            ensureRows();

            if (player.y > topRow) {
                topRow = player.y;
                score = topRow;
                document.getElementById('score').innerText = score;
            }

            cameraY = Math.max(0, player.y - (ROWS_VISIBLE - 4));
        }

        function update(timestamp) {
            if (isGameOver) return;

            const dt = timestamp - lastTick;
            lastTick = timestamp;
            tickAccumulator += dt;

            while (tickAccumulator >= tickInterval) {
                tickAccumulator -= tickInterval;
                processTick();
            }
        }

        function processTick() {
            if (inputQueue.length > 0) {
                const key = inputQueue.shift();
                if (key === 'ArrowUp') tryMove(0, 1);
                else if (key === 'ArrowDown') tryMove(0, -1);
                else if (key === 'ArrowLeft') tryMove(-0.5, 0);
                else if (key === 'ArrowRight') tryMove(0.5, 0);
            }

            rows.forEach(function (row) {
                if (row.type === ROAD_ROW || row.type === RIVER_ROW) {
                    row.items.forEach(function (item) {
                        item.x += row.speed * row.direction;
                        if (item.x > COLS) item.x -= COLS + item.len + 2;
                        if (item.x + item.len < 0) item.x += COLS + item.len + 2;
                    });
                }
                if (row.type === RIVER_ROW) {
                    row.scrollOffset -= row.speed * row.direction * TILE;
                    row.scrollOffset = ((row.scrollOffset % TILE) + TILE) % TILE;
                }
            });

            const playerRow = rows.find(function (r) { return r.y === player.y; });
            if (playerRow) {
                if (playerRow.type === ROAD_ROW) {
                    let hit = false;
                    const playerHb = getPlayerHitboxX();
                    playerRow.items.forEach(function (item) {
                        const spriteType = (item.sprite === SPRITES.TRUCK) ? 'TRUCK' : 'CAR';
                        const itemHb = getHitboxX(item.x, 1, spriteType);
                        if (overlapX(playerHb, itemHb)) hit = true;
                    });
                    if (hit) endGame();
                } else if (playerRow.type === RIVER_ROW) {
                    let onLog = false;
                    const playerHb = getPlayerHitboxX();
                    playerRow.items.forEach(function (item) {
                        const itemHb = getHitboxX(item.x, item.len, 'LOG');
                        if (overlapX(playerHb, itemHb)) onLog = true;
                    });
                    if (!onLog) endGame();
                    else {
                        player.x += playerRow.speed * playerRow.direction;
                        if (player.x < 0 || player.x >= COLS) endGame();
                    }
                }
            }

            if (blackMoving && !isGameOver) {
                blackY += BLACK_SPEED;
                if (player.y <= blackY + BLACK_KILL_OFFSET) endGame();
            }
        }

        function draw() {
            if (!spriteSheet) return;

            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

            const startRow = Math.floor(cameraY);
            const endRow = startRow + ROWS_VISIBLE + 1;

            for (let y = startRow; y < endRow; y++) {
                const row = rows.find(function (r) { return r.y === y; });
                if (!row) continue;
                const screenY = CANVAS_H - ((y - cameraY + 1) * TILE);

                drawTile(row.type, 0, screenY, CANVAS_W, TILE, y);

                if (row.treeMask) {
                    for (let x = 0; x < COLS; x++) {
                        if (row.treeMask[x]) {
                            drawSprite(SPRITES.TREE, x * TILE, screenY, TILE, TILE);
                        }
                    }
                }

                if (row.type === ROAD_ROW) {
                    row.items.forEach(function (item) {
                        const ix = Math.floor(item.x * TILE);
                        const c = getSpriteCoords(item.sprite || SPRITES.CAR);

                        if (row.direction < 0) {
                            ctx.save();
                            ctx.translate(ix + TILE, screenY);
                            ctx.scale(-1, 1);
                            ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, 0, 0, TILE, TILE);
                            ctx.restore();
                        } else {
                            ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, ix, screenY, TILE, TILE);
                        }
                    });
                }

                if (row.type === RIVER_ROW) {
                    row.items.forEach(function (item) {
                        const ix = Math.floor(item.x * TILE);
                        const c = getSpriteCoords(SPRITES.LOG);
                        for (let t = 0; t < item.len; t++) {
                            ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, ix + t * TILE, screenY, TILE, TILE);
                        }
                    });
                }
            }

            drawPlayer();
            drawBlack();
        }

        function drawTile(type, x, y, w, h, rowY) {
            if (type === RIVER_ROW) {
                const row = rows.find(function (r) { return r.y === rowY; });
                const offset = row ? (row.scrollOffset || 0) : 0;
                const startX = Math.floor(x - offset);
                for (let tx = startX; tx < x + w + TILE; tx += TILE) {
                    drawSprite(SPRITES.RIVER, tx, y, TILE, TILE);
                }
                return;
            }

            let spriteIndex = SPRITES.GRASS;
            if (type === ROAD_ROW) spriteIndex = SPRITES.ROAD;
            else if (type === GRASS_ROW && rowY === 0) spriteIndex = SPRITES.SAFE_ZONE;

            for (let tx = x; tx < x + w; tx += TILE) {
                drawSprite(spriteIndex, tx, y, TILE, TILE);
            }
        }

        function drawSprite(index, x, y, w, h) {
            if (!spriteSheet) return;
            const c = getSpriteCoords(index);
            ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, x, y, w, h);
        }

        function drawPlayer() {
            const screenY = CANVAS_H - ((player.y - cameraY + 1) * TILE);
            const screenX = Math.round(player.x * TILE);
            const facing = player.facing || 1;

            if (facing < 0) {
                ctx.save();
                ctx.translate(screenX + TILE / 2, screenY + TILE / 2);
                ctx.scale(-1, 1);
                const c = getSpriteCoords(SPRITES.CHICKEN);
                ctx.drawImage(spriteSheet, c.x, c.y, c.w, c.h, -TILE / 2, -TILE / 2, TILE, TILE);
                ctx.restore();
            } else {
                drawSprite(SPRITES.CHICKEN, screenX, screenY, TILE, TILE);
            }
        }

        function drawBlack() {
            const baseTop = Math.floor(CANVAS_H - ((blackY - cameraY + 1) * TILE));
            if (baseTop >= CANVAS_H) return;
            ctx.fillStyle = 'black';
            for (let x = 0; x < CANVAS_W; x += JAGGED_STEP) {
                const offset = JAGGED_PATTERN[Math.floor(x / JAGGED_STEP) % JAGGED_PATTERN.length];
                const top = Math.max(0, baseTop - offset);
                const h = CANVAS_H - top;
                if (h > 0) ctx.fillRect(x, top, JAGGED_STEP, h);
            }
        }

        function loop(timestamp) {
            if (!isGameOver) {
                update(timestamp);
                draw();
                gameLoop = requestAnimationFrame(loop);
            }
        }

        function endGame() {
            isGameOver = true;
            if (gameLoop) cancelAnimationFrame(gameLoop);
            saveHighScore(score);
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'block';
            draw();
        }
    </script>

</body>

</html>
