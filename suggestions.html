                document.getElementById('new-title').value = '';
                document.getElementById('new-desc').value = '';
            };

            window.submitSuggestion = function () {
                const btn = document.getElementById('submit-sugg-btn');
                const title = document.getElementById('new-title').value.trim();
                const desc = document.getElementById('new-desc').value.trim();
                const category = document.getElementById('new-category').value;
                const device = document.getElementById('new-device').value.trim();
                const app = document.getElementById('new-app').value.trim();

                const radios = document.getElementsByName('sugg-type');
                let type = 'suggestion';
                for (var i = 0; i < radios.length; i++) {
                    if (radios[i].checked) {
                        type = radios[i].value;
                        break;
                    }
                }

                if (!title || !desc) {
                    showMessage("Missing Info", "Please fill in title and description.");
                    return;
                }

                if (type === 'problem' && !device) {
                    showMessage("Missing Info", "Please specify your device for problems.");
                    return;
                }

                if (type === 'translation' && !app) {
                    showMessage("Missing Info", "Please specify which app this translation applies to.");
                    return;
                }

                if (containsBadWords(title) || containsBadWords(desc)) {
                    showMessage(window.t ? window.t('suggestions.msg.profanity_title') : 'Family-Friendly', window.t ? window.t('suggestions.msg.profanity') : 'Please keep suggestions and comments family-friendly.');
                    return;
                }


                // Logic moved to earlier in function for validation
                // const radios = ... 


                // Disable button to prevent multiple submissions
                if (btn) {
                    btn.disabled = true;
                    btn.textContent = 'Submitting...';
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                }

                // Check for duplicates in already-loaded data
                var isDuplicate = false;
                for (var sIdx = 0; sIdx < allSuggestions.length; sIdx++) {
                    if (allSuggestions[sIdx].title === title && allSuggestions[sIdx].description === desc) {
                        isDuplicate = true;
                        break;
                    }
                }
                if (isDuplicate) {
                    showMessage("Duplicate", "A suggestion with this exact title and description already exists.");
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Submit';
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                    return;
                }

                // No duplicate found, proceed to add
                var newRef = rtdb.ref('suggestions').push();
                newRef.set({
                    title: title,
                    description: desc,
                    type: type,
                    category: category,
                    device: (type === 'problem') ? device : null,
                    app: (type === 'translation') ? app : null,
                    authorUid: currentUser.uid,
                    authorName: currentUser.displayName || currentUser.email.split('@')[0],
                    upvotes: {},
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                }).then(function () {
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Submit';
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                    closeModal();
                }).catch(function (err) {
                    console.error(err);
                    showMessage("Error", "Error submitting. Content too long?");
                    if (btn) {
                        btn.disabled = false;
                        btn.textContent = 'Submit';
                        btn.style.opacity = '1';
                        btn.style.cursor = 'pointer';
                    }
                });
            };

            // MODAL SYSTEM
            window.showMessage = function (title, text) {
                document.getElementById('msg-title').textContent = title;
                document.getElementById('msg-body').textContent = text;
                document.getElementById('msg-modal-overlay').style.display = 'flex';
            };

            window.closeMsgModal = function () {
                document.getElementById('msg-modal-overlay').style.display = 'none';
            };

            // UTILS
            function escapeHtml(text) {
                if (!text) return "";
                return text
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#039;");
            }

            function censorText(text) {
                if (!text || !window.filterBadWords) return text || '';
                return window.filterBadWords(String(text));
            }

            function containsBadWords(text) {
                if (!text || !window.filterBadWords) return false;
                return window.filterBadWords(String(text)) !== String(text);
            }

            function escapeJsString(text) {
                if (!text) return '';
                return String(text)
                    .replace(/\\/g, '\\\\')
                    .replace(/'/g, "\\'")
                    .replace(/\n/g, '\\n')
                    .replace(/\r/g, '\\r')
                    .replace(/\u0026/g, '\u0026amp;')
                    .replace(/\u003c/g, '\u0026lt;')
                    .replace(/\u003e/g, '\u0026gt;')
                    .replace(/"/g, '\u0026quot;');
            }

        } catch (e) {
            console.error("CRITICAL INIT ERROR", e);
            document.body.innerHTML = '<div style="padding:20px;">CRITICAL ERROR: ' + e.message + '</div>';
        }

        function showConfirm(msg, onOk, onCancel) {
            var d = document.createElement('div');
            d.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:10000;display:flex;align-items:center;justify-content:center;';
            d.innerHTML = '<div style="background:white;border:2px solid black;box-shadow:4px 4px 0 black;padding:20px;max-width:320px;font-family:sans-serif;text-align:center;"><p style="margin-bottom:16px;">' + msg + '</p><div><button id="sc-ok" style="border:2px solid black;box-shadow:2px 2px 0 black;padding:6px 16px;background:black;color:white;font-weight:bold;cursor:pointer;margin-right:10px;">OK</button><button id="sc-cancel" style="border:2px solid black;box-shadow:2px 2px 0 black;padding:6px 16px;background:white;font-weight:bold;cursor:pointer;">Cancel</button></div></div>';
            document.body.appendChild(d);
            d.querySelector('#sc-ok').onclick = function() { d.remove(); if (onOk) onOk(); };
            d.querySelector('#sc-cancel').onclick = function() { d.remove(); if (onCancel) onCancel(); };
        }

        var _confirmCallback = null;
        function showConfirmModal(msg, callback) {
            var m = document.getElementById('confirm-modal');
            if (m) {
                document.getElementById('confirm-modal-message').innerText = msg;
                _confirmCallback = callback;
                m.style.display = 'flex';
            } else {
                showConfirm(msg, callback);
            }
        }
        function onConfirmYes() {
            if (_confirmCallback) _confirmCallback();
            closeConfirmModal();
        }
        function closeConfirmModal() {
            var m = document.getElementById('confirm-modal');
            if (m) m.style.display = 'none';
            _confirmCallback = null;
        }
    </script>

    <script src="https://cdn.counter.dev/script.js" data-id="4e551911-0e5d-4c48-91a6-b828c3301675"
        data-utcoffset="11"></script>
    <!-- REKINDLE MODALS -->
    <div id="confirm-modal" class="modal-overlay"
        style="z-index:99999; display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); align-items:center; justify-content:center;">
        <div class="modal-box"
            style="background:#fff; border:2px solid #000; padding:20px; max-width:300px; width:80%; text-align:center; box-shadow:4px 4px 0 rgba(0,0,0,0.2);">
            <h3 id="confirm-modal-title" style="margin-top:0;">Confirm</h3>
            <p id="confirm-modal-message"></p>
            <div style="margin-top: 15px; display: flex; justify-content: center">
                <button class="sys-btn" onclick="onConfirmYes()"
                    style="border:2px solid #000; background:#000; color:#fff; padding:5px 15px; font-weight:bold; cursor:pointer;">Yes</button>
                <button class="sys-btn" onclick="closeConfirmModal()"
                    style="border:2px solid #000; background:#fff; padding:5px 15px; font-weight:bold; cursor:pointer;; margin-left: 10px">No</button>
            </div>
        </div>
    </div>
