<!DOCTYPE html>
<html lang="en">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <meta charset="UTF-8">

    <title>Food Log</title>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <style>
        /* COMPATIBILITY FIX: Global Animation Kill Switch for E-ink */
        *, *::before, *::after {
            transition: none !important;
            animation: none !important;
        }

        /* SYSTEM 7 AESTHETICS */
        :root {
            --bg-color: #ffffff;
            --text-color: #000000;
            --border: 2px solid #000000;
            --shadow: 4px 4px 0px #000000;
            --stripe-pattern: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 3px, #000 4px);
        }

        body {
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            background-repeat: repeat;
            background-position: top left;

            font-family: "Geneva", "Verdana", sans-serif;
            margin: 0;
            padding: 20px;
            height: 100vh;
            overflow: hidden;
            background-color: #e5e5e5;

            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            user-select: none;
            box-sizing: border-box;
        }

        /* WINDOW FRAME */
        .window {
            background: white;
            border: 2px solid black;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            min-height: var(--scaled-window-vh, 90vh); /* Scaling fix / auto scaling integrated */
            max-height: var(--scaled-window-vh, 90vh);
            width: 100%;
            max-width: 600px;
            position: relative;
        }

        /* TITLE BAR */
        .title-bar {
            height: 35px;
            border-bottom: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
            padding: 0 10px;
            position: relative;
            flex-shrink: 0;
        }

        .title-stripes {
            position: absolute;
            top: 4px;
            bottom: 4px;
            left: 4px;
            right: 4px;
            background-image: var(--stripe-pattern);
            z-index: 0;
        }

        .title-text {
            background: white;
            padding: 0 15px;
            font-weight: bold;
            z-index: 1;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            height: 100%;
            box-sizing: border-box;
        }

        /* CLOSE BUTTON */
        .close-box {
            position: absolute;
            left: 10px;
            width: 18px;
            height: 18px;
            border: 2px solid black;
            background: white;
            z-index: 2;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            line-height: 1;
            box-shadow: 2px 2px 0 black;
        }

        .close-box:active {
            background: black;
            color: white;
            transform: translate(1px, 1px);
            box-shadow: none;
        }

        /* CONTROLS */
        .period-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            border-bottom: 2px solid black;
            background: #eee;
            flex-shrink: 0;
        }

        .period-display {
            font-weight: bold;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .nav-btn {
            background: white;
            border: 2px solid black;
            padding: 5px 15px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
        }

        .nav-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        /* SCROLLABLE CONTENT */
        .window-content {
            flex-grow: 1;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            overflow: hidden; /* Prevent full body scroll, let sections scroll internally */
            background: white;
        }

        /* MEAL SECION LAYOUT */
        .meal-section {
            display: flex;
            flex-direction: column;
            border-bottom: 2px solid black;
            border-right: 2px solid black;
            min-height: 0; /* Let flexbox shrink it properly */
            min-width: 0;
        }

        .meal-section:nth-child(even) {
            border-right: none;
        }

        .meal-section:nth-child(n+3) {
            border-bottom: none;
        }
        
        .meal-header {
            background: #ccc;
            padding: 5px 5px;
            font-weight: bold;
            border-bottom: 1px solid black;
            flex-shrink: 0;
            text-align: center;
            font-size: 0.95rem; /* slightly smaller to fit quadrants cleanly */
        }
        
        .meal-items {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .meal-input-row {
            display: flex;
            padding: 5px;
            background: #e0e0e0;
            border-top: 1px dashed #ccc;
            flex-shrink: 0;
        }
        
        .meal-input-row > * + * {
            margin-left: 5px;
        }

        /* ENTRIES */
        .food-entry {
            display: flex;
            justify-content: space-between;
            padding: 5px 8px;
            border-bottom: 1px dashed #ccc;
            align-items: center;
        }

        .food-entry:last-child {
            border-bottom: none;
        }

        .food-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            min-width: 0;
            margin-right: 5px;
        }

        .food-name {
            font-weight: bold;
            font-size: 0.95rem;
            word-break: break-word;
            line-height: 1.2;
        }

        .food-note {
            font-size: 0.8rem;
            color: #444;
            word-break: break-word;
            margin-top: 2px;
        }

        .delete-btn {
            background: transparent;
            border: 2px solid black;
            font-weight: bold;
            padding: 2px 6px;
            font-size: 0.7rem;
            cursor: pointer;
            margin-left: 5px;
            flex-shrink: 0;
        }

        .delete-btn:active {
            background: black;
            color: white;
        }

        /* INPUT FIELDS */
        .sys-input {
            border: 2px solid black;
            padding: 5px;
            font-size: 0.9rem;
            font-family: inherit;
            flex-grow: 1;
            min-width: 0; /* Prevents flex blowout */
        }

        .sys-btn {
            border: 2px solid black;
            background: white;
            padding: 5px 8px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 2px 2px 0 black;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .sys-btn:active {
            background: black;
            color: white;
            box-shadow: none;
            transform: translate(1px, 1px);
        }

        /* STATUS BAR */
        #status-bar {
            font-size: 0.7rem;
            text-align: center;
            padding: 4px;
            background: #ccc;
            border-top: 1px solid black;
            flex-shrink: 0;
        }

    </style>
    <script src="time.js"></script>
    <script src="theme.js?v=18"></script>
    <script src="js/i18n.js"></script>
</head>

<body>

    <div class="window">
        <div class="title-bar">
            <div class="title-stripes"></div>
            <div class="close-box" onclick="window.location.href='index'">X</div>
            <span class="title-text" data-i18n="food.title">Food Log</span>
        </div>

        <div class="period-controls">
            <button class="nav-btn" onclick="changeDay(-1)">&lt;</button>
            <span class="period-display" id="current-day-label">...</span>
            <button class="nav-btn" onclick="changeDay(1)">&gt;</button>
        </div>

        <div class="window-content" id="food-list">
            <!-- Dynamically populated meal sections -->
        </div>

        <div id="status-bar">Local Mode</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "__REKINDLE_FIREBASE_API_KEY__",
            authDomain: "rekindle-fork.firebaseapp.com",
            projectId: "rekindle-fork",
            storageBucket: "rekindle-fork.firebasestorage.app",
            messagingSenderId: "136525921771",
            appId: "1:136525921771:web:1ab69288e786dbfd9e2dae"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Configuration mapping
        const MEAL_CATEGORIES = [
            { id: 'breakfast', labelKey: 'food.cat.breakfast', labelDefault: 'Breakfast' },
            { id: 'lunch', labelKey: 'food.cat.lunch', labelDefault: 'Lunch' },
            { id: 'dinner', labelKey: 'food.cat.dinner', labelDefault: 'Dinner' },
            { id: 'snacks', labelKey: 'food.cat.snacks', labelDefault: 'Snacks' }
        ];

        // --- STATE ---
        // Local state format: { "YYYY-MM-DD": { entries: [ { id: 123, name: "Apple", category: "snacks" } ] } }
        let logData = {};
        let currentDate = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
        let currentUser = null;
        let unsubscribe = null;

        // --- INIT ---
        window.onload = () => {
            if (window.rekindleApplyWallpaper) window.rekindleApplyWallpaper();
            
            // Normalize current time to start of day
            currentDate.setHours(0, 0, 0, 0);

            // Scaffold internal elements right away so events bind correctly
            initLayout();

            auth.onAuthStateChanged(user => {
                if (user) {
                    currentUser = user;
                    const syncedText = window.t ? window.t('status.synced', 'Synced: ') : 'Synced: ';
                    document.getElementById('status-bar').innerText = syncedText + user.email;
                    loadCloudData();
                } else {
                    const guestText = window.t ? window.t('status.guest', 'Guest Mode (Local)') : 'Guest Mode (Local)';
                    document.getElementById('status-bar').innerText = guestText;
                    loadLocalData();
                }
            });
        };

        // Builds the sections structure
        function initLayout() {
            const listContainer = document.getElementById('food-list');
            listContainer.innerHTML = '';
            
            MEAL_CATEGORIES.forEach(cat => {
                const section = document.createElement('div');
                section.className = 'meal-section';
                section.id = 'meal-section-' + cat.id;

                const header = document.createElement('div');
                header.className = 'meal-header';
                header.setAttribute('data-i18n', cat.labelKey);
                // Attempt to translate immediately if script loaded
                header.innerText = window.t ? window.t(cat.labelKey, cat.labelDefault) : cat.labelDefault;

                const itemsDiv = document.createElement('div');
                itemsDiv.className = 'meal-items';
                itemsDiv.id = 'items-' + cat.id;

                const inputRow = document.createElement('div');
                inputRow.className = 'meal-input-row';

                const nameInput = document.createElement('input');
                nameInput.type = 'text';
                nameInput.id = 'input-name-' + cat.id;
                nameInput.className = 'sys-input';
                // Adjust placeholder based on available space for quadrant layout
                const namePh = window.t ? window.t('food.btn.add', 'Add') : 'Add';
                nameInput.placeholder = namePh + '...';

                const noteInput = document.createElement('input');
                noteInput.type = 'text';
                noteInput.id = 'input-note-' + cat.id;
                noteInput.className = 'sys-input';
                const notePh = window.t ? window.t('food.placeholder.note', 'Note') : 'Note';
                noteInput.placeholder = notePh + '...';

                const btn = document.createElement('button');
                btn.className = 'sys-btn';
                btn.onclick = () => addEntry(cat.id);
                btn.innerText = '+';

                // Handle "Enter" key on input fields inside this section
                const onEnter = function(e) { if (e.key === 'Enter') addEntry(cat.id); };
                nameInput.addEventListener('keypress', onEnter);
                noteInput.addEventListener('keypress', onEnter);

                inputRow.appendChild(nameInput);
                inputRow.appendChild(noteInput);
                inputRow.appendChild(btn);

                section.appendChild(header);
                section.appendChild(itemsDiv);
                section.appendChild(inputRow);

                listContainer.appendChild(section);
            });

            // Rescan i18n
            if (window.i18nRescan) window.i18nRescan();
        }

        function getDateKey(d) {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return y + "-" + m + "-" + day;
        }

        // --- DATA LOADING ---
        function loadLocalData() {
            logData = JSON.parse(localStorage.getItem('food_log_data')) || {};
            renderView();
        }

        function loadCloudData() {
            if (unsubscribe) unsubscribe();

            const docRef = db.collection('users').doc(currentUser.uid).collection('food_logs');
            unsubscribe = docRef.onSnapshot(snap => {
                logData = {};
                snap.forEach(doc => {
                    logData[doc.id] = doc.data();
                });
                renderView();
            }, error => {
                console.error("Error fetching cloud data:", error);
                document.getElementById('status-bar').innerText = "Sync Error - Running local copy";
            });
        }

        function isDayEmpty(data) {
            if (!data) return true;
            return !data.entries || data.entries.length === 0;
        }

        function saveData() {
            const dateKey = getDateKey(currentDate);
            const dayData = logData[dateKey];
            const empty = isDayEmpty(dayData);
            
            if (currentUser) {
                const docRef = db.collection('users').doc(currentUser.uid).collection('food_logs').doc(dateKey);
                
                if (!empty) {
                    docRef.set(dayData).catch(err => console.error("Error saving to cloud", err));
                } else {
                    docRef.delete().catch(err => console.error("Error deleting from cloud", err));
                    delete logData[dateKey];
                }
            } else {
                if (empty) {
                    delete logData[dateKey];
                }
                localStorage.setItem('food_log_data', JSON.stringify(logData));
                renderView(); 
            }
        }

        // --- ACTIONS ---
        window.addEntry = function(catId) {
            const foodInput = document.getElementById('input-name-' + catId);
            const noteInput = document.getElementById('input-note-' + catId);
            
            const name = foodInput.value.trim();
            const note = noteInput ? noteInput.value.trim() : '';
            if (!name) return;

            const dateKey = getDateKey(currentDate);
            if (!logData[dateKey]) {
                logData[dateKey] = { entries: [] };
            }

            const newEntry = {
                id: Date.now(),
                name: name,
                note: note,
                category: catId
            };

            if (!logData[dateKey].entries) logData[dateKey].entries = [];
            logData[dateKey].entries.push(newEntry);
            
            foodInput.value = '';
            if (noteInput) noteInput.value = '';
            foodInput.focus();

            saveData();
        };

        window.deleteEntry = function(entryId) {
            const dateKey = getDateKey(currentDate);
            if (!logData[dateKey] || !logData[dateKey].entries) return;

            logData[dateKey].entries = logData[dateKey].entries.filter(function(e) {
                return e.id !== entryId;
            });

            saveData();
        };

        window.changeDay = function(delta) {
            currentDate.setDate(currentDate.getDate() + delta);
            renderView();
        }

        // --- VIEW ---
        function renderView() {
            // Update Header Label
            const lang = document.documentElement.lang || 'en';
            const dateStr = (function(zd) {
                var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
                return days[zd.getDay()] + ', ' + months[zd.getMonth()] + ' ' + zd.getDate();
            })(typeof rekindleGetZonedDate === 'function' ? rekindleGetZonedDate(currentDate) : currentDate);
            
            const today = window.rekindleGetZonedDate ? window.rekindleGetZonedDate() : new Date();
            today.setHours(0, 0, 0, 0);
            
            const isToday = currentDate.getTime() === today.getTime();
            const todayLabel = window.t ? window.t('food.label.today', 'Today') : 'Today';
            document.getElementById('current-day-label').innerText = isToday ? (todayLabel + " - " + dateStr) : dateStr;

            const dateKey = getDateKey(currentDate);
            const dayData = logData[dateKey];
            const entries = dayData && dayData.entries ? dayData.entries : [];

            // Render into the sections
            MEAL_CATEGORIES.forEach(cat => {
                const listContainer = document.getElementById('items-' + cat.id);
                if (!listContainer) return;
                listContainer.innerHTML = ''; // reset inner items

                // By default old items (or missing cat) map nicely to 'snacks'
                const catEntries = entries.filter(e => e.category === cat.id || (!e.category && cat.id === 'snacks'));

                if (catEntries && catEntries.length > 0) {
                    catEntries.forEach(entry => {
                        const row = document.createElement('div');
                        row.className = 'food-entry';

                        const infoDiv = document.createElement('div');
                        infoDiv.className = 'food-info';

                        const nameSpan = document.createElement('div');
                        nameSpan.className = 'food-name';
                        nameSpan.textContent = entry.name;
                        infoDiv.appendChild(nameSpan);

                        if (entry.note) {
                            const noteSpan = document.createElement('div');
                            noteSpan.className = 'food-note';
                            noteSpan.textContent = entry.note;
                            infoDiv.appendChild(noteSpan);
                        }

                        row.appendChild(infoDiv);

                        const delBtn = document.createElement('button');
                        delBtn.className = 'delete-btn';
                        delBtn.textContent = 'X';
                        delBtn.onclick = () => deleteEntry(entry.id);
                        row.appendChild(delBtn);

                        listContainer.appendChild(row);
                    });
                }
            });
        }

    </script>
</body>
</html>
