name = "rekindle-stripe"
main = "worker.js"
compatibility_date = "2024-12-05"

[vars]
FIREBASE_PROJECT_ID = "rekindle-fork"
# Secrets to be set via `wrangler secret put`:
# STRIPE_WEBHOOK_SECRET
# STRIPE_KEY
# FIREBASE_CLIENT_EMAIL
# FIREBASE_PRIVATE_KEY
# STRIPE_PRICE_MONTHLY   (find in Stripe Dashboard: Products → Monthly → Price ID)
# STRIPE_PRICE_YEARLY    (find in Stripe Dashboard: Products → Yearly → Price ID)
# STRIPE_PRICE_LIFETIME  (find in Stripe Dashboard: Products → Lifetime → Price ID)
